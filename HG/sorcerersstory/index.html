<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sorcerer's Story — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "sorcerersstory", "title": "Sorcerer's Story", "scenes": {"1v1": "*set mana 100\n*set health 100\n\nYou jump up and grab the elixer with both hands. Are you afraid of dropping it?\n\n*fake_choice\n  #Yes, it's my only chance.\n    Despite almost fumbling it away, you end up catching it relatively easily.\n  #No, I know I can do this.\n    You don't know if it's your confidence that did it, but you hold on to the elixer.\n\nAs you're mid-air, however, you hear a scream behind and below you. You check behind you as you land and it's just as you feared: Karol was unable to hold on to the ledge for long enough and has fallen to her death. You wish that you were in a place where magic worked, as you could have used a blast magic spell to levitate her to save her.\n\n\"Well, it appears you got what you wanted: a fight against me,\" Blaine says to you. \"I mean, I would call you noble, having fought alongside your friends, but they don't appear to mean very much to you. Your ego is so big, you want to face me alone instead of saving her. Perhaps, we're not so different.\"\n\nThis shakes you up briefly, you know in your heart that you're nothing like Blaine. You didn't disrupt the lives of several citizens, you didn't attack public places, you never advocated for public shootings to bring down your enemies.\n\n\"No response, is there?\" Blaine asked, clearly not knowing your thoughts. \"Well come on, drink the elixer and step into the place where magic actually works so I can beat you while you're at your full power.\"\n\n\nYou're annoyed both at his arrogance, and at him telling you what to do, but that was your plan anyway so you decide to play along, for now, moving so that both of you are in a place where both of you can cast magic.\n\n*temp Blaine\n\n*set Blaine 20\n\n*page_break\n\n\"So, before we begin,\" Blaine started, as if he stalling for time, \"I must ask you, is this a dream come true for you? For everything to be riding on a fight between the two of us?\"\n\n*choice\n  #I attack him to get the upper hand. Gotta take any advantage I can. Plus, he needs to shut up.\n    *goto attack\n  #I answer his question. I'll beat him anyway, so best to rub it in his face.\n    *goto interact\n\n*label interact\n\nWhat do you say?\n\n*choice\n  #\"Not really. I'll take it though.\"\n    He snickers back. \"Well, alright,\" he says before getting ready to fight you.\n    *goto attack\n  #\"Of course. Shame others had to die.\"\n    \"Oh, that's not a shame, at least not to me,\" he responds, knowing that such a remark would push your buttons.\n    *goto attack\n  #\"God no. It's a nightmare for you, though.\"\n    \"Oh clever,\" he says in a condescending tone before getting ready to fight you.\n    *goto attack\n  #\"I'm just here to do what must be done.\"\n    \"So am I,\" he says, referring to killing you and taking over the world.\n    *goto attack\n\n*label attack\n\nSlightly distracted by your conversation, Blaine can't see that you have an open opportunity to attack him. You take this chance to catch him off guard with a single attack. What kind of attack do you use?\n\n*choice\n  #A blast spell. Let's stick with the basics and just deal direct damage.\n    *if blast > 60\n      You use a fireball to engulf him in flames, dealing noticeable damage to him.\n      *set Blaine -3\n      *set mana -10\n      *set blast +1\n      *goto fight_1\n    You use a fireball to engulf him in flames, but its not powerful enough to do as much damage to him as you had initially hoped for.\n    *set Blaine -2\n    *set mana -10\n    *set blast +1\n    *goto fight_1\n  #A summon spell. One-on-one can be boring. Let's mix this up.\n    *if summon > 60\n      You summon a powerful buffalo that charges at him, trampling him for plenty of excess damage.\n      *set Blaine -3\n      *set mana -10\n      *set summon +1\n      *goto fight_1\n    You summon a powerful buffalo that charges at him, but it doesn't deal as much damage to him as you would have liked.\n    *set Blaine -2\n    *set mana -10\n    *set summon +1\n    *goto fight_1\n  #A transform spell. It might not work on him, but I can use it to my advantage.\n    *if transform > 60\n      You turn yourself into a bull and charge directly into Blaine, flipping him into the air like its a rodeo.\n      *set Blaine -3\n      *set mana -10\n      *set transform +1\n      *goto fight_1\n    You turn yourself into a bull and charge directly into Blaine, but are unable to flip him and deal the kind of damage that you felt you should have.\n    *set Blaine -2\n    *set mana -10\n    *set transform +1\n    *goto fight_1\n  #A physical attack. I'm going to save some mana.\n    *if fitness > 65\n      You blindside Blaine with a kick to the head, causing him to reel from damage.\n      *set Blaine -3\n      *set fitness +1\n      *goto fight_1\n    You blindside Blaine with a kick to the head, but don't deal very much actual damage to him.\n    *set Blaine -2\n    *set fitness +1\n    *goto fight_1\n\n*label fight_1\n\n\"Bit of a cheap shot, there isn't it. Not very like you. Guess you do need to cheat to beat me,\" he gloats, as if proud that he was just blindsided like that. You're not in the mood to talk however, as the situation is very serious and you don't want to let your guard down in the same way that he did.\n\nAs you turn to face him, you realize that you did more damage than you originally thought and that he may in fact just be putting on a tough guy image in order to intimidate you. With your increased confidence, you prepare to make another attack, not wanting to give him the chance to fight back, because you know he would have the chance to take you down. What attack type do you use to further damage him?\n\n*choice\n  #A blast spell. I'm not going to waste time being creative\n    *if blast > 60\n      You use a fireball to burn him heavily, dealing noticeable damage to him.\n      *set Blaine -3\n      *set mana -10\n      *set blast +1\n      *goto fight_2\n    You use a fireball to burn him heavily, but it's not powerful enough to do as much damage to him as you had initially hoped for.\n    *set Blaine -2\n    *set mana -10\n    *set blast +1\n    *goto fight_2\n  #A summon spell. I'd like to have an ally, even if it's only temporary.\n    *if summon > 60\n      You summon a powerful wildebeest that charges at him, running him over for plenty of excess damage.\n      *set Blaine -3\n      *set mana -10\n      *set summon +1\n      *goto fight_2\n    You summon a powerful wildebeest that charges at him, but it doesn't deal as much damage to him as you initially would have thought.\n    *set Blaine -2\n    *set mana -10\n    *set summon +1\n    *goto fight_2\n  #A transform spell. It might not work on him, but I can use it on myself to become stronger.\n    *if transform > 60\n      You transform yourself into a crocodile, biting him for a large amount of damage. \n      *set Blaine -3\n      *set mana -10\n      *set transform +1\n      *goto fight_2\n    You turn yourself into a crocodile, dealing some bite damage but less than you initially thought would work.\n    *set Blaine -2\n    *set mana -10\n    *set transform +1\n    *goto fight_2\n  #A physical attack. I'm not going to use my mana straight away.\n    *if fitness > 65\n      You blindside Blaine with a karate chop, causing him to fall down and receive heavy damage.\n      *set Blaine -3\n      *set fitness +1\n      *goto fight_2\n    You blindside Blaine with a karate chop but only do limited damage to him.\n    *set Blaine -2\n    *set fitness +1\n    *goto fight_2\n\n*label fight_2\n\nFurious that you were able to land two blows on him before he was even able to attack, Blaine seems to recover from the second attack right away. Seeming to have learned his lesson about talking too much, he begins to fight back, summoning a cheetah to sprint at you. You realize you can't outrun it, and you have very little if any chance to avoid being hit. What do you do?\n\n*choice\n  #Attack the cheetah with a telekinetic blast, sending it back.\n    *if blast > 60\n      Your blast is powerful enough to send the cheetah flying back. It lands harshly and then disappears instantly.\n      *set blast +1\n      *set mana -10\n      *goto fight_3\n    Your blast is only strong enough to slow the Cheetah down, and it still gets in a swat at you before disappearing.\n    *set blast +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #Summon your own Cheetah to fight back.\n    *if summon > 60\n      You summon a more powerful cheetah that overpowers his. You're able to catch him off guard, but your Cheetah is unable to get to him before disappearing.\n      *set summon +1\n      *set mana -10\n      *goto fight_3\n    Your cheetah isn't strong enough to fend off his, and his cheetah still pounces on you.\n    *set summon +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #Transform the cheetah into something weaker. I can't use transform on Blaine, but I can do it on his minions.\n    *if transform > 60\n      You transform the cheetah into a mouse. The irony of a cat becoming a mouse quickly dawns on you, but Blaine then recalls it, allowing the battle to resume.\n      *set transform +1\n      *set mana -10\n      *goto fight_3\n    You attempt to transform the cheetah into something else, but it doesn't work and it runs you over before quickly disappearing.\n    *set transform +1\n    *set mana -10\n    *set health -10\n    *goto fight_3\n  #Side step to dodge. Cheetahs are fast, but bad at changing direction. I might be able to avoid it.\n    *if fitness > 65\n      You are somehow agile enough to dodge the cheetah, who runs right by you and then disappears, having failed in its attempt to catch you.\n      *set fitness +1\n      *goto fight_3\n    You are not fast enough to dodge the cheetah which is able to land a few hits before disappearing.\n    *set fitness +1\n    *set health -10\n    *goto fight_3\n\n*label fight_3\n\nBlaine now decides to hold on for a minute. Instead of firing at you, he shoots a fireball at a wall near neither of you, setting it ablaze. As the smoke starts to form between you, he starts to run for a distant part of the room. Unsure of what he's doing, you wonder whether or not you should follow him there or not.\n\n*choice\n  #Obviously I should follow him, he obscured my vision so that it would be harder to do so. He's hiding something.\n    *goto follow_Blaine\n  #No way, this is clearly a trap.\n    *goto no_follow_Blaine\n\n*label follow_Blaine\n\nTurns out, he wasn't going anywhere and just wanted you to be in a cloud of smoke so that you wouldn't see his attack coming. He hits you with a blast of electricity that topples you over. You can hear Blaine laugh after he hits you, indicating he got great joy out of his little trick.\n\n*set health -10\n\n*goto fight_4\n\n*label no_follow_Blaine\n\nYou see him blast the area where you would have been had you chased him. Whew! That was close. You put together that his trick was designed to draw you out into an exposed position, and know to keep an eye out for future tricks.\n\n*goto fight_4\n\n*label fight_4\n\nAfter that attack, it's clear that Blaine doesn't intend to give you a straight-up one-on-one fight. Instead, he plans on using 'smoke and mirror' type of moves in order to take cheap shots. You now see his shadow through the smoke. You'll need more skill to hit him, but if you do, he won't be able to respond. Do you take it? Keep in mind that since he's in the distance, meaning that any 'free shot' you take at him can't be physical, so you can't punch him or transform yourself.\n\n*choice\n  #Yes, it's a chance to do damage before he hits me.\n    *goto take_shot\n  #No. My energy and mana are limited, and I don't want to waste it on a difficult shot.\n    *goto no_shot\n\n*label take_shot\n\nWhat kind of attack do you make? \n\n*choice\n  #Blast magic\n    *if blast > 65\n      You're somehow able to hit him with a blast of frost from a distance, dealing a solid amount of damage.\n      *set blast +1\n      *set mana -10\n      *set Blaine -3\n      *goto fight_5\n    You shoot a blast of frost at his, missing him. He seems to be damaged by the surrounding cold, but you're kind of embarrassed by the fact that your main attack missed.\n    *set blast +1\n    *set mana -10\n    *set Blaine -2\n    *goto fight_5\n  #Summon a creature.\n    *if summon > 65\n      You summon a wolf, which is brave enough to go near the fire and into the smoke to begin to Maul Blaine for a few seconds. It does reasonable damage before the wolf disappears.\n      *set summon +1\n      *set mana -10\n      *set Blaine -3\n      *goto fight_5\n    You summon a wolf, which is brave enough to go near the fire and into the smoke to begin to Maul Blaine for a few seconds. However, it doesn't stick around long enough to do as much damage as you would like.\n    *set summon +1\n    *set mana -10\n    *set Blaine -2\n    *goto fight_5\n\n\n*label no_shot\n\nYou decide to pass up the opportunity to take a shot at him, waiting instead of him to be more clearly visible.\n\n*goto fight_5\n\n*label fight_5\n\nAfterwards, he runs outside of the smoke, making him an easy target to you once again. You see him choking and coughing on the smoke. However, the part that stands out to you the most isn't that, its the fact that he seems to be scared of what the smoke is making shapes of. You're not sure how you drew the connection, but it seems to be that any illusions he sees are somehow damaging him. You're tempted to see if this works on your next attack.\n\n*set Blaine -1\n\n*page_break\n \nAfter he is cleared from the smoke, you're able to see how damaged he is.\n\n*if Blaine >= 15\n  You see that he's relatively undamaged, and you'll have to step up the damage.\n  *goto fight_6\n*elseif Blaine >= 12\n  You see some marginal amount of damage taking its toll, but you haven't crippled him by any means.\n  *goto fight_6\n*else\n  You see that you've started to deal some decent damage to him, and keeping this level up will likely lead to victory.\n  *goto fight_6\n\n*label fight_6\n\nReady to make another attempt, you're tempted to use your illusion magic against him. Do you do this?\n\n*choice\n  #No, I'd rather blast him with electricity.\n    *if blast > 60\n      You fire a powerful electrical blast at him, sending powerful shocks down his spine.\n      *set mana -10\n      *set blast +1\n      *set Blaine -3\n      *goto fight_7\n    You fire a weak electrical blast at him, sending some shocks through his body.\n    *set mana -10\n    *set blast +1\n    *set Blaine -2\n    *goto fight_7\n  #No, I summon a beast to fight him.\n    *if summon > 60\n      You create a lion that pounces on him, mauling him powerfully before it fades.\n      *set mana -10\n      *set summon +1\n      *set Blaine -3\n      *goto fight_7\n    You create a lion that pounces on him, dealing some but not much damage to him before it fades.\n    *set mana -10\n    *set summon +1\n    *set Blaine -2\n    *goto fight_7\n  #No, I transform into something else to beat him.\n    *if transform > 60\n      You turn into a polar bear and rips into his chest. You'd have ripped him up to death had your magic not run out.\n      *set mana -10\n      *set summon +1\n      *set Blaine -3\n      *goto fight_7\n    You turn into a polar bear and do very limited damage before being forced to go back into your human form.\n    *set mana -10\n    *set transform +1\n    *set Blaine -2\n    *goto fight_7\n  #No, I beat him up without transforming magic.\n    *if fitness > 65\n      You use some martial arts moves to beat him up, ending by throwing him across the floor.\n      *set fitness +1\n      *set Blaine -3\n      *goto fight_7\n    You attempt some martial arts moves, but mostly just land a few punches.\n    *set fitness +1\n    *set Blaine -2\n    *goto fight_7\n  #Yes, let's see if this option works.\n    *if illusion > 60\n      You create illusions of horrifying otherworldly creatures, and Blaine seems to attempt to rip his own eyes out, damaging him.\n      *set mana -10\n      *set illusion +1\n      *set Blaine -3\n      *goto fight_7\n    You create illusions of horrifying creatures that cause him to want to rip his eyes out, but he quickly notices that these forms aren't real.\n    *set mana -10\n    *set illusion +1\n    *set Blaine -2\n    *goto fight_7\n\n*label fight_7\n\nBlaine seems upset that you're damaging him so much and creates an explosion around himself that you can't block or avoid. After being blown back and collecting yourself, you get up to see that Blaine has also both damaged himself doing this and is now completely winded. He does, however, see to have something to say to you.\n\n*set health -20\n*set Blaine -1\n*page_break\n\n\"Well there ${name}, you seem to be quite the opponent,\" he starts. \"You're in fact almost as powerful as I am.\" You're upset at his phrasing, but you know that you are in fact much more of a match for him than he claims. \"So, with Lee and Steve no longer...available, I have an opening within my ranks. How would you like to be my second in command?\"\n\nDo you take Blaine's offer? You're aware that he does keep his word when he promises loyalty to someone, so you would be safe, at least from him. However, you would doom the world. Do you accept his offer?\n\n*choice\n  #Yes, I've always dreamed of being an evil overlord.\n    *goto evil_1\n  #No, I can't do that.\n    *goto decline_offer\n\n*label evil_1\n\nYou accept Blaine's offer. He takes over the world with your help, and you gain access to the throne room, becoming the second most powerful and most wealthy person in the world, exploiting slaves to gain this power.\n\n*goto_scene evil_ending\n\n*label decline_offer\n\nBlaine seems to take it personally, summoning a boa constrictor around you. You know that he won't let it go until the snake disappears, which won't be enough to kill you. However, you can reduce this damage. How do you choose to do this?\n\n*choice\n  #I summon a creature to fight the constrictor and loosen its grip on me.\n    *if summon > 60\n      You summon an ape to grab the constrictor. It doesn't cause the snake to let go completely but does limit the damage.\n      *set summon +1\n      *set mana -10\n      *set health -5\n      *goto fight_8\n    You summon an ape that's unable to do anything to the constrictor.\n    *set summon +1\n    *set mana -10\n    *set health -15\n    *goto fight_8\n  #I Blast the snake so it loosens its grip.\n    *if blast > 60\n      After only a couple of seconds, you freeze the snake and break it. This limits the damage the snake does to you.\n      *set blast +1\n      *set mana -10\n      *set health -5\n      *goto fight_8\n    You attempt to freeze the snake but are unable to create enough ice with your blast spell.\n    *set blast +1\n    *set mana -10\n    *set health -15\n    *goto fight_8\n  #I transform myself into something that can't be constricted.\n    *if transform > 60\n      You quickly transform into an elephant for a couple of seconds, sending the snake way off.\n      *set transform +1\n      *set mana -10\n      *set health -5\n      *goto fight_8\n    You attempt to transform yourself into an elephant but are unable to before the snake is wrapped around you.\n    *set transform +1\n    *set mana -10\n    *set health -15\n    *goto fight_8\n  #I struggle to fight it off with sheer strength.\n    *if fitness > 60\n      You're strong enough to hold off the snake\n      *set fitness +1\n      *set health -10\n      *goto fight_8\n    You are unable to compete with the might of the snake.\n    *set fitness +1\n    *set health -15\n    *goto fight_8\n\n*label fight_8\n\nAfter the snake finally disappears, you can clearly see how damaged Blaine really is.\n\n*if Blaine > 10\n  You have dealt less damage to Blaine than you thought you had. Strange, but you know for a fact you need to push forward.\n  *goto fight_9\n*elseif Blaine > 8\n  You've dealt a decent amount of damage to Blaine, and know that you need to keep your foot on the gas so to say.\n  *goto fight_9\n*elseif Blaine > 6 \n  You've dealt a lot of damage to Blaine, and you have the chance to finish him somewhat soon.\n  *goto fight_9\n*else\n  Blaine is pretty close to death, and you could finish him off soon.\n  *goto fight_9\n\n*label fight_9\n\n\n\nKnowing that your mana won't last forever, you begin to look around yourself of a weapon. Or, at least something that can be used as an improvised one. Literally, anything will do. Blaine is on the ground, and this is your chance to get some free damage on him. You note that this being a castle museum's throne room, there's going to be representations of medieval weapons. You see around you a boomerang and a sword. You have briefly practised using a boomerang, and know that it takes some brains to throw it properly. You recognize the sword as something that's easier to wield and will do damage based on your strength. They're on opposite ends of the room, and Blaine will be up soon. What's your choice?\n\n*choice\n  #The boomerang. I think I'm smart enough to use it.\n    *goto boomerang\n  #The sword. I'm jacked enough to do serious damage.\n    *goto sword\n\n*label boomerang\n*if brains > 60 \n  You run over to the boomerang and throw it directly at Blaine. It hits him hard as he gets up, and returns to you. Good job, you got him.\n  *set Blaine - 2\n  *goto fight_10\nYou run over to the boomerang and throw it directly at Blaine. It barely scratches him for only minor damage, and bounces off the wall, landing a few feet away from you. Could have been better, I guess.\n*set Blaine - 1\n*goto fight_10\n\n*label sword\n*if fitness > 60\n  You run over the sword and stab Blaine, and he's only barely able to barely avoid a stab to a vital area. You're still able to cause him to bleed, however.\n  *set Blaine - 2\n  *goto fight_10\nYou run over the sword and stab Blaine, and he almost completely dodges the sword, as you barely scratch him.\n*set Blaine - 1\n*goto fight_10\n\n*label fight_10\n\nEnraged with the situation of you having a weapon, Blaine decides to attack you with an electrical blast magic spell. You're able to block it with your weapon, however, the weapon is flung off into the distance, leaving you unarmed once again. However, as the weapon successfully blocked the attack, there was some success to your actions. How do you feel about this?\n\n*fake_choice\n  #Great. The weapon did its job and then some.\n    Your positive attitude, while commendable, will do very little to help you survive this situation.\n  #Terrible, I needed that weapon.\n    Understandable, but you realize there's very little you can do about that right, now.\n  #Conflicted. No plan survives contact with the enemy, though.\n    Probably the realist response.\n\nAfter you internalize your feelings for a second, you can see that Blaine is preparing a follow-up move, which he uses quickly. He summons a coyote to attack you. Although the coyote does some damage, its a sign that since that's all he was able to summon, he's getting close to his limits.\n\n*set health -5\n\nAfter you let the feelings of the moment pass, you realize that you're still in a life or death situation. Its time to fight further. You realize you need to end this soon, and it's coming to a point where you're considering a technique called 'pushing'. This is where you damage yourself in order to make a more powerful spell. You see that this is probably a good idea, you just have to make sure you have enough health left in order to do it without getting yourself killed.\n\n*choice\n  #I push. I need to finish this before Blaine has a chance to recover.\n    *goto push\n  #I don't push. I might not survive.\n    *goto no_push\n\n*label push\n\nWhat kind of spell do you push?\n*choice\n  #A blast spell. Time to finish this off the old fashioned way.\n    *if blast > 60\n      You engulf him in an extreme amount of flames, dousing him into what appears to be an excruciating amount of pain as he screams to the high heavens\n      *set mana -10\n      *set health -5\n      *set blast +1\n      *set Blaine -4\n      *goto after_push\n    You engulf him in plenty of flames, but feel like someone more skilled with blast magic would have done more.\n    *set mana -10\n    *set health -5\n    *set blast +1\n    *set Blaine -3\n    *goto after_push\n  #A summon spell. I can create something that could finish him.\n    *if summon > 60\n      You create a T-Rex, which seems to be able to kill him on its own. You smile, seeing it bite him once before it disappears.\n      *set mana -10\n      *set health -5\n      *set summon +1\n      *set Blaine -4\n      *goto after_push\n    You create a T-rex, which bites him once but doesn't hold onto him as long as you'd like before its time runs out.\n    *set mana -10\n    *set health -5\n    *set summon +1\n    *set Blaine -3\n    *goto after_push\n  #An illusion spell. I don't understand how they work, but if since they do might as well use them.\n    *if illusion > 60\n      You make Blaine see visions of horrifying otherworldly creatures surrounding his with their tendrils. Had it not been for the situation, I'd be wondering what was wrong with you.\n      *set mana -10\n      *set health -5\n      *set summon +1\n      *set Blaine -4\n      *goto after_push\n    You make Blaine see visions of otherworldly horrifying creatures. You don't understand why this is a thing and feel you could have done better, but it still damages him.\n    *set mana -10\n    *set health -5\n    *set illusion +1\n    *set Blaine -3\n    *goto after_push\n  #A transform spell. I can at least use this one on myself.\n    *if transform > 60\n      You turn yourself into a raptor, and run at Blaine, ripping what's left of him to shreds.\n      *set mana -10\n      *set health -5\n      *set transform +1\n      *set Blaine -4\n      *goto after_push \n    You turn yourself into a raptor but are only able to sustain it long enough to deal moderate damage.\n    *set mana -10\n    *set health -5\n    *set transform +1\n    *set Blaine -3\n    *goto after_push \n\n*label no_push\n\nYou choose not to, and instead don't want to hurt yourself more.\n\n*choice\n  #I use a blast spell to blow him away.\n    *if blast > 60\n      You attempt to kill him with a blast of fire and deal a lot of damage.\n      *set mana -10\n      *set blast +1\n      *set Blaine -3\n      *goto after_push \n    You burn him with fire. The fire could have been stronger, but there's no point in worrying about it now.\n    *set mana -10\n    *set blast +1\n    *set Blaine -2\n    *goto after_push\n  #I use a summon spell to create something strong.\n    *if summon > 60\n      You create a bull that charges at him, running him over for great damage.\n      *set mana -10\n      *set summon +1\n      *set Blaine -3\n      *goto after_push \n    You create a bull that charges at him, starting to run him over before it disappears.\n    *set mana -10\n    *set summon +1\n    *set Blaine -2\n    *goto after_push\n  #I use an illusion spell to make him think he's dying.\n    *if illusion > 60\n      You create an illusion spell that confuses him, in your attempt to make him think he's dead.\n      *set mana -10\n      *set illusion +1\n      *set Blaine -3\n      *goto after_push \n    You create an illusion spell that temporarily confuses him into thinking he's dead before he snaps out of it. Hopefully what you did was enough. \n    *set mana -10\n    *set illusion +1\n    *set Blaine -2\n    *goto after_push   \n  #I use a transform spell on myself.\n    *if transform > 60\n      You turn into a gorilla and beat the hell out of Blaine.\n      *set mana -10\n      *set transform +1\n      *set Blaine -3\n      *goto after_push \n    You turn into a gorilla and begin to beat him up, but the damage you do is minimal before you transform back.\n    *set mana -10\n    *set transform +1\n    *set Blaine -2\n    *goto after_push\n\n*label after_push\n\n*comment Blaine hit for 11-20\n*comment player hit for 40-65\n*comment player used up to 90 mana\n\n*if Blaine \u003c= 0\n  Blaine falls to the ground, seemingly crushed by your attack. You keep an eye on it, cautiously approaching knowing he may not be dead yet. However, as you finally make it, you can see he has several deep-running scars across his chest, with his organs almost showing. \n  *goto_scene 1v1_victory\n\n*else\n  *goto fight_11\n\n*label fight_11\n\nHaving been hit by your large attack, you can tell that Blaine is in no mood to continue playing games. It appears now that he has also had the idea to push his spells. He screams in pain as he creates a large fireball, throwing it at you. What do you choose to do about it?\n\n*if mana > 0\n  *goto mana_fireball\n*else\n  *goto no_mana_fireball\n\n*label mana_fireball\n\n*choice\n  #Using my own fireball to block it. Fight fire with fire\n    *if blast > 60\n      You successfully block the majority of the fireball. The tiny bit that does get through only did so due to the fact that the spell was pushed.\n      *set mana -10\n      *set health -5\n      *set blast +1\n      *goto after_fireball\n    Your fireball isn't strong enough to do anything to stop his, and you take the full force of his attack.\n    *set mana -10\n    *set health -25\n    *set blast +1\n    *goto after_fireball\n  #Using a summon spell to absorb it with another creature.\n    *if summon > 60\n      You don't see what it is you summon, but it doesn't matter. What does matter is it was powerful enough to tank most of the fireball, leaving you almost unharmed.\n      *set mana -10\n      *set health -5\n      *set summon +1\n      *goto after_fireball\n    Whatever creature it was that you summoned didn't seem powerful enough to do anything to slow down the fireball, and you take the full force of it.\n    *set mana -10\n    *set health -25\n    *set summon +1\n    *goto after_fireball\n  #Dodge it.\n    *if fitness > 65\n      You somehow are fast enough to be able to dodge it.\n      *set health -5\n      *set fitness +1\n      *goto after_fireball\n    You are not fast enough to be able to dodge the massive fireball.\n    *set health -25\n    *set fitness +1\n    *goto after_fireball\n  #Block it to only take partial damage.\n    You absorb some of the hit, and the attack does slightly less damage to you as a result.\n    *set health -15\n    *set fitness +1\n    *goto after_fireball\n\n*label no_mana_fireball\nBeing out of mana, you have very little choice in what to do.\n*choice\n  #Dodge it.\n    *if fitness > 65\n      You somehow are fast enough to be able to dodge it.\n      *set health -5\n      *set fitness +1\n      *goto after_fireball\n    You are not fast enough to be able to dodge the massive fireball.\n    *set health -25\n    *set fitness +1\n    *goto after_fireball\n  #Block it to only take partial damage.\n    You absorb some of the hit, and the attack does slightly less damage to you as a result.\n    *set health -15\n    *set fitness +1\n    *goto after_fireball\n\n*label after_fireball\n\n*set Blaine -3\n\n*if Blaine \u003c= 0\n  *if health \u003c= 0\n    You can feel your view going black at this point, but in your last moments for life, you can see Blaine being torn apart and falling down to the ground, dying with you. You can end up dying but can die at peace, knowing that you've saved the world.\n    *goto_scene death\n  *else\n    As you take the attack, you see that Blaine has finally been defeated. You look around and see his dead body lying there. After going over to it, you see that     Blaine is now gone from the world.\n    *goto_scene 1v1_victory\n*else\n  *if health \u003c= 0\n    You feel your world going black, with Blaine having survived his self-inflicted damage. You're aware that he survived, and will soon take over the world, with his every need catered to him.\n    *goto_scene death\n  *else\n    You both survive this, somehow.\n    *goto fight_12\n\n*label fight_12\n\nAfter that, you see that despite the fact that he took serious damage, he's preparing to make another, identical attack, still ready to kill you.\n\n*if mana > 0\n  *goto mana_fireball_2\n*else\n  *goto no_mana_fireball_2\n\n*label mana_fireball_2\n\n*choice\n  #Using my own fireball to block it. Fight fire with fire\n    *if blast > 60\n      You successfully block the majority of the fireball. The tiny bit that does get through only did so due to the fact that the spell was pushed.\n      *set mana -10\n      *set health -5\n      *set blast +1\n      *goto after_fireball_2\n    Your fireball isn't strong enough to do anything to stop his, and you take the full force of his attack.\n    *set mana -10\n    *set health -25\n    *set blast +1\n    *goto after_fireball_2\n  #Using a summon spell to absorb it with another creature.\n    *if summon > 60\n      You don't see what it is you summon, but it doesn't matter. What does matter is it was powerful enough to tank most of the fireball, leaving you almost unharmed.\n      *set mana -10\n      *set health -5\n      *set summon +1\n      *goto after_fireball_2\n    Whatever creature it was that you summoned didn't seem powerful enough to do anything to slow down the fireball, and you take the full force of it.\n    *set mana -10\n    *set health -25\n    *set summon +1\n    *goto after_fireball_2\n  #Dodge it.\n    *if fitness > 65\n      You somehow are fast enough to be able to dodge it.\n      *set health -5\n      *set fitness +1\n      *goto after_fireball_2\n    You are not fast enough to be able to dodge the massive fireball.\n    *set health -25\n    *set fitness +1\n    *goto after_fireball_2\n  #Block it to only take partial damage.\n    You absorb some of the hit, and the attack does slightly less damage to you as a result.\n    *set health -15\n    *set fitness +1\n    *goto after_fireball_2\n\n*label no_mana_fireball_2\nBeing out of mana, you have very little choice in what to do.\n*choice\n  #Dodge it.\n    *if fitness > 65\n      You somehow are fast enough to be able to dodge it.\n      *set health -5\n      *set fitness +1\n      *goto after_fireball_2\n    You are not fast enough to be able to dodge the massive fireball.\n    *set health -25\n    *set fitness +1\n    *goto after_fireball_2\n  #Block it to only take partial damage.\n    You absorb some of the hit, and the attack does slightly less damage to you as a result.\n    *set health -15\n    *set fitness +1\n    *goto after_fireball_2\n\n*label after_fireball_2\n\n*set Blaine -3\n\n*if Blaine \u003c= 0\n  *if health \u003c= 0\n    Despite the fact that you both survived the first instance, the second time is too much for both of you. As you see everything go black, you notice that Blaine is dying alongside you.\n    *goto_scene death\n  *else\n    You survive the blast, but at the end of it all, you see Blaine fall down, and you know immediately that he is dead, as he couldn't handle his own attack.\n    *goto_scene 1v1_victory\n*else \n  *if health \u003c= 0\n    You can see that although you pushed Blaine to his absolute limits, Blaine has somehow survived everything you've thrown at him. Your world goes black, and you are forced to acknowledge that Blaine survived and you didn't.\n    *goto_scene death\n  *else\n    *goto fight_final\n\n*label fight_final\n\nYou can see that Blaine is about to fall down and die. Despite the heavy damage done to you, you have the opportunity to finish him off.\n\n*if mana > 0\n  *goto finish_mana\n*else\n  *goto finish_no_mana\n\n*label finish_mana\nHow do you finish him off?\n\n*choice\n  #A blast spell\n    You freeze him permanently in place with a frost spell. His death is quick and merciful compared to what it could have been.\n    *goto_scene 1v1_victory\n  #A summon spell\n    You defeat him by summoning a lion which rips him apart, killing him.\n    *goto_scene 1v1_victory\n  #An illusion spell\n    You make him envision terrifying otherworldly creatures, and he dies of sheer horror.\n    *goto_scene 1v1_victory\n  #A transform spell on myself\n    You transform yourself into a lion and maul him to death\n    *goto_scene 1v1_victory\n*label finish_no_mana\n\nWith no mana left, do have to beat him up. Luckily, he's already done enough of the work himself, and you just need to land a few hits to do it.\n*goto_scene 1v1_victory ", "1v1_victory": "*set health 100\n*set mana 100\n\n*page_break\n\nYou walk away from Blaine, victorious, but with little cause for celebration. Seemingly right when you leave, the media suddenly starts to notice all the damage to to the university, as well as the castle. You're not sure how they didn't notice before but come to the conclusion that somehow Blaine's magic was stopping them from seeing it. Now that he's dead, it's not working anymore.\n\nYou explain everything to the media, stumbling your way through it. You let them know of the evils of Blaine, Steve and Lee. You also tell them of the heroic deaths of the professor, Veronica, Damian, Nancy, Rick and Karol, all of whom have statues built of them. You also are given leadership of the society of sorcerers, and a new treaty is drawn up, indicating many new laws sorcerers must follow in order to gain full acceptance of society. As several sorcerers come to your new academy, you are now in charge of the relations between sorcerers. As you look forward to the challenges you face in this struggle, you realize you have quite the challenge ahead of you as you look to rebuild society.\n\n*achieve survivor\n*achieve solesurvivor\n\n*goto_scene ending\n", "coffee": "You get instructions from the professor on directions to the coffee shop, as well as a day and time.\n\n*page_break\n\nYou reach the coffee shop the next day. When you get there, you recognize the fact that two of your classmates were\nthere already.  The prof waves you over, and you go there after ordering a coffee and a doughnut. The prof begins it like a business\nmeeting, which you assume he does in order to blend into the shop, and not arouse any kind of suspicion of the four of you\nbeing sorcerers, due to the nature of them being considered a threat to the public.\n\n\"So I met earlier with Rick, Nancy and Steve,\" he said, and you begin to hear a groan when Steve's name is brought up. You look to see that the groan came from one of the other sorcerers.\n\n\"Do you have something to say, Damian?\" the professor asked, looking over at the one at the table who groaned.\n\n\"Yes, actually.\" Damian began, pausing between his words. He let out a sigh before slowly continuing. \"I have reason to believe\nthat Steve is not someone who we should be trusting. He's talked a lot about wanting to leave the academy and was always a good friend of Blaine's. Since we now know that Blaine is..\" Damian pauses as if he's trying to figure out\nhow to phrase what he's about to say and not alert those around him. \"a rival so to say, doesn't that make anyone that\nwas close to him automatically a person of interest?\" There is a brief pause in the conversation. Do you say something in order to back up Damian?\n\n*choice\n  #Yes, I never trusted Steve to begin with. Now with all these good points, Damian could be on to something.\n    You note that it's probably smart to ensure that Damian's opinion is heard. You back it up, stating that you can't be too careful.\n    you feel significantly smarter and know in the future to pay greater attention to detail.\n    *set Brains+ 2\n    *goto interrupt\n  #No, I want this to be sorted out organically, and I have very little to say in the manner.\n    Not sure of what to say, you feel its better to let the conversation play out. You feel its the best balance between social graces and doing what's smart.\n    *set brains +1\n    *set social +1\n    *goto interrupt\n  #Actually, I (politely) say something to counter Damian. He should be minding his own business, and he has no place interrupting authority.\n    Damian glances over at you briefly as you talk, but is quick to temper the emotions he clearly felt. You weren't sure of yourself at first,\n    but he's handling it well. You feel as if you've shown a good display of charisma.\n    *set social +2\n    *goto interrupt\n\n*label interrupt\n\n\"It's definitely something to keep an eye on,\" replied the professor. \"However, we don't have the time right now to be suspicious\nof anything, really. If I know what Blaine is like, he's already planning a second attack, and that means that we'll have even\nfewer forces able to attack back.\"\n\n\"I mean, I guess,\" Damian said softly. The way he talked made it sound he was agreeing more so because he didn't want to hold the professor up, but that's beside a point. You remember that Damian had often questioned the prof only to be\ntold no and after a few incidents became a lot more submissive. \n\n\"I can help keep an eye on him as well,\" the other student chimed in, as she took advantage of a brief pause in the\nconversation. \"I do think that Damian is on to something. I know it might seem paranoid to worry about anyone else\npossibly stabbing us in the back, but these are very extreme times, and we don't know who we can trust and who we can't.\n\n\"Thank you, Veronica,\" the professor said, clearly wanting to get back on track. After meeting with those three, I went to speak\nwith Karol. The four of them, combined with the four of us, gives us a total of 8 people who will be fighting against Blaine and\nhis forces. \n\n\"And what are those forces?\" Veronica asked.\n\n\"We don't know,\" stated the Professor, who's weaker tone showed a lack of confidence in his abilities. \"However, we have to attack very soon,\notherwise we're letting Blaine weaken us even further. There's no point in attempting to hide because we know that he's powerful enough to\ntrack us and hunt us down one-by-one. Everyone else who I didn't mention earlier has chosen to drop out so to say, thinking that this\nisn't their problem. We are, with the exception of Rick, Nancy, Steve and Karol, completely on our own.\"\n\n*page_break\n\nYou, Veronica and Damian all pause of a moment, looking at each other. Afterwards, you hear someone opening the door to the coffee shop.\nThis shouldn't be a big deal to you, and in fact wasn't each of the other times that it happened, however, this particular time was,\nfor some odd reason, different.\n\nIt's not one just one person walking in, but a group of 5. All of them are young adults, wearing what appear to be masks. They appear\nvery unsettling to you, but you brush it off until you see that the other three are all a little bit unsettled as well. It's at that point that\nyou get worried. Damian is biting his lip, Veronica noticeably gulps and the Professor, who had previously opened his mouth as if about to start saying\nsomething instead decides to stop talking and instead tries to look away from them. You, Damian and Veronica all immediately look away as well, in\na way that felt so automatic, that it seemed instinctual. You look down at your hands, noticing that they are now suddenly sweaty. You attempt to\nrub them against each other in a natural-looking way and look at the coffee and doughnut that you have half-finished in order to fake to any onlookers as if you are\neyeing up your food instead of internally panicking. You're not sure why this panic is taking you over, but the others are all noticeably afraid as well.\n\nThe Prof is looking down at his order of coffee, which normally wouldn't stand out, but in this case, causes you to think that he might be trying to avoid\neye contact with the 5 who just entered. Veronica is holding her neck with one hand as if to hide her noticeable gulp a few seconds ago. Her eyes\nare darting around the room, back and forth between looking at the 5 who just entered, and immediately looking away. Damian is clearly breathing\nmore heavily, so much so that you can almost internally hear inhales and exhales. He grabs his chest area as if going into cardiac arrest, and makes\na wincing face that matches. The four of you are looking at each other uneasily. Suddenly, Veronica lets out a scream, and you look behind you to see...\n\n*page_break\n\nThe group of five not only has stopped right behind you, but they're all holding assault rifles. Everyone else in the coffee shop, including the staff,\nhave all either already left or are all running out. The five apparent thugs, however, are making no attempt to rob the place or attack any of the other\npatrons. Instead, they are all pointing weapons directly at you. Their eyes are all glazed over, which you recognize as showing them having been possessed by a charm spell. These are Blaine's mind-controlled henchmen alright, as you quickly glance outside to see more of them. You see outside a whole bunch more of them are out there. You're hoping to get out of here without a fight, but see that as unlikely.\n\nOne of the ones inside points his gun at you. \"You feel like you can get out of this one without using your magic, bub?\" You feel that with them mind-controlled,\nthe possibility of a diplomatic solution is out the window. What's your response?\n\n*choice\n  #I grab his gun and push it aside. I'm saving my mana for later.\n    *if fitness > 60\n      You're fast enough to able to grab his gun and point it towards him before he's able to fire it. He hits himself in the confusion and is knocked down.\n      *set fitness +1\n      *goto fight_2\n    You attempt to grab his gun from him but are shot at first. When you're on the ground recovering from a gunshot wound you notice Damian blast him with fire.\n    *set fitness +1\n    *set health -10\n    *goto fight_2\n  #I use blast magic to fire something at him. Brute force is needed here.\n    *if blast > 54\n      You're skilled enough with blast magic that you're able to incinerate him with a fireball before he's able to shoot you.\n      *set mana -10\n      *set blast +1\n      *goto fight_2\n    You're not skilled enough with blast magic to unleash your attack before being shot. When you're on the ground recovering from a gunshot wound you notice Damian blast him with fire.\n    *set mana -10\n    *set blast +1\n    *set health -10\n    *goto fight_2\n  #I transform him into something useless. Take him out more subtly.\n    *if transform > 54\n      You're skilled enough with transform magic to transform him into a cockroach before he is able to shoot you. He then scurries away, with his gun dropped to the ground.\n      *set mana -10\n      *set transform +1\n      *goto fight_2\n    You're not skilled enough with transform magic to succeed before he shoots you. When you're on the ground recovering from a gunshot wound you notice Damian blast him with fire.\n    *set mana -10\n    *set transform +1\n    *set health -10\n    *goto fight_2    \n  #I summon something strong to help me.\n    *if summon > 54\n      You're skilled enough with summon magic to summon a tiger on the back of the gunman before he shoots you. The tiger mauls him to death immediately.\n      *set mana -10\n      *set summon +1\n      *goto fight_2\n    You're not skilled enough with summon magic to create a minion before you're shot. When you're on the ground recovering from a gunshot wound you notice Damian blast him with fire.\n    *set mana -10\n    *set summon +1\n    *set health -10   \n    *goto fight_2  \n\n*label fight_2\n\nAs the other four thugs pulling up their guns to avenge their fallen comrade, and the others run in, you can tell that this will be a fight that you won't\nbe able to keep this subdued. This will be a very large fight and people will see it. Covering up the presence of sorcerers in this location is no longer an option.\nWith a series of thugs around you, what do you do to help them fight off?\n\n*choice\n  #I shoot one with elements using a blast spell.\n    *If blast > 54\n      Your skill with blast magic is great enough that you're able to freeze one of them in place, rending him useless of the rest of the battle.\n      *set mana -10\n      *set blast +1\n      *goto fight_3\n    You don't have the blast magic skill to cast the spell quickly enough to save yourself from an attack. The target throws a grenade in your face before you complete your attack. You survive, and eventually, encase him, but are dealt massive damage.\n    *set mana -10\n    *set blast +1\n    *set health -15\n    *goto fight_3\n  #I summon a beast to assist in the fight. \n    *if summon > 54\n      You're skilled enough with summon magic to summon the bear before an attack is fired, squishing one of the attackers before he's able to attack you.\n      *set mana -10\n      *set summon +1\n      *goto fight_3\n    Your skill with summon magic isn't high enough to create a bear fast enough to stop the attack. The beast is summoned after the target throws a\n    grenade at your face. You survive, and the bear mauls his, but are dealt massive damage. \n    *set mana -10\n    *set summon +1\n    *set health -15\n    *goto fight_3\n  #I transform one of them into something useless.\n    *if transform > 54\n      Your skill with transformation magic is strong enough that you're able to quickly transform one of them into a rat. Another one of them, with a great fear of rats, shoots the rat, unable to process that it killed his comrade.\n      *set mana -10\n      *set transform +1\n      *goto fight_3\n    You don't have the required transform magic to transform the target into a ran quickly enough. It's not until after he throws the grenade that you turn him into a\n    rat, who one of his allies steps on. You survive the explosion but are dealt massive damage. \n    *set mana -10\n    *set transform +1\n    *set health -15\n    *goto fight_3\n  #I transform myself into something strong.\n    *if transform > 54\n      Your skill with transform magic is strong enough that you're able to turn yourself into a rhino and you trample an enemy who was about to throw\n      a grenade at you.\n      *set mana -10\n      *set transform +1\n      *goto fight_3\n    You don't have the transform magic required to turn yourself into a rhino quickly enough before you transform, a grenade blows up in your face. You\n    are still able to turn into a rhino, but after you turn back into human form, you notice you have taken massive damage.\n    *set mana -10\n    *set transform +1\n    *set health -15\n    *goto fight_3\n  #I Attempt to counter charm one of them.\n    *if charm > 54\n      Your charm magic is honed enough that you're able to freeze the target in his tracks. The grenade he was about to throw blows up in his hand, killing him.\n      *set mana -10\n      *set charm +1\n      *goto fight_3\n    Your charm magic isn't well-honed enough to stop him from throwing the grenade he was holding at your face. However, you were able to pull him into the explosion. You survive and he doesn't, but you still take massive amounts of damage.\n    *set mana -10\n    *set transform +1\n    *set health -15\n    *goto fight_3\n\n*label fight_3\n\nYou hear a scream of pain to your left that you recognize. Its Damian. You've never heard him scream before, but his voice was recognizable enough that\nyou were able to identify it as him straight away. Two of the thugs have him pinned down, each of them grabbing an arm. Two others are pointing their guns\nat his now almost immobile body. As you see him struggle to get out, you realize you can do something to help him.\n\n*choice\n  #I blast the thugs about to shoot him with lightning. Remove the threat the old fashioned way.\n    *if blast > 54\n      Your blast magic is strong enough to electrocute and neutralize the two armed thugs. Had this not bee a life or death scenario, you'd make a joke about it being       'shocking'.\n      *set mana -10\n      *set blast +1\n      *goto fight_4 \n    Your blast magic is too weak, and the two thugs shrug it off, firing back at you and hitting you. You survive but are heavily damaged.  \n    *set mana -10\n    *set blast +1\n    *set health -15\n    *goto fight_4\n  #I counter charm one of the ones about to shoot him. Turn an enemy into an ally.\n    *if charm > 54\n      You successfully take control of one of the thugs and have him shoot the other one.\n      *set mana -10\n      *set charm +1\n      *goto fight_4 \n    Your charm magic only alerts the thug to your presence. Instead of shooting Damian's exposed body, he shoots you. You're wounded, but you live.\n    *set mana -10\n    *set charm +1\n    *set health -15\n    *goto fight_4\n  #I transform him into something stronger. Give him a fighting chance.\n    *if transform > 54\n      Your transform skill is high enough that you're able to transform Damian into a crocodile. He's able to escape and take down the thugs before being forced to transform back.\n      *set mana -10\n      *set transform +1\n      *goto fight_4 \n    You are unable to hold the transformation long enough, and his brief stint as a crocodile ends in him simply deflecting the enemies towards you, whom they attack.     You take heavy damage but survive.\n    *set mana -10\n    *set transform +1\n    *set health -15\n    *goto fight_4\n  #I summon an ally to help him.\n    *if summon > 54\n      You're able to summon a buffalo, landing on the two armed thugs. The two that were holding him let go in order to fight it off. \n      *set mana -10\n      *set summon +1\n      *goto fight_4 \n    Your summon skill isn't high enough to summon a buffalo for long enough, and you only temporarily stun those surrounding Damian. You still buy him time,\n    as the thugs attack you instead. You take heavy damage but survive.\n    *set mana -10\n    *set summon +1\n    *set health -15\n    *goto fight_4    \n  \n\n*label fight_4\n\nAfter the thugs are taken care of, you see Damian get up. You cover him as he does when a thug jumps on top of you. Not to be distracted, you throw the thug off of you,\nonly to see that another one has jumped on Damian. Unable to throw him off, Damian is surrounded by a bunch of them, all of whom quickly raise their guns in unison.\nUnable to fight them all off, you Damian cross his arms across his chest, set to use a spell you have heard of only once: an extremely powerful blast spell that destroys all those surrounding the user but taking the user with them. You are about to scream for him not to do it, stating he can still be saved, but it is\ntoo late. Seeing no other way out, Damian sacrifices himself to take out over a dozen thugs, blasting everyone else, including yourself, Veronica and the prof a few feet back.\nYou get back up and wind up face-to-face with one of the thugs. Although this one is not directly responsible for Damian's death, he was fighting in the battle,\nand the adrenaline is running through your body. You see the thug reaching for his gun. What do you do?\n\n*choice\n  #I blast him with another elemental attack.\n    *if blast > 54\n      Your blast magic is strong enough to drench him in scolding water, resulting in a painful death as his skin peels off. You are now aware of your emotional state\n      *set mana -10\n      *set blast +1\n      *goto fight_5\n    Your blast magic is weak, so your attempt to shoot scorching water at him ends up giving him a shower before he shoots you, damaging you.\n    *set mana -10\n    *set blast +1\n    *set health -15\n    *goto fight_5\n  #I counter charm him into shooting one of his allies.\n    *if charm > 54\n      He grabs the gun. You panic as he seems to have you lined up. However, you soon realize you charm magic is strong enough as he is hypnotized into shooting a thug behind you.\n      *set mana -10\n      *set charm +1\n      *goto fight_5\n    He is clearly unphased, instead of pointing the gun at you. You're hit and damaged pretty hard.\n    *set mana -10\n    *set charm +1\n    *set health -15\n    *goto fight_5\n  #I transform the gun into a grenade so it'll blow up in his hand.\n    *if transform > 54\n      He grabs the gun as it appears to explode in his hand. You're somewhat amused but mostly horrified by this site.\n      *set mana -10\n      *set transform +1\n      *goto fight_5\n    You transform the gun into a grenade, but as it takes longer to explode than you intend, he notices it and throws it at you. You take heavy damage.\n    *set mana -10\n    *set transform +1\n    *set health -15\n    *goto fight_5\n  #I summon something to kill him\n    *if summon > 54\n      You're skilled enough with summoning magic to summon a snake around his neck, slowly strangling him to death. He is unable to hold the gun as he suffocates before\n      he's able to get a shot off. \n      *set mana -10\n      *set summon +1\n      *goto fight_5\n    You summon a snake to attempt to suffocate him but aren't skilled enough with summon magic in order to strangle him before he gets the gun and shoots you. You     take\n    heavy damage before the snake is able to begin suffocating him enough.\n    *set mana -10\n    *set summon +1\n    *set health -15\n    *goto fight_5\n\n*label fight_5\n\nYou see the corpse of the thugs in front of you, knowing that Damian is also now dead. How do you feel about the fact that you killed someone partially responsible for Damian's death?\n\n*fake_choice\n  #Cathartic. I've basically avenged an ally.\n    The high of blood lust gives you a moment of joy. A sick and twisted moment of joy, but you'll take what you can get for now.\n  #Terrible. The guy I killed was mind-controlled.\n    When this is all over you'll have a hard time forgiving yourself for all the death you've caused.\n  #Somewhere in between. This was purely self-defense.\n    You don't feel right after having killed someone, but comfort yourself thinking you have no other choice.\n\nYou feel this course through your body for a second, but there's not much time to process the feeling, as you're in the middle of a fight to the death.\nYou let the moment pass and immediately look back to the fight.\n\n*page_break\n\nYou realize that now Veronica is in trouble. You see that a lot of the thugs are closing in on her, similar to how Damian had a lot attacking him right before\nhe died. You see someone sneaking up behind her holding a shotgun. You're about to yell a warning to her, but realise that things are so chaotic at this point that\nshe almost certainly won't be able to hear you. So, instead of warning her, you decide to handle the soldier on your own. How do you do it?\n\n*choice\n  #I use a blast spell, using telekinesis throw the attacker against a wall.\n    *if blast > 54\n      Your spell is strong enough for you send the thug flying backwards. He screams in terror and dies the moment he hits the wall behind him.\n      *set mana -10\n      *set blast +1\n      *goto fight_6\n    Your blast magic is weak. You still manage to hit your target, but due to your lack of power, your attempt to jolt the thug back only impacts the gun, which is turned in your direction.\n    *set mana -10\n    *set blast +1\n    *set health -15\n    *goto fight_6\n  #I summon a creature to turn the shotgun around, getting it to shoot the thug.\n    *if summon > 54\n      You summon a powerful eagle, which flips the gun around. Due to your high summon skill, it does this so fast that the thug can't stop themselves from pulling the trigger, and end up offing themselves.\n      *set mana -10\n      *set summon +1\n      *goto fight_6\n    You summon a powerful eagle, but due to your weak use of the summon skill, it isn't strong enough to fully turn the gun around. Instead, it points the gun at you, causing the thug to fire. You take damage but survive.\n    *set mana -10\n    *set summon +1\n    *set health -15\n    *goto fight_6\n  #I transform the thug into something useless.\n    *if transform > 54\n      You are able to transform the thug into a rat, which scurries away as fast as possible.\n      *set mana -10\n      *set transform +1\n      *goto fight_6\n    You attempt to transform the thug, who see your attempt and turn his gun to fire at your instead, dealing you an extremely painful blast.\n    *set mana -10\n    *set transform +1\n    *set health -15\n    *goto fight_6\n  #I Charm an ally of the thug with magic getting them to friendly fire.\n    *if charm > 54\n      Why always target the threat directly? You find a sniper, and your magic is strong enough that you can charm them into shooting the thug about to kill Veronica.\n      *set mana -10\n      *set charm +1\n      *goto fight_6\n    You are able to take control of another thug, but because your control over charm magic is weaker than needed, only for a slip second. They realize it was you who took control of you and they shoot you, damaging your body.\n    *set mana -10\n    *set charm +1\n    *set health -15\n    *goto fight_6\n\n*label fight_6\n\n*page_break\n\nYou have successfully saved Veronica. At least, you think. You enjoy the moment for a second, and then suddenly have your victory snagged away from you at the last second. As you feel a sense of vindication going through you, somehow a sniper rapid fires into her head, killing her from afar. Now, after seeing the second one\nof your classmates fall, you have a blood-lust going, and you're willing to ignore the fact that the people you're fighting are mind-controlled. You turn your\nhead to see the sniper who killed Veronica and notices that now the rifle is pointed directly at you. How do you respond?\n\n*choice\n  #I incinerate them with a great fire-related blast spell. Burn them alive!!!\n    *if blast > 54\n      A human-shaped fire blast surrounds the sniper, and they are engulfed into flames. You can feel a sinister smile on your face, as you hear a scream start and suddenly end.\n      *set mana -10\n      *set blast +1\n      *goto fight_7\n    You successfully incinerate the sniper in a burst of flames but have so little self-control that you also burn yourself very badly in the heat of the moment\n    you survive your own attack, but take a huge amount of incidental damage.\n    *set mana -10\n    *set blast +1\n    *set health -15\n    *goto fight_7\n  #I use a transform spell to turn them inside-out variation of themselves. I play no games.\n    *if transform > 54\n      In a sickly move, you turn the sniper's body inside out, as their organs explode out from their now lifeless set of bones and muscle. You hear little more than a       brief whimper, albeit one of the most horrifying whimpers of your life.\n      *set mana -10\n      *set transform +1\n      *goto fight_7\n    You successfully turn them inside you, but as their organs fly all over the room, you notice that your organs are also beginning to turn. You're able to gain back control of them inside yourself, but only barely. You are aware of the permanent damage to your insides.\n    *set mana -10\n    *set transform +1\n    *set health -15\n    *goto fight_7\n  #I summon the most terrifying thing possible. I can't kill them myself, but someone else will do it for me.\n    *if summon > 54\n      You summon a rabid wolf who takes out the sniper by biting off their leg and ripping them in half. You have to quickly call the wolf back before it can do the same to you.\n      *set mana -10\n      *set summon +1\n      *goto fight_7\n    You summon a rabid wolf who takes out the sniper by biting off their leg and ripping them in half. You attempt to call it back before it attacks you, but your skill isn't quite there yet. The wolf takes a bite out of you before you're able to do so. You don't have rabies, but you do have a huge wound to attend to.  \n    *set mana -10\n    *set blast +1\n    *set summon -15\n    *goto fight_7\n  #I use a charm spell to make them kill themselves. I've had it with them. \n    *if charm > 54\n      Suddenly, the sniper's eyes go bloodshot red as he turns the gun on himself almost instantly. He blows off his own head so suddenly that everyone around interrupts their fight to look.\n      *set mana -10\n      *set charm +1\n      *goto fight_7\n    Suddenly, the sniper's eyes go bloodshot red as he turns the gun on himself almost instantly. However, the bullet gun pointed towards your foot, and the bullet reels through his head and into your foot.\n    *set mana -10\n    *set blast +1\n    *set charm -15\n    *goto fight_7\n\n*label fight_7\n\n*page_break\n\nYou now turn around to see that the professor is also in trouble. As you do so, you see that now the professor is in trouble as well. He's backed into a corner\nwith seemingly no way out, surrounded by the only 5 remaining goons. The professor is then shot but blasts the goons one-by-one. He collapses after killing the\nlast one. You're unaware of how hurt he is until you run up to him, with your attackers all defeated. \n\n\"It's too late for me,\" he says. You desperately think to yourself wondering if you have any healing magic, and realize you don't. An ambulance won't be able to make it in time to save him from blood loss. \"You must lead our attack against Blaine and his minions. There must have been a spy listening to us. That's how they knew.\"\n\n\"Steve,\" You say. You and the dying professor both look at Damian's corpse. He had been right and everyone had doubted him. \n\n\"Yes, you're right. You right now need to lead...a plan against...\" the professor can't continue talking and passes away in your arms.\n\n*page_break\n\nYou then hear the blaring of sirens in the distance and recognize it has an ambulance. You have no choice but to leave right away and inform all other surviving sorcerers about the deaths of Damian, Veronica and the professor. You remember the names of those who met with the prof earlier: Steve, Rick, Nancy and Karol. Knowing that Steve is a traitor, that leaves just Rick, Nancy and Karol for you to contact.\n\nYou then rush out of the coffee shop with your phone, using an illusion magic spell in order to mask the damage somewhat, but you have no idea how well it will work, if at all. Upset by the death of three allies, including your mentor, and the betrayal of a forth, you begin to wonder who it is you can even trust anymore. After hesitating, you begin to call the three others but are reluctant to describe the whole story to them. After calling each of the three, including the stories of the dead and the spies, you begin to wonder if giving them all of that information was a mistake.\n\n*choice\n  #I feel it was a mistake\n    Sometimes, you have to second guess yourself.\n    *set Chapter_3 \"Spymissed\"\n    *goto_scene Payment\n  #No, I held my ground\n    Sometimes, you have to stand your ground.\n    *set Chapter_3 \"Spymissed\"\n    *goto_scene Payment", "deadspy": "*set health 100\n*set mana 100\n\nSo, after a few days, it begins to sink it that you may have killed Steve a little bit quickly, before being able to get information from him\nthat could have helped. You shrug this off, however, knowing that he needed to die so that he wouldn't escape. Keeping in mind that there's a few days before the\nprofessor's funeral, what do you do with the spare time that you now have?\n\n*choice\n  #Socializing\n    You realize you're getting more socially adept but on some level feel like you're wasting your time.\n    *set social +1\n    *goto funeral\n  #Studying\n    You feel a boost to your intelligence but on some level feel like you're wasting your time.\n    *set brains +1\n    *goto funeral\n  #Lifting\n    You feel yourself getting stronger but on some level feel like you're wasting your time.\n    *set fitness +1\n    *goto fune
