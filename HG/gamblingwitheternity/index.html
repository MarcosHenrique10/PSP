<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gambling with Eternity — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "gamblingwitheternity", "title": "Gambling with Eternity", "scenes": {"agency": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nFor a long time, there’s silence, and darkness, and nothingness. \n\nAnd then, as if your entire existence had simply been paused and now someone was pressing the play button, you feel a sharp prod against your shoulder. Your eyes shoot open of their own accord. You stare in utter confusion, and all the world seems like a scratched record for one lagging moment.\n\nAren’t you supposed to be dead?\n\nYou’re sitting in a hard wooden chair, surrounded by concrete walls that are suggestive of a very low-maintenance prison. There’s a naked light-bulb swaying sickeningly above your head. Across from you, at a low plastic fold-out table that is pretending to be a desk, there sits a tight-faced man wearing a suit that’s too small for him. He is dead. He doesn’t look like the stereotypical ghost, but you know just the same that he’s dead. It’s like he’s not quite there, but not quite gone.\n\nShaking, you look down at your hands. You, too, are not quite there, but not quite gone. Breath catching in your lungs, you look around the room, desperate, searching for any kind of reflective surface. You have to know. You just have to know. Finally, you catch sight of a mirror, and you crane your neck, trying to catch your relfection. Instead of seeing the bright ${eyecolor} eyes, the well-groomed ${haircolor} hair, the smile that just hints at your ${laugh} laugh, you see only a nondescript, formless shadow.\n\nYou're nothing. You're a silhouette. You're a memory. You're...dead.\n\nYou spent a lifetime deciding who you were; and then, in one day, one moment, one breath, all of it fell away. Everything you did, everything you said, everything you thought, everything you dreamed--all lost in an instant, as if your whole life was a teardrop in a rainstorm. Nothing you were matters now. \n\nAll that matters now is what you will be.\n\n*set name \"Gone\"\n*set gender \"Gone\"\n*set haircolor \"Gone\"\n*set eyecolor \"Gone\"\n*set jobtitle \"Gone\"\n*set laugh \"Gone\"\n\n“Glad you're coming to terms with everything.” \n\nYou turn your head. The man behind the desk nods without looking up from his paperwork. \n\n“You’re the new recruit. Had you pegged before you even died. You ought to consider yourself lucky.” He gives a sarcastic smile to the papers. “You’re here, instead of out there like the rest of the riff-raff.” \n\nAt those words, you suddenly realize the gravity of the situation. You take a deep breath, steal one final glance at your faceless, shapeless reflection, and turn away. \n\n“Sir?” you say, slowly, uncertainly. \"Where exactly is…here?”\n\nThe man sighs and lifts his head, cocking an eyebrow at you. “Look, you’re here to do what we tell you, not to ask questions.” He waves a hand vaguely. “We select recruits based on their performance in the last minutes of their life. Your response suggests that you’re prepared for the job.”\n\n“And that job is?”\n\nHe gives you an exasperated look. “Questions, questions,” he mutters. He shuffles the papers on his so-called desk, finds a manila envelope, and hands it to you without so much as an upward glance. “You are now officially in the service of the Haunting Department. You are a contract haunter, and your job is to paranormally disrupt the life of your target—whose information you will find in your envelope.”\n\nYou stare at the envelope that, apparently, holds the details of your fate.\n\nAre you ready to face this Eternity?\n*choice\n\t#Okay. Here goes nothing.\n\t\t*gosub trial_end\n\t\t*goto_scene highschoolgirl\n\t#No thanks.\n\t\tYou clear your throat, preparing to tell this man, this ghost of a man whose attention is evidently too good for you, that you don’t want the job.\n\n\t\tWait. How do you plan to do that? You’ve never talked back to a ghost before.\n\t\n\t\t*choice\n\t\t\t#I demand that I be set free. \n\t\t\t\t*gosub trial_end\n\t\t\t\tHe freezes. His eyes flash.\n\n\t\t\t\t“Pardon?” he says, his voice dangerously soft, without looking up.\n\n\t\t\t\t“Let me go,” you repeat.\n\n\t\t\t\tFinally, he lifts his head. He’s a weasel-looking fellow, with a thin nose and tiny little eyes, now that you have time to look at him straight-on.\n\n\t\t\t\tFor a moment, you stare at one another.\n\n\t\t\t\t“Okay,” he says at last. “We’ll let you go.”\n\n\t\t\t\tSuddenly you’re not sure you want them to let you go at all.\n\n\t\t\t\tSlowly, calmly, without breaking the eye contact, he reaches down and presses a button on the side of his desk. Almost instantly, the door is thrown open and two guards appear.\n\n\t\t\t\t“This newcomer wants to be let go,” says the man behind the so-called desk.\n\n\t\t\t\tOh no.\n\t\t\t\n\t\t\t\t*page_break\n\t\t\t\n\t\t\t\tBefore you can say another word, your arms are gripped firmly by two sets of burly hands. You are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\n\t\t\t\t*goto_scene void\n\n\t\t\n\t\t\t#I say no and leave without another word.\n\t\t\t\tAs soon as the door slams behind you, you come to the sudden conclusion that you have no idea where you are going. There are a thousand hallways snaking out all around you, all of them made of cement and unfriendly doors, and you aren’t sure where the exit is. There aren’t exactly neon exit signs. \n\n\t\t\t\tYou are lost.\n\n\t\t\t\tAnd, unfortunately, someone finds you quite before you’ve found yourself.\n\n\t\t\t\tTwo huge guards, each built like a brick wall, come barreling around the corner. When they see you, they shout and begin pounding down the hallway toward you. You have no choice but to take off, even though you have no idea where you’re going. \n\n\t\t\t\tYou run. You pick hallways wildly, spilling around corners, charging through groups of other ghost employees who look at you with wide, frightened eyes. It’s not too long before you’re starting to feel out of breath that you no longer have. You stop for a moment, panting, and look around. \n\n\t\t\t\tA door stands slightly ajar in front of you. You guess that it’s some kind of janitor’s closet, but you can’t really tell. It looks promising—or, at the very least, more welcoming than the heavy pairs of feet that are growing ever closer.\n\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#I roll the dice and go through the door to wait for the guards to go past.\n\t\t\t\t\t\t*gosub trial_end\n\t\t\t\t\t\tYou crash through the door into the musty darkness. You expect to stumble over a mop, or possibly get your foot stuck in a bucket like on those Saturday-morning cartoons you used to watch in your long-lost childhood, but there is nothing. Nothing at all.\n\n\t\t\t\t\t\tThis is no janitor’s closet. It’s some kind of portal.\n\n\t\t\t\t\t\tYou are hovering in velvety darkness, and suddenly your feet no longer feel the cement floor, and you’re sinking, spinning, drowning. \n\n\t\t\t\t\t\tYou fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\n\t\t\t\t\t#I keep running down the hallway.\n\t\t\t\t\t\tThe footsteps are coming ever closer. You’re going to have to run faster.\n\n\t\t\t\t\t\tYou tear off down the hallway, spilling around another corner, and narrowly avoid barreling over a prim-looking young lady with a blonde ponytail and small eyes. \n\n\t\t\t\t\t\t“I’m sorry,” you say, breathless.\n\n\t\t\t\t\t\tShe narrows her eyes at you. The footsteps echo somewhere not so very far away, and she turns her head as if listening; then, after a moment, she returns her icy gaze to you and says flatly, “I can help you hide.”\n\n\t\t\t\t\t\tYou stare, open-mouthed.\n\n\t\t\t\t\t\tDo you trust her?\n\n\t\t\t\t\t\tOr—the better question is—do you really have a choice?\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I do have a choice, and I choose “no thanks.”\n\t\t\t\t\t\t\t\t*gosub trial_end\n\t\t\t\t\t\t\t\tYou tear past the woman, the hallway blurring on every side, and not a moment later you hear her distant voice behind you, telling the guards where you went.\n\n\t\t\t\t\t\t\t\tLooks like you made the right choice.\n\n\t\t\t\t\t\t\t\tUnfortunately, the guards are starting to catch up, and you’ve still found no help.\n\n\t\t\t\t\t\t\t\tSoon you find yourself at the end of a hallway. This time there is nowhere to turn, no other corridor to race down. You have simply come to the end—like when you were young and you’d get lost in the corn maze, and all too often, you’d find yourself staring at a wall of corn.\n\n\t\t\t\t\t\t\t\tBut this isn’t corn. It’s cold, heartless cement, and in the center is a single door with the word “EXIT” above it in big red letters. Somehow, you don’t think it’s the exit you want—but then again, you don’t have much choice.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou close your eyes, take a deep breath, and crash through the door and into the musty darkness. You expect to stumble on a stairway, or feel the sunlight on your face, or perhaps be in some kind of huge parking garage—but there is nothing. Nothing at all.\n\n\t\t\t\t\t\t\t\tIt isn’t a door. It’s a portal.\n\n\t\t\t\t\t\t\t\tYou are hovering in velvety darkness, and suddenly your feet no longer feel the cement floor, and you’re sinking, spinning, drowning. \n\n\t\t\t\t\t\t\t\tYou fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene void\n\n\t\t\t\t\t\t\t#I trust her.\n\t\t\t\t\t\t\t\t*gosub trial_end\n\t\t\t\t\t\t\t\tShe nods and takes you by the hand, pulling you down the hallway. She makes a thousand turns, and after awhile, you stop trying to keep track. You are completely at her mercy.\n\n\t\t\t\t\t\t\t\tToo bad she’s merciless.\n\n\t\t\t\t\t\t\t\tShe leads you right back to the room where you started, depositing you like some kind of naughty child who tried to flee daycare. Her icy eyes seem to leer at you, saying, “How foolish you were!” You glare at her, but there’s nothing to say. Not anymore.\n\n\t\t\t\t\t\t\t\tThe guards are waiting with open arms to force you up to the so-called desk, and they hold your wrist and force you to sign a few pieces of paper while that weasel-man watches. Your name glitters on the black line, tiny and shaky and nothing like your real signature, but still your name written by your hand. \n\n\t\t\t\t\t\t\t\tThe man behind the so-called desk gives you a serpentine smile.\n\n\t\t\t\t\t\t\t\t“Glad to have you on board,” he says, and pushes the manila envelope toward you.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene highschoolgirl\n\t\t\t#I politely say no thanks.\n\t\t\t\t*gosub trial_end\n\t\t\t\tHe freezes. His eyes flash.\n\n\t\t\t\t“Pardon?” he says, his voice dangerously soft, without looking up.\n\n\t\t\t\t“No thank you,” you repeat firmly.\n\n\t\t\t\tFinally, he lifts his head. He’s a weasel-looking fellow, with a thin nose and tiny little eyes, now that you have time to look at him straight-on.\n\n\t\t\t\tFor a moment, you stare at one another.\n\n\t\t\t\t“Unfortunately,” he says, in a voice like a dry summer wind, “that is not an option.”\n\n\t\t\t\tHe reaches down and presses a button on the side of his desk, and before you know what’s happening, two ghostly guards built like brick walls have burst in through the door and are forcing you to sign a paper. Your name glitters on the black line, tiny and shaky and nothing like your real signature, but still your name written by your hand. \n\n\t\t\t\tThe man behind the so-called desk gives you a serpentine smile.\n\n\t\t\t\t“Glad to have you on board,” he says, and pushes the manila envelope toward you.\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\t*goto_scene highschoolgirl\n\n*label trial_end\n*comment end trial\n*return\n", "businessmanclever": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nAt the top of the stairs, you find what you’re looking for: the home office of Mr. Frank. You slip through the door and enter a room larger than your house—bookshelves line every wall, grand curtains hug the bay windows, and in the middle rests a fine oak desk that must have taken the lives of hundreds of ancient trees. Disgusted, you settle down in the leather chair and begin going through the files in the desk. Not ten minutes later, you have evidence of over fifty cases where this businessman has cheated, scammed, and betrayed innocent people. \n\nNow, all you need to do is decide how you’ll use this information.\n*choice\n\t#I use this evidence to get the authorities involved.\n\t\tIt is backbreaking work. You begin to wonder if all the living folk are as ignorant as these police officers are. Suddenly you begin to wonder how often ghosts may have approached you in your life, and you, going about your (numbered) days completely without realizing that the dead were trying to make contact. After all, the degree to which you are currently being ignored suggests that you could start a full-fledged awakening of the dead and you would still get nothing more than a vague glance in your direction. \n\n\t\tFinally, after a little creativity and a lot of pure exasperation at the endless stupidity of the living, you manage to get the attention of one of the officers with a well-placed piece of paperwork. It’s not five minutes later that a full investigation has been launched against Mr. Richard Frank. You sit back, take a breath, and let it out heavily. You have never, in all your days—both living and dead ones—felt so invisible. It was as if you were a drowning ant begging the rainclouds to listen to your pleas. Thank goodness it’s over.\n\t\tSure enough, Mr. Frank is soon arrested for the crimes he committed in his dirty business. He is hauled off to prison.\n\n\t\tWhat now?\n\t\t*choice\n\t\t\t#My work here is done.\n\t\t\t\tYou return to the Agency, relatively pleased with your success. As you trot down the cement hallways, avoiding the awkward, dead eyes of your coworkers, you wonder if your hard work will ever be appreciated.\n\n\t\t\t\tNo. No it won’t.\n\n\t\t\t\tYou are stopped in the hallway by that weasel-faced man, whom you almost do not recognize without his plastic desk. He folds his arms, his little eyes burning, and says in a particularly slinking voice, “You have failed the final case.”\n\n\t\t\t\tYou stare. “What?”\n\n\t\t\t\tHe gives you a sly smile. “You administered the justice of the living,” he says. “If we had wanted that, we would have sent those fool breathers to do our dirty work for us.”\n\n\t\t\t\tYou shake your head, unable to believe this. All of that work….\n\n\t\t\t\t“But the other two cases,” you say. “I did fine!”\n\n\t\t\t\t“Unfortunately, any failure is considered failure. Goodbye, lowlife.”\n\t\t\t\t*page_break\n\t\t\t\tBefore you can say another world, before you can fight or reason with the man or cry out for help, your arms are gripped by four rough hands and you are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void\n\t\t\t#I follow him to prison. I’m not done with him yet.\n\t\t\t\t*achieve jail\n\t\t\t\tLike some sort of parody of a guardian angel, you stick with Mr. Frank. You watch him shriek red-faced about his rights, and his innocence, and that he wants an attorney. You watch the guards roll their eyes when he isn’t looking. You even think, objectively of course, or maybe not so objectively, that Mr. Frank will look good in stripes.\n\n\t\t\t\tOnce he is settled into a jail cell, you begin to consider your options. You’ll have to act quickly, before his trial—who knows, the slippery snake might just get out of his accusations.\n\n\t\t\t\tWhat’s the plan? \n\t\t\t\t*choice\n\t\t\t\t\t#I’ll get the other prisoners to introduce him to their fists.\n\t\t\t\t\t\tAs it turns out, you’ve got it easier than you could possibly have hoped.\n\n\t\t\t\t\t\tIt doesn’t take long to realize that one of the prisoners—a tall, black-eyed fellow—is actually here because of some scheme of Mr. Frank’s. Naturally, there’s a bit of a storm brewing, and you haven’t even made a move yet. You feel a cat-like smile stretch across your face. This is going to be fun.\n\n\t\t\t\t\t\tIt takes almost no work to get the black-eyed prisoner to beat up your businessman friend. The others join in, though for less personal reasons, like the joy of targeting a slime-ball, which you yourself have experienced—and it gets even better. The fight looks like nothing more than a normal prison scuffle. No one is punished and no one is hurt, except, of course, Mr. Frank. And then, the greatest victory: the black-eyed prisoner is released the next day, his accusations having been found false by evidence discovered on Mr. Frank. You watch the businessman’s eyes as the other prisoner is taken away, and they burn in his head with such fierce fire that you know you’ve succeeded in your job. It is this—not the jail-time—that makes him truly feel Karma herself. \n\n\t\t\t\t\t\t“Thanks for the fun, Mr. Frank,” you think, and, with a smile, you follow the black-eyed fellow—your temporary ally—out of the prison. \n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene contractend\n\t\t\t\t\t#I’ll make him suspicious of everyone, slowly driving him insane.\n\t\t\t\t\t\tYou work hard to make the businessman suspicious of the guards and the other prisoners—no challenge there—and even his own lawyers. You play with his nightmares, you toy with his mind, and you administer subtle doses of insanity like some kind of strange, twisted parody of a psychologist. \n\n\t\t\t\t\t\tAnd then everything goes wrong.\n\n\t\t\t\t\t\tBefore you can convince him to make a move—the old snake, he’s too cowardly to act on your well-planted suspicions—his lawyers have got him out of prison. Shocked, dismayed, and destroyed, you watch him strutting out of the cell like a king, his nose in the air. You’ve lost your chance.\n\n\t\t\t\t\t\tThis is not good.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tCrestfallen, you return to the Agency. Maybe another job will be just the thing for you. As you walk through the cement hallways, head down in shame, you can’t help but feel that all the other ghosts are staring at you with their dead eyes flashing accusations. Somewhere deep in your un-beating heart of hearts, you know that you’re looking for consolation.\n\n\t\t\t\t\t\tYou find none.\n\n\t\t\t\t\t\tWhat you do find, however, is a raging man sitting behind his plastic desk, and a lot of curses hurdled at you like cannonballs, and shame and disappointment beyond your wildest dreams, and then something worse. Two guards come in through the door and put their hands roughly on both of your arms.\n\n\t\t\t\t\t\t“We do not tolerate failure here,” spits the man behind the desk, his face as red as a summer sunset. \n\n\t\t\t\t\t\t“Wh—what?”\n\n\t\t\t\t\t\t“Goodbye,” says the man. He smoothes his tie, takes a deep breath, and waves the guards away.\n\n\t\t\t\t\t\tOh no.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tBefore you can say another world, before you can fight or reason with the man or cry out for help, you are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene void\n\t#I manipulate events so that the same things he did to others will now happen to him.\n\t\t*achieve dwight\n\t\tYou fill up on the paperwork like a starving man at a steakhouse, leaving no cruel event unread and no sneaky action unconsidered. By the time you stand from the leather chair, you know exactly how this man has been ruining lives, and, better yet, you know how to do the same thing to him. Taking a deep breath, you exit the office, if office it can be called, and stand for a moment on the grand landing of the stairs. You look into the empty eyes of a bust—with a snort, you realize it is of Mr. Frank himself—and prepare yourself for the battle ahead.\n\n\t\tIt takes a long time. With painstaking work and backbreaking accuracy, you manage to set up a bit of financial ruin here, a little character destruction there. Mr. Frank’s success plummets. A few of his sports-cars disappear from the garage, one at a time. You’re doing relatively well—but for every success, there are three failed plans. It’s hard work. Of course, it’s worth it when you see Mr. Frank beginning to realize that he’s being tormented in the same ways he so recently tormented others.\n\n\t\tAfter a good while—years, maybe? You don’t know—you wander down the staircase, by now a regular house-guest, and see Mr. Frank standing by the front door speaking with his wife. She shrieks with glee and races up the staircase past you, taking the steps two at a time, and without a second thought you press yourself up against the wall so she can pass. You watch her go. This doesn’t bode well.\n\n\t\tYou listen for awhile and find that Mr. Frank has recently purchased two tickets for a faraway cruise. This, you think bitterly, does not sound like a man who is neck-deep in financial ruin. Your plans have not made a big enough dent.\n\n\t\tWhat now?\n\t\t*choice\n\t\t\t#I give up.\n\t\t\t\tCrestfallen, you return to the Agency. Maybe another job will be just the thing for you. As you walk through the cement hallways, head down in shame, you can’t help but feel that all the other ghosts are staring at you with their dead eyes flashing accusations. Somewhere deep in your un-beating heart of hearts, you know that you’re looking for consolation.\n\n\t\t\t\tYou find none.\n\n\t\t\t\tWhat you do find, however, is a raging man sitting behind his plastic desk, and a lot of curses hurdled at you like cannonballs, and shame and disappointment beyond your wildest dreams, and then something worse. Two guards come in through the door and put their hands roughly on both of your arms.\n\n\t\t\t\t“We do not tolerate failure here,” spits the man behind the desk, his face as red as a summer sunset. \n\n\t\t\t\t“Wh—what?”\n\n\t\t\t\t“Goodbye,” says the man. He smoothes his tie, takes a deep breath, and waves the guards away.\n\n\t\t\t\tOh no.\n\t\t\t\t*page_break\n\t\t\t\tBefore you can say another world, before you can fight or reason with the man or cry out for help, you are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void\n\t\t\t#I persevere.\n\t\t\t\tYears pass. You see Mr. Frank’s children grow up and move away. You see more sports-cars disappear from the garage. You see gray hairs sprout on Mr. Frank’s head. You see thousands of plans fail right before your eyes, falling dead like birds with bleeding breasts; you see only one or two plans succeed, forcing little heads up here and there, shy and small on the massive plain that is this battlefield. It’s hard work, and not very rewarding, at that.\n\n\t\t\t\tBut then one day, something changes.\n\n\t\t\t\tYou hear a car door slam—a minivan door, to be precise. You peer out the window, rubbing exhausted eyes. What you see takes the weariness from your bones like some kind of bright magic. It is Mr. Frank’s wife, all packed up and leaving, her face red with shouting at her husband—or, you think with a glow, her now ex-husband. He stands there banging on the window and shouting for her to stop, but she doesn’t. She drives away, her dull gold minivan streaking off down the street.\n\n\t\t\t\tAfter that, things go your way. Mr. Frank loses his job. A good deal of his scams are discovered by officials and hounded by the media. Mr. Frank goes from living like a king to living like a prisoner, accused and hated, and eventually he loses his house, his gaudy belongings, and, most notably, his honor. He slinks away like a beaten dog.\n\n\t\t\t\tYou’ve done it.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene contractend", "businessmanfierce": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\nYou take a deep breath, standing at the top of the stairs like a king looking over his kingdom, and realize that this is not so very far from the truth. Perhaps you are not a king—a silent-handed puppet master, more like—but you still have ultimate power over this house and what happens within it. Every door is yours to slam, every light yours to flicker, and the battlefield is yours to paint red with fear. You need only step onto it with your sword drawn.\n\nAnd so you do.\n\nYou begin that very night, waiting for the family to get into their beds. As soon as the last light is off you begin with ghostly sounds—a classic. The night after that, you slam the doors. The night after that, you set off the house alarm; next, you shatter the light-bulbs; next, the car alarms, all at once, so that the air is pieced with the shrieking voices of countless spotless sports-cars. You have made the family nervous. Mr. Frank even has a baseball bat next to his bed thanks to your antics—although, you think slyly, this isn’t likely to help him much, not least because you doubt he has enough muscle to swing it harder than a four-year old. This, you reflect, is some of your best work.\n\nBut then things go wrong.\n*page_break\nApparently, you are not the first less-than-happy spirit Mr. Frank has had to face. It’s not really surprising, given the number of people whose lives he has ruined—it only makes sense that these people would come back for him in death. Well, either way, it matters very little now. The old snake has professional exorcists on speed-dial. They’re a radical new type of ghost-hunter, unaccompanied by any one religious organization but rather uniting the ideals of multiple beliefs. And the result, unfortunately, is trouble for you.\n\nYou listen to the phone conversation, your dead flesh prickling, and realize that these are no amateur ghost-hunters. These people are trained, powerful, and smart. They are not going to wave around little machines they bought on the Internet; they are going to analyze the environment, pinpoint the problem—you gulp, because you would prefer any other name but “the problem”—and then eliminate it. \n\nIt’s clear that the job is hopeless. But that doesn’t mean the fun is over—or is it?\n*choice\n\t#I stick around. I’m curious.\n\t\tWell, curiosity killed the cat—but, then again, can curiosity kill a cat who has already died? You hope not.\n\n\t\tUnfortunately, you’re about to find out just how wrong you are on that account.\n\n\t\tThe exorcists arrive in a slender black van that’s as well-shaped and fierce as a sports-car. There’s a menacing logo on the side with nothing more than a fierce red X. The passenger doors open and out spill two young adults—dressed not like the exorcists you see in the movies, but rather in form-fitting clothes that allow much freedom of movement, and each has a multipurpose belt around their waist with a variety of tools attached. \n\n\t\tYou might be in trouble.\n\n\t\tThe two young adults, one black-haired man and one blonde woman, approach the front door, exchange decidedly-chilly niceties with Mr. Frank—looks like he isn’t popular with any social group, even exorcists—and close the door behind them. The first thing they do is mutter some kind of chant. It doesn’t take you long to realize what they’re doing, even though the words they speak grate on your ears like metal and make your insides squirm.\n\n\t\tThey’ve made it impossible for any disembodied spirit—that is to say, you—to leave. You’re trapped.\n\n\t\tSo curiosity CAN kill a dead cat.\n\t\t*page_break\n\t\t*label yeehaw\n\t\tYou begin searching for an escape, but you’re a little too late. You start upstairs, hoping that their chant only covers the first floor, although your instincts tell you otherwise. Of course, it’s hopeless. There’s no way out.\n\n\t\tYou begin to panic a little. You tear down the stairs and spill around a corner, only to feel the air explode around you with scalding white lights and alarms that buzz like shrieking vultures, and you know you’re caught. There’s no hiding now.\n\n\t\tWhat’s the plan?\n\t\t*choice\n\t\t\t#I hold my ground.\n\t\t\t\t*label cam\n\t\t\t\tYou take a deep breath and straighten your back. There’s no more time for running or hiding or cowardice. Slowly, grimly, like a funeral procession, you walk to the center of the living room and stand still. Alarms blare around your head, a halo of shrieking like fingernails on chalkboard. Lights flash on every side. You stand there and…\n\n\t\t\t\tWait. What exactly is it that you’re planning to do now?\n\t\t\t\t*choice\n\t\t\t\t\t#Plan? What plan?\n\t\t\t\t\t\t*achieve winging\n\t\t\t\t\t\tYou stand there for one more shrieking, flashing moment, a ghostly statue in the middle of the living room, and then the living are flooding into the room. The young man comes in through one door, vaulting over a couch with some sort of gun-like metal contraption in his hand, and the young woman races in through another entrance, making a grand appearance through the double doors like some sort of medieval princess. She carries a camera in her hand.\n\n\t\t\t\t\t\tBefore you can do anything else, the man lifts his metal device and pulls the trigger. The beam shoots forth, a ray of gold like pure sunlight, and it illuminates your form with stark ferocity. Your body begins to tingle from head to toe. You feel like someone lit a very small, very bright candle inside you. For the first time since your death, your form is completely visible—almost solid, even—and you look down at your form in shock.\n\n\t\t\t\t\t\t“Who are you, spirit?” demands the young man. He’s looking right at you.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou stammer for a moment. You had no plan, no forethought, no idea as to how this little game of chess would play out. Now, it’s coming back to bite you—and it’s obvious. The exorcists look at you in confusion, shooting each other uncertain glances as you continue to stammer painfully.\n\n\t\t\t\t\t\tYou choke on your words for a little while before finally whipping a half-cocked explanation into shape. It’s pale, and you haven’t thought it all the way through, and it feels like one of those terrible summer movies that must have spent only a quarter of an hour being scripted. Essentially, you’re in trouble. \n\n\t\t\t\t\t\tAnd what’s worse: your uncertain, uncomfortable muttering has been taken by the exorcists as some kind of dark, twisted witchcraft. Oops.\n\n\t\t\t\t\t\tIn unison, they begin a deep, steady chant that rises and falls like the breath of the sea. Their voices twine together, a perfect combination of high and low. Their words twist in the air like lengths of red ribbon. You are caught up in the breathlessness of it all, your mouth open, your eyes wide—\n\n\t\t\t\t\t\tAnd then, it’s over.\n\n\t\t\t\t\t\tThe last word of the chant is spoken, and suddenly you feel as though someone has hit you hard in the center of your chest. You stumble backward, and then lose your balance and fall, fall, fall much too far, what happened to the ground…? You look around you and see only darkness. There is a rush of cold air around you, like you’re sinking in an icy sea, and then you hit the bottom, and there’s nothing.\n\n\t\t\t\t\t\tNothing at all.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t#I make up some sob-story.\n\t\t\t\t\t\tYou’ve seen enough horror movies to know how this works. A pathetic back-story is usually the defining factor between an agreeable ghost and an exorcised one.\n\n\t\t\t\t\t\tSo, what story will you tell?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I say I'm looking for the living child left behind when I died.\n\t\t\t\t\t\t\t\tYou stand there for one more shrieking, flashing moment, a ghostly statue in the middle of the living room, and then the living are flooding into the room. The young man comes in through one door, vaulting over a couch with some sort of gun-like metal contraption in his hand, and the young woman races in through another entrance, making a grand appearance through the double doors like some sort of medieval princess. She carries a camera in her hand.\n\n\t\t\t\t\t\t\t\tBefore you can do anything else, the man lifts his metal device and pulls the trigger. The beam shoots forth, a ray of gold like pure sunlight, and it illuminates your form with stark ferocity. Your body begins to tingle from head to toe. You feel like someone lit a very small, very bright candle inside you. For the first time since your death, your form is completely visible—almost solid, even—and you look down at your form in shock.\n\n\t\t\t\t\t\t\t\t“Who are you, spirit?” demands the young man. He’s looking right at you.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou take a deep breath and launch into your story. Like any good tale-weaver, you apply a very specific set of details; you spin a world out of words, telling what color the sky was that day, and how the carpet felt under your feet, and what it felt like to die. (This is one detail you don’t have to fabricate. Unfortunately, that memory is still fresh in your mind.)\n\n\t\t\t\t\t\t\t\tThe exorcists listen intently to your story. When you’ve finished, they share a glance. But the look in their eyes is not of pity; it’s of darkness, of anger, of hate. Oh no. What have you done?\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tClearly, your little performance has led the exorcists to distrust you. They seem especially upset over your decision to bring kids into it. You note, too late, that the woman’s eyes are misty,  like a seaside forest in the morning, and you quickly realize—with a sinking feeling in your dead heart—that you have made a severely bad call.\n\n\t\t\t\t\t\t\t\tPredictably, they’re not going to let you leave after a lie like that. \n\n\t\t\t\t\t\t\t\t“Clara,” says the young man, placing a hand on her shoulder in a consoling way that makes you wince, “go get the tools.”\n\n\t\t\t\t\t\t\t\tOh no.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tBefore you can say anything else or try desperately to patch up your lie like fixing a child’s favorite toy, the woman called Clara is running back into the room. She carries a metal device on a tripod and a small, handheld gray box. Her eyes flash behind the thin curtain of tears.\n\t\n\t\t\t\t\t\t\t\t“We can’t trust a lying spirit,” says the young man. “Especially one who so lightly discusses the suffering of children.”\n\n\t\t\t\t\t\t\t\t“What? No!”\n\n\t\t\t\t\t\t\t\tBut it’s too late. The man gives Clara a nod, and she presses a few buttons on the tripod device and holds the gray box out toward you, like she’s aiming a toy gun.\n\n\t\t\t\t\t\t\t\tThere’s a little click, like the sound of a lighter, and then they begin a low chant, a rising and falling murmur of snaking words and twirling voices—\n\n\t\t\t\t\t\t\t\tAnd then the world disappears sharply. You know nothing more.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t#I say I’m a lost spirit.\n\t\t\t\t\t\t\t\tYou stand there for one more shrieking, flashing moment, a ghostly statue in the middle of the living room, and then the living are flooding into the room. The young man comes in through one door, vaulting over a couch with some sort of gun-like metal contraption in his hand, and the young woman races in through another entrance, making a grand appearance through the double doors like some sort of medieval princess. s out, dear old Mr. Frank really did kill someone. Your lie helped to reopen the case—and new evidence was found. Now, Mr. Frank IS in jail for murder, and it’s all thanks to you, with a little help from your exorcist friends.\n\n\t\t\t\t\t\t\t\t\t\tAfter thanking you for your “contributions to justice,” they set you free. You leave the house with a smile on your face—a dead smile, but a smile just the same. You did not think you would be able to punish Mr. Frank so soundly. Calling the exorcists backfired on him—he wanted them to get rid of his ghosts, but instead they found the skeletons in his closet. \n\n\t\t\t\t\t\t\t\t\t\tYou’ve succeeded in your job. It’s time to go back to the Agency.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene contractend\n\t\t\t\t\t#I tell them the truth.\n\t\t\t\t\t\tYou stand there for one more shrieking, flashing moment, a ghostly statue in the middle of the living room, and then the living are flooding into the room. The young man comes in through one door, vaulting over a couch with some sort of gun-like metal contraption in his hand, and the young woman races in through another entrance, making a grand appearance through the double doors like some sort of medieval princess. She carries a camera in her hand.\n\t\n\t\t\t\t\t\tBefore you can do anything else, the man lifts his metal device and pulls the trigger. The beam shoots forth, a ray of gold like pure sunlight, and it illuminates your form with stark ferocity. Your body begins to tingle from head to toe. You feel like someone lit a very small, very bright candle inside you. For the first time since your death, your form is completely visible—almost solid, even—and you look down at your form in shock.\n\n\t\t\t\t\t\t“Who are you, spirit?” demands the young man. He’s looking right at you.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou take a deep breath, close your eyes, and launch into your story. You don’t pause for questions. You don’t stop for breath. In fact, y let you go. \n\n\t\t\t\t\t\t\t\tYou head back to the Agency. You find your form slowly returning to its original, semi-invisible state, and a pang of regret hits you. How good it was, to pretend—if only for awhile—that you were YOU again. Now you’re just another ghost.\n\n\t\t\t\t\t\t\t\tSo? What will you do once you return to the Agency?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I’ll tell them nothing of what went on here. As far as they’re concerned, I succeeded at the job, and that’s that.\n\t\t\t\t\t\t\t\t\t\t*goto_scene contractend\n\t\t\t\t\t\t\t\t\t#I’ll tell them how I faithfully protected them.\n\t\t\t\t\t\t\t\t\t\tYou arrive back at the Agency and, standing before the man at the plastic desk, you tell your tale. His small, beady eyes get even smaller and beadier as you explain how you stood up to the exorcists and protected the interests of the Agency. Your voice begins to quiver, your words becoming uncertain. He doesn’t exactly seem pleased. This is far from the warm reception you were expecting.\n\n\t\t\t\t\t\t\t\t\t\t“You have failed,” he says when, at last, your voice has quivered and died.\n\n\t\t\t\t\t\t\t\t\t\t“Wh—what?”\n\n\t\t\t\t\t\t\t\t\t\tHe gives you a cold, humorless smile. “You cannot honestly consider this a ‘success’ when exorcists were not only called, but informed of the existence of the Agency?” He snorts and shakes his head. “Unfortunately, that is not how we function here.”\n\n\t\t\t\t\t\t\t\t\t\t“But—but I protected the Agency!”\n\n\t\t\t\t\t\t\t\t\t\tHe raises his eyebrows.\n\n\t\t\t\t\t\t\t\t\t\t“No,” he says. “You endangered us.”\n\n\t\t\t\t\t\t\t\t\t\tLooks like your loyalty wasn’t well-placed after all.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tBefore you can say another word, your arms are gripped firmly by two sets of burly hands. You are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\t\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\t\t\n\t\t\t\t\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t#I answer all of their questions in exchange for my freedom.\n\t\t\t\t\t\t\t\tThe two exorcists exchange a glance.\n\n\t\t\t\t\t\t\t\t“Freedom from us, or freedom from this Agency?” asks the young woman, narrowing her eyes.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Freedom from you.\n\t\t\t\t\t\t\t\t\t\t“Seems fair,” says the young man. \n\n\t\t\t\t\t\t\t\t\t\tAnd so, they begin to ask you questions about the Agency—little things at first, like the environment of the offices, and then bigger questions, like the organization of power. You answer with as much detail as possible. After awhile, you find that you even enjoy talking so freely about the horrors that you’ve seen, as if sharing the truth can somehow protect you from it. You especially like telling the exorcists about the man behind the plastic desk. You think you’ve managed to make him sound like a complete fool.\n\n\t\t\t\t\t\t\t\t\t\tOnce they have run dry on questions, the exorcists nod, thank you for your help, and release you from the house. The specifics of your bargain demand that you return to the Agency, so you do.\n\n\t\t\t\t\t\t\t\t\t\tYou only hope that no one ever discovers that you’ve betrayed the company secrets.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene contractend\n\t\t\t\t\t\t\t\t\t#Freedom from the Agency.\n\t\t\t\t\t\t\t\t\t\t“Seems fair,” says the young man. \n\n\t\t\t\t\t\t\t\t\t\tAnd so, they begin to ask you questions about the Agency—little things at first, like the environment of the offices, and then bigger questions, like the organization of power. You answer with as much detail as possible. After awhile, you find that you even enjoy talking so freely about the horrors that you’ve seen, as if sharing the truth can somehow protect you from it. You especially like telling the exorcists about the man behind the plastic desk. You think you’ve managed to make him sound like a complete fool.\n\n\t\t\t\t\t\t\t\t\t\tOnce they have run dry on questions, the exorcists nod and thank you for your help. Then they exchange a rather strange look—a knowing, meaningful glance, complete with bright eyes and raised brows—and you begin to get a bit suspicious.\n\n\t\t\t\t\t\t\t\t\t\t“What?” you ask frankly.\n\n\t\t\t\t\t\t\t\t\t\t“Oh, we were just…thinking,” says the young woman.\n\n\t\t\t\t\t\t\t\t\t\t“You’re going to have a hard time avoiding that Agency, if they’re as controlling as you say.” The young man looks at you. “If you want to ensure that you won’t be recaptured, I think you’ll have to come with us. You could certainly be a valuable addition to our team.”\n\n\t\t\t\t\t\t\t\t\t\tAnd so it is that you become a member of a group of professional exorcists. With the information you were able to provide, the young pair are able to narrow their sights onto Agency scum, and the three of you travel the world, eliminating this threat for the good of the living and the dead. You free innocent spirits. You liberate Agency offices. You make a change in the world—actually, in two worlds, the living one and the dead one—and you lead a very successful afterlife.\n\n\t\t\t\t\t\t\t\t\t\tAfter awhile, you turn to training new spirits and young living beings to follow in your footsteps. Your power is eternal. Your change is strong.\n\n\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*achieve one\n\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t#I race to another room.\n\t\t\t\tYou race forward and spill through the room, skidding to a stop in the hallway and standing for one quivering, panting minute, like a racehorse after a long run. You hear footsteps behind you and know that you have nowhere to go but forward. \n\n\t\t\t\tYou run into the next room—a kitchen, by the look of it—and suddenly the air explodes around you. Alarms are going off, shrieking in shrill, fierce little voices that make you want to tear at your ears. You realize with a sinking feeling just what this means.\n\n\t\t\t\tEvery room has alarms. You won’t be able to run or hide.\n\t\n\t\t\t\tWhat now?\n\t\t\t\t*choice\n\t\t\t\t\t#Maybe running away just isn’t the answer.\n\t\t\t\t\t\tIt rarely ever is. Clever choice.\n\n\t\t\t\t\t\tYou stand in the middle of the room and take a deep breath. That’s it. No more running, no more hiding.\n\t\t\t\t\n\t\t\t\t\t\tSo, what’s the new plan?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Are you insane? I’m not ready to give up on this whole “hiding” thing yet.\n\t\t\t\t\t\t\t\tOkay then. Perhaps there WILL be more hiding. \n\n\t\t\t\t\t\t\t\tYou launch into the next hallway and begin a sort of obstacle course. By cleverly avoiding the cameras and setting off alarms only methodically, you manage to confuse the exorcists. A fallen tripod there, a shrieking alarm there, another alarm going off only a second later all the way across the house. It’s confusing, but you do a good job.\n\n\t\t\t\t\t\t\t\tThe little game of cat-and-mouse, or, more appropriately, exorcists-and-ghost, goes on for quite awhile. You’re making their equipment work against them, and they know it. At last, confused, frustrated, and exhausted, they give up. You’ve done it! You’ve defeated the exorcists!\n\n\t\t\t\t\t\t\t\tThey mutter a few words to dispel the protection around the house, and you find yourself—for the first time in much, much too long—free. \n\n\t\t\t\t\t\t\t\tYou make a break for the front door.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*gosub swaggysnake\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#I’ll hold my ground and face them.\n\t\t\t\t\t\t\t\t*goto cam\n\t\t\t\t\t\t\t#Actually…maybe running IS the answer. There’s a plan forming here!\n\t\t\t\t\t\t\t\t*label yeahand\n\t\t\t\t\t\t\t\tGood thinking! You can run from room to room and set off all of the alarms and cameras!\n\n\t\t\t\t\t\t\t\tYou take another deep breath, filling your dead lungs, wishing you could feel the air the way you could when you were alive. Then you exhale and shoot forward. You feel like a racehorse, a shooting star. You spill into the next room and, instantly, the alarms explode in the air all around you. Camera lights flicker to life. You don’t even pause. Your feet thundering, you race into the next room and set off the alarms there, and then the next, and the next, until the whole house is alight with the shriek of alarms.\n\n\t\t\t\t\t\t\t\tFinally, you take a moment to reflect on the result of your work. The exorcists are standing in the living room, shouting to one another over the scream of the alarms. From what you can gather, they suspect foul play, but either way their equipment is clearly shot. They resolve to get backup and they leave you alone.\n\n\t\t\t\t\t\t\t\tBackup?\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou feel panic welling up inside of you, like bile climbing your throat. You weren’t planning on the exorcists having backup. What will you have to face now?\n\n\t\t\t\t\t\t\t\tA moment later, the young man and woman come back into the house, followed closely by an old, bent woman who looks like a weeping willow. You look at her, shocked. She wears the same type of clothing as the other two. She must be their leader.\n\n\t\t\t\t\t\t\t\tShe listens carefully to the report that her coworkers give, and then she walks to the living room and, stooping low to pick up a tripod, she begins to watch one of the videos. You peer over her shoulder. There, unbelievably, you can just make out your own blurred form like a fingerprint on white paper, racing through the room at top speed.\n\n\t\t\t\t\t\t\t\tThe old woman gives a small smile and moves on to the next camera. Here, too, your form can be seen shooting through the room. The old woman puts down the camera, and she laughs.\n\n\t\t\t\t\t\t\t\tThe young pair look shocked. “What?” asks the woman.\n\n\t\t\t\t\t\t\t\tThe old woman laughs again. She laughs until her eyes water and her breath comes rough, and you can’t help smiling a bit yourself.\n\n\t\t\t\t\t\t\t\t“This spirit,” she says. “It beat the system!”\n\n\t\t\t\t\t\t\t\tThe young man and woman exchange a wide-eyed, open-mouthed stare.\n\n\t\t\t\t\t\t\t\t“It deserves its freedom,” says their leader. “It’s earned that much!”\n\n\t\t\t\t\t\t\t\tAnd so, with a few murmured words, the blockades around the house come down, and you’re free.\n\n\t\t\t\t\t\t\t\tWho knew?\n\n\t\t\t\t\t\t\t\tYou give the woman a small smile, a silent thank-you that she will never receive, and then you take off. You’ve done it. Your race for the front door is fueled by electric, breathless bliss.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto swaggysnake\n\t\t\t\t\t#I attack the exorcists.\n\t\t\t\t\t\tThe exorcists spill into the room behind you, a tangle of limbs and beating hearts, and you turn on them with fire in your eyes. You have become a cornered animal, a panicked and feral creature, and you know you’ll have to fight your way to freedom. You aren’t sure how much damage the living can do to the dead, but you have to try.\n\n\t\t\t\t\t\tYou launch yourself at them, and it’s the young man you hit first. You feel skin under your hands and you scratch and tear. He cries out and stumbles backward into the young woman, still unable to see you. You don’t let up. You kick and pull and scratch and wriggle—\n\n\t\t\t\t\t\tAnd then you feel something strike you in the shoulder, like a small, cold fist, and you feel your soul give a fierce tremor within you. With the force of the hit, you half expect the woman to have punched you. But when you turn around, it’s not a balled fist that’s pointed at you. It’s a small gun-like device. And, somehow, it just shot you.\n\n\t\t\t\t\t\tShe pulls the trigger again. Another cold fist slams into you, hitting your chest. She pulls it again, and again, and again. With every shot you feel your soul come apart a little more, like a vase that’s slowly being cracked with a hammer. And then she pulls the trigger and the blow lands somewhere over the place where your heart once beat—\n\n\t\t\t\t\t\tAnd the world falls away. It just stops, simultaneously, every sound and sensation and smell of cologne on the air—everything stops.\n\t\t\n\t\t\t\t\t\tYou know no more.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene void\n\t#Great! I’ll haunt them too!\n\t\tThat’s the spirit (no pun intended)!\n\n\t\tThe exorcists arrive in a slender black van that’s as well-shaped and fierce as a sports-car. There’s a menacing logo on the side with nothing more than a fierce red X. The passenger doors open and out spill two young adults—dressed not like the exorcists you see in the movies, but rather in form-fitting clothes that allow much freedom of movement, and each has a multipurpose belt around their waist with a variety of tools attached. \n\n\t\tThey don’t look like they scare easily.\n\n\t\tNot one to be so easily disheartened, you take up a position and wait for them to set up shop. After exchanging some decidedly-cool niceties with Mr. Frank—looks like he isn’t popular amongst any group, even exorcists—they quickly organize their cameras and lights and tools throughout the house. You give a thin smile. These kids are going down.\n\n\t\tUnfortunately, their next move is something you don’t expect.\n\n\t\tThey stand before the front door and begin to chant, a thick, low-voiced mutter that rises and falls like red waves. You crane your neck to hear them better. It doesn’t take you long to realize what they’re doing, even though the words they speak grate on your ears like metal and make your insides squirm.\n\n\t\tThey’ve made it impossible for any disembodied spirit—that is to say, you—to leave. You’re trapped.\n\n\t\tIs this a concern?\n\t\t*choice\n\t\t\t#Um…yes.\n\t\t\t\t*goto yeehaw\n\t\t\t#Not really.\n\t\t\t\tGood for you!\n\n\t\t\t\tUnmoved, you proceed with the original plan. After all, these kids came into YOUR territory, didn’t they? You have the home-field advantage. You can terrorize them to your heart’s content.\n\n\t\t\t\tThe first step, though your heart hungers for terror and screaming, is boring but necessary. You must sit quietly and watch these exorcists. If you hope to scare them at all, you’ve got to analyze the situation and see where your expertise could be applied for maximum success. Although it’s a tiring business, it’s crucial to any good haunting, and, you reflect, probably where most horror-movie type ghosts get it wrong. After all, as you’ve learned, terrifying the living is an art.\n\n\t\t\t\tYou watch for awhile, and come to the conclusion that you’ve got some options.\n\t\t\t\t*choice\n\t\t\t\t\t#I’ll just attack them. Good old-fashioned horror never fails.\n\t\t\t\t\t\tYou set your trap like a creeping, clever little spider, and you feel the feral ferocity of the hunt pounding in your body. You hover in the shadows of the living room and wait, just wait, for the right moment. When you feel the time is right, you shift a little and set off the alarm. Predictably, the exorcists come immediately, spilling into the room, a tangle of limbs and beating hearts.\n\n\t\t\t\t\t\tYou launch yourself at them, and it’s the young man you hit first. You feel skin under your hands and you scratch and tear. He cries out and stumbles backward into the young woman, still unable to see you. You don’t let up. You kick and pull and scratch and wriggle—\n\n\t\t\t\t\t\tAnd then you feel something strike you in the shoulder, like a small, cold fist, and you feel your soul give a fierce tremor within you. With the force of the hit, you half expect the woman to have punched you. But when you turn around, it’s not a balled fist that’s pointed at you. It’s a small gun-like device. And, somehow, it just shot you.\n\n\t\t\t\t\t\tShe pulls the trigger again. Another cold fist slams into you, hitting your chest. She pulls it again, and again, and again. With every shot you feel your soul come apart a little more, like a vase that’s slowly being cracked with a hammer. And then she pulls the trigger and the blow lands somewhere over the place where your heart once beat—\n\n\t\t\t\t\t\tAnd the world falls away. It just stops, simultaneously, every sound and sensation and smell of cologne on the air—everything stops.\n\n\t\t\t\t\t\tYou know no more.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t#They seem reliant on their technology. I’ll sabotage their equipment.\n\t\t\t\t\t\t*goto yeahand\n\t\t\t\t\t#I’d like to provide a more individualized haunting experience. I’ll target their unique weaknesses.\n\t\t\t\t\t\tYou bide your time, waiting in the shadows, watching and listening and drinking it all in. You have to be careful not to set off the alarms or get in front of the cameras, but that’s not too hard. And anyway, it doesn’t take you very long to realize what you need to do.\n\n\t\t\t\t\t\tWhile the young man and woman seem to be startlingly lacking in personal fears and phobias, you do manage to overhear one of the muttered conversations that fill up the dark, lonely, and, thanks to you, uneventful hours of their time here. They seem to have some sort of a Founder, some guy who started their organization, and from what you can gather, he likes to gamble. “Never turns down high stakes, our Founder,” mutters the young man, and they both laugh.\n\n\t\t\t\t\t\tWell, this is interesting. What do you do now? \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I’ll use their equipment to communicate and ask for this “Founder.”\n\t\t\t\t\t\t\t\tIt takes a little bit of creativity and a lot of careful planning, but eventually, you find a way to use the cameras and alarms and recording devices peppering every room in the house to communicate with these exorcists. You slink into the living room, carefully, so that the alarms don’t go off. That’s the first problem solved. Next, to find a camera that’s already recording, and, hoping that it’s specialized to pick up the noises of the afterlife, you convey a message.\n\n\t\t\t\t\t\t\t\t“Bring me your Founder.”\n\n\t\t\t\t\t\t\t\tAfter that, you move freely to the center of the room, setting off the alarms. The exorcists come running. They see the flashing light on the camera, hit the play button, and watch your message. Predictably, it only takes a few viewings for them to be trembling in their shiny black shoes and racing out the front door to gather their backup.\n\n\t\t\t\t\t\t\t\tSuccess. \n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou don’t have to wait long. It’s only a moment before the front door whips open again, and there in the shadows stands the Founder. There is a footstep. A tall mucking boot appears from the gloom. Another footstep, and the Founder is in full light.\n\n\t\t\t\t\t\t\t\tAnd he is a SHE.\n\n\t\t\t\t\t\t\t\tShe’s a wrinkled, bent old lady who looks like a weeping willow. Her presence is shocking. You had been expecting a man, fully and completely. Why? You don’t know. You think back, but you can’t remember the kids mentioning that their Founder was either a man or a woman. What, then, led you to believe the former? \n\n\t\t\t\t\t\t\t\tYou hesitate and fall back a few steps. An old woman may be a bit more difficult to bargain with than an enthusiastic young man, the one you were imagining. \n\n\t\t\t\t\t\t\t\tHow will you win your freedom?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I know! I’ll intrigue the Founder with a high-stakes wager.\n\t\t\t\t\t\t\t\t\t\t*achieve gamble\n\t\t\t\t\t\t\t\t\t\tYou manage to get their attention with a similar technique to the one you used earlier. Knowing the old woman is likely to lose patience and interest quickly without that “high stakes” aspect, you get to the point.\n\n\t\t\t\t\t\t\t\t\t\t“I’d like to make you a wager.”\n\n\t\t\t\t\t\t\t\t\t\tShe’s intrigued immediately. Her eyes glow like shooting stars in a sky of wrinkles. “What kind of wager?”\n\n\t\t\t\t\t\t\t\t\t\tYou think quickly. “If I can beat every room full of your equipment and make it out unnoticed and unrecorded, you have to let me go. If not, you can do what you like with my spirit.”\n\n\t\t\t\t\t\t\t\t\t\tThe young man and woman quickly try to talk their Founder out of it, saying that such a wager is ridiculous and too risky, but she won’t hear it. You said the magic words: “high stakes.”\n\n\t\t\t\t\t\t\t\t\t\t“Okay, spirit,” she says. “We’ll leave you. You two, take down the restrictions.”\n\n\t\t\t\t\t\t\t\t\t\tWith an ill-looking glance at one another, the young pair begins a low chant. The blocks around the house go down. You could leave now, if you like.\n\n\t\t\t\t\t\t\t\t\t\tBut…you did make a deal…\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Who cares? I’m out of here!\n\t\t\t\t\t\t\t\t\t\t\t\tYou make a break for the front door as soon as the exorcists and their Founder are out of sight. The alarms in the entryway go off, marking your loss of the wager, but you don’t care. You spill out onto the porch, panting, your chest expanding with the intoxicating sensation of freedom—\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then, it’s over.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe air around you explodes. Alarms go off from everywhere, and before you know what’s happening, you’re once again surrounded by the exorcists. They suspected foul play all along. They prepared for you to cheat and escape even though you set off the alarms inside.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“I thought so,” mutters the Founder. “Goodbye, foul spirit.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tOh no.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\tLed by the old woman, the exorcists begin a deep, steady chant that rises and falls like the breath of the sea. Their voices twine together, a perfect combination of high and low. Their words twist in the air like lengths of red ribbon. You are caught up in the breathlessness of it all, your mouth open, your eyes wide—\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then, it’s over.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe last word of the chant is spoken, and suddenly you feel as though someone has hit you hard in the center of your chest. You stumble backward, and then lose your balance and fall, fall, fall much too far, what happened to the ground…? You look around you and see only darkness. There is a rush of cold air around you, like you’re sinking in an icy sea, and then you hit the bottom, and there’s nothing.\n\n\t\t\t\t\t\t\t\t\t\t\t\tNothing at all.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t\t\t\t\t#No, I have to think of a real plan.\n\t\t\t\t\t\t\t\t\t\t\t\tYou hesitate for a moment, considering your options. You’ve really talked yourself into a corner with this one. How are you going to beat their equipment? This is no amateur ghost-hunting gig. These are professionals, people who have been doing their work—and doing it well—for years. \n\n\t\t\t\t\t\t\t\t\t\t\t\tYou’re in trouble.\n\n\t\t\t\t\t\t\t\t\t\t\t\tSo, what now?\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I guess I have to try to disable the equipment. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou take a deep breath and begin what promises to be the most risky obstacle course you’ve ever seen. After all, the stakes are only high for you—and they are as high as could be: you are gambling, once again, with your Eternity.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou slink like an alley-cat through each room, carefully locating the alarms and avoiding their range. You dodge cameras like a thief, disable alarms like a spy, and overall manage to stay unnoticed and unrecorded. You hardly dare to breathe—though you’re not sure it’s really breathing anyway—for fear that the motion may send your plan up in flames.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tFinally, you reach the final room. It’s a basement, though, granted, it’s the basement of a rich man. It is huge and shadowy, a recipe for ghosts, and you almost consider going back for a flashlight before realizing that you are, in fact, a ghost yourself. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou know you can’t go down the stairs, so you slide over the banister and fall to the ground. You hold your breath. When no alarms go off, you straighten up and examine the room. Two cameras, sitting in the middle of the room back-to-back, and no alarms. Perfect.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou calculate the blind spot and slink up to the cameras, holding your breath. Carefully, very carefully, you reach over and, with both hands, simultaneously disable the cameras. It’s the last thing you do.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe cameras begin shrieking with their own built-in alarms, apparently designed to warn filmmakers when their cameras had died. A useful feature for exorcists on week-long jobs; not such a useful feature for the spirits trying not to be exorcised. Unlucky. Looks like you’ve failed.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe exorcists come racing down the stairs at the call of the alarm, the Founder leading the herd. There is a triumphant smile swimming in the wrinkles of her face.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Well done, well done!” she’s saying, sounding overjoyed. “You put up a real fight! Had me on pins and needles, spirit, you certainly did!”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou look at her hopelessly.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“I can’t exorcise one with your guts, spirit. We’ll move you on, but don’t worry, it’ll be fine.” She laughs heartily. “Why, I haven’t been so entertained in years!”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tWait, what? What was that, about being moved on?\n\t\t\t\t\t\t\
