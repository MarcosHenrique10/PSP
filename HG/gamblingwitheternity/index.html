d the boys all leap backward from the table. One of them falls out of his chair. They all howl and laugh and accuse one another of making the board shake, and then, looking not at all terrified, they return to the game.\n\n\t\t\t\t\t\t\t\tYou’re going to have to do better than that.\n\n\t\t\t\t\t\t\t\tYou frown and go to form a word—what it will be, you’re not sure yet—when suddenly you find that the game-piece is moving over the letters without you. One of the boys is moving it. The game proceeds to spell out some vulgar words and suggests that each of the boys perform rude physical impossibilities.\n\n\t\t\t\t\t\t\t\tYou have lost control. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I’ve tried my best. I’m giving up on this job, and the Agency will never be the wiser.\n\t\t\t\t\t\t\t\t\t\tAnd perhaps they won’t.\n\n\t\t\t\t\t\t\t\t\t\tBut perhaps they will.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene businessmanopening\n\t\t\t\t\t\t\t\t\t#I give up on the Ouija board and try something new.\n\t\t\t\t\t\t\t\t\t\t*goto_scene desecratorcar\n\t\t\t\t\t\t\t#I keep up the mystery and do nothing.\n\t\t\t\t\t\t\t\tUnfortunately, while this plan worked fantastically for awhile, you’ve overestimated their attention span. The troublemakers quickly grow bored when no answer comes, and they pack up the Ouija board—and with it, your final hope for this plan—and they resort instead to playing a particularly violent video game. Grumbling under your breath, you struggle to mentally regroup, whipping your thoughts into line like a slave-driver.\n\n\t\t\t\t\t\t\t\tYou need a new plan, and fast.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene desecratorcar\n\t\t\t\t\t#I’ll go full horror-movie on them.\n\t\t\t\t\t\tExcellent choice.\n\n\t\t\t\t\t\tIt is not long before you locate your target. You slink into his apartment after him. He’s a tall, awkward thing, with a mop of filthy blonde hair and off-blue eyes like a muddy lake. Instantly you know you don’t like him. You’ve always tried not to judge a book by its cover—but, then again, you read this book, and all that was inside it was disrespect and immaturity.\n\n\t\t\t\t\t\tHe deserves what is coming to him.\n\n\t\t\t\t\t\tOnce you find him, it doesn’t take long for your plan to fall into place. He has friends over nearly every night—the same group of awkward troublemakers who laugh too loud and drink too much—and you work them over, convincing them with the subtle arts of the dead that the Ouija board is calling to them. You pull the box out of the closet and leave it on their favorite chairs, targeting a different boy every night. You play with their minds. It’s not too long before they’re prying the ancient lid from the box and exposing the Ouija board.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou put your plan into play immediately. After all, you’ve only got one chance. This was by far the riskiest choice, but if it works, you’ll have decimated this group of troublemakers and made the graveyard desecrator pay for his disrespect.\n\n\t\t\t\t\t\tYou start out simple. As they hold the moving game-piece over the letters, you move it, slowly, steadily. “Hi.” It’s a great way to keep them hooked, and, like any group of stupid kids in a horror movie, they look at each other and hoot and howl with laughter and accuse each other of moving the game and then eventually fall to asking another question. \n\n\t\t\t\t\t\tThis time, you try a death threat. It takes a little longer, and you have to start over multiple times because the dimwits lose track of all the letters, but once the message gets through all the laughter is silenced. They stare at one another. \n\n\t\t\t\t\t\t“Did you move it?”\n\n\t\t\t\t\t\t“No.”\n\t\n\t\t\t\t\t\t“He moved it, had had to,” says the graveyard desecrator.\n\n\t\t\t\t\t\t“Why don't you come over here and say that to my face, you--”\n\n\t\t\t\t\t\tJust when they’re at each other’s throats, pulling the collars of shirts and snarling and shoving chests and waving fists, you put the final piece of the plan into play. You kill the lights. Their voices fall silent in the darkness. Then you begin to shake the board, slowly at first, then faster and faster until it looks as if a tiny earthquake is taking place only underneath the table. Finally, you spell out the names on the headstones the graveyard desecrator toppled—one after another, names and dates and more names and a few curses here and there.\n\n\t\t\t\t\t\tAnd then you spell out his name, the one you found in the file. \n\n\t\t\t\t\t\tThat’s it. That’s all you have. You hold your breath, hoping for success.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou’ve done it!\n\n\t\t\t\t\t\tThe boys shriek and take off, spilling out the door, shoving one another in their desperate attempt to escape. They trip over dirty laundry and food-covered paper plates as they scramble. The graveyard desecrator himself stays in the middle of the room, trembling.\n\n\t\t\t\t\t\tYou move the game-piece again. Slow and steady, your movements decisive, fearsome, cruel. \n\n\t\t\t\t\t\t“Confess.”\n\n\t\t\t\t\t\t“Okay,” he says, “okay! I’ll do it!”\n\n\t\t\t\t\t\tThe graveyard desecrator whips out his cell phone and begins dialing. He drops the thing a few times, flinching every time, before he finally gets the number he wants.\n\n\t\t\t\t\t\t“Hello, police?” He pauses, and then shoots a terrified look at the now-still Ouija board. He’s confessing. Anything to appease your obviously-evil spirit.\n\n\t\t\t\t\t\tYou’ve done your job perfectly. And, it was satisfying, too. Perhaps you should consider haunting Ouija boards professionally.\n\n\t\t\t\t\t\tOn to the next case.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene businessmanopening\n\t\t\t#I go to the young woman.\n\t\t\t\tYou stride through the grass toward the young lady. She hears you coming, though your feet make no sound and your breath is dead in your lungs, and she turns around. She is clearly not of this time period, or, you think, of any time period your parents or your grandparents had lived to see. Her head is swaddled in a bonnet, and her lacey dress billows out at the waist like some kind of pink floatation device, and she holds what you think to be a parasol.\n\n\t\t\t\t“Hello, stranger,” she says in a voice like lilies, and dips her knees in a slight curtsey. \n\n\t\t\t\tYou clear your throat. \n\n\t\t\t\t“Hello, er…Miss,” you say, unsure of how to address her. She inclines her head and you continue. “I was just wondering what exactly happened here.”\n\n\t\t\t\t“Ah.” She frowns and casts her eyes toward the grass. “A foul day, it was. The boy came upon us like a storm, and he wreaked his frightful havoc, and then he was gone, and our stones were left scattered across the lawn like so many dead things.”\n\n\t\t\t\tYou sigh.\n\n\t\t\t\t“There was something else,” she says, looking up at you. “He carried some sort of…lighted torch.”\n\n\t\t\t\t“A flashlight,” you say. Interesting.\n\n\t\t\t\t“He held it out with hand shaking, as if he feared what waited in the dark.” She tilts her head. “I thought only children feared the shadows.”\n\n\t\t\t\tYou give her a little smile.\n\t\n\t\t\t\t“Well, I’m about to make him a kid again, then,” you say, and shake her hand, though she looks a little surprised, and take off.\n\n\t\t\t\tYou know what to do now.\n\t\t\t\t*page_break\n\t\t\t\tIt is not long before you locate your target. You slink into his apartment after him. He’s a tall, awkward thing, with a mop of filthy blonde hair and off-blue eyes like a muddy lake. Instantly you know you don’t like him. You’ve always tried not to judge a book by its cover—but, then again, you read this book, and all that was inside it was disrespect and immaturity.\n\n\t\t\t\tHe deserves what is coming to him.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene desecratorterrorize", "highschoolgirl": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\nYou reach out and, hesitantly, as if it is a snake with glowing red eyes, you take the manila envelope. It has a name on the front, written in small, neat calligraphy.\n\nCarlie Elizabeth.\n\n“That is the name of your target,” says the man behind the so-called desk. He gives you a dark smile, almost a sneer. “Good luck, newcomer.”\n\nAnd so, clutching your envelope, you turn around, swallow hard, and begin your fate.\n*page_break\n*achieve newb\n*set jobtitle \"Contract Haunter\"\n\n\nYou walk out into the hallway, feeling a little like a mouse in a lab maze. You see doors painted with fancy golden lettering, boasting the names of thousands of individuals who, you realize, are dead too--and a shiver goes down your spine. It's like standing in a cemetery where all of the headstones are glass, and if you're not careful, you might just see your own name somewhere. Unsettled, you begin to walk...but as soon as you take the first step, your mind fills with static and everything goes fuzzy. You don't remember where you go or what you do, but suddenly, you're standing outside.\n\nIt's a little strange at first, but you only have a moment to question the logic of the afterlife before realizing you've got a job to do. You take a furtive look around you and peer inside the manila envelope. There’s a collection of water-stained papers in a state of complete upheaval, all of them wrinkled and bent and dog-eared, and you wonder how a name penned in calligraphy can be hiding such chaos.\n\nThen, bitterly, you realize that all of this Agency is exactly like that: pretty enough on the outside, but a bit ominous inside.\n\nThe papers are a mess, but they aren’t unreadable. You manage to find a lot of information about Carlie Elizabeth—her eye color, her height, her favorite food, her darkest fears, the pattern on her bed sheets. The most notable information, however, you find at the bottom, though you are sure it should have been somewhere more noticeable, considering how important it is.\n\nShe’s sixteen. Carlie Elizabeth is hardly more than a child, and you’re being sent to haunt her.\n\nWith unease setting in, you follow the directions found within the envelope and manage to get to the girl’s home. Something is wrong here…but what?\n\nNo time for that now. You have to decide how you’re going to do this. After all, you’ve never haunted anyone before—and uneasy or not, you have the feeling you don’t want to fail at this job, or risk facing the wrath of the mysterious Agency. \n*choice\n\t#I’m going to haunt her cleverly, like I’m a character out of a psychological thriller.\n\t\tYou find your way up to her room—not difficult to find, considering it’s the only door plastered with band memorabilia. You wait outside for a few minutes, hoping that she isn’t home, and when you don’t hear anything, you decide to head in.\n\n\t\tAs soon as you assure yourself that she isn’t here, you’re investigating your new haunt, if you’ll forgive the expression. It’s a pretty average room, certainly not suggestive of the horror you’ve been sent here to inflict. She has movie posters on every possible surface and books everywhere else. You can’t imagine what she could have done to incur the wrath of the Agency.\n\n\t\tYou spend some time planning a routine, and when you see a school bus pulling up at the sidewalk, you’re relatively confident that you can ruin Carlie Elizabeth’s life. As she approaches the front of her house, you cast a critical eye over her. Short, dark-haired, with eyes the color of raven feathers. She might have been beautiful, if not for the look of deep sadness that seemed to have taken up permanent residence on her face.\n\n\t\tThe first thing you do is wait for her to walk into her bedroom, and as she’s tossing her overstuffed backpack onto the bed, you slam the door. She jumps, and then freezes in place. It’s almost as if she knows you’re there.\n\n\t\tYou get the feeling something isn’t right here.\n\t\t*page_break\n\t\tEventually, with wide and wary eyes like a fawn, Carlie goes back about her business. She crashes on her bed and cranks up her MP3 player—only one ear-bud in, you notice. She’s ready for you.\n\n\t\tIn the coming weeks, you manage to terrify Carlie Elizabeth. You push things off the desks. You leave books open to the most ominous pages—usually character deaths, some of which you remember agonizing over yourself. You even find a way to make every object in her room suddenly begin shaking, as if there is an earthquake, one night when the shadows are particularly deep. That is what finally sets her off.\n\n\t\tAll along she has known that something is wrong. You can see it in her eyes, when she’s home alone, and when she’s getting ready for school, and in those glorious moments of twilight just after the sun has set. It’s like she’s watching a horror movie—she knows there is something terrible waiting for her, but she doesn’t know which corner is concealing it.\n\n\t\tWhen you make everything shake, however, it appears to drive her over the edge. No more wide eyes, no more shudder when she walks. She gets up, flicks on her flashlights, and hisses, “Enough!”\n\n\t\tYou stop involuntarily.\n\n\t\t“I know you’re there,” says Carlie. “I’ve met your kind before. Ghost, right? Yeah.”\n\n\t\tOh. No wonder she seems so constantly sad. She looks death in the face every day.\n\t\t*page_break\n\t\tSuddenly it all makes sense. The Agency didn’t want to torment this girl because she had done something to insult or wrong the world of the dead.\n\n\t\tShe can talk to dead people, and the Agency doesn’t like it.\n\n\t\tYou swallow hard and shrink into a corner. An uncomfortable realization leers at you from every shadow. You are the accomplice of something very, very immoral—tormenting children—and it isn’t right.\n\n\t\t“Come on. If you’re going to keep this up, at least let me know why,” she says. “I’m Carlie. Carlie Elizabeth. And you are?”\n\n\t\tWell, that makes things difficult. What are you going to do now?\n\t\t*choice\n\t\t\t#I didn’t sign up to be the guest appearance at a seance. I’m going back to the Agency to complain.\n\t\t\t\t*goto_scene challengeagency\n\t\t\t#I’m intrigued. I don’t bail out just yet.\n\t\t\t\t*goto intrigued\n\t#I’m going to torment her like an old-fashioned horror movie.\n\t\tYou find your way up to her room—not difficult to find, considering it’s the only door plastered with band memorabilia. You wait outside for a few minutes, hoping that she isn’t home, and when you don’t hear anything, you decide to head in.\n\n\t\tAs soon as you assure yourself that she isn’t here, you’re investigating your new haunt, if you’ll forgive the expression. It’s a pretty average room, certainly not suggestive of the horror you’ve been sent here to inflict. She has movie posters on every possible surface and books everywhere else. You can’t imagine what she could have done to incur the wrath of the Agency.\n\n\t\tYou spend some time planning a routine, and when you see a school bus pulling up at the sidewalk, you’re relatively confident that you can ruin Carlie Elizabeth’s life. As she approaches the front of her house, you cast a critical eye over her. Short, dark-haired, with eyes the color of raven’s-feathers. She might have been beautiful, if not for the look of deep sadness that seemed to have taken up permanent residence on her face.\n\n\t\tAs soon as she walks into the room, you’re ready. You take a deep breath—you’ve never haunted anyone before—and begin what promises to be a complex and intricate plan. You make the lights flicker. Books fly from their shelves, objects throwing themselves at the ground seemingly of their own accord. You make your voice like the snarl of a wolf, something you find quite easy now that you’re dead, and say:\n\n\t\t“Hello, Carlie. I’ve been waiting for you.”\n\n\t\tShe stands in the doorway for a moment, mouth open, and then slowly steps into the room. She closes the door behind her, and you allow yourself a small smile. You make a few pencils fly off the desk. You even manage to shatter a mirror, which, you think, is a nice touch.\n\n\t\tCarlie Elizabeth throws her backpack on the bed. She turns, leans against the footboard, and says all too casually, “This again?”\n\n\t\tUh oh.\n\n\t\t“Yeah, that’s right.” She casts an unconcerned look over her room, which is now in a state of complete upheaval. “I can talk to your kind, y’know. Dead people don’t scare me anymore.”\n\n\t\tOh. No wonder she seems so constantly sad. She looks death in the face every day.\n\n\t\tWhat now?\n\t\t*choice\n\t\t\t#I go back to the Agency to give them a piece of my mind. This is not right.\n\t\t\t\t*goto_scene challengeagency\n\t\t\t#I hang around. I’m curious to see what she wants.\n\t\t\t\t*label intrigued\n\t\t\t\t“Look,” says Carlie. “I get it. You’re here to haunt me or something, right?”\n\n\t\t\t\tReluctantly, you allow yourself to be seen. Your form glitters, only half-way there, as if you’re a movie played on an old projector. \n\n\t\t\t\t“Actually, yes,” you say. \n\n\t\t\t\t“Well, nice job.” She shakes her dark mane. “Listen, you’ve done what you came here to do. You can go back…or you can stay here, because I really, really need your help.”\n\n\t\t\t\tYou hesitate.\n\n\t\t\t\t“I know,” she says quickly. “Sounds crazy, right? But hear me out. I’m just looking for this guy I used to know—my best friend—and he’s, well, he’s not…around anymore.”\n\n\t\t\t\tYou blink.\n\n\t\t\t\t“It’s just that he could talk to dead people like I can,” she says, almost pleading now. “I know he’ll be doing something important, you know, on the other side.”\n\n\t\t\t\t“What does this have to do with me?” you ask slowly. You don’t like where this is going.\n\n\t\t\t\t“Can you please, please help me find him?” Her eyes glitter, her expression a mask of pain and desperation. \n\t\t\t\t*choice\n\t\t\t\t\t#“Sorry, kid. I’m not a bounty hunter.”\n\t\t\t\t\t\tHer face falls.\n\n\t\t\t\t\t\t“I understand,” she says softly. She closes her eyes, like she’s trying to hide behind her own eyelids, and bows her head until dark hair makes a veil over her face.\n\n\t\t\t\t\t\t“Good luck out there,” she says softly.\n\n\t\t\t\t\t\tAnd that’s it.\n\n\t\t\t\t\t\tSo, what will you do now?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I’m going to the next case.\n\t\t\t\t\t\t\t\t*goto_scene graveyarddesecrator\n\t\t\t\t\t\t\t#I’m going back to the Agency to complain about this job. It’s been nothing but chaos from the beginning.\n\t\t\t\t\t\t\t\t*goto_scene challengeagency\n\t\t\t\t\t#Okay, I’ll help. What’s the worst that could happen?\n\t\t\t\t\t\tYou sigh and press a hand to your forehead.\n\n\t\t\t\t\t\t“What’s his name, then?”\n\n\t\t\t\t\t\tShe lets out a little whimper of excitement, something that vaguely resembles a happy puppy barking at a toy, and leaps up.\n\n\t\t\t\t\t\t“Reuben Billings,” she says, her voice crackling with joy like there are fireworks going off in her throat. “Oh, I can’t believe it! So many of you, so many have said no…but you, you….”\n\n\t\t\t\t\t\tYou frown. As she continues talking to no one in particular, you think about that name—Reuben Billings. It seems familiar.\n\n\t\t\t\t\t\tYou saw it on a door at the Agency.\n\n\t\t\t\t\t\t“I’ll be back, Carlie,” you tell her, and she cuts off her rant of excitement, turning wide eyes on you.\n\n\t\t\t\t\t\t“What?”\n\n\t\t\t\t\t\t“I’ll be back soon,” you say. “There’s something I need to look into.”\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*label door\n\t\t\t\t\t\tYou definitely remember seeing that name on a door, a gorgeous door, a door in the deep dark bowels of the Agency. It’s clear what must be done.\n\n\t\t\t\t\t\tYou arrive back at the Agency, your head down, your eyes wide open. You’re on a mission—and you have no idea what you’re doing. “What a great combination,” you think, with a roll of your eyes.\n\n\t\t\t\t\t\tAlready, however, you’re starting to notice that other employees are looking at you. Their dead eyes follow you, frowns marking their faces like books that have been scribbled in. You don’t like the attention. Something must be done.\n\n\t\t\t\t\t\tSo…what’s the game plan?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I try to be subtle.\n\t\t\t\t\t\t\t\tYou keep your head down and your eyes wide, and, by the skin of your neck, you manage to make it through the Agency without being caught or turned in. Other employees notice you, but they don’t say anything. You’re too subtle to make them uneasy.\n\n\t\t\t\t\t\t\t\tYou finally find your way to a wide, bright-red office door with the name “Reuben Billings” written across it in fine golden calligraphy. It stands slightly ajar, and the lights are off behind the glass, so you slip inside.\n\n\t\t\t\t\t\t\t\tIt’s a fine office, with a real desk and a thousand overflowing file cabinets and framed pictures and a lot of desk toys. You stand open-mouthed for a moment, unsure of where to start, or exactly what your plan was in the first place.\n\n\t\t\t\t\t\t\t\tJust then, you hear a voice from behind you.\n\n\t\t\t\t\t\t\t\t“Who’re you?”\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou spin around to find a tall blonde fellow standing behind you, his electric blue eyes full of shock.\n\n\t\t\t\t\t\t\t\t“Who are you?” you blurt, without thinking, perfectly aware that you literally just bounced his own question back to him.\n\n\t\t\t\t\t\t\t\tHe narrows his eyes and wrinkles his nose just a little. “Reuben,” he says, “but—”\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#“I know your friend!”\n\t\t\t\t\t\t\t\t\t\t*label potato\n\t\t\t\t\t\t\t\t\t\tFor a moment, Reuben Billings just stands. He stands there open-mouthed, looking too tall for his office, his electric eyes burning into you.\n\n\t\t\t\t\t\t\t\t\t\t“My friend?”\n\n\t\t\t\t\t\t\t\t\t\t“Carlie Elizabeth,” you say, a little breathlessly.\n\n\t\t\t\t\t\t\t\t\t\tHis eyes go blank. “…Carlie,” he repeats softly. “How do you know her?”\n\n\t\t\t\t\t\t\t\t\t\t“She was my case,” you say, shame poking at you with red-hot little fingers. “I, um, I was supposed to be haunting her.”\n\n\t\t\t\t\t\t\t\t\t\t“Her?” He narrows his eyes. “What could she have done?”\n\n\t\t\t\t\t\t\t\t\t\tYou shake your head.\n\n\t\t\t\t\t\t\t\t\t\t“It’s these Agency fat-cats,” he mutters, and begins pacing back and forth across his office, running long, translucent hands through his blonde hair, like a skeleton stroking the sun. “They don’t care about anything. They’ll send you to haunt whoever seems like a threat to them—and a girl who talks to dead people, yeah, they wouldn’t like that.”\n\n\t\t\t\t\t\t\t\t\t\tThere is silence for a moment—and then, a loud hammering sounds at the door, ringing the stale air, pounding like war-drums in your ears.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t“We’re in a lot of trouble,” says Reuben. He turns to you, so quickly he’s a yellowish blur, and says hastily, “Look, we’ve both got to get out of here. I’ve got to protect Carlie, and as for you--well, after this little show you put on, I exactly don't think you're gonna be welcomed back with open arms.”\n\n\t\t\t\t\t\t\t\t\t\tYou give a humorless snort.\n\n\t\t\t\t\t\t\t\t\t\t“Yeah, so,” says Reuben, “I can help you get away, but you’ll have to come with me, or they’ll never let you go. You in?” \n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#“Look, I just want my old job back. That’s it.”\n\t\t\t\t\t\t\t\t\t\t\t\tReuben nods, clears his throat, and straightens up, hardening his face into an unexpectedly stony look of determination. “Right,” he says. “Follow my lead.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then he grabs your wrist, pulls you out the door, and begins dragging you down the hallway.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Hey—what—”\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou struggle and he turns around to shoot you a broad grin, quite the sudden change from his steely look of determination. “That’s great,” he whispers. “Real believable. Keep it up!”\n\n\t\t\t\t\t\t\t\t\t\t\t\tOh. It’s all a game.\n\n\t\t\t\t\t\t\t\t\t\t\t\tHe pulls you through the cement hallways of the Agency, nodding to the occasional passing guard, yanking at your arm with what you deem to be unnecessary force. You follow and say nothing. You’re not sure how this is going to work, but then again, people seem to respect Reuben around here. You can see it in their eyes—whatever he’s doing must be good, they think, and turn away.\n\n\t\t\t\t\t\t\t\t\t\t\t\tFinally, the pair of you reach a door and he skids to a stop. “Here you are,” he says. “You’ll be fine. I’ll clear your name while you’re on the next case, and they’ll never know that any of this business ever happened, yes?”\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou look into his electric eyes, so bright and blue that there might still have been life somewhere deep in the dead pupils. You extend one hesitant hand. “Thanks, Reuben.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tHe gives you a lopsided smile and shakes your hand. “Don’t mention it,” he says. “Now we’re even, anyway. Carlie would say the same.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then he is gone, and you turn around.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene graveyarddesecrator\n\t\t\t\t\t\t\t\t\t\t\t#\"Okay. I'm in.\"\n\t\t\t\t\t\t\t\t\t\t\t\tReuben nods, clears his throat, and straightens up, hardening his face into an unexpectedly hard look of determination. “Right,” he says. “Follow my lead.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then he grabs your wrist, pulls you out the door, and begins dragging you down the hallway.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Hey—what—”\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou struggle and he turns around to shoot you a broad grin, quite the sudden change from his steely look of determination. “That’s great,” he whispers. “Real believable. Keep it up!”\n\n\t\t\t\t\t\t\t\t\t\t\t\tOh. It’s all a game.\n\n\t\t\t\t\t\t\t\t\t\t\t\tHe pulls you through the cement hallways of the Agency, nodding to the occasional passing guard, yanking at your arm with what you deem to be unnecessary force. You follow and say nothing. You’re not sure how this is going to work, but then again, people seem to respect Reuben around here. You can see it in their eyes—whatever he’s doing must be good, they think, and turn away.\n\n\t\t\t\t\t\t\t\t\t\t\t\tFinally, the pair of you reach a huge ballroom-like space with pair of wide, proud-looking glass doors at the front, like you’ve suddenly been transported to some fine building in the heart of New York City. The room is gorgeous, full of hardwood and sharp-looking desks, and a hearth set in the side wall even plays host to a cozy fire. Couches and lounge chairs are spread throughout the room, and side tables sit waiting to hold cups of coffee and newspapers. Anyone passing by would never know the evil that takes place behind the glittering glass. \n\n\t\t\t\t\t\t\t\t\t\t\t\tYou know better.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Oh, no,” moans Reuben.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou spin around. While you were admiring the room, guards had begun spilling in after you, and now you’re facing down a sea of burly, pig-eyed ghosts. They all have the same ugly snarl on their faces.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“What’s the plan?” you hiss at Reuben.\n\n\t\t\t\t\t\t\t\t\t\t\t\tHe looks at you, eyes wide. “Um,” he says. “Run.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd so you do. The guards immediately give chase, a thousand pairs of heavily-booted feet thumping the hardwood, their jeers dancing up to the vaulted ceiling, but you and Reuben keep running.\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then you burst through the glass doors, and your breath is gone.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\tYou are standing in a vast expanse of white, as if the world fell away around you, as if you are a lone painting on an empty canvas. You spin around and find Reuben standing next to you, panting.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“We made it,” he says, and gives you a golden-retriever grin. “We made it!”\n\n\t\t\t\t\t\t\t\t\t\t\t\t“What do you mean, we made it?” You narrow your eyes. “We’re…we’re nowhere!”\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Yeah, and they can’t follow us,” he says. “This is just what happens when you leave the Agency without anywhere to go. The afterlife is like that. Tricky, sort of.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then he takes your hand again, and he gives you a tug off in some direction that seems to be no direction at all, and with stumbling feet you follow—and then the world is back.\n\n\t\t\t\t\t\t\t\t\t\t\t\tJust like that, colors appear again. The ground takes shape under your feet. Surroundings blossom on all sides. You’re standing in Carlie Elizabeth’s bedroom again, with one living girl staring at you open-mouthed and one ghost panting next to you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“…Reuben?” she stammers.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Carlie,” he says, and grins that dog-like grin again. “Heard you got yourself into some trouble.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou clear your throat.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Oh, yeah.” Carlie turns to you. You notice that the shadow of pain written across her face is almost gone, as if some bright sun chased away the looming clouds. “Thank you. You, uh, you’re kind of my hero right now.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tReuben nods. “And now, you’re free.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou look at him hesitantly. “No more haunting?”\n\n\t\t\t\t\t\t\t\t\t\t\t\t“No more haunting.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou are truly free.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*achieve wow\n\t\t\t\t\t\t\t\t\t\t\t\tAfter some heartfelt farewells to your new allies, you leave Carlie Elizabeth’s house, knowing with a certain sense of storybook-like certainty that you’ll never see this place again. But it doesn’t matter. You leave behind you a happy pair of friends, and you have ahead of you an infinity of freedom.\n\n\t\t\t\t\t\t\t\t\t\t\t\tSo you travel the world. You see everything, every niche, every landmark, every wonder that your living eyes never got to feast upon. It’s a bit lonely at times, because no living beings see you anymore and even the dead are scarce, but you come to be alright with it. After all, the whole world is yours.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*achieve notfood\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t\t\t#I run for it.\n\t\t\t\t\t\t\t\t\t\t\t\tBefore the sentence is even out of his mouth, you rush past him and burst through the door. He calls after you, but you don’t catch the words and you don’t want to. You’re getting out of here.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou run like a deer in the meadow, spilling around corners, narrowly avoiding collision with multiple groups of anxious-looking employees.\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd then you run into one, and it isn’t an employee. It’s a guard. He turns to you with a snarl on his face like a junkyard dog, and his buddy appears behind him, cracking dead knuckles.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThat’s it for you.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*gosub oohsnap\n\t\t\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t\t#I take the opportunity to run for it.\n\t\t\t\t\t\t\t\t\t\tYou dart past Reuben Billings and race down the hallway. Your feet pound on the cold hard floor, your dead breath ringing in your ears.\n\n\t\t\t\t\t\t\t\t\t\tAfter a moment, the voice of Reuben Billings echoes somewhere far away, calling not to you but to the guards. You rush forward. There’s no stopping now. You made it here without being caught, after all, and you can probably—\n\n\t\t\t\t\t\t\t\t\t\tBut no. You can’t.\n\n\t\t\t\t\t\t\t\t\t\tTwo huge guards round the corner and stand before you like a ghostly brick wall. You skid to a stop.\n\n\t\t\t\t\t\t\t\t\t\tMaybe running wasn’t the best choice after all.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*gosub oohsnap\n\t\t\t\t\t\t\t\t\t#I attack him. I can’t give him the chance to turn me in.\n\t\t\t\t\t\t\t\t\t\tYou throw a punch and it just barely connects with the side of his face. For a moment he just stands, staring, his blonde hair going every direction in a wild golden halo—\n\n\t\t\t\t\t\t\t\t\t\tAnd then he attacks you. For such a skinny stick of a man, he sure does hit hard.\n\n\t\t\t\t\t\t\t\t\t\tYou didn’t know ghosts could feel pain.\n\n\t\t\t\t\t\t\t\t\t\tThe next thing you know, you’re lying on the ground and your head is swimming, and you’re being pulled roughly to your feet by two guards who weren’t there a moment ago….\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*gosub oohsnap\n\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#I pretend like I belong here.\n\t\t\t\t\t\t\t\tUnfortunately, the guards know better.\n\n\t\t\t\t\t\t\t\tYou’re captured almost immediately. The men who have you are big and sturdily built, as if they were football players in life. They pull you off, your feet dragging. Not only have you failed Carlie Elizabeth—you gambled with your eternity and lost.\n\n\t\t\t\t\t\t\t\tAs the men pull you down the hallway, your heels scraping the floor, you see a tall, thin fellow with light blonde hair stick his head out of a door to see what the commotion is about. He’s got electric blue eyes, eyes that somehow seem full of life even in the face of a ghost, and he looks inclined to smiling. You look at the name on the door.\n\n\t\t\t\t\t\t\t\tReuben Billings.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I struggle against the guards. I have to get to Reuben!\n\t\t\t\t\t\t\t\t\t\t“Reuben!” you shout, wriggling in the hands of your chaperones. “Reuben, you have to help me! I was here to—ow!—you’ve got to get me out of this!”\n\n\t\t\t\t\t\t\t\t\t\tReuben narrows his eyes, looking utterly confused.\n\n\t\t\t\t\t\t\t\t\t\t“What—”\n\n\t\t\t\t\t\t\t\t\t\t“Mind your business, Billings,” spits one of the guards, and the other claps you on the back of the head with a firm hand. You see stars.\n\n\t\t\t\t\t\t\t\t\t\t“But—”\n\n\t\t\t\t\t\t\t\t\t\t“Back to work, pencil-pusher,” leers the other guard.\n\n\t\t\t\t\t\t\t\t\t\tAnd then Reuben Billings grimaces and pulls his head back inside his office.\n\n\t\t\t\t\t\t\t\t\t\tYou watch your last hope close the door in your face.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*label oohsnap\n\t\t\t\t\t\t\t\t\t\tAfter that, you know there's not much point in putting up a fight. You might escape your captors, but then what? They're faster than you, stronger than you, and, not to mention, this whole place is crawling with them. You'd never make it more than four yards. It's over.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYour feet drag as, hopeless, you are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\t\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t\t\t#I beg for his help.\n\t\t\t\t\t\t\t\t\t\tYou writhe and wriggle in the firm hands of the guards, but all you get in return is a few sets of sharp fingers dug into your arms.\n\n\t\t\t\t\t\t\t\t\t\t“Quiet,” snaps one of your chaperones.\n\n\t\t\t\t\t\t\t\t\t\t“Yeah, that’s enough, lowlife,” spits the other. “You’re outta here.”\n\n\t\t\t\t\t\t\t\t\t\tReuben Billings pulls his head back inside his office.\n\n\t\t\t\t\t\t\t\t\t\tYou watch your last hope close the door in your face.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*gosub oohsnap\n\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t\t#“I know your friend!”\n\t\t\t\t\t\t\t\t\t\tReuben Billings darts out of his office faster than you could have imagined, a lanky blonde hurricane, and he wrenches you from the grip of the guards.\n\n\t\t\t\t\t\t\t\t\t\t“I’ll take care of this.”\n\n\t\t\t\t\t\t\t\t\t\t“But—” begins one of your captors, looking uncertain.\n\n\t\t\t\t\t\t\t\t\t\t“I said, I can handle it,” Reuben repeats.\n\n\t\t\t\t\t\t\t\t\t\tAnd then he pulls you into his office and slams the door.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto potato\n\t\t\t\t\t#I tell her I want to help—but I’m planning to betray her.\n\t\t\t\t\t\tYou sigh believably and press a hand to your forehead.\n\n\t\t\t\t\t\t“What’s his name, then?”\n\n\t\t\t\t\t\tShe lets out a little whimper of excitement, something that vaguely resembles a happy puppy barking at a toy, and leaps up. A little pang of guilt rings in your chest.\n\n\t\t\t\t\t\t“Reuben Billings,” she says, her voice crackling with joy like there are fireworks going off in her throat. “Oh, I can’t believe it! So many of you, so many have said no…but you, you….”\n\n\t\t\t\t\t\tYou frown. As she continues talking to no one in particular, you think about that name—Reuben Billings. It seems familiar.\n\n\t\t\t\t\t\tWhat now?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Forget trying to betray her—something’s up here!\n\t\t\t\t\t\t\t\t*goto door\n\t\t\t\t\t\t\t#Who cares about the name? I want the credit for this.\n\t\t\t\t\t\t\t\t“Okay.” You put on a bright smile, and the girl mirrors it, hope lighting every corner of her face. “I think I know how to help. Hang tight.”\n\n\t\t\t\t\t\t\t\t“Oh, thank you!” She beams. “Really, you have no idea…this means so much….”\n\n\t\t\t\t\t\t\t\tYou hesitate.\n\n\t\t\t\t\t\t\t\t“…sure, kid.”\n\n\t\t\t\t\t\t\t\tWell, aren’t you just the perfect hero?\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou head back to the Agency and find your way to the room where you were first introduced to this new fate of yours. You locate the door without any trouble, even though you have to walk through countless cement hallways to get where you’re going.\n\n\t\t\t\t\t\t\t\tYou stand there, staring at the door, your fingers an inch away from the handle.\n\n\t\t\t\t\t\t\t\tHow are you going to play this?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I’m going to report her boldly. This is no time to play games.\n\t\t\t\t\t\t\t\t\t\tYou march boldly into the room, and without waiting for a word from the man sitting behind his plastic desk, you say, “I have apprehended a dangerous individual and would like help in taking her in for further questioning.”\n\n\t\t\t\t\t\t\t\t\t\tFor a moment there is silence. Your words seem to ring in the stale air.\n\n\t\t\t\t\t\t\t\t\t\t“A dangerous individual?” The man narrows his weasel-like eyes at you. “Weren’t you on the Carlie Elizabeth case? That individual you speak of is no more than sixteen, at best.”\n\n\t\t\t\t\t\t\t\t\t\tYou stutter helplessly, all your bravado drained from you like someone took out a plug in the bottom of the ocean.\n\n\t\t\t\t\t\t\t\t\t\t“You are nothing more than a troublemaker,” says the man. “Guards, take this lowlife away.”\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tBefore you can say another word, your arms are gripped firmly by two sets of burly hands. You are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\t\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t\t\t#I’m going to report her cleverly. I have to make sure things go the way I want them to.\n\t\t\t\t\t\t\t\t\t\tYou open the door. There is the man, sitting behind his little plastic desk of a table, scribbling at what appears to be the same paperwork. It’s as if time has not moved an inch.\n\n\t\t\t\t\t\t\t\t\t\t“Excuse me,” you say. \n\n\t\t\t\t\t\t\t\t\t\tThe man doesn’t look up. \n\n\t\t\t\t\t\t\t\t\t\t“What is it?” he asks disinterestedly.\n\n\t\t\t\t\t\t\t\t\t\t“The girl,” you say. “Carlie Elizabeth? Yes. She’s trying to use this Agency’s network to contact her friend.”\n\n\t\t\t\t\t\t\t\t\t\tHis pen freezes mid-sentence.\n\n\t\t\t\t\t\t\t\t\t\t“What?”\n\n\t\t\t\t\t\t\t\t\t\tYou nod. “Yes sir. It’s true. She tried to get me to help her.”\n\n\t\t\t\t\t\t\t\t\t\tThe man lifts his head and looks at you, just looks, as if his eyes can pierce your very being. He’s trying to see if you’re lying.\n\n\t\t\t\t\t\t\t\t\t\t“This is not good at all,” he says at last, his tone unconcerned, his voice like a snake. Strange eyes flash underneath his thin brow. “Thank you for your…honesty.”\n\n\t\t\t\t\t\t\t\t\t\tBefore you know what’s happening, the entire Agency is in motion. Guards race from every room. Hallways are full to brimming with employees peeking nervous heads out their doors, alarmed by all the commotion. Orders are being shouted and you catch the words “special forces.”\n\n\t\t\t\t\t\t\t\t\t\tSomehow, you manage to be completely forgotten. It’s clear that you’re not going to get any of the credit.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#That’s not going to work for me.\n\t\t\t\t\t\t\t\t\t\t\t\tYou catch the first official-looking person you can find, though he’s a sharp-eyed little rat of a fellow, with an upturned nose like he was hit by a bus.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Hey, I did this, y’know,” you say, narrowing your eyes. “I raised the alarm. Don’t I get any credit for that?”\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe man raises an eyebrow.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Oh, of course,” he says at last, in a heavily-affected accent that you half suspect is fake. “Right this way.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tHe leads you to a door.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“What?” You glare. “What is this?”\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Your reward,” he says simply, and pushes you through the door.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThen you’re falling, and you know nothing but darkness, and cold, and the sound of your breath in your dead lungs.\n\n\t\t\t\t\t\t\t\t\t\t\t\tAfter that, you know nothing at all.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t\t\t\t\t#Oh well. I’ll just move on, I guess.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene graveyarddesecrator", "kidsstopped": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nFlush with your success, you leave the home of the businessman and head back to the Agency. You’re wandering down the street, unsure of just how it is that you’ve been getting back, when quite suddenly a hand appears on your shoulder. A warm hand. A hand covered in flesh. A living hand.\n\nYou spin around, stumbling backward, not sure whether you’re trying to run away or trying to put enough space between yourself and this stranger that you can attack. Either way, you freeze, because you quickly realize that both courses of action are going to get you absolutely nowhere. The stranger standing before you may look alive, but he’s not a member of the world of the living—nor of the world of the dead. He is, to put it simply…somewhere in the middle.\n\nHe’s a good-looking fellow, not terribly tall, with golden-blonde hair and eyes brown like the earth. His face seems prone to smiling. He’s dressed casually, jeans and a gray sweatshirt, but he still seems, somehow, not of this world. A strange glow seems to emanate from him. You take another step back, suspicious.\n\nBefore you can speak, he’s talking—and his voice is like a sweet spring breeze.\n\n“I know that you terrorized those children,” he says. “Why?”\n\nYou stare.\n\nQuickly! What is your answer?\n*choice\n\t#I just leave.\n\t\tYou shake your head and turn around, shoving your hands deep in your pockets and walking away down the road. You don’t turn around. You don’t look back. You can tell he’s staring at you—it’s as if you can feel his bright eyes blazing into your skin, burning, searching, waiting—but you give those eyes nothing except the hood of your jacket.\n\n\t\t“Wait.”\n\n\t\tIt’s not a request. It’s a demand.\n\n\t\tYou have no choice but to stop, not because you want to obey, but because your body freezes at the command in his voice. You stand there like a ghostly statue on the sidewalk and listen to his footsteps, soft like cat-paws, gentle like wing-beats.\n\n\t\tHe comes around in front of you and repeats the question.\n\n\t\t“Why the children?”\n\n\t\tLooks like you’ll have to answer after all.\n\t\t*choice\n\t\t\t#I make up a lie.\n\t\t\t\t*goto lie\n\t\t\t#I just shake my head and say, \"It's my job.\"\n\t\t\t\t*goto job\n\t#I make up a lie.\n\t\t*label lie\n\t\tYou open your mouth to say the words, even though you aren’t yet sure of your story, but before you’ve even finished your first sentence you can tell that it’s not going to work. The blonde guy just looks at you with this disappointed slant of his lips, like he expected more, and he gives a shake of his golden head.\n\n\t\t“You cannot lie to me,” he says. \n\t\n\t\tYou hesitate. “And why is that?”\n\n\t\tHe is silent for a long moment, just looking you over—as if you are a book and he is reading every plot twist you’ve been through, every minor character you’ve overrun, every chapter you’ve written. Obviously, you are not his preferred genre.\n\n\t\t“You have made the wrong choice,” he says at last. \n\n\t\tAnd then the glow of his skin becomes blinding, a pure, clean white, like breath on a crisp winter’s day, like moonlight in a star-dappled sky, and you realize what he is. Not living, not dead. He is a Servant of the Light.\n\n\t\tWhat does that make you?\n\n\t\t“In punishment for your crimes against the innocent and for denial of your guilt, you will serve an Eternity’s sentence in The Void.”\n\n\t\t“Wh—what?”\n\n\t\tHe just shakes his head.\n\n\t\t“You could have done great things,” he says.\n\n\t\tAnd then, the world is sucked away in a great white vortex, and time and space spin around you in a great twirling dance, and the color of nothingness blinds you, and, dizzy, you fall to your knees….\n\n\t\tAnd there is nothing.\n\t\t*page_break\n\t\t*goto_scene void\n\t#I shrug, a little hopeless, and say, “It’s my job.”\n\t\t*label job\n\t\tHe looks at you for a long moment, just looks. You feel uncomfortable under the infinite gaze, like you’re being stared at by all the stars in the sky at once. It’s as if you are a book and he is reading every plot twist you’ve been through, every minor character you’ve overrun, every chapter you’ve written. You wonder if “horror story” is his preferred genre.\n\n\t\t“Do you regret it?”\n\n\t\tThe question comes so suddenly that you almost miss it.\n\n\t\tYou stare. “Sorry?”\n\n\t\tHe tilts his golden head and burns you with those intense eyes like lightning. “Do you regret how you treated those children? Not the father, the children. Do you feel bad for tormenting them for the crimes of their father?”\n\n\t\tWell? Do you?\n\t\t*choice\n\t\t\t#“Yes.”\n\t\t\t\tHe nods solemnly. The glow of his skin becomes blinding, a pure, clean white, like breath on a crisp winter’s day, like moonlight in a star-dappled sky, and you realize what he is. Not living, not dead.\n\t\t\t\t\n\t\t\t\t“Then you, spirit, have passed the test, and are forgiven.”\n\n\t\t\t\tYou catch your breath. He is a Servant of the Light.\n\n\t\t\t\t“T—thank you,” you stammer.\n\n\t\t\t\tHe inclines his head. “Be careful of your choices, ghost. They can still ruin you, though you have no life to lose.”\n\n\t\t\t\tAnd then he is gone, and you are alone.\n\n\t\t\t\tA little dazed, you head to the Agency.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene contractend\n\t\t\t#“Yes,” but I’m lying.\n\t\t\t\tYou open your mouth to say the word, but before you’ve even taken a breath you can tell that it’s not going to work. The blonde guy just looks at you with this disappointed slant of his lips, like he expected more, and he gives a shake of his golden head.\n\n\t\t\t\t“You cannot lie to me,” he says. \n\n\t\t\t\tYou hesitate. “And why is that?”\n\n\t\t\t\tHe is silent for a long moment, just looking you over—as if you are a book and he is reading every plot twist you’ve been through, every minor character you’ve overrun, every chapter you’ve written. Obviously, you are not his preferred genre.\n\n\t\t\t\t“You have made the wrong choice,” he says at last. \n\n\t\t\t\tAnd then the glow of his skin becomes blinding, a pure, clean white, like breath on a crisp winter’s day, like moonlight in a star-dappled sky, and you realize what he is. Not living, not dead. He is a Servant of the Light.\n\n\t\t\t\tWhat does that make you?\n\n\t\t\t\t“In punishment for your crimes against the innocent and for denial of your guilt, you will serve an Eternity’s sentence in The Void.”\n\n\t\t\t\t“Wh—what?”\n\n\t\t\t\tHe just shakes his head.\n\n\t\t\t\t“You could have done great things,” he says.\n\n\t\t\t\tAnd then, the world is sucked away in a great white vortex, and time and space spin around you in a great twirling dance, and the color of nothingness blinds you, and, dizzy, you fall to your knees….\n\n\t\t\t\tAnd there is nothing.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void\n\t\t\t#“No.”\n\t\t\t\tHe tilts his head at you, a look of disappointment crossing his warm face.\n\n\t\t\t\t“You made the wrong choice, then,” he says.\n\n\t\t\t\tAnd then the glow of his skin becomes blinding, a pure, clean white, like breath on a crisp winter’s day, like moonlight in a star-dappled sky, and you realize what he is. Not living, not dead. He is a Servant of the Light.\n\n\t\t\t\tWhat does that make you?\n\n\t\t\t\t“You have no regret for your actions, and thus you must be punished for them,” he says. “You are sentenced to an Eternity in The Void.”\n\n\t\t\t\t“Wh—what?”\n\n\t\t\t\tHe just shakes his head.\n\n\t\t\t\t“You could have done great things,” he says.\n\n\t\t\t\tAnd then, the world is sucked away in a great white vortex, and time and space spin around you in a great twirling dance, and the color of nothingness blinds you, and, dizzy, you fall to your knees….\n\n\n\t\t\t\tAnd there is nothing.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Gone\"\n*set gender \"Gone\"\n*set haircolor \"Gone\"\n*set eyecolor \"Gone\"\n*set laugh \"Gone\"\n*set jobtitle \"Contract Haunter\"\nYou've taken over the Agency, and you've decided that you're going to stay on as an employee to haunt the living. That’s great—it’s interesting work, you’re making a difference in the world, and you don’t really have anything else to do anyway—but who are you working for?\n\nIt's up to you to choose a new CEO--but you must find someone worthy of the post, or you might just have to start another revolution.\n\nWhom do you prefer?\n*fake_choice\n\t#Me! I'm the obvious choice!\n\t#I choose Matthew Grace, the man who helped me start this revolution.\n\t#I choose the first person who followed me into battle against the old CEO.\n\t#I don't want to be in the middle of this. I let someone else decide.\n\t\n\t\n*script changeBackgroundColor(\"black\")\n\n*set name \"Gone\"\n*set gender \"Gone\"\n*set haircolor \"Gone\"\n*set eyecolor \"Gone\"\n*set laugh \"Gone\"\n*set jobtitle \"Infamous Haunter\"\nThe two exorcists interrupt your haunting job--but you’re not worried. After all, they’re alive, and beating hearts mean ample opportunity for a new haunting. It’s going to take some patience, though. If you hope to scare them at all, you must decide where your expertise could be applied for maximum success.\n\nYou lurk in the shadows, watching their every move with sharp eyes and a sharper smile. It's not long until you’ve formulated multiple plans.\n\nWhich do you choose?\n*fake_choice\n\t#I’ll just attack them. Good old-fashioned horror never fails.\n\t#They seem reliant on their technology. I’ll sabotage their equipment.\n\t#I’d like to provide a more individualized haunting experience. I’ll target their unique weaknesses.\n\t\n*script changeBackgroundColor(\"sepia\")\n\t\n*set name \"Gone\"\n*set gender \"Gone\"\n*set haircolor \"Gone\"\n*set eyecolor \"Gone\"\n*set laugh \"Gone\"\n*set jobtitle \"Contract Haunter\"\nAmateur ghost hunters, huh? You’ve never seen anything like this before--at least, not from the ghost’s perspective. It seems like an opportunity for some cheap entertainment. \n\nOne of the ghost hunters holds up a recorder, his arm shaking, and says in a voice like a quaking aspen, “Is…is anyone there?”\n\nHe’s trying to communicate. How quaint!\n\nHow do you respond?\n*fake_choice\n\t#I’m out of here. I was getting bored anyway.\n\t#I lean in close and hiss \"I'm watching you.\"\n\t#I say casually, \"Hey there!\"\n\t#I take a deep breath and shriek, \"GET OUT!\" (Classic!)\n\n\n*set name \"Gone\"\n*set gender \"Gone\"\n*set haircolor \"Gone\"\n*set eyecolor \"Gone\"\n*set laugh \"Gone\"\n*set jobtitle \"Contract Haunter\"\n“I’m just looking for my best friend,” she says quickly. “He’s...he’s dead.”\n\nYou blink.\n\n“It’s just that, well, he could talk to dead people, just like me,” she says. “I know he’ll be doing something important on the other side. It should be easy to find him.”\n\nYou shake your head. “What has this got to do with me?”\n\n“Please,” she whispers. “I need you to look for him, y'know, in the Afterlife.”\n\nWell then. \n\nWhat now?\n*fake_choice\n\t#“Sorry, kid. I’m not a bounty hunter.”\n\t#Okay, I’ll help. What’s the worst that could happen?\n\t#I tell her I want to help—but I’m planning to betray her.\n\t\n*set name \"Gone\"\n*set gender \"Gone\"\n*set haircolor \"Gone\"\n*set eyecolor \"Gone\"\n*set laugh \"Gone\"\n*set jobtitle \"Gone\"\nTwo huge guards, each built like a brick wall, come barreling around the corner. When they see you, they shout and begin pounding down the hallway toward you. You have no choice but to flee.\n\nLooks like making the Agency mad wasn’t a good idea.\n\nYou run, spilling around corners, and spot an open door not too far ahead. It looks promising—or, at the very least, more welcoming than the heavy pairs of feet that are growing ever closer.\n*fake_choice\n\t#I roll the dice and go through the door to wait for the guards to go past.\n\t#Not worth it. I keep running down the hallway.", "startup": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*title Gambling with Eternity\n*author Ashlee Sierra\n*scene_list\n\tstartup\t\n\tagency\n\thighschoolgirl\t\n\tchallengeagency\n\temptyhouse \n\temptyhouseexplore \n\temptyhouseescape \n\tgraveyarddesecrator\n\tdesecratorcar\n\tdesecratorparty\n\tdesecratorterrorize\n\tbusinessmanopening\n\tbusinessmanclever\n\tbusinessmanfierce\n\tbusinessmankids\t\n\tkidsstopped \n\tcontractend\t\n\tvoid \n\tend\t\n\n\t\n*achievement newb visible 5 Rookie\n\tMake it to the first case.\n*achievement old visible 10 Up-and-Comer\n\tMake it to the second case.\n*achievement expert visible 20 Professional\n\tMake it to the final case.\n*achievement safe visible 100 Safe and Sound\n\tMake it through all of the challenges.\n*achievement sass visible 5 Determined\n\tDon't give into pressure from sassy narrators.\n*achievement argue visible 5 Argumentative\n\tGo out of your way to question authority.\n*achievement wow visible 5 Hero\n\tSave the day.\n*achievement snap visible 5 Oops\n\tWas that supposed to happen?\n*achievement thanks visible 5 Thanks, Kid\n\tMeet a young friend with some big ideas.\n*achievement level visible 5 Level-Headed\n\tDon't panic--even in the face of an oncoming monster truck.\t\n*achievement curious visible 5 Curiosity \n\tCan curiosity kill the cat if the cat is already dead?\n*achievement news visible 5 Bad News\n\tDiscover some bad news about the Agency.\n*achievement rick visible 5 Friendly\n\t\"The enemy of my enemy is my friend.\"\t\n*achievement mean visible 5 Hostile\n\tPick a fight with a ghost.\n*achievement dwight visible 5 Puppet Master\n\tManipulate events in the name of justice.\n*achievement jail visible 5 Jailbird\n\tGo to jail.\n*achievement winging visible 5 Winging It\n\tHave no plan whatsoever.\n*achievement lie visible 5 Liar\n\tSuccessfully pull off a lie.\n*achievement friend visible 5 Old Friends\n\tMeet up with an old friend.\t\n*achievement good visible 10 Reconsider\n\tReconsider your decisions and make a different call.\t\n*achievement power visible 20 Powerful\n\tChange the balance of power in the Agency.\n*achievement car visible 20 Pit Stop\n\tGet creative with your haunting.\n*achievement gamble visible 20 Gambler\n\tGamble your Eternity.\n*achievement smart visible 100 Justice\n\tHe had it coming, right?\n*achievement one visible 5 Fate #1 of 27--Part of the Team\n\tReach Fate #1.\n*achievement safeish visible 5 Fate #2 of 27--Safety\n\tReach Fate #2.\n*achievement freedom visible 5 Fate #3 of 27--Freedom\n\tReach Fate #3.\n*achievement ceo visible 5 Fate #4 of 27--CEO\n\tReach Fate #4.\n*achievement prosper visible 5 Fate #5 of 27--Prosper\n\tReach Fate #5.\n*achievement lorelei visible 5 Fate #6 of 27--Lorelei\n\tReach Fate #6.\n*achievement star visible 5 Fate #7 of 27--Rising Star\n\tReach Fate #7.\n*achievement vacation visible 5 Fate #8 of 27--Vacation\n\tReach Fate #8.\n*achievement relief visible 5 Fate #9 of 27--Relief\n\tReach Fate #9.\n*achievement apple visible 5 Fate #10 of 27--Apple Pies\n\tReach Fate #10.\n*achievement watching visible 5 Fate #11 of 27--Watchful Eye\n\tReach Fate #11.\n*achievement picnic visible 5 Fate #12 of 27--Panic\n\tReach Fate #12.\n*achievement lost visible 5 Fate #13 of 27--Lost\n\tReach Fate #13.\n*achievement exorcism visible 5 Fate #14 of 27--The Exorcism\n\tReach Fate #14.\n*achievement jailhaha visible 5 Fate #15 of 27--Imprisoned\n\tReach Fate #15.\n*achievement notfood visible 5 Fate #16 of 27--Travels\n\tReach Fate #16.\n*achievement influence visible 5 Fate #17 of 27--Influence\n\tReach Fate #17.\n*achievement integrity visible 5 Fate #18 of 27--Integrity\n\tReach Fate #18.\n*achievement reverence visible 5 Fate #19 of 27--Reverence\n\tReach Fate #19.\n*achievement paradise visible 5 Fate #20 of 27--Paradise\n\tReach Fate #20.\n*achievement ranking visible 5 Fate #21 of 27--Ranking\n\tReach Fate #21.\n*achievement oooooohsnap visible 5 Fate #22 of 27--Rebel\n\tReach Fate #22.\n*achievement powerr visible 5 Fate #23 of 27--Powerful\n\tReach Fate #23.\n*achievement riches visible 5 Fate #24 of 27--Riches\n\tReach Fate #24.\n*achievement challenges visible 5 Fate #25 of 27--Challenges\n\tReach Fate #25.\n*achievement communication visible 5 Fate #26 of 27--Communication\n\tReach Fate #26.\n*achievement finally visible 5 Fate #27 of 27--Guidance\n\tReach Fate #27.\n\n\n\t\n*create name 0\n*create gender 0\n*create haircolor 0\n*create eyecolor 0\n*create laugh 0\n*create jobtitle 0\n*create dead 0\n\n\t\nWelcome to [i]Gambling with Eternity[/i], the short-story adventure game that will take you where no living being has gone before: into the afterlife and beyond. As you make choice after breathtaking choice on your way to one of twenty-seven separate endings, you will encounter pure hearts and fouled ones, adventures and nightmares, friends and foes. But be cautious; the decisions you make now are bigger than anything you may have encountered within the mortal realm. One wrong move could send your fate plummeting into darkness--while a slightly different decision could have had you on a gilded throne. The difference is up to you, so choose wisely.\n \nAfter all, something bigger than life is at stake: you're gambling with eternity now. \n\nGood luck. \n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\n\t*if choice_is_advertising_supported\n\t\t[i]Gambling with Eternity[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n*page_break\n\nGAMBLING WITH ETERNITY\n\nYou open your eyes, and all you know is darkness.\n\nYour breath catches in your lungs. You’re falling, and falling fast. The world is speeding past on all sides, a blur of velvety nothingness, and the air is whipping you with cold, clammy hands. There’s nothing above you. There’s nothing below you. You feel that familiar leap in your chest like when you miss a step on the staircase--but there are no stairs, and the leaping in your chest doesn’t stop, throbbing, tense, a hollow pounding like you can feel the echo of your heartbeat. You try to take a deep breath, but your lungs feel small and thin, and you’ve forgotten how to breathe, you can’t do it, you can’t do it--\n\t\nYou’re dying. Terrified, you gasp and begin to claw the air in front of you, trying to slow your descent. There’s nothing to grab on to, nothing but cold, rushing darkness that slips through your fingers like a dark laugh. You’re freefalling. You’re sinking, fast, in an ebony ocean. You’re falling up into a starless night sky. You’re dying.\n\nYou tilt back your head and scream.\n\nYour scream--is it the voice of a male, or the voice of a female?\n*fake_choice\n\t#Male.\n\t\t*set gender \"male\"\n\t#Female.\n\t\t*set gender \"female\"\n\t#Neither.\n\t\t*set gender \"neither\"\n*page_break\nYour scream cuts through the air like a knife, and just like that, the darkness shatters. Shards of nothingness peel away like old paint and fall with you, spinning around and around like an ebony halo. You’re surrounded by bright white light now, just as empty as the darkness, but colder somehow--callous, and more piercing. Your halo makes wild Appaloosa spots in your vision. \n\nYou shake your head and blink, and suddenly your own eyes are looking back at you from every direction. The sky is your eyes. The horizon is your eyes. The ground is your eyes, and you’re falling, falling fast, into your own gaze.\n\nWhat color are your eyes--all of them?\n*fake_choice\n\t#Blue.\n\t\t*set eyecolor \"blue\"\n\t#Brown.\n\t\t*set eyecolor \"brown\"\n\t#Green.\n\t\t*set eyecolor \"green\"\n\t#Hazel.\n\t\t*set eyecolor \"hazel\"\n\t#Crimson.\n\t\t*set eyecolor \"crimson\"\n\t#Skip to the end.\n\t\t*goto_scene end\n*page_break\nCold ${eyecolor} eyes gaze at you from everywhere. They blink when you blink; their gazes shift as yours does. Your breath becomes fluttery in your chest, your heart leaping, and you claw the air again, desperate to stop this kaleidoscopic descent. A million ${eyecolor} gazes oversee your helpless writhing, like millions of birds watching one tiny, nervous little worm. You've been stared at before, and you thought you knew the feeling by now, but this--this is something else entirely. It’s as if your mind has been put into a ${eyecolor} straitjacket. It’s like you’re going insane.\n\nYou shake your head, trying to clear it. Are those really your eyes? Does your gaze really feel so cold and heartless and piercing? You shake your head again--\n\nThe world explodes. The eyes all around you are suddenly framed by your own hair, waving like seaweed as you fall, flashing from every corner, and your own face stretches below, and you’re in a hall of mirrors, falling, falling, falling.\n\nYou take a deep breath. You have to focus on the small things, like the color of your hair--not the fact that you can hardly breathe, or that the walls are staring at you, or that you’re falling so fast that the air stings your face.\n\nSo, what color is your hair?\n*fake_choice\n\t#Brown.\n\t\t*set haircolor \"brown\"\n\t#Black.\n\t\t*set haircolor \"black\"\n\t#Blonde.\n\t\t*set haircolor \"blonde\"\n\t#Red.\n\t\t*set haircolor \"red\"\n\t#White.\n\t\t*set haircolor \"white\"\n\t#Gray.\n\t\t*set haircolor \"gray\"\n*page_break\nYou take a few more deep breaths, trying to hold on to these few small, concrete facts. You know who you are...but here, in this funhouse-wasteland, this kaleidoscopic nightmare, it's as if every aspect of your identity is being used as a lash, whipping you until your mind stings. You’re still falling, but you don’t seem to be going anywhere. Your own face leers at you from all sides. Your mouth smiles a creeping grin, a grin that becomes the sky, the ground, the horizon.\n\nYou can’t help yourself. You know it’s going to make things worse--it always does--but you just can’t help it. \n\nYou laugh.\n\nThe entire world explodes into laughter around you. A million mouths burst with your laugh; a million eyes glitter with hysterical amusement. \n\nIt’s your laugh. What does it sound like?\n*fake_choice\n\t#Musical.\n\t\t*set laugh \"musical\"\n\t#Rough.\n\t\t*set laugh \"rough\"\n\t#Light.\n\t\t*set laugh \"light\"\n\t#Awkward.\n\t\t*set laugh \"awkward\"\n\t#Caustic.\n\t\t*set laugh \"caustic\"\n\t#Cold.\n\t\t*set laugh \"cold\"\n\t#Cheery.\n\t\t*set laugh \"cheery\"\n*page_break\nThe familiar-yet-unfamiliar, ${laugh} laugh echoes. You can feel it shaking your bones. You can feel it resonating in your chest. Is this what it feels like to go insane? You're not sure, you're just not sure--\n\nAnd then you gasp, and leap up in bed.\n\nFor a moment, your mind reels like an angry ocean, but the soothing silence of the darkness eases your thoughts. You're finally able to catch your breath. Smoothing your hair, you straighten your back, take another deep breath, and take in the gentle calm of reality. You are sitting, safe and alive and perfectly sane, in the middle of a stark-white hotel bed. City lights dance in the gaps between the blinds. Outside the door, feet tread softly to some other room, and a showerhead roars to life somewhere on the floor above you.\n\nYou look down at your hands and find that they're shaking. Unsteady, you get up for a drink of water, and as you get up, you catch sight of yourself in the mirror. You look at that face, those ${eyecolor} eyes, that ${haircolor} hair. It’s you. You’re not falling, you’re not in a room made of your own eyes, you’re not feeling the echo of your own laugh pound against your heartbeat. You're here, looking at a reflection made imperfect by shadows, not one made unsettling by glowing funhouse grins.\n\nIt was a nightmare.\n\nYou take a deep breath, look at your reflection, and say your name firmly in your head. It’s like you’re calling yourself back to earth. It’s like you’re waking your identity. It’s like you’re introducing yourself...to yourself.\n\nWhat name do you say?\n*input_text name\n*page_break\nAfter a moment, you take a deep breath. Turning, you grab the little plastic cup on the table, drain every last drop of water, and crush the cup in your hand. You return to bed, sighing.\n\nYou don't have any more dreams about falling.\n\nYou don't have any more dreams at all.\n*page_break\nYou're woken much too early by the scream of the alarm clock. Grumbling, you slash a heavy hand at the clock to silence its shriek, and then you roll over and just lie there for a moment, looking up at the ceiling. The pattern is awkward and overly glossy.\n\nDidn't you have some weird dream last night? You hardly remember the details now. Something about falling, maybe?\n\nYou sigh and pull yourself out of bed. You've got to get going. \n\nIt's going to be a long day.\n\nOnce everything is packed and ready, you take one last look at yourself in the mirror. You're a confident...\n\nWait, what profession is it that's forced you into this little travel adventure? What job title do you want to keep so badly that you'd get up this early to proceed with the next leg of your journey? \n*input_text jobtitle\n*page_break\nYou take a long look at your reflection, drinking in everything you have become. Bright ${eyecolor} eyes. Well-groomed, almost-glowing ${haircolor} hair. A smile that just hints at your ${laugh} laugh. You're ${name}, the ${jobtitle} who is off on an adventure.\n\nAnd you're about to lose everything you are.\n*page_break\n\nYour Eternity begins somewhere entirely ordinary. In fact, if someone had told you that this moment would be the one that defined the rest of your existence, you would probably have laughed.\n\nAfter all, when we think about the moment in which we meet our Eternity, it's rarely tiny bags of peanuts and suspiciously wrinkled vomit-bags that we imagine first.\n\nThat's right: you're sitting on a plane. \n\nThis whole business trip has been anything but a smooth journey. Yesterday's connecting flight was cancelled and you had to spend the night in a hotel room waiting for this new flight, which, unfortunately, is packed full. Fate, you decide coldly, is an unkind creature.\n\nThe air is warm and stale, like you're trapped inside of a vacuum cleaner. Squalling babies surround you, and someone knocked over your drink so that you're wearing more ginger ale than shirt, and every breath is permeated by a menagerie of smells that you don't even want to name. It's far from enjoyable. If you were thinking about it, you'd probably come to the conclusion that this is no place for any worthy tale to begin, certainly not your own--but then again, you're not thinking about it. You've got other things on your mind.\n\nAs always, you somehow found yourself swindled out of the window seat, and the result is an uncomfortable chair with a charming view of all your in-flight neighbors. Every seat is full--and for some reason, it's like you can feel everyone's breath on your skin as they sit around you, talking, laughing, mumbling, munching. You'd bemoan your luck under your breath, but the guy next to you is so close that you fear he might overhear. This is far from one of your best flights.\n\nFor awhile, you try to relax and look out the window. This would have been much easier, you conclude bitterly, if you had secured that window seat--but since you didn't, you're forced to peer around heads and bodies, craning your neck into the aisle, ignoring the glares of the flight attendants.\n\nYou're starting to wish you'd taken the bus.\n\n*page_break\n\nIt's been a few slow, torturous hours. You've almost managed to fall asleep, when, quite out of nowhere, there is a bump.\n\nIf you had been driving a car, you probably wouldn't have thought much of this bump. A stone in the road, maybe, or a piece of tire. Nothing to worry about.\n\nBut you're not on the road--and, as the plane is seized by more jolts, each fiercer than the last, you realize that you will likely never see the road again.\n\nA crackling sound fills the plane, and the pilot's rough voice comes over the intercom, informing you of what you already knew. He sounds grave. Something's gone wrong, they're trying to fix it but there isn't much hope, and, as he says without much conviction, \"Please stay calm.\" Of course, human nature doesn't often lend itself to staying calm, and before the announcement is over, there are people screaming and crying, shouting at one another as if there is anything anyone can do now. The children start to cry, clutching their teddy bears and blankets. The adults don't fare much better. You hear a lot of praying and sobbing, and everyone seems to be hugging someone else.\n\nAnd then it hits you: you are going to die.\n\nYou're going to lose your ${eyecolor} eyes. You're going to lose your ${haircolor} hair. You're never going to laugh that ${laugh} laugh again. This morning, you were ${name}, ${jobtitle}; now, you'll be ${name}, an empty name destined for nothing but a headstone.\n\nThere's another violent crash, fiercer and more ominous than the last. You hear people stumbling, crying, shrieking into the echoing clamor. The lights flicker. You glance over and watch the sky as it races past through the window, a blur of white and blue like you're shooting through a half-done fingerpainting. It's almost beautiful, in a way, and the last thought you have is \"if only I'd taken that window seat.\"\n\nThen everything goes black, and you know no more.\n\n*page_break\n*set dead 1\n*goto_scene agency\n", "void": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\n*achieve snap\nYou have been discharged from the world of the dead. What else is there?\n\nHesitantly, you open your eyes. A great white plain stretches out on all sides, like you are the first sketch on a piece of blank paper. There are no hills, and there are no trees, and there are no clouds in the sky, and there is no sky at all. In fact, there is nothing. Nothing but you.\n\nYou turn around, hoping to see anything, anything but this infinite white Void--\n\nAnd then you spot him.\n\n*page_break\n\nHe's a stringy, awkward little fellow, with glasses that take up most of his face and a clipboard that covers the rest. His form wavers as if he is not quite sure how existing is done.\n\n\"Hello?\" you say uncertainly, and without looking up, he waves a hand in dismissive greeting.\n\n\"Yes, yes, I've been expecting you.\" He frowns and looks at his clipboard. \"It says here that your end was, ah, less than conventional.\" He fixes his watery gaze back on you. \"Apparently, you didn't make it far enough to receive a location assignment for your time here. We won't know where to put you until you pass a rigorous placement test.\"\n\n\"Put me?\" you ask, not liking the sound of that. Haven't you been through enough?\n\n\"Well, of course,\" he says dismissively. \"We can't just have you wandering around The Void for all eternity, now, can we? No, no. That simply isn't logical. You must move on.\"\n\nYou take a step back--not that there's anywhere to go.\n\n\"Move on to where?\" you say.\n\nHe skims you with a vague look, presses his glasses farther up his nose, and gives a thin sigh. \"That would be what the placement test is for,\" he says shortly. \"You'll be given a set of decisions to make based off of fictional scenarios, and we place you based on your decisions.\" \n\n\"What if I make the wrong choice?\"\n\nThe man, whom you've come to think of as the Clipboard, raises an eyebrow. \"I think you'll quickly find that there is no right or wrong in these particular moral issues,\" he says, and makes a lengthy note, mouthing the words as he goes, before, at length, he lifts his head and looks at you. \"There's just...you.\"\n\nWell, that's comforting. \n\n\"Good luck,\" he says, and before you can ask the thousands of questions that are buzzing in your brain, the landscape blurs and falls away. You can't look.\n\n*page_break\n\nYou open your eyes. You're sitting at a tired old diner, a menu folded in front of you, a mouthwatering aroma of sizzling bacon drifting toward you from the kitchen. Strangers with blank faces bustle about their business on all sides. Out the window, there is nothing but blank landscape. \n\nSomething compels you to glance up and you do, only to see a static-riddled old ceiling-mounted TV chattering over the bar. It's clearly a newscast, though you don't recognize the channel or the news anchors, and you give a start as a man's face flashes on-screen. Memories that aren't yours begin to flood into your head. You saw this man yesterday evening at the supermarket--but there's more than that. Your false memories tell you that this man is your spouse's uncharged killer, never arrested or charged for the crime you know he committed. You can't quite picture your spouse--another false memory--but every particle of your being burns for justice.\n\nA banner flashes on the TV underneath the killer's face. He's being charged with the slaughter of a young girl, a brutal murder which took place late yesterday.\n\nBut wait. You saw him at the supermarket yesterday evening. It couldn't have been him. Although, perhaps this is justice. After all...he is a killer, just not exactly the one everyone believes him to be.\n\nYou've arrived at the moral question that Clipboard warned you about. \n\nWhat do you do?\n\n\n*choice\n\t#Tell the truth.\n\t\tYou blink a few times and shake your head. The landscape has shifted around you, and now you're standing in a sparse stretch of forest, a gun in your hand. A man--your false memories kick in and insist that he's your buddy Carl Murphy--stands beside you, also wielding a gun, but his face is pale and his expression is a cocktail of horror and shock. An ambulance races down the dirt road away from the pair of you.\n\t\tYou search your false memories for an explanation. You and Carl were out doing some target practice, having chose
