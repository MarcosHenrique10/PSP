f. His parents obviously weren’t willing to play the bankers this time. No money means no new car, and that means you’ve got a little more time left to figure out a new plan.\n\n\t\tSo, ah…what IS the plan?\n\t\t*choice\n\t\t\t#I keep right on doing what I’m doing. I’m no quitter.\n\t\t\t\tYou throw yourself with renewed vigor into your work. The car is more responsive than ever, as if trying to make up for being your metal prison, and the graveyard desecrator kid gets more and more frustrated with each passing day. You hear the satisfying shriek of other cars’ brakes, hear their drivers shouting curses and pounding their horns and generally singing your praises. You’re doing so well.\n\n\t\t\t\tAnd then…you’re not.\n\n\t\t\t\tAll it takes is one misstep, one slip in judgment, and suddenly you and the car and the graveyard desecrator are careening across the road with a new dent in the passenger door. You feel the metal shrieking all around you, the impact like a freight-train against your shoulder. The brakes whine. \n\n\t\t\t\tNo one is hurt. No one but the car, that is—and that means you’re in trouble.\n\n\t\t\t\tFor a long while after that, you don’t know what’s going on. There’s a lot of apologizing on both sides, and strangers rushing up to ask if everyone’s alright, and every cell phone within a mile radius seems to be calling the cops. It’s not long before the sirens blare—and then something else comes. Something big, and grumbling, and roaring like a dragon.\n\n\t\t\t\tIt’s a tow truck, and it’s here to take you and your metal prison to the junkyard.\n\n\t\t\t\tIt’s a rough ride. You sit there in the belly of the car, metal crushed fiercely against your shoulder, and think how wonderful this plan seemed earlier. You were on top of the world. Now, you’re being flattened underneath it.\n\t\t\t\t*page_break\n\t\t\t\tOnce you and your metal prison are placed in the junkyard—or, as you begin to call it, the metal graveyard—things rapidly deteriorate. Unfortunately, the junkyard is generally treated as an auto parts store, and folks from everywhere flock to rip pieces of metal from your white car. With every piece goes a little piece of your consciousness. \n\n\t\t\t\tThe first time someone took a part from the car—the tires—you were terrified. It felt as though a piece of your soul had been torn from your body, and now a gaping hole was left inside you, leaking out the thoughts and the memories and the emotions and the strength. You were like a pool toy with a tear in the plastic.\n\n\t\t\t\tNow, parts go almost everyday. The steering wheel. The seats. Even the logo on the back of the car falls victim to a salvager, and you feel a part of your own soul go off to become some kind of scavenged art-project. You aren’t as sharp anymore. Things are getting dark around the edges, and memories don’t last as long, and thoughts fade like little fires. \n\n\t\t\t\tYou are a puzzle, with the pieces violently lost. Your existence is all raw pain and confusion. \n\t\t\t\t*page_break\n\t\t\t\tIt takes years, but finally the last car part containing a bit of your fragmented soul is taken. You feel yourself drifting, like you’re floating on a black glass sea. You see the remains of the car as your consciousness dispels—and it looks like you feel, a raw, ruined snarl of metal, with its insides splayed across the dirt and its shell slumped to the side. \n\n\t\t\t\tThe final bond holding together your ruined soul is finally broken, and your consciousness dispels. \n\n\t\t\t\tYou drift with a sigh into a dark abyss. Nothingness is a relief.\n\n\t\t\t\tThis is your Eternity. \n\t\t\t\t*page_break\n\t\t\t\t*achieve relief\n\t\t\t\t*goto_scene end\n\t\t\t#I stop causing trouble and just look for an escape.\n\t\t\t\tYou put all of your energy into finding a way out of this mess. You are awake long into the night, every night, wriggling and kicking and lashing out with every inch of your body. The car shudders, but it doesn’t give. You begin to feel a raw aching from the impacts of the metal, and now you are both trapped and in pain, and things do not seem to be getting better.\n\n\t\t\t\tUnfortunately, Fate has other ideas for you.\n\n\t\t\t\tIt isn’t very long later that you hear the graveyard desecrator kid getting out of the car, and hear a stranger getting in. She’s a thin little thing, wispy like a willow, and her hands feel uncertain on the steering wheel. She takes your car for a short drive, and you manage to behave yourself.\n\n\t\t\t\tThe graveyard desecrator never gets back in the car. He has just sold his little white junker—and you along with it.\n\n\t\t\t\tSo, that plan did not go well. What now?\n\t\t\t\t*choice\n\t\t\t\t\t#It’s no use. I’ll just have to see how this plays out.\n\t\t\t\t\t\tYou put your terrorizing antics to rest—for now—and settle down deep into the belly of the car, waiting and watching and taking your time. This girl, whose name you learn to be Kate, drives much differently than that graveyard desecrator punk did. Her touch is gentle and hesitant, and she never runs red lights, and she rarely goes over forty miles an hour. \n\n\t\t\t\t\t\tAfter awhile, you realize what’s going on. Kate is a new driver. This is her first car, and you are along for the ride. She’s still a bit shaky behind the wheel. Funny, you think, you could probably help her with that.\n\n\t\t\t\t\t\tSo what’s the plan now?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I’ll help her out.\n\t\t\t\t\t\t\t\tYou begin taking an active roll in her driving experience. You slow down the car when she’s speeding—though that rarely ever happens—until she realizes what’s happening and slows down herself. You help her make her turns sharper and quicker. You kick the car into gear and help her find impossibly narrow gaps in traffic. You’re a regular guardian angel.\n\n\t\t\t\t\t\t\t\tHow ironic.\n\n\t\t\t\t\t\t\t\tAfter a few years, when it’s clear that Kate has become a more comfortable driver—no more shaking hands on the wheel, no more hesitancy, no more close calls—she, reluctantly, makes the decision to hand down the car.  Her little sister begins to drive in your little white junker, which has seen much better care since its original graveyard-desecrating owner, and you do for this girl what you did for Kate.\n\n\t\t\t\t\t\t\t\tThe years go by. You and your car are sold over and over again, each time meeting up with a new and experienced driver and parting with the same driver transformed into the image of confidence. You meet all kinds of characters, from the fearsome to the fearful, and you don’t regret a moment of it. You never quite forget Kate—and even though you’re a ghost, tucked up inside a tired old car with little left to give to the world, and you never even met the girl face to face…\n\n\t\t\t\t\t\t\t\tYou don’t think she forgot you, either.\n\n\t\t\t\t\t\t\t\tEventually the white car is retired and brought into the backyard of a nice old woman who smells like apple pies, and she plants flowers in the windows and her grandchildren play on the hood, and even though you’ve been stuck so long that the lines between your consciousness and the car itself have gone blurry, you’re happy.\n\n\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*achieve apple\n\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t#I’m a professional haunter, not a guardian angel. I’m going to terrorize this girl.\n\t\t\t\t\t\t\t\tYou sit there in your claustrophobic metal lair and think up new brands of evil, almost smiling to yourself in the gloom, reclining against the cool interior of the car and lounging in your genius.\n\n\t\t\t\t\t\t\t\tThings don’t go as planned.\n\n\t\t\t\t\t\t\t\tThe first time you make the car misbehave, as you had been doing to the graveyard desecrator kid, you realize you’ve made a fierce miscalculation. This girl is no professional driver. She shrieks and quickly disintegrates into hysteria, freezing up, reacting like so much of a concrete wall, and for all of your effort, you get into a crash. \n\n\t\t\t\t\t\t\t\tThere is a sound like a cannon going off in your eardrum, and then an impact, and metal pierces you. Sharp edges seem to be coming from all sides. You’ve jumped into an ocean of knives. You’re being crushed between the metal guts of the car, your body flattened, your soul shrieking for freedom, your form like a dying bumblebee underneath the farmer’s boot—\n\n\t\t\t\t\t\t\t\tYour last thought is of the girl. You wonder if she is hurt.\n\n\t\t\t\t\t\t\t\tAnd then, you know no more.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t#I don’t know. I…I just don’t know.\n\t\t\t\t\t\t\t\tYou rapidly sink into despair. Days, months, years—all pass like zooming wasps, flashing for a moment in your eyes and then disappearing as if they never existed at all. Your existence is a pattern of roaring engines, shuttering metal, and sharp turns. You begin to ache from the pressure of the car’s guts pressing against you. Your mind feels distant, foggy.\n\n\t\t\t\t\t\t\t\tIt’s not long before disuse renders you incapable of controlling the car. You try to turn the steering wheel one day, just to test it, when you’re alone in the driveway. Nothing happens. You are paralyzed, imprisoned, and you have no hope of escape.\n\n\t\t\t\t\t\t\t\tYour strength fades. Your consciousness more and more often goes black.\n\n\t\t\t\t\t\t\t\tOne day, you just don’t wake up.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t#I can’t give up. I try to escape again.\n\t\t\t\t\t\tYou wriggle inside of the car like a fish in a metal net. The car shrieks and bucks from side to side, swaying, unsteady. The tires scrape the pavement. You hear people screaming and listen to the melodic thump-thump-thump of their feet pounding the ground, and you realize they are running from you. You’re like a horror movie—but in a way you never imagined.\n\n\t\t\t\t\t\tIt’s not long before the new owner of your metal prison sells both you and the car off again. Of course, you don’t blame her. You just wish you could find a way out of here. The metal seems to burn wherever it touches you, and more and more often you find that you can’t breathe, and you seem to be dying again even though you’re already dead.\n\n\t\t\t\t\t\tThis time, you’re sold somewhere a little less…friendly.\n\n\t\t\t\t\t\tYour white car is driven out into what seems to be a landscape made purely of dirt and dust. Filth reaches you even in your safe place tucked up in the metal, and, bemoaning your luck, you cough. The car bounces along the unsteady ground and jostles you fiercely. The metal still burns. Could things get any worse?\n\n\t\t\t\t\t\tYes. Yes they could.\n\n\t\t\t\t\t\tFor a few minutes, you’re left by yourself in the middle of the dust and dirt, your white car groaning. Suddenly your ears pick up a distant roaring, soft at first, and then fierce and powerful and pounding like a beating heart. Loud music wrenches the air. It’s a crowd, a huge one, and they’re excited. That’s not good.\n\n\t\t\t\t\t\tBefore you know what’s happening, something huge and heavy is crashing over your little white car. You feel like a bug underneath a steamroller. Panic fills you, and the roar of the crowd seems invasive in your ears, and you feel the metal of the car pressing into your skin on all sides like a metal straitjacket.\n\n\t\t\t\t\t\tYou’re an obstacle in a monster truck rally. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I freeze up and just sit there quietly.\n\t\t\t\t\t\t\t\t*achieve level\n\t\t\t\t\t\t\t\tIt’s the kind of time when you’d expect to hear your heart hammering in your ears, but you don’t, and for a moment you wonder why. There’s just silence inside of you. The shrieks of the crowd are there, and the roar of the fearsome engines towering around you, but inside there is silence. You sigh softly. You have never really realized how strange death is until this moment, when you expected to feel something inside yourself and instead felt pure stillness, like an abandoned house. All the life has left it.\n\n\t\t\t\t\t\t\t\tSuddenly, the ground is vibrating, and once again a metal monster is tearing over you. You brace yourself. \n\n\t\t\t\t\t\t\t\tThis time, though, something is different. The car parts surrounding you seem to give way, and with a great sigh, your soul drifts out into the open. For the first time in ages, you are standing. The ground feels strange underneath you. The light blinds you. It’s like you have forgotten how to be surrounded by the world. A monster truck comes barreling toward you, gleaming red and yellow, and you suddenly remember how to run.\n\n\t\t\t\t\t\t\t\tYou turn and throw one last look over your shoulder. There is your little white car, sitting ruined and tired behind the wheels of a massive monster truck. It seems to peer at you with cracked headlights—a bittersweet farewell. \n\n\t\t\t\t\t\t\t\tSo, now that your legs are working again, where do you run to?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I’m not going back to the Agency, that’s for sure.\n\t\t\t\t\t\t\t\t\t\tYou never return to the Agency. Instead, you become one of the rare “free spirits” in the land of the living, wandering across the world wherever you choose, experiencing everything and fearing nothing.\n\n\t\t\t\t\t\t\t\t\t\tWell…almost nothing.\n\n\t\t\t\t\t\t\t\t\t\tOne day as you are standing on a cobblestone street, with the melodic sound of a foreign language ringing bell-like in your ears, you see two ghostly shapes roaming the road. They wear the symbol of the Agency on their chests. You turn to flee and quickly lose yourself in a crowd of gawking tourists. You keep an eye on the Agency employees, but they eventually drift away, and you’re left breathless and wondering how long you’ll be able to evade them.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tAs it turns out, you are able to evade them for quite awhile—an eternity, in fact.\n\n\t\t\t\t\t\t\t\t\t\tYou spend the rest of your infinite days wandering freely across the globe. You avoid the Agency employees who rarely show their faces among the living, and you do well. Although you have to keep a watchful eye on your surroundings, you’re happy.\n\n\t\t\t\t\t\t\t\t\t\tAfter all, for the first time in both your life and your death…you’re free.\n\n\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*achieve watching\n\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t#I run straight back to the graveyard desecrator’s apartment. I’m not through with that punk yet.\n\t\t\t\t\t\t\t\t\t\tYou arrive back at the apartment, which has deteriorated even more in your absence, and find that it still suffers under the same no-good owner. You give a thin smile.\n\n\t\t\t\t\t\t\t\t\t\tIt’s game on.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#I wait for him to go to sleep, and then terrorize like a horror movie.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene desecratorterrorize\n\t\t\t\t\t\t\t\t\t\t\t#I think I’m in the mood to crash a party.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene desecratorparty\n\t\t\t\t\t\t\t\t\t#I’ll get back to work, but I’m going to the next case.\n\t\t\t\t\t\t\t\t\t\t*goto_scene businessmanopening\n\t\t\t\t\t\t\t#I panic.\n\t\t\t\t\t\t\t\tUnfortunately, the belly of a car is not the best place to panic. You make the little junker go berserk, like it is suffering from some kind of metal seizure. The crowd doesn’t seem to notice. Metal sticks into your sides, and, sucking in a sharp breath, you throw yourself against the side of the car.\n\n\t\t\t\t\t\t\t\tIt’s then that someone sees you. Someone driving a five-ton monster machine.\n\n\t\t\t\t\t\t\t\tNoticing the unnatural movement of your little white car, the monster truck drivers decide to do what’s natural. They aim for you. They come barreling across the dusty expanse like metal buffalo, their trucks gleaming fiercely green and red and yellow, and the ground shakes under their tires and the world begins to tremble and you feel the metal shaking but you can’t tell if that’s you or the car—\n\n\t\t\t\t\t\t\t\tAnd then a massive tire flattens your car. And then another, and then another, and like a dent under a paintbrush, a flame under a downpour…\n\n\t\t\t\t\t\t\t\tYou are extinguished. There is nothing left--of you, of your soul, of the world.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*achieve picnic\n\t\t\t\t\t\t\t\t*goto_scene end", "desecratorparty": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\nBased on what you know about this punk, you come to the conclusion that he’s probably the type with a vivid night-life. You can’t imagine that he doesn’t have a group of friends, his equals in stupidity and immaturity, and this is just begging for your “artistic touch.” They might as well have invited you over. Feeling rather like a sly, cunning snake with gleaming eyes and a feral grin, a slithering creature consumed by its own wiliness, you prepare to wreak havoc on the graveyard desecrator’s life.\n\nJust as you suspected, it’s only a matter of hours before the apartment is flooded with other rude, obnoxious, foul-smelling young men. They wear tee shirts advertising explicit bands and smothered in curse words. Such a cultured bunch, you think wryly, and set your plan into play.\n\nAt first, it’s simple. You shake a few things. You make the lights flicker. They look uncomfortable, but, as youth often will, they brush it off. You set your jaw, straighten your back, and launch into Phase Two. This time you forcefully knock over a row of open beer cans, one by one, watching their frothy contents spill like golden blood across the carpet. The troublemakers stare. Encouraged by their shock, you keep it up: you shake the glass of the windowpanes, turn the TV to screeching static, blast the radio, make all of their phones vibrate and shutter as if suffering a technological seizure.\n\nAfter that, you give it a rest. They go about their business mostly normally, if a little less boisterously. The next night, when the same group is yet again gathered in the apartment, you do it again. And again, and again, until the others don’t come over anymore and the graveyard desecrator himself is hardly sleeping. You know what that means.\n\nIt’s time for Phase 3.\n*page_break\n*goto_scene desecratorterrorize", "desecratorterrorize": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nThe only natural progression from here is to focus your attention on the very few hours that this graveyard desecrator actually spends sleeping. He doesn’t seem to be a subscriber to that old adage, “early to bed and early to rise makes a man healthy, wealthy, and wise.” Although, as he doesn’t appear to be any of those things, perhaps he’s working to prove the truth of the statement by exhibiting its opposite. \n\nSomehow, nighttime seems like the best stage for your mischief. The graveyard desecrator finally slows down and slumps into his bed, usually around four in the morning, and that is when you really come alive—if you’ll excuse the expression. You lurk in the shadows and make the floors creak and the furniture groan and the door open of its own accord. You make the glass in his window tremble. You whisper just softly enough that he has to sit up in his bed and hold his breath to see whether he’s imagining things, but by then, you have already fallen silent.\n\nAfter this comes the next phase. He’s certainly unsettled, but it’s not enough, so you’re forced to get more creative. You slam doors. You open his closet and make things fly out. You put hair-thin cracks in the window, and then, in what you quickly come to regard as your proudest moment, you flash a gruesome grin behind him in the mirror and then proceed to shatter both your ghostly reflection and his pale-faced one. \n\nYou’re doing great.\n*page_break\nAfter a few nights of progressively darker actions, you begin to notice that the graveyard desecrator seems to be truly, completely losing his nerve. He leaves the light on. He leaves the door open. He has his cell phone close by his bed, emergency numbers put painstakingly on speed-dial.\n\nYou’re almost there!\n\nYou are brimming with your success—but it isn’t to last. Just when you’re planning to play the final card, make the final move, something goes wrong. Someone flips the board. You’re caught off guard.\n\nIt’s the last night, and you have something truly terrifying in store. You lurk in the shadow behind the door—one of the few places this kid has allowed shadows to remain—and wait for your moment to strike.\n\nBut as it turns out, someone else takes it.\n\nBefore you know what’s happening, papers are flying from the desk. The lights are flickering, the bulbs shattering, and the windowpane trembles as if something outside is trying very hard to get in. You stand there, open-mouthed. You know it’s a strange thing to think at a time like this, but you can’t help it: someone is stealing your spotlight.\n\nThere’s a little scuffle from the hallway, and you spin around to see the ghost of a young woman, her hair pulled back in a fierce frame around her face, her eyes glowing with undead fire. You know the living kid can’t see her yet—but you can, and you almost wish you couldn’t.\n\n“Who are you?” you hiss at her.\n\nShe turns suddenly, as if she is alarmed by your presence. When she sees you, a little frown twists her thin lips, and she appears almost pouty.\n\n“I’m here to make this punk pay for what he did to my headstone,” she says, cocking a hip. “Who are YOU?”\n\n“I’m here to make him pay for what he did to the whole graveyard,” you say, almost managing to be modest, and this makes her eyes flash, as if she thinks you’re trying to best her—and, if you’re honest, you sort of are trying to do just that.\n\nShe stands there glaring, and as the clammy seconds pass, she starts to seem more and more like a flame. Perhaps you don’t want to be on the wrong side of this girl. But, you realize, as you glance at the living boy out of the corner of your eye—unaware, as always, of the world around him—you still have a job to do.\n\nWhat’s the plan?\n*choice\n\t#I call it a day and head to the next job. She seems capable of finishing things up here, anyway.\n\t\tYou give the girl a little bow. “He’s all yours,” you say, and without another word, you leave. \n\n\t\tYou know she is staring at you as you drift past her. You don’t care.\n\n\t\tOn to the next case.\n\t\t*page_break\n\t\t*goto_scene businessmanopening\n\t#I think I’ll try to team up with her. The enemy of my enemy is my friend, right?\n\t\t“Look.” You cross your arms and give her a firm, yet not unfriendly, glare. “We’re in this together, right? We both want the same thing. Why not pool our expertise and wipe the ground with this punk?”\n\n\t\tShe hesitates for a moment, rocking back and forth on her heels. You sneak a glance at the graveyard desecrator—he is sitting up in his bed, looking around, trembling like a tiny, hairless dog.\n\n\t\t“Okay,” she says at last. “Truce, then. But if you betray me—”\n\n\t\tYou cut her off. “Betray you and do what? It’s not as if I can get you killed.”\n\n\t\tShe’s silent for a moment. Then a small, fierce little smile lights up that angular face, and you decide that she could have been quite the troublemaker herself. “I like you,” she says decisively, and that’s it.\n\n\t\tYou’re a team.\n\n\t\tAnd so it is that you and this mysterious, vengeful young lady pool your considerable abilities and terrorize this boy who so desperately deserves it. You break his windows. You trash his apartment. You make characteristic scratches on the wall, so that at the very least, he won’t be getting his deposit back. Everywhere you can, you make mention of the graveyard, dropping painfully-obvious hints as to the nature of your revenge. The two of you make a fine team. \n\n\t\tIt’s not long before your combined evils make the graveyard desecrator decide that he’s losing it. (This could, you think with a wry smile, have something to do with the fact that you set everything straight whenever he calls someone else to witness the terror, and thus he begins to believe that, perhaps, it’s all in his head.) He checks himself into a hospital somewhere.\n\n\t\tThe punishment fits the crime, you decide.\n\t\t*page_break\n\t\t*achieve rick\n\t\t“Well, we did it,” says your new ally, standing in the now-vacated apartment, a small smile twisting her lips. “We’re kind of incredible.”\n\n\t\t“That we are,” you say.\n\n\t\t“So, what now?” She tilts her head at you. For a moment, there’s silence, nothing but the buzzing of the light-bulbs. “I mean, we could keep it up, y’know. Stick it to the troublemakers. Keep the world of the living in check. You know, that kind of stuff.”\n\n\t\tYou hesitate, not having expected such a proposal. It’s a fair question, though.\n\n\t\tWhat now?\n\t\t*choice\n\t\t\t#I think I’ll just head to the next job.\n\t\t\t\tYou respectfully decline her offer—because you certainly don’t want to be the next target of her “expertise”—and she doesn’t look all that broken up.\n\n\t\t\t\t“Gotcha,” she says. “Well, good luck, stranger. Nice working with you.”\n\n\t\t\t\tAnd then she punches your arm, gives you a twisted smile, and simply stops existing.\n\n\t\t\t\tYou blink.\n\n\t\t\t\tWell…on to the next case.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene businessmanopening\n\t\t\t#You know, that sounds like fun.\n\t\t\t\tYou smile at her. “I’ve got nowhere to be,” you say, which, of course, isn’t exactly true.\n\n\t\t\t\tShe beams at you. “Great! I know just what we can do. There’s this living dude who always creeps around that other cemetery, the one on the hill—”\n\n\t\t\t\tShe chatters on, a fearsome fire lit up behind her eyes, and you sink into worried thought. Will the Agency track you down? Will they try to reclaim what they see as their property—that is to say, your soul?\n\n\t\t\t\tYou don’t know.\n\n\t\t\t\tBut you’re going to find out.\n\t\t\t\t*page_break\n\t\t\t\tIt’s been a few months, by living standards, and your little team has come a long way. You’re nearly world famous—among both the breathing and the no-longer-breathing societies—and your troublemaking antics are respected as some of the greatest revenge techniques known to man. You’re feared. You’re respected. \n\n\t\t\t\tYou’re in trouble.\n\n\t\t\t\tUnfortunately, the attention draws a pair of not-so-friendly eyes. Before you know what’s happening, a pair of familiar ghost guards, wearing the symbol of the Agency on their chest pockets, arrive at your latest haunt—a pioneer cemetery somewhere by the sea—and claim you.\n\n\t\t\t\t“Oh, no you don’t,” snarls your fearsome little ally, whose name you have learned to be Sarah. “That’s my partner in crime!”\n\n\t\t\t\t“Ah,” says one of the guards. “You’re the brats what’ve been causing us so much trouble!” His rough accent grates on your ears, and you bite your lip, knowing that this path is not a good one. “Riled up the living, you have. Makes our targets a lot more uneasy, and our jobs a lot more difficult. Not very nice of you, is it?”\n\n\t\t\t\tYou swallow hard.\n\n\t\t\t\t“You’re both coming with us,” says the other guard.\n\n\t\t\t\tOf course, there’s no argument. Not on your part. Sarah fights like a junkyard dog, wriggling and screeching and writhing, but it’s no good. You are both dragged to the Agency.\n\t\t\t\t*page_break\n\t\t\t\tThere isn’t exactly a trial. In fact, there’s nothing at all. You and Sarah are simply escorted none-too-gently through the cement halls of the Agency to an old metal door that’s rusting at the hinges, you walking along in silence and Sarah writhing like a maniac. You can’t blame her. You have seen this place before, and know the cold, clammy horror of it. She has likely never known anything quite as ominous.\n\n\t\t\t\tOne of the guards kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t“You first, Absent-Without-Leave,” snarls one of the guards, and he gives you an unpleasant grin.\n\n\t\t\t\tSarah kicks desperately. “No! Wait! We haven’t done anything—”\n\n\t\t\t\t“Sarah.” You shake your head. “It’s over. I…I’m sorry.”\n\n\t\t\t\tShe looks at you, eyes shining, mouth open in a final protest that you never get to hear.\n\n\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the scuffle of feet from above you. Maybe Sarah will escape. She’s good like that.\n\n\t\t\t\tToo bad you aren’t.\n\n\t\t\t\tJust like that, you know nothing more.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void\n\t#I glare at her and snap, “Get out.”\n\t\t*achieve mean\n\t\tPerhaps this wasn’t the best choice.\n\n\t\tHer eyes light up like small gray bonfires, and you’re suddenly aware of the fact that you have made a dangerous enemy. She doesn’t even give you time to consider the full depths of your actions. She just launches at you, a blur of ghostly hands seeking your throat and ghostly feet seeking to crash like semi-trucks against your dead flesh. You didn’t know ghosts could fight. But, as this girl flies toward you, all fire and fearsome fury, it’s clear that they can.\n\n\t\tYour battle is intense, and most of the time you find yourself defending instead of attacking. Your vision is a blur of fingernails and flying hair, sometimes a fist, sometimes a foot breaking the monotony. Pain shrieks through you, even though your body is dead.\n\n\t\tIt’s too bad the two of you didn’t pool this fury and focus it on the graveyard desecrator—your intensity would have terrified the bravest man. In fact, despite the fact that the two of you are little more than a rolling tangle of limbs and shrieks and curses, you still manage to wreak havoc on your surroundings. The boy can’t see you, but he can hear you, and he can see things buck and shatter when your writhing bodies crash into them.\n\n\t\tEventually, you manage to best her. You’re not quite sure how—it was all a blur—but you find yourself, breathless and exhausted, kneeling over her still body. Her form shimmers for a moment and then fades away. \n\n\t\tDid…did you just kill a ghost?\n\n\t\tYou turn back to see where the graveyard desecrator has gone. He seems to have frozen, sitting up in his bed, and is now pale-faced and wide-eyed in the middle of his ruined room. You sigh and straighten up, pain coursing through you like red rivers. You’ve won the battle, but you are much weakened.\n\n\t\tWhat now?\n\t\t*choice\n\t\t\t#I have to go. I don’t know if ghosts can die of exhaustion, but I don’t want to find out.\n\t\t\t\tYou leave, the boy trembling and mumbling under his breath behind you. You have been relatively successful.\n\n\t\t\t\tBefore you head to the next case, you take a bit of a break. What’s the harm? After all, the Agency never has to know—and anyway, if you tried to move to the next case, you’d probably exhaust yourself and die for the second time. You’ve had enough death for awhile, thank you, so you decide to take the rest.\n\n\t\t\t\tYou wander around parks. You lounge on benches and have to avoid the living when they come—and a few times, you narrowly avoid having them sit on you. You frighten the pigeons, who can, apparently, feel the presence of the dead.\n\n\t\t\t\tAnd then one day, as you're wandering around trying to kick stones, although you’re not doing very well because your foot keeps going right through them, you hear a voice calling. It’s harsh, gravelly, like fingernails on the trunk of a gnarled tree. You turn around, curious. \n\n\t\t\t\tAn old woman is sitting on a park bench staring right at you. Her milky eyes swim in her head, and her expression is vague, but she seems to be looking right at you. Something feels off about this. She leaves soon, but the next day she’s back again, and the next, and the next.\n\n\t\t\t\tYou have to cut your rest short and head to the next case. Luckily, you're feeling rested enough to run for it. \n\t\t\t\t*page_break\n\t\t\t\t*goto_scene businessmanopening\n\t\t\t#I’m not giving up. I’ve got a job to do.\n\t\t\t\tYou pick up roughly where you left off, shaking things—though most of the boy’s possessions are already scattered across the floor—and making the lights flicker. Luckily, your little scuffle did a good deal as far as terror is concerned. The boy doesn’t take much more prodding, and almost instantly he’s tearing out of the room, shrieking something about a mental hospital.\n\n\t\t\t\tYou’ve done it…but you’re just so…tired.\n\n\t\t\t\tUnfortunately, that last little bit of haunting took it all out of you. You slump to the ground, exhausted, breathless, feeling the fire run out of you like someone has blown out your pilot light. It’s too much. You have no life to lose, but you still feel like you’re dying.\n\n\t\t\t\tYou don’t last much longer. A knot of limbs on the floor, surrounded by the broken lamps and dirty laundry and notebook papers that were so recently the tools of your evil, is all you are. And then, slowly, ever so slowly, darkness creeps in. Your ghostly figure fades away like smoke on the breeze. You are just pieces. No, you are just one piece, one shattered piece.\n\n\t\t\t\tNo…now you are nothing.\n\n\t\t\t\tYou know no more.\n\n\t\t\t\tYou have lost your Eternity.\n\t\t\t\t*page_break\n\t\t\t\t*achieve lost\n\t\t\t\t*goto_scene end", "emptyhouse": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nThe woman smiles a serpentine smile, shuffles through the documents on her desk, and hands you a thin manila envelope. This one is small and water-stained and looks as if it had been forgotten until this very moment. There is nothing written on it. You peer inside, and find a single piece of paper, with an address instead of a name—and when you look back up, the whole office seems to be staring at you again. Their eyes are wide and glittering and…smug.\n\nWithout another word, you turn to leave the office.\n\nBut wait. Is that…sniggering? Are they laughing at you back there?\n\n*choice\n\t#They’re not worth my time. I ignore them and head off.\n\t\t*label go\n\t\tYou arrive at the address, and what you find defies all expectations.\n\n\t\tYou are standing in front of a dilapidated, trembling old barn of a place, leaning like it’s had too much to drink, its windows crying broken glass and its door hanging dizzyingly from the hinges. Weeds poke through the wooden slats of the front porch. A dog house sits off to the side like a silent sentinel, its chain stretched out and empty like it is waiting for its dog.\n\n\t\tThis can’t be right.\n\n\t\tYou walk up hesitantly, peering around, though you aren’t quite sure what you’re afraid of. You are a ghost, after all.\n\n\t\tYou push open the door with one finger and step over the threshold. The floor creaks at your weightless step. Dust motes dance in the air, sheets covering looming pieces of furniture—at least you hope it’s furniture—and there is no one in sight.\n\n\t\tSomething is very wrong.\n\t\t*choice\n\t\t\t#I take a look around.\n\t\t\t\t*goto_scene emptyhouseexplore\n\t\t\t#I head back to report another problematic case.\n\t\t\t\t*goto_scene emptyhouseescape\n\t\t\t#I’m out of here—but I’m not going back to the Agency. There's something off about those people.\n\t\t\t\t*goto_scene emptyhouseescape\n\t#I spin around and snap, “Sorry, did you say something?”\n\t\tIt’s as if the room underwent a set-change in the second it took you to turn around. No one is looking up. Every head is bowed and every pen is scratching, and there is no evidence that you were ever the center of attention. Someone gives a soft cough, and then there is nothing but the sound of scribbling pens.\n\t\t*choice\n\t\t\t#This is ridiculous. We're not in middle school anymore. I leave.\n\t\t\t\t*page_break\n\t\t\t\t*goto go\n\t\t\t#“Oh, please,” I snap, “I know you said something.”\n\t\t\t\tA dark murmur goes through the room. You notice dead eyes exchange dead looks. Something is not right here.\n\n\t\t\t\tA man lifts his head and fixes you with a beady glare. “We were just saying,” he says, with a voice like a winter wind, “how strange it is that there are things worse than being dead.”\n\n\t\t\t\tUneasily, you turn to go, mulling these words over in your head.\n\t\t\t\t*page_break\n\t\t\t\t*gosub go", "emptyhouseescape": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\nYou turn around and race toward the front door. It stands closed, firm on its hinges, with a stripe of moonlight pouring in underneath—and that’s not right. You didn’t close it. And when you left, it was hanging off the hinges…wasn’t it?\n\nYou try to drift through the wood, but all you get in return is a sharp thump on your nose. That’s never happened before. A little panicked now, you grab the handle and shake violently, unsure of how else to escape. The wood creaks and the floor makes sounds that almost resemble laughter, but the door doesn’t budge. \n\nYou’re trapped.  \n*choice\n\t#I try an open window.\n\t\tYou scramble into what once may have been a living room—a stupid, fleeting laugh escapes you at the sheer irony of it—and you immediately find a window. Ancient drapes billow in the wind. You sigh in relief and reach toward the gap, the square of moonlight and night sky that pours into the dark room, but your fingers run into something hard. It feels like…glass.\n\n\t\tThat’s not right.\n\n\t\tYou race through the room, trying the next window, this one broken. Again, a feeling of phantom glass meets your fingers.\n\n\t\tFalling still, a sickening feeling begins to creep over you, as if you’ve missed a step or ten on a cold marble staircase.\n\t\t*page_break\n\t\t*goto snap\n\t#I try the back door.\n\t\tYou scramble through the house, passing deep wells of pure shadow and shapes you’d rather not investigate, and finally spot a door. Although, as you get closer, it hardly looks like a door. A slab of wood and a handle, more like. Either way it’s a welcome sight, and you crash into it, seizing the handle with trembling fingers.\n\n\t\tBut it’s locked.\n\n\t\tFalling still, a sickening feeling begins to creep over you, as if you’ve missed a step or ten on a cold marble staircase.\n\t\t*page_break\n\t\t*label snap\n\t\t*achieve news\n\t\tThe Agency has trapped you here.\n\n\t\tNot a moment after this thought enters your head, cold and unbidden like a parasite, you hear a tell-tale creak from the front door. You dash over to see if an escape has presented itself. Perhaps things aren’t as bleak as you thought.\n\n\t\tBut no—they’re worse.\n\n\t\tYou reach the front entryway and skid to stop, your breath catching in your dead lungs. A priest stands in the doorway, flanked by two glassy-eyed teens wearing graphic tees that advertise a certain ghost-busting company from an 80’s movie. The mismatched trio peers into the gloom, muttering amongst themselves, and you know that it will only be a matter of time before they’re coming, and coming for you. But despite that knowledge, you find yourself rooted to the spot, as if you’ve become a tree—a trembling, ghostly tree.\n\n\t\tSo? What’ll it be?\n\t\t*choice\n\t\t\t#I make a dash for the open door.\n\t\t\t\t*gosub goingdown\n\t\t\t#I race upstairs.\n\t\t\t\t*gosub goingdown\n\t\t\t\t*finish\n\t\t\t#I stay where I am.\n\t\t\t\tYou hold your breath and make every part of your ghostly form as still as death itself. You become a shadow, a lifeless rectangle of cold, clammy air, and nothing more. It could just work. Maybe he’ll walk past you. Maybe you’ll make it through this after all.\n\n\t\t\t\tThe priest takes a deep breath and, uncertainly, as if he’s playing that classic childhood game where the floor is lava, he steps into the old house. The wooden floorboards creak underneath his glittering black shoes. His face is wrinkled but friendly, like a scarecrow in the gloom, but his jaw is set and he is ready for action.\n\n\t\t\t\t“Come along, boys,” he says to the quivering teens behind him, and he takes another, more confident step forward.\n\n\t\t\t\tYou have to step back so that he doesn’t step right into you—and that’s it.\n\t\t\t\t*page_break\n\t\t\t\t*label goingdown\n\t\t\t\tYour movement, although small, like the breath of a baby, sends a chill of clammy air billowing up around the priest and his trembling sidekicks. They all go still in unison, a movie that has been stopped prematurely, a song that died just before the chorus.\n\n\t\t\t\t“It is here,” breathes the priest.\n\n\t\t\t\tAnd then, from somewhere low in his throat, he begins a determined chanting. The sound rises and falls in the air like a roller coaster cutting through the shadow. You take a step back, and then another, and then another. You know what this is. Every particle of your being is sure of what’s coming—even though you can’t make out the words of the chant, and his voice is smooth and almost soothing.\n\n\t\t\t\tExorcism.\n\t\t\t\t*page_break\n\t\t\t\tYour mind races like a train spilling from its tracks. You’re not an evil spirit, not really. You haven’t done anything that wrong. And anyway, what happens to an exorcised spirit? You’ve only ever seen this from the other side, from the perspective of the unlucky family in the horror movie, or the foolish teens in the cheesy ghost story. You have never stopped to wonder what a ghost feels like during an exorcism.\n\n\t\t\t\tNow you will find out.\n\n\t\t\t\tEvery word that drifts from the priest’s lips seems to rip away a piece of your being. You feel yourself physically unraveling, your muscles useless, your limbs frozen. It is as if every word is a bear, taking a great bite out of your existence. \n\n\t\t\t\tSlowly, so slowly, you lose everything you have. You are nothing but a shell of consciousness hovering in the clammy air of an old, ugly house with creaking floors, and then the priest says one final word, and your mind shuts off like a light switch was flipped. Your last thought is of the Agency, and how unlucky you were to end up at their evil, snaky whim.\n\n\t\t\t\tJust like that, there’s nothing. You can’t move. You can’t see. You have only the simplest awareness, like your powerful brain was stripped and a single cell put in its place. In this moment, you realize that there is truly something worse than death:\n\n\t\t\t\tNothingness. Nothingness like a bitter, mindless dream, without body or mind or breath, robbed of movement and of freedom, trapped forever in an empty plain.\n\n\t\t\t\tThis is your Eternity.\n\t\t\t\t*page_break\n\t\t\t\t*achieve exorcism\n\t\t\t\t*goto_scene end", "emptyhouseexplore": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*achieve curious\nYou decide to do some looking around, and what you find makes you feel as though you’re suddenly the star of a horror movie—but now, instead of playing the ghost, you’re playing the unlucky teen whose only fate is to die in the end.\n\nThe house must have been abandoned ages ago. The wood is rotting in some places, the floorboards sagging and splintering and groaning with low voices. Furniture sits huddled together in corners, draped with white fabric. Naked and shattered light-bulbs sway from the ceiling. The air itself seems to be holding its breath—it’s like you’re inside a cave. \n\nWhile this house clearly has no real owners, it is also apparently not lacking in faithless, abusive visitors. You suddenly feel a rush of pity for the once-proud home. Once upon a time, it had people who loved it, a few of rosy-cheeked children playing near its fireplace, a dog by the now-ruined front door—and now it is only ever used by the teenagers who throw rocks through the windows and leave their sneaking, up-to-no-good footprints in the layers of dust on the floorboards. \n\nThe house is truly alone…kind of like you.\n*page_break\nYou are just about ready to turn around and leave this house, if only to escape the feeling of distant melancholy like a sad song. You turn one final corner, looking for the exit—\n\nAnd then you run straight into a tripod, its spindly black legs bearing a camera with hundreds of flickering lights. It rocks back and forth at your touch and you leap backward like a horse shying away from a gunshot. Somewhere in the darkness of this next room, you hear a gasp. \n\nYou are not alone.\n\nWhat do you do?\n*choice\n\t#I’ve had enough of this. I’m out of here!\n\t\t*goto_scene emptyhouseescape\n\t#I move a little bit closer. Curiosity can’t kill a cat who’s already dead, right?\n\t\tThat’s the spirit (if you’ll excuse the expression).\n\n\t\tYou step a little farther into the room, tilting your head, holding your breath in your dead lungs. The floorboards do not creak under your weightless feet and your presence is not betrayed. Not by that, at least.\n\n\t\tUnfortunately, your little run-in with the tripod has already alerted the other beings in this house—you realize you don’t even know whether they’re dead or alive—to your presence here. The camera’s lights flash wildly. The air stands still for one along moment, and you don’t hear anything.\n\n\t\tAnd then, softly: “Dude, did you see that?”\n\n\t\tYou turn your head. There they are, two teenage boys in graphic tees bearing the logo of a famous ghost-hunting team from the 80’s. They don’t look like much. Their shirts are too big and their pants are too low, and their hair seems as if they’ve both come from a world before showers, but other than that they appear to be nothing at all special.\n\n\t\tOne of them—blonde and curly-haired—gets up and comes hesitantly over to the tripod. He walks like a dog slinking toward its master after having dug holes in the backyard. You take a step back, narrowly avoiding his touch.\n\n\t\tHe waves something through the air around the tripod, where you were only moments ago, and you see a gray box with glowing lights blazing at the top. The lights go from green to orange as the box passes you.\n\t\t*choice\n\t\t\t#That’s it, I’m out of here.\n\t\t\t\t*goto_scene emptyhouseescape\n\t\t\t#Well, it looks like it’s time to have a little fun!\n\t\t\t\t*goto noidea\n\t\t\t#Fascinating! I move in for a closer look.\n\t\t\t\tYou take another step closer. And then another. In just a moment, you’re standing right next to the boy, so close you can smell his lack of cologne, and then he turns to wave the box in a different direction.\n\n\t\t\t\tThe lights blaze from orange to wildfire red, and the box shrieks. It’s shrieking at you. He’s pointing the box right at you.\n\n\t\t\t\tWhat?\n\n\t\t\t\tSuddenly, the strangest memory overwhelms your mind. That girl you used to know in high school—Abby, right? Little girl, blonde, with the brightest blue eyes. You try to remember what she went on about for most of freshman year. She had a gray box just like this one. She said it measured the electro-magnetic field….\n\n\t\t\t\tYou’re actually being ghost hunted. These are amateur ghost hunters.\n\t\t\t\t*choice\n\t\t\t\t\t#Okay. NOW I'm out of here!\n\t\t\t\t\t\t*goto_scene emptyhouseescape\n\t\t\t\t\t#Well, I might as well give them something to tell their friends about.\n\t\t\t\t\t\t*gosub noidea\n\t\t\t\t\t\t*finish\n\t\t#Wait a minute…\n\t\t\tYou take a few steps backward, hesitating. The floorboards whine, though your weight is hardly more than a baby’s breath. You know what this is. You’ve seen something like this before—on TV late at night, and around the end of October, and also in the first year of high school…a girl you knew, Abby, she used to carry around a little gray box with a row of lights on top, and she’d go to abandoned buildings at night, asking if anyone else was there with her.\n\n\t\t\tGhost hunting.\n\n\t\t\tYou think back to what Abby used to do. You never knew her very well, but you do remember her talking about this “ghost hunting” all the time. It seemed innocent enough, as far as you know—a few questions, a little bit of waving around the gray box, and that was it. Not that bad. But you’ve only ever known about ghost hunting from the side of the living.\n\n\t\t\tWhat does this mean to a ghost?\n\t\t\t*choice\n\t\t\t\t#To this ghost, it means the Agency set me up!\n\t\t\t\t\tYour breath catches in your dead lungs. You hear voices from inside the dark room, but you don’t care anymore. \n\n\t\t\t\t\tThose nasty ghosts in the Hiring Department—they sent you here on purpose. They wanted to get rid of you. They threw you to the ghost hunters, like a fisherman dumps out the dead worms in the bottom of his bait pail.\n\n\t\t\t\t\tThis is not right.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#No, it isn’t right. And I’m going to storm out of here and tell the Agency just what I think of them.\n\t\t\t\t\t\t\t*goto_scene emptyhouseescape\n\t\t\t\t\t\t#That’s it, I’m out of here!\n\t\t\t\t\t\t\t*goto_scene emptyhouseescape\n\t\t\t\t#It means that I get to have a little fun with these ghost hunters, that’s what it means.\n\t\t\t\t\t*label noidea\n\t\t\t\t\tYou look around the room. There are countless devices looming in the darkness—cameras mounted on poles, snaky-legged machines monitoring the environment of the room, screens glowing from a hundred places, and other things that leer at you with indescribable metallic grins. Well, you may not know what all of these things are for, exactly, but you can make them your tools.\n\n\t\t\t\t\tYou focus your energy on the various pieces of equipment scattered across the room. One by one, you begin to make them shake—a deep, ghostly shake, like the middle of a horror movie, right before the unlucky teenagers start dying off one by one. There is a great metal ringing in the air. Things clatter against the walls, the groaning floorboards, even other pieces of equipment.\n\n\t\t\t\t\tPredictably, the boys panic.\n\t\t\t\t\t*page_break\n\t\t\t\t\tJust when you’re starting to feel a bit cruel, what with their scattering and shrieking like ants fleeing a water-hose, one of the boys stops. He’s got dark hair and dark eyes, probably considered “handsome” to all of the girls his age. Arm shaking, he holds up another box—this one black, and without the lights—and says in a quavering voice, “H…hello?”\n\n\t\t\t\t\tIt’s a recorder. He’s trying to communicate.\n\n\t\t\t\t\tHow quaint!\n\n\t\t\t\t\tHow do you respond to this new plot twist?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I’m out of here. I was getting bored anyway.\n\t\t\t\t\t\t\t*goto_scene emptyhouseescape\n\t\t\t\t\t\t#I say something.\n\t\t\t\t\t\t\tYou allow the objects in the room a rest from their hysterical shaking. Metal falls still, the floorboards give one last groan, and the stage belongs to you.\n\n\t\t\t\t\t\t\tWhat do you say into the recorder? \n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I make my voice deep and rolling, and I hiss, “I’m watching you.”\n\t\t\t\t\t\t\t\t\t*goto kaythen\n\t\t\t\t\t\t\t\t#“Hi there.”\n\t\t\t\t\t\t\t\t\t*label kaythen\n\t\t\t\t\t\t\t\t\tAs soon as you are finished speaking, a small, humble green light begins to glow at the top of the recorder. The boys exchange a glance, swallow hard, and, leaning in close to the black box, they listen to your voice.\n\n\t\t\t\t\t\t\t\t\tIt’s you speaking. You know that much. And you remember saying the words—but, somehow, it doesn’t sound like you. The voice is hollow and dragging, like a cave descending for miles. That is a monster. That can’t be you…right?\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\tThey press record on the black box once again, and the blonde-haired boy swallows hard and looks up into the gloom.\n\n\t\t\t\t\t\t\t\t\t“Did…” He stammers, and the other boy finishes for him.\n\n\t\t\t\t\t\t\t\t\t“Did you die here?”\n\n\t\t\t\t\t\t\t\t\tHow do you respond?\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#I don’t. I’m bored, so I leave.\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene emptyhouseescape\n\t\t\t\t\t\t\t\t\t\t#I say yes, I died here.\n\t\t\t\t\t\t\t\t\t\t\t*label swag \n\t\t\t\t\t\t\t\t\t\t\tThe boys listen once again to your strange, hollow voice, and you can’t help but wonder how that could possibly be you. Does death really change everything?\n\n\t\t\t\t\t\t\t\t\t\t\tUpon hearing your response, the ghost hunters look at one another and swallow hard. “T-thanks,” the blonde one stammers.\n\n\t\t\t\t\t\t\t\t\t\t\t“Yes, thank you for talking with us,” says the other, probably trying to make sure you can’t find offense in his friend’s somewhat-lacking response. After all, who would want to tick off a ghost?\n\n\t\t\t\t\t\t\t\t\t\t\tWith that, and a swish of jeans and graphic tee-shirts, they’re gone.\n\n\t\t\t\t\t\t\t\t\t\t\tWell, that was fun. Time to go.\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tYou wander toward the front of the house, still thinking over that strange response. What are those boys planning to do now? They couldn’t just ask you a question and leave, right? After all, they now have proof of life after death. They’re going to have more questions—or, at the very least, the rest of the world is.\n\n\t\t\t\t\t\t\t\t\t\t\tAlmost without thinking, you put your hand on the front door and push. Even though it is hanging from its hinges, even though it should swing open and let you out, it doesn’t budge. You frown and try again. And again. Then you try to go through the wood, and all you get for your efforts is a sore nose. You go through the house doing the same thing, dancing the same dance, but the doors are locked and impassible.\n\n\t\t\t\t\t\t\t\t\t\t\tYou’ve never seen a locked door before, not in the Afterlife. You can go where you want. \n\n\t\t\t\t\t\t\t\t\t\t\t…Right?\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\tYou while away a few long, lonely hours trying to find a way out, and as these things go, your mind is working constantly the whole time. Like some spinning, spitting little creature, it tries to find an answer for this strange turn of events—\n\n\t\t\t\t\t\t\t\t\t\t\tAnd then you realize what’s going on. It’s the Agency. That no-good Hiring Department sent you here on purpose, fed you to the ghost hunters like a zookeeper feeding a pair of uncoordinated young lions, and then trapped you.\n\n\t\t\t\t\t\t\t\t\t\t\tYou storm through the house, fuming. The floorboards creak under your feet. Cabinet doors slam and furniture trembles as you go past like a small hurricane. You’ve been played, betrayed, fooled.\n\n\t\t\t\t\t\t\t\t\t\t\tAnd then, it gets worse.\n\n\t\t\t\t\t\t\t\t\t\t\tQuite suddenly, the front door bursts open, and you find the house flooded with giggling, shrieking, obnoxious teenagers. They cling to one another, squealing with excitement. Every single one of them has either a beer can or a camera in their hand, sometimes both. \n\n\t\t\t\t\t\t\t\t\t\t\t“Hey, ghost!” You look around and spot the two ghost hunter boys who were here earlier. “Think you could put on that show again? Y’know, for our friends?”\n\n\t\t\t\t\t\t\t\t\t\t\tThis isn’t looking good. You try to dodge around them, to get to the door. It stands there so open and inviting, hemorrhaging fresh night air, mocking you—but you can’t get out. You stand on the threshold, blocked by some invisible and dark magic, and realize with a sinking feeling that your fate has been sealed.\n\n\t\t\t\t\t\t\t\t\t\t\tLooks like you’re the new entertainment. \n\n\t\t\t\t\t\t\t\t\t\t\tThere is something worse than death: eternal imprisonment and humiliation.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t*achieve jailhaha\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t\t#I say no, I didn’t die here.\n\t\t\t\t\t\t\t\t\t\t\t*goto swag\n\t\t\t\t\t\t\t\t#I take a deep breath a shriek, “GET OUT!” (Classic!)\t\n\t\t\t\t\t\t\t\t\tAs soon as you are finished speaking, a small, humble green light begins to glow at the top of the recorder. The boys exchange a glance, swallow hard, and, leaning in close to the black box, they listen to your voice.\n\n\t\t\t\t\t\t\t\t\tYour shriek echoes in the little room. The fierce words bounce off the walls, make the floorboards groan, shake the metal instruments. You feel the house trembling around you.\n\n\t\t\t\t\t\t\t\t\tThe boys drop the recorder and disappear into the gloom, howling.\n\n\t\t\t\t\t\t\t\t\tWith a chuckle, you turn around. What were you doing again, before this little detour distracted you?\n\n\t\t\t\t\t\t\t\t\tOh yes. You were sent here to do a job, but unless these boys were it—which you highly doubt—something has gone wrong. Looks like it’s time to go.\n\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t*goto_scene emptyhouseescape", "end": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*page_break\nThank you for playing [i]Gambling with Eternity![/i] We hope you've enjoyed your venture into the afterlife and beyond.\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nBut, of course, the journey doesn't have to end here. With twenty-seven unique endings, there are countless decisions yet to be made, robust storylines yet to be explored, and vivid characters yet to be met. There's always another tale just waiting to be written by your choices.\n\nYour Eternity can still be changed, if you dare to toy with the strings of fate.\n\n*delay_ending 1200 $4.99 $0.99", "graveyarddesecrator": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*set jobtitle \"Successful Haunter\"\nYou find yourself standing right in the middle of the room where you first met your fate. The plastic desk is empty, the lights off, and papers are scattered haphazardly. \n\nUneasy, you take a manila envelope from the corner of the desk. It’s scrawled with the words “Graveyard Desecrator,” and inside, you find information on a young man who has been defiling graveyards. You have to make him pay for his crimes—however you can. Doesn’t seem like such a bad gig.\n\n“Let the games begin,” you think.\n\nSo, where do you start?\n*achieve old\n*choice\n\t#I prefer to confront him directly.\n\t\tYou get his information from the file and quickly locate his apartment. It’s in a bad part of town, located in the bowels of a decrepit building with broken doors and bars on the windows. He basically lives in a vandalized shoebox. You climb the steep stairs to what your file says is his door, slip through the rotting wood, and find yourself in a fly’s paradise.\n\n\t\tThere are plates of old food lying everywhere. Beer bottles and soda cans clutter the maroon sofa, and dirty clothes line the floors like a new take on the old salt-shield, and the whole place smells like sweat-socks.\n\n\t\tThen, you see him.\n\n\t\tHe’s a tall, awkward thing, with a mop of filthy blonde hair and off-blue eyes like a muddy lake. Instantly you know you don’t like him. You’ve always tried not to judge a book by its cover—but, then again, you read this book, and all that was inside it was disrespect and immaturity.\n\n\t\tHe deserves what is coming to him.\n\n\t\tBy the way…what exactly is coming to him?\n\t\t*choice\n\t\t\t#I’m going to do some classic night-haunting.\n\t\t\t\t*goto_scene desecratorterrorize\n\t\t\t#I’m going to wait for his friends to come over and then crash the party.\n\t\t\t\tBased on what you know about this punk, you come to the conclusion that he’s probably the type with a vivid night-life. You can’t imagine that he doesn’t have a group of friends, his equals in stupidity and immaturity, and this is just begging for your “artistic touch.” They might as well have invited you over. Feeling rather like a sly, cunning snake with gleaming eyes and a feral grin, a slithering creature consumed by its own wiliness, you prepare to wreak havoc on the graveyard desecrator’s life.\n\n\t\t\t\tJust as you suspected, it’s only a matter of hours before the apartment is flooded with other rude, obnoxious, foul-smelling young men. They wear tee shirts advertising explicit bands and smothered in curse words. Such a cultured bunch, you think wryly, and set your plan into play.\n\n\t\t\t\tAt first, it’s simple. You shake a few things. You make the lights flicker. They look uncomfortable, but, as youth often will, they brush it off. You set your jaw, straighten your back, and launch into Phase Two. This time you forcefully knock over a row of open beer cans, one by one, watching their frothy contents spill like golden blood across the carpet. The troublemakers stare. Encouraged by their shock, you keep it up: you shake the glass of the windowpanes, turn the TV to screeching static, blast the radio, make all of their phones vibrate and shutter as if suffering a technological seizure.\n\n\t\t\t\tAfter that, you give it a rest. They go about their business mostly normally, if a little less boisterously. The next night, when the same group is yet again gathered in the apartment, you do it again. And again, and again, until the others don’t come over anymore and the graveyard desecrator himself is hardly sleeping. You know what that means.\n\n\t\t\t\tIt’s time for Phase 3.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene desecratorterrorize\n\t\t\t#For now, I just follow him outside.\n\t\t\t\t*goto_scene desecratorcar\n\t#I head to the targeted graveyard to do a little investigating.\n\t\tYou look in the file and find information about the graveyard, and just as soon as you make up your mind to head out, you’re standing there. Funny how the afterlife works.\n\n\t\tYou heave a sigh and get down to business.\n\n\t\tThe graveyard sprawls out around you, hugging the soft green landscape, rolling with the gentle hills. Gnarled and knobby trees climb toward the sky like the hands of desperate corpses, the branches swaying with a kind of melancholy taciturnity. All in all, it would be a nice little cemetery—but then, there are the headstones.\n\n\t\tEverywhere you look, grave-markers are slumped on their sides like a hurricane barreled through the cemetery. Names are cut clean in half. Once-proud stones now kneel on the grass, bent and broken and shamed. Rubble lies scattered in with the grass. The unspeakable wrongness of it makes your stomach churn.\n\n\t\tYou look around for someone to ask about this horror. The owners of the ruined headstones are present, but hardly. They drift around like baby’s-breath on the wind, looking lost, their eyes shattered and their faces full of shadow. You notice three individuals who seem like they could handle a conversation: a young woman standing before a ruined grave, an old man leaning against one of the gnarled trees, and a little boy sitting cross-legged in the grass.\n\n\t\tWhom do you approach?\n\t\t*choice\n\t\t\t#I go to the old man.\n\t\t\t\tYou shuffle through the grass toward the old man. He’s a bent and wrinkled old fellow, his skin sallow and his eyes distant, but his face looks prone to smiling and his clothes bear the sun-faded evidence of many days spent in nature. When he sees you coming, he straightens up and touches his hat in greeting. You nod in reply. Strange that the dead abandon hand-shakes, but then, what good is it to shake a hand without skin, bone, or blood?\n\n\t\t\t\t“Hello, stranger,” says the man, in a voice like a gravel road. “You’re from another graveyard, eh?”\n\n\t\t\t\t“You could say that,” you mutter. “I was just wondering…what happened here?”\n\t\t\n\t\t\t\tThe old man snorts. A shadow of disgust crosses his face. “Ah, one of the local boys got it into his fool head that it’d be funny to ruin the graveyard,” he says. “Hundreds of headstones destroyed, some of ’em dating back to the pioneer days. Shame, isn’t it?”\n\n\t\t\t\t“More like a senseless act of stupidity,” you say, disgusted.\n\n\t\t\t\tThe old man smiles. \n\n\t\t\t\t“The kid drove away real fast, too, the reckless fool. Classic troublemaker. Bet it was a dare.”\n\n\t\t\t\tSo, the boy likes his wheels, huh? Perhaps you can use this to your advantage.\n\n\t\t\t\tYou thank the old man, bid him good luck, and set off on your mission.\n\t\t\t\t*page_break\n\t\t\t\tIt is not long before you locate your target. You slink into his apartment after him. He’s a tall, awkward thing, with a mop of filthy blonde hair and off-blue eyes like a muddy lake. Instantly you know you don’t like him. You’ve always tried not to judge a book by its cover—but, then again, you read this book, and all that was inside it was disrespect and immaturity.\n\n\t\t\t\tHe deserves what is coming to him.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene desecratorcar\n\t\t\t#I go to the little boy.\n\t\t\t\t*achieve thanks\n\t\t\t\tYou walk through the grass toward the little boy. He’s sitting there, just as innocent as could be, a shock of brown hair curtaining his brown eyes and a toy racecar sitting useless between his vaporous hands. He looks up when you approach, a distant sadness in his eyes, and you realize you are witnessing the pain of a life lost in its prime. You suddenly feel very lucky to have lived as long as you did.\n\n\t\t\t\t“Hello,” you say to him, kindly, and he perks up at the tone of your voice. “What have you got there?”\n\n\t\t\t\t“A racecar,” he says, and holds it up to you proudly. “My little brother put it here. When they buried me. It’s cool, huh?”\n\n\t\t\t\tYou nod.\n\n\t\t\t\t“Wish I could race it,” he says, and sighs. “I can’t make it go anymore. It just sits. Just sits and rusts.”\n\n\t\t\t\t“I wish you could race it too,” you say.\n\n\t\t\t\tHe looks up at you, piercing you with a brown gaze beyond his ended years.\n\n\t\t\t\t“You’re here about that big boy who came here, huh?”\n\n\t\t\t\tYou smile. “Yes, I am.”\n\n\t\t\t\t“Then you should know I heard him say something about a Ouija board.” You stand in silence, staring, and the boy doesn’t seem to notice. He just chatters on. “My big sister and her friends played with one of those. I don’t like them, y’know. They’re…weird.”\n\n\t\t\t\tYou hesitate, considering this new piece of the puzzle. So, the graveyard desecrator kid was messing around with a Ouija board, hmm? That’s promising.\n\n\t\t\t\t“Well,” you say, and put a hand on the little brown head, smiling gently, “I’ll bet he doesn’t like them, either. Or, at least, he won’t when I’m through with him.”\n\n\t\t\t\tAnd you mean it.\n\n\t\t\t\tAs you walk away from the boy, having taught him how to make the racecar move just a little without having to be alive to move it, you consider your options. You are definitely going to explore this Ouija board avenue. All you have to do is get the troublemaker and his friends to revisit the Ouija board, which they have clearly used before.\n\n\t\t\t\tBut…what’s the rest of the plan?\n\t\t\t\t*choice\n\t\t\t\t\t#Start out light.\n\t\t\t\t\t\tExcellent choice.\n\n\t\t\t\t\t\tIt is not long before you locate your target. You slink into his apartment after him. He’s a tall, awkward thing, with a mop of filthy blonde hair and off-blue eyes like a muddy lake. Instantly you know you don’t like him. You’ve always tried not to judge a book by its cover—but, then again, you read this book, and all that was inside it was disrespect and immaturity.\n\n\t\t\t\t\t\tHe deserves what is coming to him.\n\n\t\t\t\t\t\tOnce you find him, it doesn’t take long for your plan to fall into place. He has friends over nearly every night—the same group of awkward troublemakers who laugh too loud and drink too much—and you work them over, convincing them with the subtle arts of the dead that the Ouija board is calling to them. You pull the box out of the closet and leave it on their favorite chairs, targeting a different boy every night. You play with their minds. It’s not too long before they’re prying the ancient lid from the box and exposing the Ouija board.\n\n\t\t\t\t\t\tTheir first question—the poor, unimaginative fools—is a classic. “Are you there?”\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I spell \"Yes.\"\n\t\t\t\t\t\t\t\tThey look at one another. \n\n\t\t\t\t\t\t\t\t“Did someone move it?” asks the graveyard desecrator.\n\n\t\t\t\t\t\t\t\tThe answer comes unanimously. “No.”\n\n\t\t\t\t\t\t\t\t“This is lame,” says one of them. Someone hits his arm, he spits curses, and they turn back to the game.\n\n\t\t\t\t\t\t\t\tThe next question comes immediately. “Is there someone trying to contact us?”\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Okay, that’s it. I’m done.\n\t\t\t\t\t\t\t\t\t\t*goto newplan\n\t\t\t\t\t\t\t\t\t#I spell “Yes” again.\n\t\t\t\t\t\t\t\t\t\t*label yeah\n\t\t\t\t\t\t\t\t\t\tThis really gets the young men going. They glance at one another, a little nervous now, and continue to demand that someone confess to moving the game-piece. Again, no one comes forward—and of course they don’t, you think slyly, because none of them are doing it—and so you are forced to sit through another argument over who did what. It’s fairly exhausting, and full of petty violence. You’re getting sick of these boys.\n\n\t\t\t\t\t\t\t\t\t\tYou have to recapture their attention. What do you spell?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#I’ll make them think I’m from the ruined cemetery. “I know you.”\n\t\t\t\t\t\t\t\t\t\t\t\tThey look at one another, all pretense of violence and crude joking gone from their eyes.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Seriously,” says the graveyard desecrator. “Who’s doing this?”\n\n\t\t\t\t\t\t\t\t\t\t\t\tNo one says anything.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“We just wrecked a cemetery. You don’t think—”\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Actually,” corrects another boy, “YOU just wrecked a cemetery.”\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Oh, come on, you guys,” says a third. “Quit your complaining. We’ll just ask who it is.” He takes on a mocking, motherly voice. “Will that make you guys feel better?”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAfter a few choice curses, the next question comes. “Who are you?”\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I spell one word: “Revenge.”\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThat does it.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThey (predictably) freak out. Accusations are thrown across the table in every direction, but somehow, it’s not about who’s moving the game piece anymore—now it’s about the graveyard, and the wreckage, and the blame. Eventually they decide to just get rid of the board, though, you think slyly, it’s not as if that could really help anyway. They don’t seem to care. They take the whole box outside and dump it in the dumpster.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tWhen the graveyard desecrator wakes up in the morning, you have placed the Ouija board at the end of his bed.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThat’s it. Before you know it, he’s whipped out his cell phone and is calling the cops to confess. Anything to appease your obviously-evil spirit.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tNice job. On to the next case!\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene businessmanopening\n\t\t\t\t\t\t\t\t\t\t\t\t\t#“Your worst nightmare.” (Classic!)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe boys look at one another.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Okay, that’s it,” says the graveyard desecrator—but he sounds irritated, not afraid. “I’m done. One of you idiots is moving it.”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnd so, the board is packed up and put away, the video games are turned on, and somebody orders pizza. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tOuch.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou need a new plan.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene desecratorcar\n\t\t\t\t\t\t\t\t\t\t\t#I go straight for it. “You will pay!”\n\t\t\t\t\t\t\t\t\t\t\t\tThey look at one another, all pretense of violence and crude joking gone from their eyes.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Seriously,” says the graveyard desecrator. “Who’s doing this?”\n\n\t\t\t\t\t\t\t\t\t\t\t\tNo one says anything.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“We just wrecked a cemetery. You don’t think—”\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Actually,” corrects another boy, “YOU just wrecked a cemetery. And this is stupid. There’s…there’s nothing to this game anyway.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd so, they share a white-faced look, and they put away the board.\n\n\t\t\t\t\t\t\t\t\t\t\t\tWell, so much for that. You were so close, too. Looks like your technique was flawed.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou need a new plan.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene desecratorcar\n\t\t\t\t\t\t\t#Ugh. I don’t think I can take this. Forget the Ouija board, I need a new plan.\n\t\t\t\t\t\t\t\t*label newplan\n\t\t\t\t\t\t\t\tYou quickly give up on the Ouija board and have to watch as the fools begin answering each other’s questions. They accuse each other of moving the game-piece, get into multiple small fights, and then give up and begin playing video games. All the while, you’re sitting, and thinking, and waiting. \n\n\t\t\t\t\t\t\t\tTime goes on.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene desecratorcar\n\t\t\t\t\t#Be mysterious.\n\t\t\t\t\t\tExcellent choice.\n\n\t\t\t\t\t\tIt is not long before you locate your target. You slink into his apartment after him. He’s a tall, awkward thing, with a mop of filthy blonde hair and off-blue eyes like a muddy lake. Instantly you know you don’t like him. You’ve always tried not to judge a book by its cover—but, then again, you read this book, and all that was inside it was disrespect and immaturity.\n\n\t\t\t\t\t\tHe deserves what is coming to him.\n\n\t\t\t\t\t\tOnce you find him, it doesn’t take long for your plan to fall into place. He has friends over nearly every night—the same group of awkward troublemakers who laugh too loud and drink too much—and you work them over, convincing them with the subtle arts of the dead that the Ouija board is calling to them. You pull the box out of the closet and leave it on their favorite chairs, targeting a different boy every night. You play with their minds. It’s not too long before they’re prying the ancient lid from the box and exposing the Ouija board.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tTheir first question is “Are you there?”\n\n\t\t\t\t\t\tTo this, you give no answer. You watch carefully, realizing that your plan relies heavily on keeping the attention of these troublemakers so that you can properly terrify them. You hope you’ve made the premise creepy enough to keep them around for awhile longer. Luckily, they don’t leave. Perhaps your convincing made them genuinely interested in a spiritual presence. Your plan survives—for now.\n\n\t\t\t\t\t\tThey look at one another. \n\n\t\t\t\t\t\t“This is lame,” says one of them. Someone hits his arm, he spits curses, and they turn back to the game.\n\n\t\t\t\t\t\tThe next question comes immediately. “Is there someone trying to contact us?”\n\n\t\t\t\t\t\tWhat now?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I spell “Yes.”\n\t\t\t\t\t\t\t\t*gosub yeah\n\t\t\t\t\t\t\t#I shake the board.\n\t\t\t\t\t\t\t\tYou give the board a fierce shake, an
