n a place in the forest that you thought wasn't frequented by anyone but nosy birds. Unfortunately, you were wrong. One of you accidentally clipped a passing hiker, and she has been sent to the hospital.\n\t\tIt was your shot that did the damage.\n\t\t\"I...I think I did that,\" says Carl softly, and you turn to him. He gives you a blank-eyed look, a statue with horrified features. \"I think I shot her.\"\n\t\n\t\tHere we go again.\n\t\n\t\tYou briefly consider what would happen if you were to take responsibility for this action. Your false memories inform you that you have a family at home who relies completely on your income, a pair of bright-eyed kids who rely on you to tuck them in at night. Your punishment will be theirs, too.\n\t\n\t\tBut Carl doesn't have a family. He's single--and, as you look at him standing there, slack-faced and hollow, you feel that a better way to describe him would be \"he is alone.\"\n\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Let Carl take the fall.  I have to take care of my family first.\n\t\t\t\tThe world shifts around you again, and just as you were starting to come to terms with this scenario, a new one arises. You open your eyes to find yourself sitting in the sand on some almost-luxurious shore. You might be on vacation, except that you're surrounded by a group of shabby-looking people with terrified expressions and gruesome injuries.\n\t\t\t\n\t\t\t\tYou search your false memories. You were involved in a plane crash--you start at the familiarity of it all--and were only able to grab a very small amount of medicine before the plane went down. A group of survivors ended up on this island, and although you and two others have life-threatening injuries, only two of you can receive medical help due to the shortage of supplies. The group has elected you to make the tough decision--and your memories assure you that this is due to your ability to lead, although you aren't quite sure whether this is an actual skill or just another false memory planted for the sake of the test.  \n\t\t\t\n\t\t\t\tGrudgingly, you begin to evaluate the dilemma. The man you're sitting next to, who is covered in blood, has varied skills that will be invaluable in keeping the whole group alive for as long as you must stay here. Other survivors flock around him, trying to help as best they can. Their eyes are hollow.\n\t\t\t\n\t\t\t\tThe woman lying stretched out on the beach is the CEO of some goliath of a company. In fact, she's still wearing a tee-shirt with the company's logo on it--as if anything like that matters now. What does matter is that, while completely lacking in useful skills, the woman has offered to pay an extremely considerable amount of money to both you and the family of the other injured man, if she receives the medicine. \n\t\t\t\t\n\t\t\t\tAs your false memories so strongly assure you, you are capable of leading this scraggly little group of survivors. If you get the medicine, you'll survive to make sure that as many people as possible make it through this.\n\t\n\t\t\t\tSo? Whom do you choose to save?\n\t\t\t\t*choice\n\t\t\t\t\t#I save myself and the man. Money isn't going to mean anything if we don't make it off this rock alive.\n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"You have a keen sense of doing what needs to be done for the good of the majority,\" he says. \"Your eternity will be: a leader in the Guardian Angel Department, choosing which departed souls will protect which beating hearts.\"\n\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked away to your new fate. Over time, you become aware of just how important you have become, how much power you have, and you realize that you are fully content. People respect you. They need you. You are changing lives, one decision at a time.\n\t\t\t\t\t\n\t\t\t\t\t\t*achieve influence\n\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t#I save myself and the woman. I'm relatively confident in my ability to get us out alive, and that money is looking pretty friendly anyway.\n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"You have shown strong determination to do what you believe to be right, rather than what is logical,\" he says. \"Your eternity will be: reincarnation as one destined to be a judge among the living. But be warned--fate is not set in stone, and if you stray from your path, your gifts will be wasted.\"\n\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked off to your new life--and all that has happened to you, both in life and in death, becomes little more than a forgotten dream.\n\n\t\t\t\t\t\t*achieve integrity\n\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t#I tell the woman to send my portion of the cash to my loved ones, and split the medicine between her and the man.\n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"I...I've never seen anything like it,\" he says. His eyes are wide, his expression awed, as if you are some kind of miracle standing before him. \"Your cleverness, problem-solving, selflessness, and strong inclination to protect your own...it's the perfect recipe for a Shepherd. You will advise and protect the souls of children who come to us, for children cannot fairly undergo the judgment process.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked away to your eternity. You become something between a Guardian Angel and a kindergarten teacher, and no matter how you felt about children in life, you suddenly find yourself enjoying being the Shepherd to these lost little sheep. It is a fulfilling job, if a bittersweet one, and you spend your eternity as one of the most celebrated Shepherds of all time. \n\n\t\t\t\t\t\t*achieve reverence\n\t\t\t\t\t\t*goto_scene end\n\t\t\t#Take responsibility for my actions. No matter what happens, I have to be honest.\n\t\t\t\t\tThe world shifts around you again, and just as you were starting to come to terms with this scenario, a new one arises. You open your eyes to find yourself standing in a fire station. Alarms shriek on all sides, and blank-faced people race past you, shouting at one another and preparing for the fiery battle ahead. But, despite the buzzing action and the shouts and the sense of purpose driving every set of feet, you can sense that there is tragedy at hand.\n\t\t\t\t\n\t\t\t\t\tYou search your false memories. You're now a firefighter in an old country town, one of those places that's more like a scattering of children's toys than an actual town. There are miles between the closest neighbors. Unfortunately for you, it happens to be the 4th of July--your false memories give you a shudder of discomfort, and you assume that the 4th of July is a particularly bad time for your little troop of firefighters--and you currently have two calls about raging fires caused by the patriotic festivities.\n\t\t\t\t\t\n\t\t\t\t\tBut the problem is that you're already spread too thin. The fires are on opposite sides of the awkward town, and you only have enough manpower left to handle one.\n\t\t\t\t\t\n\t\t\t\t\tYou can stop the first fire, which is currently devouring a hospital. For a moment, you allow yourself to foolishly hope that the place has been cleared out--but no. Hundreds of lives are in danger.\n\t\t\t\t\n\t\t\t\t\tOr, you can stop the second fire, which is burning in the town's only hospice center. A twinge of discomfort stings your insides. You look to your false memories to explain, and they lend you a new, agonizing piece of the puzzle: your grandparents are in that particular hospice center. Abandoning it would mean abandoning your grandparents to the flame. \n\t\t\t\t\n\t\t\t\t\tYour troop looks at you nervously. They've finished prepping and are now awaiting your decision, standing before you like a little flock of sheep looking up to their shepherd. \n\t\n\t\t\t\t\tSo, good shepherd? What is your choice?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Save the hospital.\n\t\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You have shown great care for others as well as an appreciation for true morality,\" he says. \"Your eternity will be: infinite happiness, tailored to your likes. Whatever you wish, you shall have.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tAnd just like that, you are whisked away to your eternity--and all that has happened to you, both in life and death, becomes little more than a distant dream, lost in your never-ending joy. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*achieve paradise\n\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t#Save the hospice center.\n\t\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You are deeply concerned with doing what is right, though you will find that morality is rarely black and white,\" he says. \"Your eternity, therefore, will be reincarnation as a military leader during a time of great unrest, so that you may continue to explore the depths of true moral questions.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tAnd just like that, you're whisked off to your new life--and all that has happened to you, both in life and in death, becomes little more than a forgotten dream.\n\n\t\t\t\t\t\t\t*achieve ranking\n\t\t\t\t\t\t\t*goto_scene end\n\t#Tell the truth, wait for the man to be released, and then take care of this slimy criminal myself. \n\t\t*achieve smart\n\t\tThe decision lands firmly in your mind. You are just musing over what weapon would inflict the most pain when, quite suddenly, the diner fades away. You are standing in The Void again, surrounded by a lot of white nothingness, and the Clipboard is staring at you with eyes wide and jaw dropping.\n\t\n\t\t\"Kill him yourself?\" he stammers. \n\n\t\t\"I was going to, yes,\" you say, thoughtfully, reflecting on your decision with distant fondness. \n\t\n\t\tHe drops his pen in shock. \"That--but no one--nobody has ever done that before. It's...it's unprecedented!\"\n\t\n\t\tYou shrug.\n\t\t\n\t\t\"This calls for immediate action,\" says the Clipboard, and he scrambles to grab his pen. \"Come with me.\"\n\t\n\t\tAnd so, following the man who moves like a mouse, you are led to your fate.\n\t\t*page_break\n\t\tAs it turns out, the Higher Management here approves of your interesting view on justice. He makes you one of the prized individuals in charge of proctoring the judgment tests. You are particularly skilled at handling the hard cases with a firm hand and a crafty mind, and you quickly become a favorite among the Void's employees. You have an amazing amount of power, a flock of assistants who cater to your every whim, and a strange version of an afterlife-paycheck that you can use to get literally whatever you want. But flat-screen TV's or luxurious mansions or handsome sports-cars aside, it is that sense of do-it-yourself justice that makes your eternity meaningful. \n\t\t\n\t\tNice job.\n\t\t*achieve oooooohsnap\n\t\t*goto_scene end\n\t#Let him rot in prison--he may not be getting punished for the right murder, but at least he's getting the punishment he deserves. \n\t\tYou blink a few times and shake your head. The landscape has shifted around you, and now you're in a cramped little room with moody lighting and no doors or windows. Glancing around, you find that there are others here with you, and you're each sitting in a shaky wooden chair. \n\t\n\t\tNo--you're each TIED to a shaky wooden chair.\n\t\n\t\tYou frantically search your false memories for some sort of explanation. Apparently, you were kidnapped, and woke up in this room with a group of complete strangers who had met the same unfortunate fate. Now, a man built like a warship is pacing in front of you, gun in hand. Suddenly he whips around and points his gun directly at your forehead, a weasel-like smile creeping across his face, and he says in an oily voice, \"You will kill one of these people.\"\n\n\t\t\"No,\" you say, before you have time to think.\n\t\n\t\tHe pauses. \"Let me make myself clear,\" he says, and leans in closer. You can smell the whiskey on his breath. \"You will kill one of these people, or I'll kill you and one of those little brats.\"\n\t\n\t\tHe waves his free hand toward a little group of chairs, these ones smaller and made of plastic instead of wood. The psychopath has not just taken adults--he has targeted children as well.\n\t\n\t\tYou must make your choice. \n\t\t*choice\n\t\t\t#I don't do it. I won't be the one who pulls the trigger; I am not a murderer.\n\t\t\t\tThe world shifts around you again, and just as you were starting to come to terms with this scenario, a new one arises. You open your eyes and find yourself surrounded by white, and for a moment, you think you're back in The Void. But then you notice a mechanical beeping--a steady, icy sound--and you realize that this isn't the void.\n\t\t\t\n\t\t\t\tThis is a hospital, and you are a doctor listening to your patient's heartbeat in the cold beeps of an EKG. \n\t\t\t\n\t\t\t\tYou look down at the patient. He's pale, thin, the kind that probably used to be handsome not so long ago. There's a teary-eyed young woman clinging to his hand, whispering to him. You try not to listen. Instead, you search your false memories for some explanation.\n\t\t\t\t\n\t\t\t\tThe patient is in a coma, and his quality of life--or so your false memories assure you--is zero. The doctor instinct that you don't quite remember ever having before is telling you that life support needs to be ended. But the girl, that desperate little creature haunting the bedside, has begged you over and over again to lie and say that there is hope for his case so that no one will pull the plug. She knows the other doctors will listen to you, she says. You are prompted to look down, and find that she has even prodded a considerable check onto your clipboard.\n\t\n\t\t\t\tSo, what is your decision, doctor?\n\t\t\t\t*choice\n\t\t\t\t\t#End the life support. I think it's the right thing to do.\n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"You have shown a belief that situational justice is above law,\" he says. \"Your eternity will be: judge of the delinquent souls that do poorly in the tests of life.\"\n\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked away to your eternity. You find that you like the power, and although you don't exactly love working with the souls whose lives went roughly, you certainly make things better for all those whose paths you cross.\n\t\t\t\t\n\t\t\t\t\t\t*achieve powerr\n\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t#I take the money and leave the life support. She's convinced me.\n\t\t\t\t\t\n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"You show the ability to stick to what you believe, despite impossible odds,\" he says. \"Your eternity will be: reincarnation as a powerful, affluent individual, to see if your morals still stand when monetary corruption is a lifelong factor, rather than the temporary one you faced here.\"\n\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked off to your new life--and all that has happened to you, both in life and in death, becomes little more than a forgotten dream.\n\t\t\t\t\t\t*achieve riches\n\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t#I don't take the money, but I leave the life support. I happen to believe that this is the right thing to do.\n\t\t\t\t\t\n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"You have shown an ability to deny temptation, threat, and legal danger in order to administer true justice,\" he says. \"Your eternity will be: reincarnation as a mere villager in a war-torn country, to see if your dedication to your beliefs can withstand oppression and danger.\"\n\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked off to your new life--and all that has happened to you, both in life and in death, becomes little more than a forgotten dream.\n\n\t\t\t\t\t\n\t\t\t\t\t\t*achieve challenges\n\t\t\t\t\t\t*goto_scene end\t\n\t\t\t#I agree to do it. Whether by doing it myself or letting it happen because of my decision, I am becoming a killer today, and at least this way I can protect innocent kids.\n\t\t\t\tThe world shifts around you again, and just as you were starting to come to terms with this scenario, a new one arises. You open your eyes and find yourself thrust into an unmistakable nightmare.\n\t\t\t\n\t\t\t\tIt's dark as death--and, you think bitterly, you should know. You're tossing and stumbling on the deck of a ship, surrounded by a group of other people who cling to the rail and shriek and sob. At first, you aren't quite sure what the problem is. Your false memories aren't telling you that the ship is sinking, though that's just about all they're telling you.\n\t\t\t\n\t\t\t\tSo you peek over the rail, and even in the darkness, you realize that it's not only the deep blue sea that you're looking at. There are shapes bobbing in the water--no, not shapes. People.\n\t\t\t\n\t\t\t\tYou prod your false memories and find very sparse details. Your ship encountered rough waters, and a few people went overboard. You won't be able to save them both in time.\n\t\t\t\n\t\t\t\tOne of them, your false memories offer, is someone you love very much--but you can't quite figure out who it is. You try to remember the face and see only vague features; you try to remember the voice, and hear a stark silence. All you know is that you have an almost-undeniable urge to dive into the bitter water and save this person yourself. \n\t\t\t\n\t\t\t\tAs for the other unlucky individual, it appears to be a young woman who is struggling and fighting just to keep herself afloat, and as you look closer, you realize why. She's clutching a newborn baby. The frothing waves lap up at the child's face like unpleasant, stroking fingers, and its mother is sobbing and begging for help--you know that you must do something.\n\n\t\t\t\tWhom do you save?\n\t\t\t\t*choice\n\t\t\t\t\t#I save my loved one. \n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"You have proven your ability to make difficult choices, despite the moral dilemmas, and put your sense of justice over 'black and white' morality,\" he says. \"Your eternity will be: Communicator, in charge of imparting select afterlife knowledge to the living through dreams, seances, and signs.\"\n\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked away to your eternity. Although you find the job to be stressful, and at times exhausting--because the living are determined not to interpret your sings the way you meant--you also discover that what you're doing is helping both the living and the dead. Who knows, perhaps you're on your way to breaching the gap between the worlds.\n\t\t\t\t\n\t\t\t\t\t\t*achieve communication\n\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t#I save the woman and her baby.\n\t\t\t\t\t\tThe decision lands firmly in your mind--and as soon as you have become fully aware of all the lives you will alter simply with this one choice, it's over. The world fades around you, spinning and dizzy, like a carnival ride you didn't want to go on in the first place. You open your eyes and find yourself looking at the Clipboard.\n\t\t\t\t\t\n\t\t\t\t\t\t\"You have shown a mature range of moral depth, with both self-sacrifice and a pointed disregard for what 'justice' says is correct,\" he says. \"As a result, your eternity will put you in a position to administer both justice and judgment, though you must learn which is which--you will be a guide to the souls stuck in the Haze between life and death.\"\n\t\t\t\t\t\n\t\t\t\t\t\tAnd just like that, you're whisked away to your eternity. You become something like the afterlife equivalent of a counselor, guiding those individuals who have somehow found themselves between living and dying. You manage to get most of your cases where they need to be, whether that's back to their lives or moving on to judgment in The Void or simply on to eternities of their own. Still, you don't always succeed. Sometimes the lost just have to stay lost, and that's all there is to it. \n\n\t\t\t\t\t\t*achieve finally\n\t\t\t\t\t\t*goto_scene end"}};
