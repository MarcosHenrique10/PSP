t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tLed by the old woman, the exorcists begin a deep, steady chant that rises and falls like the breath of the sea. Their voices twine together, a perfect combination of high and low. Their words twist in the air like lengths of red ribbon. You are caught up in the breathlessness of it all, your mouth open, your eyes wide—\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnd then, it’s over.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe last word of the chant is spoken, and suddenly you feel as though someone has hit you hard in the center of your chest. You stumble backward, and then lose your balance and fall, fall, fall much too far, what happened to the ground…? You look around you and see only darkness. There is a rush of cold air around you, like you’re sinking in an icy sea, and then you hit the bottom, and there’s nothing.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tNothing at all.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t\t\t\t\t\t\t#No, there’s got to be something better than that.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tWell, okay, but it doesn’t seem that YOU have any better ideas.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou spend a long while just standing where you are, hardly daring to breathe with your dead lungs for fear of setting off some alarm or other. You have to come up with something. You have to come up with something. Try as you might, your brain is empty, and the hollowness echoes your plea back to you. You have to come up with something….\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou sigh and take a tiny step backward, trying to get a better view of the house and the alarms. The back of your heel brushes against something, and before you can catch your balance, you’ve tripped backward over a box of their equipment, and you fall gracelessly into the next room. Immediately, alarms in both rooms blare.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnd that’s when you get the idea.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou pull yourself up, take a deep breath, and begin racing through the house. You spill through room after room, hearing alarms pierce the air behind you like a thousand wars rage in your wake, and you just keep running. Kitchen, living room, dining room, game room. You don’t stop. You don’t turn around. You just spill around corners and barrel down hallways, taking stairs two at a time, bursting through doors.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tIn only a few moments, the whole house is alight with the shriek of alarms. You stand for a second, breathless, before the front door, and see the two young exorcists come inside with looks of shock and confusion on their faces. However, as she follows them inside, the old woman does not look shocked or confused—rather, she looks overjoyed.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“I’ve never been so thrilled!” she shrieks over the clatter of the alarms. “That spirit’s done it! A spirit has defeated our equipment!”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou grin and dodge around them, racing out the door and into the brisk air. You hear a shout from behind you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Brilliant! Absolutely brilliant!”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt appears you have a fan.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tSo, you’ve won your freedom. What now?\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I’ll go back to the Agency.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene contractend\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I’m not going back there. I’d rather try to make it on my own.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour feet hit the pavement and you don’t stop running. You keep going, faster, faster, like your life depends on the movement of your shoes—although that’s ridiculous, considering your life depends on nothing at all. Although, your afterlife is still an empty slate. You just have to fill in the blanks.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou wander for awhile, free and carefree, going where you please and answering to no one. You travel the world. All the things you wanted to see with your living eyes, your dead eyes get to see; all of the experiences you wanted to have with your living soul, your dead one gets to have anyway. You are truly happy.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tFor awhile, anyway.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt’s not too long before you run into a couple of guards from the Agency. You’re in a huge herd of tourists, pretending to be on vacation—although your very existence is a vacation—when you spot them. They’re impossible to miss. Huge, hulking brutes, with dark eyes and balled fists. They wear the mark of the Agency on their shirt pockets. And, undeniably, they’re looking for you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOh no.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou shrink back into the herd of tourists, trying to remain as unnoticed by the guards as you are by the living. You manage to make it into a narrow stone alley, tucked away out of view, and you hope you’ve made your escape. You turn and begin walking down the alley. Your shoes pound a rhythm like a heartbeat on the cobblestone.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnd then, there’s a guard in front of you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Hello, Absent-Without-Leave,” he snarls, and his mouth twists up into an awful smile.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stare at him for a moment, and then turn and start back down the alley—but you skid to a stop, your shoes shrieking on the stone. There’s a guard that way too. You’re trapped.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“No way out this time, lowlife,” says the first guard.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“You’re coming with us,” says the other.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Oh?” An unfamiliar voice joins the chorus. “I beg to differ.”\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*achieve friend\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAll three of you spin around to see a trio of living beings standing in the alleyway, decked out with metal equipment and leather holsters and shiny black shoes. There’s a young man and a young woman, looking more sure of themselves than you remember, and at the front there is a very familiar old woman.\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe Founder of the exorcists hasn’t changed a bit.\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe whips out a metal gun-like device and pulls the trigger once. Her two young allies do the same. There are three blasts, two shrieks like boots on gravel, and a cold blast of air, and then the alleyway is empty of the dead—except for you, of course. The old woman smiles and holsters her gun.\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Fools,” she mutters. “They let us see them. Trying to blend in with the living to hide from the dead. They forgot, though, that the living can be dangerous too!” She bears yellowing teeth in a broad grin.\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou can’t help but smile back, although she can’t see you.\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Well, good luck, spirit,” she says, her eyes roving the alleyway. “Good luck.”\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou wonder if they know it is you. You will never know; for the next second, the Founder and her allies have disappeared around the corner, and when you follow them, they are nowhere to be seen.\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tFunny how Fate works, isn’t it?\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou go on with your existence, free and, for the first time in your afterlife, truly safe. No Agency members come after you again. You are living now more than you ever did in life.\n\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*achieve safeish\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t#Forget it. I’ll just attack them all.\n\t\t\t\t\t\t\t\t\t\tWithout another thought, you launch yourself at the three exorcists. They can’t see you, but they know you’re coming: your presence is preceded by a blast of cold, clammy air, and skin prickles on the backs of their necks, and their breath comes a little harder. The old woman narrows her eyes.\n\n\t\t\t\t\t\t\t\t\t\tA mere second later, you make impact. It’s the young man you’ve hit. He stumbles back into his young partner and she yelps, and they both stumble and trip, trying to regain their balance. You don’t let them. You attack instantly, lashing out with fists and fingernails and feet. For a ghost, you sure can do some damage.\n\n\t\t\t\t\t\t\t\t\t\t“That’s enough!”\n\n\t\t\t\t\t\t\t\t\t\tQuite suddenly, something cold hits you in the back of the head—like someone threw a pebble. You turn around.\n\n\t\t\t\t\t\t\t\t\t\tThere, standing like a retired action hero, is the Founder, and she is holding a metal device that looks alarmingly like a gun.\n\n\t\t\t\t\t\t\t\t\t\tOh no.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t“We don’t take kindly to violent spirits,” says the Founder calmly. “I don’t know who you are or what you want, but you aren’t staying here.”\n\n\t\t\t\t\t\t\t\t\t\tOh no!\n\n\t\t\t\t\t\t\t\t\t\tBefore you can say anything or fix your dire mistake, she pulls the trigger. Another pebble-like projectile hits you, this time in the chest, and you feel your soul rattling within you like a loose screw shaking in a robot. She pulls the trigger again. Your soul quavers. She pulls it again and again and again—\n\n\t\t\t\t\t\t\t\t\t\tAnd suddenly, you feel as though someone has hit you hard in the center of your chest. Your soul rattles loosely within you, fading by the moment like a flower cut from its stem, losing vitality and power and…life. You’re dying. You’re dying the death of ghosts. You stumble backward, and then lose your balance and fall, fall, fall much too far, what happened to the ground…? You look around you and see only darkness. There is a rush of cold air around you, like you’re sinking in an icy sea, and then you hit the bottom, and there’s nothing.\n\n\t\t\t\t\t\t\t\t\t\tNothing at all.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t\t\t#I’ll try to communicate with them.\n\t\t\t\t\t\t\t\t\t\tYou manage to get their attention with a similar technique to the one you used earlier. You rely on the cameras to be your interpreters. It’s difficult, and you know the communication will be long, trying, and confusing—somewhat like hearing only one side of a phone call—but you have to try.\n\n\t\t\t\t\t\t\t\t\t\tYou begin by introducing yourself and telling a little bit of your story. The exorcists—mostly the young pair—are constantly interrupting with questions, useless things, like “What are the floors like in the Agency?” or “What happened to the other people you were supposed to be haunting?” and the result is chaos. You often lose your train of thought. And, after a few attempts, you realize that’s not the only thing you’ve lost.\n\n\t\t\t\t\t\t\t\t\t\tThe old woman, the Founder, has gradually drifted away from the camera where you are communicating, and has been examining the pictures hanging on the wall. You realize what that means. You’ve lost her interest. She likes high stakes, and your little talk is, apparently, low stakes. \n\n\t\t\t\t\t\t\t\t\t\tEventually, the young pair asks for her opinion, and the Founder waves her hand and says, “Just move the spirit to the Void and let’s get going.”\n\n\t\t\t\t\t\t\t\t\t\tYou swallow hard. \n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tLed by the old woman, the exorcists begin a deep, steady chant that rises and falls like the breath of the sea. Their voices twine together, a perfect combination of high and low. Their words twist in the air like lengths of red ribbon. You are caught up in the breathlessness of it all, your mouth open, your eyes wide—\n\n\t\t\t\t\t\t\t\t\t\tAnd then, it’s over.\n\n\t\t\t\t\t\t\t\t\t\tThe last word of the chant is spoken, and suddenly you feel as though someone has hit you hard in the center of your chest. You stumble backward, and then lose your balance and fall, fall, fall much too far, what happened to the ground…? You look around you and see only darkness. There is a rush of cold air around you, like you’re sinking in an icy sea, and then you hit the bottom, and there’s nothing.\n\n\t\t\t\t\t\t\t\t\t\tNothing at all.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t#I’ll convince them that they need to call in backup, so that I can target their “Founder.”\n\t\t\t\t\t\t\t\tIt’s relatively easy to make the pair of exorcists decide that they need backup. If you’ve learned one thing from watching them, it’s that they still seem unsure of themselves. They’re inclined to call in backup at any little occurrence if it wasn’t something covered in the textbook. Apparently, you’ve been a textbook case thus far.\n\n\t\t\t\t\t\t\t\tWell, that’s about to change.\n\n\t\t\t\t\t\t\t\tYou go through rooms and methodically set off the equipment, one alarm after another, a camera shaking here, a tripod falling there. It doesn’t take much to make the pair unsure, and before you’ve even finished warming up, they’re scurrying out the front door for backup.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tUnfortunately, things don’t go quite as planned.\n\n\t\t\t\t\t\t\t\tYour first shock comes when this “Founder” enters the house, and you realize that he is actually a SHE. She’s a wrinkled, bent old lady who looks like a weeping willow. Her presence is shocking. You think back, but you can’t remember the kids mentioning that their Founder was either a man or a woman. What led you to believe the former? You aren’t sure.\n\n\t\t\t\t\t\t\t\tYour next shock comes immediately after, and, unfortunately, it’s a bit more…violent.\n\n\t\t\t\t\t\t\t\t“The spirit,” says the old woman. Her voice is like summer breezes. “You said it was angry. Shaking things, ruining our equipment.”\n\n\t\t\t\t\t\t\t\tThe two young exorcists nod.\n\n\t\t\t\t\t\t\t\t“What does that mean?” she asks, like a kindergarten teacher.\n\n\t\t\t\t\t\t\t\tThey share a look. “It means we…we perform an exorcism to get rid of a violent spirit,” says the man, sounding uncertain.\n\n\t\t\t\t\t\t\t\tThe old woman nods and holds her hands out. “Go ahead.”\n\n\t\t\t\t\t\t\t\tUh oh.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tApparently, your creative form of communication was misunderstood. They think you’re violent and that you need to be exorcised. That’s not good.\n\n\t\t\t\t\t\t\t\tLed by the old woman, the exorcists begin a deep, steady chant that rises and falls like the breath of the sea. Their voices twine together, a perfect combination of high and low. Their words twist in the air like lengths of red ribbon. You are caught up in the breathlessness of it all, your mouth open, your eyes wide—\n\n\t\t\t\t\t\t\t\tAnd then, it’s over.\n\n\t\t\t\t\t\t\t\tThe last word of the chant is spoken, and suddenly you feel as though someone has hit you hard in the center of your chest. You stumble backward, and then lose your balance and fall, fall, fall much too far, what happened to the ground…? You look around you and see only darkness. There is a rush of cold air around you, like you’re sinking in an icy sea, and then you hit the bottom, and there’s nothing.\n\n\t\t\t\t\t\t\t\tNothing at all.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene void\n\t#I’m out of here!\n\t\t*label swaggysnake\n\t\tYou race away, spilling down the massive walk and tearing like a mad dog to the street. Once your feet hit the pavement you stop and take a few breaths, your dead lungs groaning.\n\n\t\tOkay, you’re running. But…where are you running to?\n\t\t*choice\n\t\t\t#I report back to the Agency, but I say nothing of this little exorcism business. As far as I’m concerned, this was a job well done.\n\t\t\t\t*goto_scene contractend\n\t\t\t#I go back to the Agency and tell the truth.\n\t\t\t\tYou find yourself standing in the middle of a very large, very dark cement room, with the man and his plastic desk in the middle and a ring of guards around you. You have no idea how exactly it is you got here—you remember walking the hallways, and knocking on a door, but not as if you did these things yourself, but rather like you watched it on a television show once, a very long time ago.\n\n\t\t\t\t“Now tell us, recruit,” hisses the weasel-like man from behind his plastic desk, “what exactly happened on your final job?”\n\n\t\t\t\t“Exorcists were called,” you say. And then, as an afterthought, you add, “Sir.”\n\n\t\t\t\tHe sneers at you.\n\n\t\t\t\t“This is ultimate failure.”\n\n\t\t\t\t“But I didn’t—”\n\n\t\t\t\tHe holds up a hand to silence you. His fingers are long and slender and pale, and you shiver involuntarily, thinking how suited that hand is to a knife.\n\n\t\t\t\t“That’s enough, lowlife,” he says. “You are expelled.”\n\n\t\t\t\t“What?”\n\t\t\t\t*page_break\n\t\t\t\tBefore you can say another word, two sets of thick hands take you by the arms, and you are escorted none-too-gently through the cement halls of the Agency to an old metal door that’s rusting at the hinges.\n\n\t\t\t\tOne of the guards kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t“Here you are, recruit,” snarls one of the guards, and he says the last word with such a leer that you tremble, and he gives you an unpleasant grin.\n\n\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the slam of the metal door above you.\n\n\t\t\t\tJust like that, you know nothing more.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void\n\t\t\t#I’m not going back to the Agency. I did my time.\n\t\t\t\tYou take a deep breath, nod to no one in particular, and stride off down the street, leaving your job and the businessman’s house and the Agency far behind.\n\n\t\t\t\tYou roam the world for awhile, with no exact direction but “away,” and it seems for a long time as if you’ve achieved that blissful freedom to which so many ghosts aspire. But, like everything in life—and, apparently, in death too—it is not to last.\u000b\n\n\t\t\t\tYou are spotted on a seaside boardwalk by two burly ghost guards, each wearing the symbol of the Agency on his shirt, and instantly you are captured and brought in. \n\t\t\t\t*page_break\n\t\t\t\tThere isn’t exactly a trial. In fact, there’s nothing at all. You are simply escorted none-too-gently through the cement halls of the Agency to an old metal door that’s rusting at the hinges.\n\n\t\t\t\tOne of the guards kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t“Here you are, Absent-Without-Leave,” snarls one of the guards, and he gives you an unpleasant grin.\n\n\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the slam of the metal door above you.\n\n\t\t\t\tJust like that, you know nothing more.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void", "businessmankids": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\nYou slink into the bedroom and find a haven of innocence within this gaudy house: it’s a cozy place, despite being much too large for the two twin beds pressed up against either wall. (You’d think that with such a huge house, Mr. Frank could let his kids have their own bedrooms—but, then again, you think coldly, perhaps that’s none of your business.) The walls are bright red and decorated cheerily with cartoon characters, and soft carpet makes its first and only appearance in the whole house, and toys are scattered around like you’re looking down on the world from space. \n\nAre you REALLY going to punish Mr. Frank by targeting his children?\n*choice\n\t#Well, now that you say it like that…maybe not.\n\t\t*achieve good\n\t\tA good choice.\n\n\t\tYou leave the little bedroom in peace and return to the hallway, sighing.\n\n\t\tWhat now?\n\t\t*choice\n\t\t\t#I’ll haunt Mr. Frank cleverly.\n\t\t\t\t*goto_scene businessmanclever\n\t\t\t#I’ll haunt Mr. Frank fiercely.\n\t\t\t\t*goto_scene businessmanfierce\n\t#You got a problem with me?\n\t\t*achieve sass\n\t\tNo, no, of course not.\n\n\t\tAnd so it is that you begin to terrorize the tots. You quickly find that the little boy, Timothy, Timothy with the huge watery eyes and the sandy hair, is the more nervous of the two, and he always goes running to his bright-eyed big sister for protection. Lily is only a bit older than him, but she likes to act big. You quickly show her that she is not so very big at all.\n\n\t\tYou begin by making their toys move without their aid. At first, this is almost gleeful—they shriek with laughter and try to figure out the trick, shoving one another in the arm and grinning. But then, they realize this is no game. You make the dolls speak words of fear, and you make them shriek; you make the cars shoot around the room crashing into things; you make the spaceships cut through the air and tangle in Lily’s hair.\n\n\t\tThey run from the room screaming.\n\n\t\tThe next night, you make the closet doors shake. After that, it’s the windowpanes, and then the creaking sounds from the hallway outside their door, and then the nightmares. Oh, the nightmares. You’re particularly proud of them—in fact, you start to view them as little, fierce, terrible works of art most menacing, and you would frame them if you could—and you work to make them specifically mention the scheming, no good-father. Suffice it to say that Daddy is no hero to these children, not in their dreams, anyway—and, to be honest, not in their waking hours, either.\n\n\t\tBut when they wake screaming, he knows the dreams are about him. They tell him every detail and his face goes white.\n\n\t\tWell, have they had enough? Is it time to switch tactics?\n\t\t*choice\n\t\t\t#What? No way. I keep terrorizing the kids.\n\t\t\t\tIf you insist.\n\n\t\t\t\tIt does not take long for your constant, cruel terror to have a strong effect on the children. They have difficulty sleeping, which aggravates you because that minimizes the power of your nightmares, and you do so love making the nightmares. Lily and Timothy begin to avoid their room during the day. They beg to sleep over at the houses of their friends, and they carry flashlights when they must walk in the dark, and they huddle close together.\n\n\t\t\t\tEventually, your torment shows itself in a rather unexpected way. After a particularly dark nightmare—you’re just congratulating yourself on a job well done—poor little Lily panics and races to her parents’ bedroom in tears. You follow, wanting to hear about your work. You love to hear them tell about the nightmares. But what you hear is not a tearful explanation of your latest masterpiece—instead it is a plea.\n\n\t\t\t\t“I want to move,” begs the little girl. “Please! Please, I don’t wanna stay here anymore, something’s not okay!”\n\n\t\t\t\tMr. and Mrs. Frank exchange a look.\n\n\t\t\t\tThe next morning, there’s a moving truck in the driveway. Or, more appropriately, a fleet of moving trucks.\n\n\t\t\t\tWell, are you proud of yourself?\n\t\t\t\t*choice\n\t\t\t\t\t#Okay, okay already! I’ll call it good.\n\t\t\t\t\t\tYou've done a good job, but as you're preparing to leave, you realize that the Agency likely won't accept this as success. You've seen how those people think. If you want to be finished with this once and for all, you're going to need to strike against this businessman pretty hard--and suddenly you're not sure if tormenting his kids will be enough.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou need a new plan.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Well, in that case, I think I'll play some mind-games with him.\n\t\t\t\t\t\t\t\t*goto_scene businessmanclever\n\t\t\t\t\t\t\t#Fine. But I'm not getting too fancy. I'll just terrify him.\n\t\t\t\t\t\t\t\t*goto_scene businessmanfierce\n\t\t\t\t\t#Of course I’m proud of myself. And, by the way, I’m following them to the new house.\n\t\t\t\t\t\tOh, is that so? And do you still plan to terrorize the children?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Of course I do.\n\t\t\t\t\t\t\t\tYou wait until the family has settled down, unpacked, and fully relaxed within their new—and if possible, even gaudier—home. As soon as the children have picked a bedroom, you’re haunting it again. To you, it’s like having a brand new playground of toys with which to exercise your evil. You have new closet doors to slam, new windows to rattle, and, as you discover one night to your immense glee, this new house has a ventilation system that will amplify your dead, ghostly voice like you have an army whispering with you. You have never been so proud of your ability to terrify.\n\n\t\t\t\t\t\t\t\tIt’s not long before you have the family in tatters. The children are instable and terrified, their mother walks around like a ghost herself, and dear old Mr. Frank is suffering dearly in both the mental price of dealing with a broken household, AND in the real price of the therapy that the whole family now requires. Soon, he’s suffering more than any of the others. The Karma Bus has arrived, and finally, he knows it.\n\n\t\t\t\t\t\t\t\tYou’ve done it.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene kidsstopped\n\t\t\t\t\t\t\t#Nah, I think I’ll punish Mr. Frank for awhile.\n\t\t\t\t\t\t\t\tYou wait until the family has settled down, unpacked, and fully relaxed within their new—and if possible, even gaudier—home.\n\n\t\t\t\t\t\t\t\tWhat’s the plan?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I'll haunt Mr. Frank fiercely.\n\t\t\t\t\t\t\t\t\t\t*goto_scene businessmanfierce\n\t\t\t\t\t\t\t\t\t#I'd prefer to do this with a bit more class.\n\t\t\t\t\t\t\t\t\t\t*goto_scene businessmanclever\n\t\t\t#This IS a bit brutal. I’ll go directly for Mr. Frank now.\n\t\t\t\tA good choice.\n\n\t\t\t\tYou leave the little bedroom in peace and return to the hallway, sighing.\n\n\t\t\t\tWhat now?\n\t\t\t\t*choice\n\t\t\t\t\t#I’ll haunt Mr. Frank cleverly.\n\t\t\t\t\t\t*goto_scene businessmanclever\n\t\t\t\t\t#I’ll haunt Mr. Frank fiercely.\n\t\t\t\t\t\t*goto_scene businessmanfierce", "businessmanopening": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n*set jobtitle \"Infamous Haunter\"\nYou return to the Agency, walking down the cement hallways with your head ducked. No one seems to notice you this time. The other employees go about their business, scurrying down the infinite hallways, flying in and out of doors like classic Saturday morning cartoons. The lights flicker over your head. Even when you’re fighting to get through the throngs of hovering ghosts, the place is—if you’ll excuse the expression—dead silent.\n\nYou arrive back at the door you know so well now, though you still have no idea how you got here from the entrance. You knock, and a muffled voice bids you enter. You take a deep breath, lock your fingers around the door handle, and open the great slab of wood.\n\nThe same weasel-like man is sitting once again at his plastic desk. Now, he looks more like a weasel that has been run over by a truck—his hair is ruffled, as if he’s been running his fingers back and forth through it like sharp rakes, and his hands do not sit still. He lifts his head and burns you with a condescending look, sighs, and without another word holds out a manila envelope. You murmur your thanks and take it. You don’t want to stick around long enough to figure out what has him so edgy.\n\nSafely in the hallway, you peer inside your envelope. Inside is a thick stack of official-looking papers, and, upon closer inspection, it appears that you’ll be targeting a very high-profile businessman by the name of Richard Frank. You peruse the file with a frown. This fellow is no saint, that’s for certain. It appears he’s guilty of cheating a new arrival to the Agency, and now you’re driving the Karma Bus. \n\n“Here we go again,” you think.\n*page_break\n*achieve expert\nThe house of Richard Frank is everything you expect it to be. Practically a mansion, it sits high on a luxurious white front porch, all a-glitter with stone statues flanking the mile-long front walk and a thousand windows glaring down over the luscious property. You stand there staring for a moment, unsure of what else to do. You know whose money paid for this house. Every shaped hedge, every gold accent, every inch of this modern-day castle was paid for right out of the pockets of honest people.\n\nSuddenly, you’re ready to make this guy pay up.\n\nYou glide in through the grand double-doors and are faced with a floor-plan that makes you feel as if you’ve stepped into a hotel. The guts of this mansion are every bit as gilded and glittering as the outside, and, as you slink up the stairs like a clever cat, you think that the entirety of the United States population could not fill up this castle. It is there that you see him, descending the stairs past you, his heavy-set form bouncing with every step like a pool toy: Mr. Frank. He’s every bit as pompous and gilded as his house, with pig-like eyes and a balding crown of dirt-colored hair. He makes you glad you get to drive the Karma Bus.\n\n\nSo, how are you going to play this?\n*choice\n\t#Cleverly.\n\t\t*goto_scene businessmanclever\n\t#Fiercely.\n\t\t*goto_scene businessmanfierce\n\t#Oh, maybe I’ll just—oh, what’s this? A kid’s bedroom? Perfect.\n\t\t*goto_scene businessmankids", "challengeagency": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*achieve argue\nYou find your way back to the Agency, determined to set things straight. \n\nYou walk the corridors, looking for someone to discuss your problem with. The fluorescent lights flicker. The hallways are narrow, made stark and impersonal by white walls and concrete floors. As you walk, you pass a handful of your coworkers—wide-eyed, timid creatures who keep their heads down and scurry about their business, carefully avoiding eye contact. No one asks you what you’re doing. \n\nThis is weird.\n\nJust as the word “lost” is beginning to take root in your brain, you turn a corner and find yourself facing three doors. They are tall, thick, and imposing, with narrow glass windows. Each window is emblazoned with curly golden lettering, so fine that you wonder whose hand was steady enough to write these words.\n\nWhich door do you choose?\n\n*choice\n\t#I choose “Andreas Packer, CEO.” Go big or go home.\n\t\t*label CEO\n\t\tYou boldly push open the door of Andreas Packer, CEO. \n\n\t\tA young, handsome man looks up from behind a vast oak desk. Awe and amazement battle for supremacy in his ice-blue eyes—and then both are overcome by fury.\n\n\t\t“How dare you enter my office without permission? Who are you, lowlife?”\n\n\t\tYou clear your throat. “I’m one of your contract haunters. I’ve come to tell you that there’s something wrong with my case.”\n\n\t\t“There’s something wrong with it, alright,” he growls. “You aren’t working on it.”\n\n\t\tThen he tilts his head back and howls, “Guards!”\n\t\t*page_break\n\t\tBefore you can say another word, your arms are gripped firmly by two sets of burly hands. You are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\tAnd then, you know nothing more.\n\t\t*page_break\n\t\t*goto_scene void\n\n\n  \n\t#I choose “Hiring Department.” Hopefully there will be some sympathetic ears here.\n\t\t*label HD\n\t\tYou knock on the door and wait a moment.\n\n\t\tNo response.\n\n\t\tYou knock again, only to be answered by the same ringing silence. Annoyed, you whip the door open and stand on the threshold, arms crossed.\n\n\t\tYou’re looking into a long, dimly-lit room full to brimming with desks—and with ghostly eyes that are locked on you. For a moment you can see nothing but the eyes. Green, blue, a thousand shades of deepest brown. The entirety of the Agency’s hiring department sits before you, staring, and you have just burst through their door.\n\n\t\tYou clear your throat, shifting uncomfortably. “Um, hello,” you say. “I’m—I’m here to report an issue with my case.”\n\t\t\n\t\tThey stare at you in silence.\n\n\t\t“There’s…there’s a girl—”\n\n\t\t“We don’t do that here,” says one of them dismissively, and like clockwork, every head bows and every eye returns to paperwork. “Get back to work.”\n\n\t\t“But the girl—”\n\n\t\t“Look,” says a woman, a prim, sharp-nosed little creature with eyes like shards of glass, “there isn’t much that can be done.”\n\n\t\tYou hesitate. She seems like the kind who would chase you out of the room wielding a ruler, but you aren’t ready to give up just yet. “I really think—”\n\n\t\tShe stands up, glaring at you until you fall silent.\n\t\t“However,” she continues, a small, prim smile twisting up her red lips, “since you are so obviously unable to get past this issue, we are prepared to offer you an alternate case.”\n\n\t\tA murmur goes through the room.\n\n\t\t“You will be accepting, of course,” she adds.\n\n\t\tYou get the feeling that something isn’t right here. But, then again, what choice do you have?\n\n\t\t“Okay,” you say slowly.\n\t\t*page_break\n\t\t*goto_scene emptyhouse\n\n\t#I choose “Human Resources.” That seems like the logical place to start. \n\t\tYou knock on the door. You only have to wait a moment before a small, mousy-looking fellow with wide eyes and thick glasses opens the door.\n\n\t\tHe peers out at you for a moment, looking as if he’s seen a ghost. You smirk privately, realizing that’s exactly what he’s seen—although, given that he’s one himself, you’d think he might be used to such things by now. He takes a step toward you and you open your mouth to speak.\n\n\t\t“I—”\n\n\t\tHe waves a hand to silence you. Irritated, you watch as he peers up and down the hallway like a rabbit too timid to leave its den, and then he pulls you into his office and closes the door behind you.\n\n\t\t“Is something the matter?” he asks, in a voice that is almost a whisper.\n\n\t\t“As a matter of fact, it is,” you say, fairly annoyed. “There’s something wrong with my case. The girl I’m supposed to be haunting—she’s innocent.”\n\n\t\tThe man gives you a bespectacled stare, two bulging eyes glittering behind the glass.\n\n\t\t“Oh, dear,” he says, and begins wringing his hands. “Oh, dear. We were never supposed to do this. Innocents are not supposed to be troubled—but they don’t follow the rules anymore, oh, no they don’t.”\n\t\t*choice\n\t\t\t#This was a bad idea. I just leave and get started on the next job.\n\t\t\t\t*goto_scene graveyarddesecrator\n\t\t\t#This is going nowhere fast. I turn around, leave, and choose a different door.\n\t\t\t\tYou return to the hallway and look at the two remaining doors. Hopefully this time you’ll find someone a bit more…helpful. \n\t\t\t\t*choice\n\t\t\t\t\t#I choose the door of “Andreas Packer, CEO.”\n\t\t\t\t\t\t*goto CEO\n\n\t\t\t\t\t#I choose the door of the Hiring Department.\n\t\t\t\t\t\t*goto HD\n\t\t\t#I can’t believe I’m doing this, but… “Okay, what’s going on here?”\n\t\t\t\tThe man gives a little shiver and steps around you, peering out the window as if he expects someone to be watching. Then, he turns back to you, steps closer—you can smell the cheap cologne he wore in life—and says very softly, “The Agency is corrupted. Morals are gone from our work, completely gone. We send our haunters wherever it is most beneficial for us. That isn’t how it was supposed to work, don’t you see?”\n\n\t\t\t\tHe shakes his head. His glasses gleam under the dim fluorescent lights.\n\n\t\t\t\t“Something must be done,” he whispers.\n\t\t\t\t*choice\n\t\t\t\t\t#I knew something wasn’t right here. I walk out of the Agency.\n\t\t\t\t\t\tYour instincts are impeccable.\n\n\t\t\t\t\t\tWithout another word to the mousy one-man Human Resources department, you push open the door, walk out into the hallway, and leave without looking back. You know he’s standing in the doorway gaping at you, and you can just imagine the look of disappointment glittering behind those glasses.\n\n\t\t\t\t\t\tBut this isn’t your problem. You’ve had enough of the corruption of the Agency, and you want out.\n\n\t\t\t\t\t\tSo you retrace your steps, looking for the exit. There is no one to be seen now. The hallways are, if you’ll excuse the expression, dead silent. You try a few doors but quickly realize that they’re all locked.\n\n\t\t\t\t\t\tHmm.\n\n\t\t\t\t\t\tYou’re just starting to realize that you don’t really remember how you got here at all when you see a promising door. It’s unmarked, and it doesn’t really have the appearance of a front entrance, but you haven’t found anything else. You approach the door and give it an experimental push. It opens with a protesting creak, and instead of an exit, you find yourself peering straight into a great black void.\n\n\t\t\t\t\t\tThat’s the last thing you know. You’re sucked into the darkness like some monster pulling you into its great, toothy mouth—or do you fall in?\n\n\t\t\t\t\t\tYou don’t know.\n\n\t\t\t\t\t\tYou don’t know anything anymore.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene void\n\n\t\t\t\t\t#Something might need to be done, but I’m not the one to do it. I’m going to get to work on my next case.\n\t\t\t\t\t\t“Look, I’m really sorry,” you say. “I can’t help you. I’ve got to get back to work.”\n\n\t\t\t\t\t\tWithout another word to the mousy one-man Human Resources department, you push open the door, walk out into the hallway, and leave without looking back. You know he’s standing in the doorway gaping at you, and you can just imagine the look of disappointment glittering behind those glasses.\n\n\t\t\t\t\t\tYou don’t see the mousy Human Resources man again.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene graveyarddesecrator\n\t\t\t\t\t#He’s right. Something must be done. I report him to the CEO.\n\t\t\t\t\t\tGood thinking! You’re sure to guarantee yourself immunity by turning in a conspirator.\n\n\t\t\t\t\t\tWithout another word to the mousy one-man Human Resources department, you push open the door, walk out into the hallway, and force your way through the door marked “Andreas Packer, CEO.” You hear the mousy man groan softly from behind you. He knows what’s coming.\n\n\t\t\t\t\t\t“So do I, friend,” you think slyly. “So do I.”\n\n\t\t\t\t\t\t“What is this?” demands Andreas Packer. He’s a young, fiery-looking ghost of a man, sitting behind his massive oak desk like a king at his throne.\n\n\t\t\t\t\t\t“Sir,” you say. “I’m here to report a conspiracy. Your Human Resources department is plotting against you. He claims that your Agency is corrupted.”\n\n\t\t\t\t\t\tThe CEO stares at you. His burning, pig-like eyes glitter in his head.\n\n\t\t\t\t\t\t“Well then,” he says at last. “It’s clear what must be done, isn’t it?”\n\n\t\t\t\t\t\tYou nod.\n\n\t\t\t\t\t\t“Guards!”\n\n\t\t\t\t\t\tImmediately, two ghosts—thick enough to have been big-league football players in life—charge through the door.\n\n\t\t\t\t\t\t“Take little Mr. Human Resources away,” says the CEO dismissively. “Oh, and while you’re at it, get this meddlesome lowlife, too.”\n\n\t\t\t\t\t\tOne of the guards tears out the door to take the mousy man—you a hear high-pitched cry of alarm—and the other guard takes your arm.\n\n\t\t\t\t\t\tMaybe you didn’t know what was coming, after all?\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\tYou and the man you reported are escorted none-too-gently to an old metal door that’s rusting at the hinges. The mousy man wriggles and shouts, his glasses askew on his pale face. Once again, he knows what’s coming.\n\n\t\t\t\t\t\t“No!” he shrieks. “No, no, no!”\n\n\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t\t\t“You first,” he says, his black eyes on you.\n\n\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t#I nod, run a hand over my forehead, and say tiredly, “I’ll try to help.”\n\t\t\t\t\t\tHis eyes light up behind the glasses, like two little fish darting around behind the aquarium glass. “Really?” He beams. “That’s wonderful. Wonderful! We have hope once more!” He claps his hands together.\n\n\t\t\t\t\t\tSomehow, you’re not feeling so optimistic.\n\n\t\t\t\t\t\tSo, what do you do first?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#We need more proof. We should find some files with incriminating evidence.\n\t\t\t\t\t\t\t\t“Let’s gather some proof,” you say to the mousy man. “Where do they keep the files around here?”\n\n\t\t\t\t\t\t\t\tHe perks up, realizing that he can be of some use. You get the feeling that’s a rare occasion for him. “The Records Hall,” he says, so eagerly that his glasses nearly bounce off his face. “This way!”\n\n\t\t\t\t\t\t\t\tYou follow him down a few deserted corridors and he finally leads you to an unlocked door. He pushes on it and it creaks open, and together you enter a long, narrow room with a high ceiling. It looks like a library out of a medieval castle—except that every solid surface is made of cement, and where there should be books, there are manila envelopes. “Let’s get to work,” says the man, his eyes glowing behind the glasses.\n\n\t\t\t\t\t\t\t\tYou approach one of the massive bookshelves, unsure of where to start. Your companion—actually, your partner in crime, now—tackles the bookshelves opposite.\n\n\t\t\t\t\t\t\t\tYou’re just reaching for a particularly fat envelope with red lettering on the front when someone shouts, “Hey! You! You can’t be in here!”\n\n\t\t\t\t\t\t\t\tYou turn to find a sturdily-built guard standing in the doorway, glaring. “You didn’t say there was a patrol!” you hiss at your mousy ally.\n\n\t\t\t\t\t\t\t\t“I—I didn’t know—” he stutters, glasses trembling on his nose.\n\n\t\t\t\t\t\t\t\t“Hey, Charlie! Come and help me with this!”  the guard calls over his shoulder. Then he turns, grins widely in the dim light, and says, “You two are done.”\n\n\t\t\t\t\t\t\t\tYou believe him.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\tYou and your ally are escorted none-too-gently to an old metal door that’s rusting at the hinges. The mousy man wriggles and shouts, his glasses askew on his pale face. He knows what’s coming.\n\n\t\t\t\t\t\t\t\t“No!” he shrieks. “No, no, no!”\n\n\t\t\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t\t\t\t\t“You first,” he says, his black eyes on you.\n\n\t\t\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t#We need allies. We should approach the other employees.\n\t\t\t\t\t\t\t\tTogether with your new ally, you coast through the abandoned hallways, poking your head into every open door and repeating the same call to action.\n\n\t\t\t\t\t\t\t\t“This Agency is corrupted. It’s up to us to stop the immorality.”\n\n\t\t\t\t\t\t\t\tYour ally from the Human Resources department proves to be a valuable asset in this process. He grabs your arm when you approach a door concealing employees who may not be friendly to your cause. He doesn’t say much, and he’s constantly pushing up those glasses, but he’s a worthy ally.\n\n\t\t\t\t\t\t\t\tUnfortunately, the response you get from the employees you do find…well, let’s just say you’re not exactly sparking revolution. Everyone just looks at you with wide, glittering eyes, like the ghosts of deer in the headlights. It’s clear that they’re terrified.\n\n\t\t\t\t\t\t\t\tYou’re not getting anywhere like this.\n\n\t\t\t\t\t\t\t\tSo, what’s the plan now?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#I’m calling it. It’s time to give up.\n\t\t\t\t\t\t\t\t\t\tUnfortunately, it’s a little difficult to stop a fire once you’ve started it.\n\n\t\t\t\t\t\t\t\t\t\tAs you are walking with your ally back to his office, you see a pair of ghostly figures standing in the hallway ahead. One of them is small, blonde, with a face that looks like she’s been eating nothing but not-yet-ripe blackberries. You recognize her as one of the employees who wouldn’t meet your eyes. The other is a guard—a guard built like a brick wall.\n\n\t\t\t\t\t\t\t\t\t\t“It was them, sir,” says the woman. Her voice is every bit as tightly-wound as her face. “They’re the ones talking about all this revolution nonsense.”\n\n\t\t\t\t\t\t\t\t\t\tThe guard turns to you and narrows his eyes. “Charlie,” he calls over his shoulder. “We got ourselves a pair of insurgents.”\n\n\t\t\t\t\t\t\t\t\t\tOh no.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\tBefore you can even think about running, you and your ally are grabbed and escorted none-too-gently to an old metal door that’s rusting at the hinges. The mousy man wriggles and shouts, his glasses askew on his pale face. He knows what’s coming.\n\n\t\t\t\t\t\t\t\t\t\t“No!” he shrieks. “No, no, no!”\n\n\t\t\t\t\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t\t\t\t\t\t\t“You first,” he says, his black eyes on you.\n\n\t\t\t\t\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t\t\t#There’s only one thing we can do. We’re going on alone.\n\t\t\t\t\t\t\t\t\t\t*label alone\n\t\t\t\t\t\t\t\t\t\tYou put your hands on the shoulders of your mousy ally. “Look, um….” You hesitate, realizing you never asked his name. “What do they call you?”\n\n\t\t\t\t\t\t\t\t\t\t“Matthew,” he stumbles, as if he’s unused to saying his own name. “Matthew Grace.”\n\n\t\t\t\t\t\t\t\t\t\t“Well, Matthew Grace,” you say, “we’re not getting any help on this one. We’re going to do this revolution thing on our own. Are you with me?”\n\n\t\t\t\t\t\t\t\t\t\tHe doesn’t hesitate. “Of course.”\n\n\t\t\t\t\t\t\t\t\t\t“Good.”\n\n\t\t\t\t\t\t\t\t\t\tAnd so, the two of you march back down the abandoned hallways, neither of you speaking. You notice eyes watching you from cracks in the doors, peering at you through the glass. They can’t believe you’d go on alone. \n\n\t\t\t\t\t\t\t\t\t\tYou approach the door of Andreas Packer, CEO. You turn to Matthew. “I don’t know what’s going to happen in there.”\n\n\t\t\t\t\t\t\t\t\t\t“No,” he says, and pushes up his glasses. “I suppose it’s time to find out.”\n\n\t\t\t\t\t\t\t\t\t\tAnd he pushes open the door.\n\n\t\t\t\t\t\t\t\t\t\tAndreas Packer, CEO, is a tall, handsome young ghost of a man, sitting behind his grand oak desk. He doesn’t lift his head at first, but when the two of you stand silent in the doorway, he finally looks up with a rather sour expression.\n\n\t\t\t\t\t\t\t\t\t\t“What is the meaning of—”\n\n\t\t\t\t\t\t\t\t\t\t“We’re here to stop you,” you say.\n\n\t\t\t\t\t\t\t\t\t\t“You are corrupt, Mr. Packer,” says Matthew. “We won’t stand for it.”\n\n\t\t\t\t\t\t\t\t\t\t“We?” Packer snorts. “You speak like you’ve got an army, pencil-pusher, but all I see is two scrawny low-life ghosts.”\n\n\t\t\t\t\t\t\t\t\t\tYou take a deep breath. \n\n\t\t\t\t\t\t\t\t\t\tYeah. That’s all you see, too.\n\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t“Actually,” says an unfamiliar voice from behind you, “make that a hundred scrawny low-life ghosts.”\n\n\t\t\t\t\t\t\t\t\t\tIn unison, you and Matthew turn to see countless ghost employees flooding the hallway behind you, haunting every doorway, coming from the connecting thresholds. The one in front—a twentysomething girl wearing a university sweatshirt—smiles at you.\n\n\t\t\t\t\t\t\t\t\t\t“It’s been awhile since we’ve seen someone as brave as you,” she says, while Packer splutters uselessly. “Going in alone? That’s hero material right there.”\n\n\t\t\t\t\t\t\t\t\t\tMatthew gives a nervous little laugh.\n\n\t\t\t\t\t\t\t\t\t\t“So,” says the girl. “Care if we join you?”\n\n\t\t\t\t\t\t\t\t\t\tA small smile begins to light up on your face, like a forest fire just starting to spark.\n\n\t\t\t\t\t\t\t\t\t\t“Not at all,” you say.\n\n\t\t\t\t\t\t\t\t\t\tAnd so it is that you, Matthew, and most of the dead employees of the Agency band together and overpower the indignant fool that is Andreas Packer. He makes a feeble attempt to call his guards, but some of them are present in your ranks. You are an unstoppable force, and, without so much as raising a finger—more like raising an eyebrow, actually—you remove Packer from power. Cowards will always be cowards, even behind oaken desks.\n\n\t\t\t\t\t\t\t\t\t\tThe Agency is yours. What now?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#I’ve done my part. It’s time to be free.\n\t\t\t\t\t\t\t\t\t\t\t\tReleased from the suffocating grip of the Agency, you choose to wander the world. Your spirit is free.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou bid farewell to all of your allies, wishing them the best of luck in their own eternities. Matthew accompanies you to the exit.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“What a day,” he remarks, as you stand staring at the doors. You laugh.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“It’s been fun, Matthew Grace,” you say. “Good luck.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou never see him again.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe moment you walk through the ominous metal doors for the last time, you feel as though you can breathe again. It’s the closest thing you’ve felt to life since you took your last breath, and you’re ready for the rest of your eternity to feel just like this.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou wander across the world, free and carefree. You do all the travelling you missed out on while you were alive. You have the whole world at your fingertips, and now, there’s nothing stopping you from seeing and experiencing and enjoying every inch of it.\n\n\t\t\t\t\t\t\t\t\t\t\t\tIt’s a lonesome existence, for you never see another ghost, and you find that your ability to interact with the living decreases over time—but you’re free.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*achieve freedom\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t\t\t#This Agency may have been corrupted, but it has good bones. I take over as the new CEO.\n\t\t\t\t\t\t\t\t\t\t\t\t*achieve power\n\t\t\t\t\t\t\t\t\t\t\t\tAs the other employees mull around, gathering in joyful groups in every hallway, filling every room with the excitement of your success, you stand silently in the middle of the office that once belonged to Andreas Packer, CEO.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe girl with the university sweatshirt walks up and puts her hand on your shoulder. “What are you going to do now?” she asks.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou look at her. “I’m going to save this company.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd you walk over and sit behind the oak desk, testing the chair, taking in the new view of the office.\n\n\t\t\t\t\t\t\t\t\t\t\t\tThe girl smiles. She knocks the “Andreas Packer” nameplate off the edge of the desk.\n\n\t\t\t\t\t\t\t\t\t\t\t\t“Sounds like a plan to me.”\n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd so, with the university girl—Lorelei Jacks—and Matthew Grace as your head employees, you restart the Agency. It’s a completely new company, free of corruption and ill will. \n\n\t\t\t\t\t\t\t\t\t\t\t\tAnd you succeed.\n\n\t\t\t\t\t\t\t\t\t\t\t\tYour employees are happy. Your work is ethical, reliable, and beneficial to all involved. You end up the master of an undead corporate empire, and things tend to go your way—forever. \n\n\t\t\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t*achieve ceo\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t\t\t#I think I’ll stick around—but I’m keeping my old job.\n\t\t\t\t\t\t\t\t\t\t\t\tYou’re going to stay on as a haunter. That’s great—it’s interesting work, you’re making a difference in the world, and you don’t really have anything else to do anyway—but who are you working for?\n\n\t\t\t\t\t\t\t\t\t\t\t\tAs the other employees mull around, gathering in joyful groups in every hallway, filling every room with the excitement of your success, you stand silently in the middle of the office that once belonged to Andreas Packer, CEO. Someone else will need to sit behind that desk. Someone else will need to run this Agency—and they must be worthy of the post, or you may just have to start another revolution.\n\n\t\t\t\t\t\t\t\t\t\t\t\tWhom do you choose to place behind the oaken desk?\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I choose Matthew Grace.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tA few short hours ago, you wouldn’t have chosen Matthew Grace for a game of volleyball, let alone for a position at the head of a rather tempestuous company. But something has changed, and he’s no longer the mousy Human Resources guy.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tNow, you could almost say you respect him. After all, he was the first one to follow you into a somewhat ill-advised revolution.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou have to force your way through the massive crowd of celebrating ghosts, and they block the hallway like semitransparent brick walls, but somehow you manage to spot Matthew Grace.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Matthew!” You push a few giggling employees out of your way. “Matthew, wait. There’s something I need you to do for me.”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe gives you a nervous look and swallows hard, his Adam’s apple jumping like a frantic puppy. “Um, okay?”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“You’re the new CEO,” you say.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHis eyes shine behind the glasses.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“…oh.”\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tMatthew Grace, CEO,  turns out to be among the best leaders that the Agency has ever seen. While he’s certainly not leading you all to undead corporate domination, he achieves relative success. He maintains his approachable demeanor, ensuring that the employees trust him—not to mention, he’s got you as his right-hand ghost, and you’re still generally respected as a hero. Things are run fairly and with a strong moral compass, and everything becomes less hostile, like a wolf pup that has been tamed by a gentle hand.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou still wonder if you could have done better, but you don’t think about it too much anymore. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe Agency prospers fairly well under Matthew’s hand. You keep your job as a haunter and get your pick of the cases, and you’re satisfied—though not exactly overjoyed. At the very least, you’re not bored, and you aren’t propagating evil at the hand of a corrupted CEO.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*achieve prosper\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I choose the first of the other employees who followed me into battle—the girl with the university sweatshirt.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe girl with the university sweatshirt pokes her head into the office, as if summoned by your decision.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Hey,” she says lightly. “We’re having a pretty crazy time out here, I mean, as crazy as things can get when you’re dead.” She smiles. “Care to join us?”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou shake your head. “I don’t think I ever caught your name.”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Oh,” she says. “Um, Lorelei Jacks.”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Well, Lorelei Jacks,” you say, and put your hand on the oak desk, “I think you should be the new CEO.”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe stands in the doorway, mouth open in shock.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“…me?”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Yes,” you say, simply.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt’s the beginning of something huge.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tLorelei Jacks, CEO, leads an undead corporate charge that skyrockets the Agency from low-life labor to a sophisticated, intelligent company that is unstoppable in every way. The word “corruption” never even enters your mind again, as if it has been wiped from your vocabulary by a steady hand. Lorelei is savvy and likeable, a dangerous combination, and with her as your leader, you and the other employees prosper beyond the farthest reaches of your imagination.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stay on as a haunter, and the work is sublime. Lorelei allows you to choose whichever cases you want, and more and more often, you’re training other new employees—nervous, newly-dead little creatures with eyes like marbles. You’re the most valued employee in the history of the Agency, and a revolutionary to boot.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tOne day you happen to pass Matthew Grace in the hallway, and it is in this moment that you realize just how far the Agency has come. Matthew is no longer afraid. He walks straight and tall—was he always that tall?—and his eyes gleam behind the glasses. He smiles and gives you a wave.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tUnder Lorelei’s firm hand, even the most timid of employees has become strong and successful. You can’t help but feel a little bit of pride for this new company that you helped wring from the ashes of a corrupted empire.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThis is your Eternity.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*achieve lorelei\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene end\n\t\t\t\t\t\t\t\t\t\t\t\t\t#I let someone else decide.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stand in the office for a moment, looking around. It’s someone else’s problem now. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnd, thus emboldened, you turn and walk out the once-imposing door, now stripped of its pomp and glamour, and you join the festivities. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tLet the time and tides of fate choose whom they will to sit behind the oaken desk.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnd choose they do.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt has been two months since the fall of the Agency, and in those two months, you have somehow gone from revolutionary to chained-up troublemaker.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou stayed on as a haunter, but without a firm leader, the Agency floundered. A few bold individuals stepped up to try their hand at being a leader, but somehow, each and every one of them ended up back among your ranks within the week. You kept your head down and went about your business, taking whichever cases presented themselves.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut then a stranger sat down behind the oaken desk, a snaky ghost of a man named Elijah, and that was the end.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAlmost instantly, you noticed a dramatic change in your case assignments—you were back to tormenting innocents, and children, and a whole host of others who did not appear to deserve it. You stopped seeing the girl with the university sweatshirt, and whenever you brought her up, her coworkers would look at one another grimly and say nothing more. Matthew Grace, too, showed evidence of the change—he walked the halls like a mouse, staying close to the wall, watching through wide eyes and stopping often and trembling always. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThings were right back to how they were before.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t“No—strike that,” you think, as you walk between two guards with ghostly chains rattling your every step. “Things are worse.”\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour revolutionary status led Elijah to distrust you. Two months after your thrilling success, you have been fired. And, it appears, “fired” in this Agency doesn’t mean a professional handshake and an escort to the front door.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour arms are gripped firmly by two sets of burly hands. You are escorted none-too-gently to an old metal door that’s rusting at the hinges, and your chains echo every step, a fierce and haunting shriek that makes you cringe.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene void\n\t\t\t\t\t\t\t#No one is going to help us. This is our battle.\n\t\t\t\t\t\t\t\t*gosub alone", "choicescript_description": "It’s a ghost story starring you. Explore the afterlife, discover the secrets of a mysterious Agency of spirits, and terrify anyone who gets in your way. But be careful—make the wrong choice, and you could meet a fate worse than death. Will you gamble an eternity?\n\n[i]Gambling with Eternity[/i] is a 53,000-word interactive novel by Ashlee Sierra. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "*if dead = 0\n\t*stat_chart\n\t\ttext Name\n\t\ttext Gender\n\t\ttext haircolor Hair Color\n\t\ttext EyeColor Eye Color\n\t\ttext Laugh\n\t\ttext JobTitle Job Title\n\n*if dead = 1\n\t*stat_chart\n\t\ttext Name\n\t\ttext Gender\n\t\ttext haircolor Hair Color\n\t\ttext EyeColor Eye Color\n\t\ttext Laugh\n\t\ttext JobTitle Job Title\n\t\t", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.\n", "contractend": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*set jobtitle \"Nightmare\"\nYou return to the Agency, flush with your success. You walk the cement corridors with a glitter in your dead eyes, as if some particle of your living self has been resurrected within you, and you do not hesitate. You’re unstoppable. Other ghosts hesitate in the hallways, clutching clipboards and manila envelopes, and they look at you with their mouths open in sick parodies of the way their corpses probably look. You ignore them.\n\nYou find your way to that same room where you first met your fate, so long ago now, and yet not long ago at all. You knock, don’t wait for an answer, and strut in.\n\n“I assume you’ve been successful,” says the man, still sitting behind his toy desk, still poised over paperwork. He doesn’t lift his head.\n\n“Yes.” You beam. Not even his iciness can beat down your pleasure now. You’d like to go into details, but—\n\n“Very well,” he says. “Your office is the first one on the right. Number ninety-five. Congratulations.”\n\nYou hesitate. You didn’t know what to expect when you finished that last job…but this? Permanent employment in this Agency?\n\nDo you even want that?\n*choice\n\t#Yes, I do, as a matter of fact.\n\t\t*achieve safe\n\t\t“Thank you,” you say eagerly. The man waves you off with one dismissive hand.\n\n\t\tYou never see him again, and you don’t regret it.\n\n\t\tYou go down the hall and find your office, number ninety-five, just as the man said. It’s a nice little place—cement walls, and a dented floor, but at least the desk is real instead of a little plastic fold-out thing. You smile and settle down in the big leather chair.\n\n\t\tThis could work.\n\n\t\tYou are quickly put in charge of training and managing a batch of new haunters, who come to you to report success and failure alike, to get the information about their next targets, and generally to complain about everything and nothing in particular. You never have to report to your own superiors. You are set free on the world—or, almost free, because somehow you are still shackled to that desk, even if it is real wood.\n\n\t\tSo, what do you do now?\n\t\t*choice\n\t\t\t#I focus on rising through the ranks of the Agency to ultimate success.\n\t\t\t\tYou stay in your office, working long hours. You hardly see the faces of your coworkers except when they walk past your office and gaze in at you through the glass. Your underlings, the haunters you have to train, are mostly a mess—and you get many a headache working to whip them into shape. For awhile, you wonder what would have happened if you’d chosen a different path.\n\n\t\t\t\tBut then, something changes.\n\n\t\t\t\tOne day, one of your haunters—a perky little lady with black hair and green eyes, who calls herself Kenna—returns to you with a  glowing report. She haunted and successfully terrorized one of the cases that had been stumping other haunters for years now. You congratulate her and send her out. The next day it happens again, with another of your haunters, and again, and again, until you and your team are known throughout the company as fierce, fearless monsters. \n\n\t\t\t\tEventually, one of your superiors even comes to your office directly to congratulate you on a job well done—and offer you a promotion.\n\n\t\t\t\tBetter start deciding what you’ll call this Agency once you reach the top, because that’s exactly where you’re going.\n\n\t\t\t\tThis is your Eternity.\n\t\t\t\t*page_break\n\t\t\t\t*achieve star\n\t\t\t\t*goto_scene end\n\t\t\t#I do the job, but unremarkably. I kind of want to be…free.\n\t\t\t\tSoon enough, you get your wish—and not exactly the way you wanted, either.\n\n\t\t\t\tYour job performance suffers from your desire to be free. Your underlings begin going to your superiors instead of you, and all you do is sit at your desk, spinning in your leather chair.\n\n\t\t\t\tAs a result, you’re not exactly surprised when two burly guards show up at your door. \n\n\t\t\t\t“Sorry, mate,” says one of them. “You’re out.”\n\t\t\t\t*page_break\n\t\t\t\tBefore you can say another word, your arms are gripped firmly by two sets of burly hands. You are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\t\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\t\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\t\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\t\t\tAnd then, you know nothing more.\n\t\t\t\t*page_break\n\t\t\t\t*goto_scene void\n\t\t\t#I pick a person to haunt, somewhere nice and tropical.\n\t\t\t\tAnd so it is that you begin to settle into your new position, controlling your fleet from a distant coast. Your haunters do well in their jobs, and thus you do well in your job. You are a passable leader—though, you’re not exactly going to show up in the history books. You don’t mind. You’re happy, you’re on a permanent vacation, and you hardly have to work anymore. \n\n\t\t\t\tYou’re living it up—if you’ll excuse the expression.\n\n\t\t\t\tThis is your Eternity.\n\t\t\t\t*page_break\n\t\t\t\t*achieve vacation\n\t\t\t\t*goto_scene end\n\t#Well…\n\t\tYou clear your throat and straighten your back.\n\n\t\t“Actually, sir,” you say. “As much as I appreciate the offer…I’d actually like to explore other options.”\n\n\t\tHis hand stops writing.\n\n\t\t“What?”\n\n\t\t“I’m not interested,” you say firmly.\n\n\t\tHe lifts his head, slowly, fixing his strange little eyes on you.\n\n\t\t“Then I’m afraid,” he says slowly, “your time is up.”\n\n\t\tAnd then he presses a button on the side of his desk.\n\t\t*page_break\n\t\tBefore you can say another word, your arms are gripped firmly by two sets of burly hands. You are escorted none-too-gently to an old metal door that’s rusting at the hinges.\n\n\t\tYou wonder briefly if there is an unemployment agency for the dead.\n\n\t\tOne of your chaperones kicks open the door. You can’t see anything beyond it—just velvety darkness.\n\n\t\tThe other guard shoves you through the door. You fall headlong into an ocean of darkness, and for one bloodcurdling moment, there is nothing but falling, and the sound of your breath in your ears, and the ringing slam of the metal door closing behind you.\n\n\t\tAnd then, you know nothing more.\n\t\t*page_break\n\t\t*goto_scene void", "desecratorcar": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\nYou’re still looking for inspiration, if you must admit it, but this seems like a good plan for now.\n\nThis graveyard desecrator’s social life must really be hopping. It’s not long before he’s rushing out the door, and you follow him out. You’re not sure what you’ll do now—but hey, it’s better than staying in his filthy apartment with more flies than furniture, you reason.\n\nHe walks briskly to the very end of the parking lot in front of his apartment building, and you follow at a safe distance, hands buried deep in your pockets. You frown thoughtfully. He’s walking awfully far away from the building, past little groups of cars huddled together like younglings in some kind of metal tribe. He appears to be headed toward the no-man’s land that rests at the end of every parking lot, where only people with shiny sports-cars ever dare to park. Funny, you think. He doesn’t seem like the sports-car type to you.\n\nAnd, as it turns out, he isn’t.\n\nHe jams a key into the door of a tiny little white junker, its windshield cracked, its windows half-covered with duct tape, its whole frame slumping. The doors are decorated like finger-paintings with dents and scratches and marks where other cars left their paint. The graveyard desecrator kid doesn’t seem aware of the fact that he is essentially getting into a shoebox on wheels—and a ruined shoebox, at that.\n\nYou stare, open-mouthed. Even you, who have no life to lose, wouldn’t risk riding in the passenger seat of that jalopy. But then an idea strikes you—a cold, cruel, wonderful idea—and you catch your breath.\n\nYou could get into the mechanics of the car and cause true chaos. You could make the boy regret ever having disrespected a graveyard. You could make him pay.\n\nSo? What’ll it be?\n*choice\n\t#I think I’ll find another plan. This seems risky.\n\t\tYou stand idly by, hands buried deep in your pockets, and watch through the duct taped window as the boy and his little white death-trap speed away. There’s a horrible cough and splutter from the engine, a shriek of brakes, and he’s nothing but a white streak on the horizon.\n\n\t\tQuietly, you turn around and return to the graveyard desecrator’s apartment, slip in right through the wooden door, and consider your options while you wait for him to return.\n\n\t\tWhat’s the plan?\n\t\t*choice\n\t\t\t#I’ll wait until he goes to sleep and then do some classic horror-movie haunting.\n\t\t\t\t*goto_scene desecratorterrorize\n\t\t\t#I think I’ll crash one of his rowdy parties.\n\t\t\t\t*goto_scene desecratorparty\n\t#Risk is my middle name. I’ll haunt the car!\n\t\t*achieve car\n\t\tJust as the boy is slamming his half-ruined door, which you’re surprised is still attached to the car at all, you sink down on your knees and peer under the little white junker. You hesitate only a moment. You’ve never done anything like this before—but then, who has? \n\n\t\tYou take a deep breath and slip through the bottom of the car. For a moment it feels like you’ve done a cannon-ball into an ocean of metal: every surface brushes up against you, cold and sleek and unfriendly, and your world is a blur of gray and black. Things poke into your sides. Rough edges catch your skin. You wriggle around, coughing, glad that your ghostly form can’t be injured by this kind of thing. You have the feeling the human anatomy would not be kind to crawling around in the inner mechanics of a car.\n\n\t\tJust as you’ve settled down, there’s a little kick, a bit of a roaring in your ears, and then everything around you seems to be vibrating. The world lurches around you. There’s a terrible cough from the engine. You look desperately for something to hang onto, but you can’t see, and you can hardly move, and suddenly you feel as if you can’t breathe even though your dead lungs don’t work anyway—\n\n\t\tYou close your eyes and try to relax. This is no time to panic. Taking a deep breath, you reach out as far as you can, your fingers wriggling against the metal, and grab the first piece of machinery that comes into your reach. Then you brace yourself and pull, hard.\n\n\t\tThe little white car lurches, and you can imagine it streaking across the road, flashing like a drunken meteorite. You hear muffled curses from the driver’s seat. \n\n\t\tAfter that, you feel more comfortable, and begin to step up your game. At first it’s little things—left turn signals when he wants right turn signals, or indicators going off when absolutely nothing is wrong, or touchy brakes. You’re careful never to hurt anyone, but even you have to admit that you’ve cut it close a few times. As time goes on, you begin to feel at home in the metal belly of the car. Nothing is beyond your reach: the car is fully at your command, and no matter how much the boy wants to think that this is his machine, you are its master. \n\n\t\tBut it is not to last.\n\t\t*page_break\n\t\tJust when you’re starting to think that your antics are about to get this graveyard desecrator into some serious trouble—you’ve already heard the pleasing shriek of police sirens behind you on several occasions—you realize a flaw in your genius plan. It happens one day when the kid is clearly driving to his parents’ house to ask for money, which, you’ve noticed, he has to do fairly often. He’s decided he needs a new car. You’ve decided you could do with a challenge.\n\n\t\tInterested in hearing the conversation—and, to be fully honest, a little eager to hear him talk about your little antics—you begin to wriggle out of your comfortable position within the belly of the car. Metal seems to grab you with hot hands. The walls close in. You can’t move, you can’t get out, and you can’t go anywhere.\n\n\t\tYou’re trapped.\n\n\t\tYou spend an agonizing couple of hours in the parking lot while the graveyard desecrator is with his parents. You struggle and wriggle and throw your body from side to side, but it’s no good. You are completely and hopelessly trapped within this junker of a car, and that is not good. Eventually the boy comes back and gets in the car, kicking the tires on the way, and you breathe a sigh of relie
