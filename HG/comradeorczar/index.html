Prep_6\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_6\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_6\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_6\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_6\n\t*selectable_if ((Money >=3000) and (Machine_Gunner >=10)) #MG Nest (30000) (10)MG Unit(s) -(3000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -3000\n\t\t*set Money -3000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_6\n\t*selectable_if ((Money >=1000) and (Riflemen >=50)) #Rifle Trench (10000) (50)Rifle Unit(s) -(2000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -1000\n\t\t*set Riflemen -50\n\t\t*goto Prep_6\n\t*selectable_if ((Money >=4000) and (Sniper_Infantry >=30)) #Sniper Hut (40000) (30)Sniper Unit(s) -(6000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -6000\n\t\t*set Money -4000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_6\n\t*selectable_if ((Money >=10000) and (Artillery >=30)) #Artillery Array (100000) (30)Artillery Unit(s) -(20000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -10000\n\t\t*set Artillery -30\n\t\t*goto Prep_6\n\t*selectable_if (Money >=3000) #Barricade (30000) -(2000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -3000\n\t\t*goto Prep_6\n\t*selectable_if ((Money >=3000) and (Infiltrator >=5)) #Infiltrator Squad (30000) (5)Infiltrator(s) -(15000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -15000\n\t\t*set Money -3000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_6\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (20000) (5)Bombers(s) -(60000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_6\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto AH_Capture_6\n\n*label AH_Capture_6\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. After this, you will be able to own 100% of Austria-Hungary's territory. The final march of Austria-Hungary.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto AH_Capture_6\n\t*disable_reuse *selectable_if (Vehicle = true) #Vehicle Attack\n\t\tYou send vehicles against the enemy, dealing significant damage.\n\t\t*set Enemy_Mass -50000\n\t\t*goto AH_Capture_6\n\t*selectable_if (Riflemen >=10) #Rifleman \n\t\tYou send a few rifleman to their quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=50)) #Rifle Squad Of 50\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -50\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=50)) #Elite Rifle Squad Of 50\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -50\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=50)) #Very Elite Rifle Squad Of 50\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -50\n\t\t*goto AH_Capture_6\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=50)) and (Machine_Gunner >=10)) #MG Phalanx\n\t\tLight machine gunners wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -50\n\t\t*set Machine_Gunner -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=10)) #machine gunner\n\t\tThe machine gunners opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=10)) #Sniper\n\t\tThe snipers gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=10) and (Artillery >=10)) #Artillery Strike \n\t\tYou fire some Artillery. They use some of their very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=2000)) #Rifle Rush X2000\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -700000\n\t\t*set Riflemen -2000\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1000)) #Heavy Artillery Strike X1000\n\t\tYou fire 1000 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -1000\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=10)) #Rocket Launcher\n\t\tAn AT squad gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=10) and (Tank >=10)) #Tank!!!\n\t\tYou send out a tank squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Flamer >=10)) #Flamer\n\t\tYou send out a flamer squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=10)) #Scorcher\n\t\tYou send out a scorcher squad to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +50\n\t\t*set Scorcher -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Airplane >=10)) #Airplane\n\t\tYou send out a airplane squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Bomber >=10)) #Bomber\n\t\tYou send out a bomber squad to do its business. It uses its bombs and is available as a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -10\n\t\t*set Airplane +10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Gas >=10)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set Enemy_Mass -15000\n\t\t*set Gas -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Infiltrator >=10)) #Infiltrator\n\t\tYou send out a Infiltrator squad to do its business. They steal enemy war funds.\n\t\t*set Enemy_Mass -25000\n\t\t*set Money +5000\n\t\t*set Infiltrator -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Marxman >=10)) #Marxman\n\t\tYou send out a Marxman squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Marxman -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Czar_Guard >=10)) #Czar Guard\n\t\tYou send out a Czar Guard squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Czar_Guard -10\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Heavy >=50)) #Heavy Squad\n\t\tYou send out a heavy squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Heavy -50\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Russia >=50)) #R.U.S.S.I.A. Squad\n\t\tYou send out a R.U.S.S.I.A. squad to do its business. It experiences minimal casualties.\n\t\t*set Enemy_Mass -100000\n\t\t*set Russia -1\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Experiment >=1)) #Send An Abomination\n\t\tYou unleash the experiment. It kills very many and escapes.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Experiment -1\n\t\t*goto AH_Capture_6\n\t*selectable_if ((Army_Power >=40) and (Failed_Experiment >=100)) #Release The Failed Experiments (100)\n\t\tYou unleash the experiments. They kill very many and are put out of their misery.\n\t\t*set Enemy_Mass -20000\n\t\t*set Failed_Experiment -100\n\t\t*goto AH_Capture_6\n\t*disable_reuse *selectable_if (Anti_Tank >=50) #Rapid Rockets\n\t\tYour rocket launcher infantry manage to fire rapidly in order to make it almost impossible for the foes to retaliate.\n\t\t*set Enemy_Mass -1200000\n\t\t*goto AH_Capture_6\n\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful battle!\n\t\t*set Enemy_Mass 0\n\t\t*set Money +100000\n\t\t*goto Meeting_2\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Meeting_2\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n*label Meeting_2\n\nYour allies meet in Moscow again to discuss your growth. They are a bit scared of your fast growth in power. With your population and enough guns, you could replace Germany as the world superpower. Italy follows France's lead and asks for the land you conquered. The Balkans oppose this again with all their power and cite that the Austrian-Hungarians attacked them, causing lots of damage and death. The west with Italy, the east with the Balkans. The field is split, its up to you. The US is offering some money under the table, they may not want you to have a bigger door to Germany...\n\n*choice\n\n\t#Leave It\n\t\tYou accept Italy's offer. The Balkans are happy the Ottomans are gone.\n\t\t*set Money +100000\n\t\t*goto Fix_7\n\t#Keep It\n\t\tThe US shoots a dirty look at you as Russia grows.\n\t\t*set Land +10\n\t\t*set Civilian +200\n\t\t*goto Fix_7\n\n*label Fix_7\n\nYou have Russia's military and science much better than before, but you think of your past life. A poor civilian who hated the government for not helping the impoverished. They people thought they would have a better life now that a poor person rose to power. Industry once lagged far behind and allowed foreigners to exploit your workforce for a large amount of money. Corruption is still endemic, as shown by Stalin. You need to improve agriculture for higher civilian growth, factories for money, and many more things. It is time for the rebirth of Russia!\n\n*choice\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Factory (150000) (30)\n\t\tYou build a factory and employ workers.\n\t\t*set Industry +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_7\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Farm (150000) (30)\n\t\tYou build a farm and employ workers.\n\t\t*set Agriculture +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_7\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Reform Constitution (150000) (30)\n\t\tYou build an office and employ scribes.\n\t\t*set State +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_7\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Welfare Policies (150000) (30)\n\t\tYou build an unemployment office and employ workers.\n\t\t*set Welfare +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_7\n\n\t*disable_reuse *selectable_if ((Money >=10000) and (Lab = true)) #Plant Research Lab (10000)\n\t\tYou make the plant breeding lab, improving agriculture and allowing more people to eat.\n\t\t*set Agriculture +20\n\t\t*set Welfare +5\n\t\t*set Money -10000\n\t\t*goto Fix_7\n\n\t#Done\n\t\tYou feel you have improved Russia.\n\t\t*goto Test_7\n\n*label Test_7\n\nYou have gotten two foes, now the big one stands in your way. Germany, the power of the world is preparing to fight you. Your moral is shrinking. People do not believe you can beat Germany. Time to prove them wrong! The Americans and other allies are stationed on their west front, you are on the east front. This will be one of 2 battles, then you may turn your sights else where... You can keep the victory streak going! You will expend 10X the units per attack. You have restarted science so now you can unlock new units. What shall you unlock?\n\nYou have$${Money}\n\n*choice\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Sniper_Infantry >=5)) and (Communist >=70)) #Marxmen (50000) (5 Snipers)\n\t\tYou develop better zoom and stability along with high caliber ammo. You give them Communist symbols.\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -5\n\t\t*set Marx true\n\t\t*set Marxman +5\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Machine_Gunner >=5)) and (Czarist >=70)) #Czar Guards (50000) (5 MGs)\n\t\tYou give them portable machine gun stands, make the guns lighter, and get rags to cool it along with Czarist symbols.\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -5\n\t\t*set Guard true\n\t\t*set Czar_Guard +5\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Riflemen >=50)) #Heavy (500000) (50 Riflemen)\n\t\tYou give heavy, lightweight armor to riflemen and pockets containing supplies.\n\t\t*set Money -500000\n\t\t*set Riflemen -50\n\t\t*set Hev true\n\t\t*set Heavy +50\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=1000000) and (Heavy >=50)) #R.U.S.S.I.A. Troops (1000000) (50 Heavies)\n\t\tYou train 50 veterans for the [b]R[/b]ussian [b]U[/b]nit of [b]S[/b]uper [b]S[/b]oldier [b]I[/b]nfantry in [b]A[/b]rmor. Only one survives...\n\t\t*set Money -1000000\n\t\t*set Heavy -50\n\t\t*set Russland true\n\t\t*set Russia +1\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Artillery >=5)) #Gas (50000) (5 Artillery)\n\t\tYou modify the chemicals in the flare shells and others making a lethal gas.\n\t\t*set Money -50000\n\t\t*set Artillery -5\n\t\t*set Gasser true\n\t\t*set Gas +5\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Gas >=5)) #Infiltrator (200000) (5 Gas)\n\t\tYou give stealth corps in dark, strong armor gas and instruct them to open the gas bombs and hide them.\n\t\t*set Money -200000\n\t\t*set Gas -5\n\t\t*set Infil true\n\t\t*set Infiltrator +5\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Tank >=5)) #Planes (200000) (5 Tank)\n\t\tYou study engines and make one powerful enough to take multiple guns and bullets into the air.\n\t\t*set Money -200000\n\t\t*set Tank -5\n\t\t*set Air true\n\t\t*set Airplane +5\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=400000) and (Airplane >=5)) #Bombers (400000) (5 Airplane)\n\t\tYou equip planes with better engines, bigger wings, and strong bombs, keeping the original guns on board.\n\t\t*set Money -400000\n\t\t*set Airplane -5\n\t\t*set Bomb true\n\t\t*set Bomber +5\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=100000) and (Anti_Tank >=5)) #Flamer (100000) (5 Anti-Tank)\n\t\tYou make rocket propellant give off a slow burn. The result; nightmares only 2nd to weapons of mass destruction.\n\t\t*set Money -100000\n\t\t*set Anti_Tank -5\n\t\t*set Fire true\n\t\t*set Flamer +5\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=300000) and (Flamer >=5)) #Scorcher (300000) (5 Flamer)\n\t\tYou develop full-body fire retardant suits and give heavy flame throwers. Destroys spies.\n\t\t*set Money -300000\n\t\t*set Flamer -5\n\t\t*set Scorch true\n\t\t*set Scorcher +5\n\t\t*goto Test_7\n\n\t*selectable_if ((Money >=30000) and (Civilian >=50)) #Prisoner Experiments (30000) (50 Civilians)\n\t\tYou give death row prisoners to the lab. The 20% that survived are now sick and have experienced mutations.\n\t\t*set Money -30000\n\t\t*set Civilian -50\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Skin (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The skin of the successful had grown crystals.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Stone_Skin true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Chemicals (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The brain of the successful had produced growth hormones.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Chem true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Immunity (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The body of the successful had been immune to pathogens.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Immune true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_7\n\n\t*disable_reuse *selectable_if (((Stone_Skin = true) and (Immune = true)) and (Chem = true)) #Abomination\n\t\tWhat have you done!?! You have made an abomination!!!\n\t\t*set Exper true\n\t\t*set Experiment +1\n\t\t*achieve dark\n\t\t*set Moral -30\n\t\t*goto Test_7\n\n\t#Done\n\t\tYou get ready to tax civilians.\n\t\t*goto Tax_7\n\n*label Tax_7\n\n*set Money +(1000 * Industry)\n*set Civilian +(50 * Agriculture)\n*set Riflemen +(30 * State)\n\nPopulation grows from Agriculture, Profits grow from Industry, army grows from State propaganda, and you have developed socialist taxing. You are ready to tax. The researching was very expensive. You have many civilians under your control. The Germans are mobilizing and preparing for more war with you. You need to afford your units and upgraded units. You are controlling all of Russia. The Germans are at their brink of collapse as Russia once was. Finish them and establish your government there. For the motherland! For Serbia!\n\nTime to tax. High gives $30 per civilian, medium gives $20, and low give $10. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular.  Get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -50\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_7\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_7\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +50\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_7\n\t*if (Contentment >=50) #Socialist Taxes\n\t\tYou tax the rich more and the poor less. The richer the people, the more money! Many enjoy this as a tax method.\n\t\t*set Civilian +10\n\t\t*set Contentment +5\n\t\t*set Money +(Welfare * Civilian)\n\t\t*goto Conscript_7\n\n*label Street_2\n\nYou go for a walk in the streets of Russia. You see many buildings, but only a few appeal to you. There is the good old Gypsy House, the training grounds, the school, and the market. Where do you go?\n\n*choice\n\n\t#School\n\t\tYou go to the school.\n\t\t*goto School_2\n\t#Training Grounds\n\t\tYou go to the training grounds\n\t\t*goto Train_2\n\t#Gypsy House\n\t\tYou go to the Gypsy House.\n\t\t*goto Gypsy_2\n\t#Market\n\t\tYou go to the market.\n\t\t*goto Market_2\n\t#None\n\t\tYou go to tax civilians.\n\t\t*goto Conscript_7\n\n*label School_2\n\nYou arrive at the school where many children greet you. One shows a picture the made of you. The entire class shows up to listen to your words. Speaking of which, what are your words?\n\n*choice\n\n\t#I Would Like Money\n\t\tThe kids empty their pockets and give you a small sum of money\n\t\t*set Moral -20\n\t\t*set Money +5000\n\t\t*goto Conscript_7\n\t#Study Hard\n\t\tThe kids obey and you hear that they turn in their work more often, improving the literacy rate.\n\t\t*set Welfare +10\n\t\t*goto Conscript_7\n\t#Grow To Work\n\t\tThe kids obey and work with their hands during their free time.\n\t\t*set Industry +5\n\t\t*set Agriculture +10\n\t\t*goto Conscript_7\n\n*label Train_2\n\nYou enter the grounds and to your left you see someone doing very many push-ups. A high-ranking official spots you and calls the units to- ATTENTION! The soldiers face you and you think of what to do. The thing you think of is...\n\n*choice\n\n\t#Train Some Yourself\n\t\tYou train some riflemen hard, then give them armor.\n\t\t*set Riflemen -50\n\t\t*set Heavy +50\n\t\t*goto Conscript_7\n\t#Give A Speech\n\t\tThe soldiers salute the amazing speech and some nosy civilians join the army.\n\t\t*set Civilian -100\n\t\t*set Riflemen +100\n\t\t*goto Conscript_7\n\t#Give A Gift\n\t\tYou give everyone an equal amount of money for their service\n\t\t*set Moral +20\n\t\t*set Money -10000\n\t\t*set Welfare +10\n\t\t*goto Conscript_7\n\n*label Market_2\n\nYou arrive at the crowded market place and you see farmers selling chickens, farmers selling bread. You think about how much of Russia is made of farmers. There is also homeless people sleeping on old logs. People start looking at you. What do you do?\n\n*choice\n\n\t#Buy Food For Others\n\t\tYou buy food for the homeless, helping them and the farmers.\n\t\t*set Money -5000\n\t\t*set Welfare +5\n\t\t*set Agriculture +10\n\t\t*goto Conscript_7\n\t#Talk About Russia\n\t\tYou inspire people. They get jobs in factories and the army.\n\t\t*set Civilian -50\n\t\t*set Riflemen +50\n\t\t*set Industry +5\n\t\t*goto Conscript_7\n\t#Ask For Money\n\t\tThe farmers can afford to give you money, so they do!\n\t\t*set Money +20000\n\t\t*goto Conscript_7\n\n*label Gypsy_2\n\nBefore you manage to discuss new buildings, you see a house that is purple, yellow, and red striped. When you enter, there is a number of gypsies that look at you, one is familiar. They have a deal for you. There is a contest for people. The contest was held to help Russia get better. They have ideas that they need to be made. If you can provide them money, those ideas may come into fruition and you can use them to better Russia. \n\nOne idea is to have a multi rocket launch platform on important areas to stop bombings ($50000)\n\nAnother is radio propaganda. That would allow Russian Ideas to spread faster. ($100000)\n\nFinally, there is an idea about bribing enemy radio officials to slightly exaggerate about the size of your army to lower the moral and amount of enemy soldiers.. ($100000)\n\nWhich do you want?\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=20000) #Rocket\n\t\tYou decide to fund the rockets.\n\t\t*set Rocket true\n\t\t*set Money -20000\n\t\t*goto Gypsy_2\n\n\t*disable_reuse *selectable_if (Money >=25000) #Radio\n\t\tYou decide to fund the radio propaganda.\n\t\t*set Radio true\n\t\t*set Money -25000\n\t\t*goto Gypsy_2\n\n\t*disable_reuse *selectable_if (Money >=10000) #Bribes\n\t\tYou decide to fund the decoy army.\n\t\t*set Decoy true\n\t\t*set Money -10000\n\t\t*goto Gypsy_2\n\n\t*disable_reuse #Talk To The Gypsies\n\t\tYou find a familiar gypsy with a familiar voice. \"You are back NicolÆ!\" the gypsy cries, using their language as your name \"I have expected you. I see allies no longer allies. They are forcing you. I see the possibility of large death and a Russian world.\" The gypsy lays back down.\n\t\t*goto Gypsy_2\n\n\t#Leave\n\t\tYou exit the house.\n\t\t*goto Conscript_7\n\n*label Conscript_7\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in Russia. This means you can get tanks, Artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 200,000 foes. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=3000) #Book On Leading (3000) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -3000\n\t\t*set Army_Power +10\n\t\t*goto Conscript_7\n\t*selectable_if ((Money >=500) and (Civilian >=10)) #10 Riflemen (5000) (10)\n\t\tYou get general riflemen.\n\t\t*set Riflemen +10\n\t\t*set Money -5000\n\t\t*set Civilian -10\n\t\t*goto Conscript_7\n\t*selectable_if ((Money >=20000) and (Civilian >=50)) #50 Riflemen (20000) (50)\n\t\tYou get 50 general rifleman. Cheaper.\n\t\t*set Riflemen +50\n\t\t*set Money -20000\n\t\t*set Civilian -50\n\t\t*goto Conscript_7\n\t*selectable_if ((Money >=30000) and (Civilian >=30)) #10 Tanks (30000) (30)\n\t\tYou get a TANK.\n\t\t*set Tank +10\n\t\t*set Money -30000\n\t\t*set Civilian -30\n\t\t*goto Conscript_7\n\t*selectable_if ((Money >=15000) and (Civilian >=50)) #10 Artillery (15000) (50)\n\t\tYou get Artillery.\n\t\t*set Artillery +10\n\t\t*set Money -15000\n\t\t*set Civilian -50\n\t\t*goto Conscript_7\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 Machine Gunners (15000) (10)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_7\n\t*selectable_if ((Money >=10000) and (Civilian >=10)) #10 Snipers (10000) (10)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +10\n\t\t*set Money -10000\n\t\t*set Civilian -10\n\t\t*goto Conscript_7\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 ATs (15000) (10)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=50000) and (Sniper_Infantry >=10)) and (Marx =true)) #Marxmen (50000) (10 Snipers)\n\t\tYou get a Marxman.\n\t\t*set Marxman +10\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=50000) and (Machine_Gunner >=10)) and (Guard =true)) #Czar Guards (40000) (10 MGs)\n\t\tYou get a Czar Guard.\n\t\t*set Czar_Guard +10\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=100000) and (Anti_Tank >=10)) and (Fire =true)) #Flamers (100000) (10 ATs)\n\t\tYou get a flamer.\n\t\t*set Flamer +10\n\t\t*set Money -100000\n\t\t*set Anti_Tank -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=150000) and (Flamer >=10)) and (Scorch =true)) #Scorchers (150000) (10 Flamers)\n\t\tYou get a scorcher.\n\t\t*set Scorcher +10\n\t\t*set Money -150000\n\t\t*set Flamer -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=50000) and (Artillery >=10)) and (Gasser =true)) #Gas (50000) (10 Artillery)\n\t\tYou get a gas unit.\n\t\t*set Gas +10\n\t\t*set Money -50000\n\t\t*set Artillery -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=300000) and (Gas >=10)) and (Infil =true)) #Infiltrator (300000) (10 Gas)\n\t\tYou get an Infiltrator.\n\t\t*set Infiltrator +10\n\t\t*set Money -300000\n\t\t*set Gas -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=300000) and (Tank >=10)) and (Air =true)) #Airplane (300000) (10 Tanks)\n\t\tYou get a Airplane.\n\t\t*set Airplane +10\n\t\t*set Money -300000\n\t\t*set Tank -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=600000) and (Airplane >=10)) and (Bomb =true)) #Bomber (600000) (10 Planes)\n\t\tYou get a Bomber.\n\t\t*set Bomber +10\n\t\t*set Money -600000\n\t\t*set Airplane -10\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=500000) and (Riflemen >=100)) and (Hev =true)) #Heavy (500000) (100 Riflemen)\n\t\tYou get a heavy unit.\n\t\t*set Heavy +100\n\t\t*set Money -500000\n\t\t*set Riflemen -100\n\t\t*goto Conscript_7\n\t*selectable_if (((Money >=1000000) and (Heavy >=100)) and (Russland =true)) #R.U.S.S.I.A. Troops (1000000) (100 Heavies)\n\t\tYou get a R.U.S.S.I.A troop.\n\t\t*set Russia +2\n\t\t*set Money -1000000\n\t\t*set Heavy -100\n\t\t*goto Conscript_7\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 200000\n\t\t*goto Prep_7\n\n*label Prep_7\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself. You may also pull missions to lower the Enemy Mass.  \n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*disable_reuse *selectable_if ((Money >=20000) and (Rocket = true)) #Rocket Platform (20000)\n\t\tYou build the missile defense system.\n\t\t*set Enemy_Mass -70000\n\t\t*set Money -20000\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=5000) and (Civilian >=1)) #House (5000) (/30)\n\t\tYou build a free house to increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -5000\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=1)) #Bar (5000) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -5000\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=3000) and (Civilian >=1)) #Pub (3000) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -3000\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=1)) #Sports Stadium (10000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -10000\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Med School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=3)) #Gun Range (10000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -10000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_7\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=3000) and (Machine_Gunner >=10)) #MG Nest (30000) (10)MG Unit(s) -(3000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -3000\n\t\t*set Money -3000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=1000) and (Riflemen >=50)) #Rifle Trench (10000) (50)Rifle Unit(s) -(2000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -1000\n\t\t*set Riflemen -50\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=4000) and (Sniper_Infantry >=30)) #Sniper Hut (40000) (30)Sniper Unit(s) -(6000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -6000\n\t\t*set Money -4000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=10000) and (Artillery >=30)) #Artillery Array (100000) (30)Artillery Unit(s) -(20000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -10000\n\t\t*set Artillery -30\n\t\t*goto Prep_7\n\t*selectable_if (Money >=3000) #Barricade (30000) -(2000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -3000\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=3000) and (Infiltrator >=5)) #Infiltrator Squad (30000) (5)Infiltrator(s) -(15000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -15000\n\t\t*set Money -3000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_7\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (20000) (5)Bombers(s) -(60000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_7\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto Germany_Capture_7\n\n*label Germany_Capture_7\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with them! After this, you will be able to own 20% of Germany's territory. The first march of Germany.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Germany_Capture_7\n\t*selectable_if (Riflemen >=10) #Rifleman \n\t\tYou send a few rifleman to their quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=50)) #Rifle Squad Of 50\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -50\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=50)) #Elite Rifle Squad Of 50\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -50\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=50)) #Very Elite Rifle Squad Of 50\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -50\n\t\t*goto Germany_Capture_7\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=50)) and (Machine_Gunner >=10)) #MG Phalanx\n\t\tLight machine gunners wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -50\n\t\t*set Machine_Gunner -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=10)) #machine gunner\n\t\tThe machine gunners opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=10)) #Sniper\n\t\tThe snipers gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=10) and (Artillery >=10)) #Artillery Strike \n\t\tYou fire some Artillery. They use some of their very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=2000)) #Rifle Rush X2000\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -700000\n\t\t*set Riflemen -2000\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1000)) #Heavy Artillery Strike X1000\n\t\tYou fire 1000 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -1000\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=10)) #Rocket Launcher\n\t\tAn AT squad gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=10) and (Tank >=10)) #Tank!!!\n\t\tYou send out a tank squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Flamer >=10)) #Flamer\n\t\tYou send out a flamer squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=10)) #Scorcher\n\t\tYou send out a scorcher squad to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +50\n\t\t*set Scorcher -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Airplane >=10)) #Airplane\n\t\tYou send out a airplane squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Bomber >=10)) #Bomber\n\t\tYou send out a bomber squad to do its business. It uses its bombs and is available as a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -10\n\t\t*set Airplane +10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Gas >=10)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set Enemy_Mass -15000\n\t\t*set Gas -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Infiltrator >=10)) #Infiltrator\n\t\tYou send out a Infiltrator squad to do its business. They steal enemy war funds.\n\t\t*set Enemy_Mass -25000\n\t\t*set Money +5000\n\t\t*set Infiltrator -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Marxman >=10)) #Marxman\n\t\tYou send out a Marxman squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Marxman -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Czar_Guard >=10)) #Czar Guard\n\t\tYou send out a Czar Guard squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Czar_Guard -10\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Heavy >=50)) #Heavy Squad\n\t\tYou send out a heavy squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Heavy -50\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Russia >=50)) #R.U.S.S.I.A. Squad\n\t\tYou send out a R.U.S.S.I.A. squad to do its business. It experiences minimal casualties.\n\t\t*set Enemy_Mass -100000\n\t\t*set Russia -1\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Experiment >=1)) #Send An Abomination\n\t\tYou unleash the experiment. It kills very many and escapes.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Experiment -1\n\t\t*goto Germany_Capture_7\n\t*selectable_if ((Army_Power >=40) and (Failed_Experiment >=100)) #Release The Failed Experiments (100)\n\t\tYou unleash the experiments. They kill very many and are put out of their misery.\n\t\t*set Enemy_Mass -20000\n\t\t*set Failed_Experiment -100\n\t\t*goto Germany_Capture_7\n\t*disable_reuse *selectable_if (Machine_Gunner >=100) #Bullet Storm\n\t\tYour machine gunners make bullets cover the battle field. Cover is destroyed and supply lines die.\n\t\t*set Enemy_Mass -500000\n\t\t*goto Germany_Capture_7\n\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful battle!\n\t\t*set Enemy_Mass 0\n\t\t*set Money +300000\n\t\t*goto Fix_8\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Fix_8\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n*label Fix_8\n\nYou have Russia's military and science much better than before, but you think of your past life. A poor civilian who hated the government for not helping the impoverished. They people thought they would have a better life now that a poor person rose to power. Industry still lags far behind and you allow foreigners to exploit your workforce for a large amount of money. Corruption is still endemic, as shown by Stalin. You need to improve agriculture for higher civilian growth, factories for money, and many more things. It is time for the rebirth of Russia!\n\n*choice\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Factory (150000) (30)\n\t\tYou build a factory and employ workers.\n\t\t*set Industry +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_8\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Farm (150000) (30)\n\t\tYou build a farm and employ workers.\n\t\t*set Agriculture +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_8\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Reform Constitution (150000) (30)\n\t\tYou build an office and employ scribes.\n\t\t*set State +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_8\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Welfare Policies (150000) (30)\n\t\tYou build an unemployment office and employ workers.\n\t\t*set Welfare +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_8\n\n\t*disable_reuse *selectable_if ((Money >=20000) and (Radio = true)) #Radio Propaganda (20000)\n\t\tYou build a radio center and distribute radios for propaganda purposes.\n\t\t*set State +25\n\t\t*set Money -20000\n\t\t*goto Fix_8\n\n\t#Done\n\t\tYou feel you have improved Russia.\n\t\t*goto Test_8\n\n*label Test_8\n\nThe final march! Your soldiers are running through German territory. The cause of this quick, quick victory is due to two new variables that were not in other conquests. One is the allied support you are getting from the west. Another is the increased moral of your army. People are buying vodka and setting up decorations for the returns of their family. You are not enjoying yourself yet; knowing some may not live to make the day. If the allies turn hostile; you have devised a plan you call Молниеносный удар, hit them fast- and hard. You can keep the victory streak going! You will expend 10X the units per attack. You have restarted science so now you can unlock new units. What shall you unlock?\n\nYou have$${Money}\n\n*choice\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Sniper_Infantry >=5)) and (Communist >=70)) #Marxmen (50000) (5 Snipers)\n\t\tYou develop better zoom and stability along with high caliber ammo. You give them Communist symbols.\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -5\n\t\t*set Marx true\n\t\t*set Marxman +5\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Machine_Gunner >=5)) and (Czarist >=70)) #Czar Guards (50000) (5 MGs)\n\t\tYou give them portable machine gun stands, make the guns lighter, and get rags to cool it along with Czarist symbols.\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -5\n\t\t*set Guard true\n\t\t*set Czar_Guard +5\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Riflemen >=50)) #Heavy (500000) (50 Riflemen)\n\t\tYou give heavy, lightweight armor to riflemen and pockets containing supplies.\n\t\t*set Money -500000\n\t\t*set Riflemen -50\n\t\t*set Hev true\n\t\t*set Heavy +50\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=1000000) and (Heavy >=50)) #R.U.S.S.I.A. Troops (1000000) (50 Heavies)\n\t\tYou train 50 veterans for the [b]R[/b]ussian [b]U[/b]nit of [b]S[/b]uper [b]S[/b]oldier [b]I[/b]nfantry in [b]A[/b]rmor. Only one survives...\n\t\t*set Money -1000000\n\t\t*set Heavy -50\n\t\t*set Russland true\n\t\t*set Russia +1\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Artillery >=5)) #Gas (50000) (5 Artillery)\n\t\tYou modify the chemicals in the flare shells and others making a lethal gas.\n\t\t*set Money -50000\n\t\t*set Artillery -5\n\t\t*set Gasser true\n\t\t*set Gas +5\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Gas >=5)) #Infiltrator (200000) (5 Gas)\n\t\tYou give stealth corps in dark, strong armor gas and instruct them to open the gas bombs and hide them.\n\t\t*set Money -200000\n\t\t*set Gas -5\n\t\t*set Infil true\n\t\t*set Infiltrator +5\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Tank >=5)) #Planes (200000) (5 Tank)\n\t\tYou study engines and make one powerful enough to take multiple guns and bullets into the air.\n\t\t*set Money -200000\n\t\t*set Tank -5\n\t\t*set Air true\n\t\t*set Airplane +5\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=400000) and (Airplane >=5)) #Bombers (400000) (5 Airplane)\n\t\tYou equip planes with better engines, bigger wings, and strong bombs, keeping the original guns on board.\n\t\t*set Money -400000\n\t\t*set Airplane -5\n\t\t*set Bomb true\n\t\t*set Bomber +5\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=100000) and (Anti_Tank >=5)) #Flamer (100000) (5 Anti-Tank)\n\t\tYou make rocket propellant give off a slow burn. The result; nightmares only 2nd to weapons of mass destruction.\n\t\t*set Money -100000\n\t\t*set Anti_Tank -5\n\t\t*set Fire true\n\t\t*set Flamer +5\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=300000) and (Flamer >=5)) #Scorcher (300000) (5 Flamer)\n\t\tYou develop full-body fire retardant suits and give heavy flame throwers. Destroys spies.\n\t\t*set Money -300000\n\t\t*set Flamer -5\n\t\t*set Scorch true\n\t\t*set Scorcher +5\n\t\t*goto Test_8\n\n\t*selectable_if ((Money >=30000) and (Civilian >=50)) #Prisoner Experiments (30000) (50 Civilians)\n\t\tYou give death row prisoners to the lab. The 20% that survived are now sick and have experienced mutations.\n\t\t*set Money -30000\n\t\t*set Civilian -50\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Skin (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The skin of the successful had grown crystals.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Stone_Skin true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Chemicals (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The brain of the successful had produced growth hormones.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Chem true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Immunity (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The body of the successful had been immune to pathogens.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Immune true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_8\n\n\t*disable_reuse *selectable_if (((Stone_Skin = true) and (Immune = true)) and (Chem = true)) #Abomination\n\t\tWhat have you done!?! You have made an abomination!!!\n\t\t*set Exper true\n\t\t*set Experiment +1\n\t\t*achieve dark\n\t\t*set Moral -30\n\t\t*goto Test_8\n\n\t#Done\n\t\tYou get ready to tax civilians.\n\t\t*goto Tax_8\n\n*label Tax_8\n\n*set Money +(1000 * Industry)\n*set Civilian +(50 * Agriculture)\n*set Riflemen +(30 * State)\n\nPopulation grows from Agriculture, Profits grow from Industry, army grows from State propaganda, and you have developed socialist taxing. You are ready to tax. The researching was very expensive. You have many civilians under your control. The Germans are mobilizing and preparing for more war with you. You need to afford your units and upgraded units. You are controlling all of Russia.\n\nTime to tax. High gives $30 per civilian, medium gives $20, and low give $10. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular.  Get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -50\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_8\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_8\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +50\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_8\n\t*if (Contentment >=50) #Socialist Taxes\n\t\tYou tax the rich more and the poor less. The richer the people, the more money! Many enjoy this as a tax method.\n\t\t*set Civilian +10\n\t\t*set Contentment +5\n\t\t*set Money +(Welfare * Civilian)\n\t\t*goto Conscript_8\n\n*label Conscript_8\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in Russia. This means you can get tanks, Artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 400,000 foes. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=3000) #Book On Leading (3000) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -3000\n\t\t*set Army_Power +10\n\t\t*goto Conscript_8\n\t*selectable_if ((Money >=500) and (Civilian >=10)) #10 Riflemen (5000) (10)\n\t\tYou get general riflemen.\n\t\t*set Riflemen +10\n\t\t*set Money -5000\n\t\t*set Civilian -10\n\t\t*goto Conscript_8\n\t*selectable_if ((Money >=20000) and (Civilian >=50)) #50 Riflemen (20000) (50)\n\t\tYou get 50 general rifleman. Cheaper.\n\t\t*set Riflemen +50\n\t\t*set Money -20000\n\t\t*set Civilian -50\n\t\t*goto Conscript_8\n\t*selectable_if ((Money >=30000) and (Civilian >=30)) #10 Tanks (30000) (30)\n\t\tYou get a TANK.\n\t\t*set Tank +10\n\t\t*set Money -30000\n\t\t*set Civilian -30\n\t\t*goto Conscript_8\n\t*selectable_if ((Money >=15000) and (Civilian >=50)) #10 Artillery (15000) (50)\n\t\tYou get Artillery.\n\t\t*set Artillery +10\n\t\t*set Money -15000\n\t\t*set Civilian -50\n\t\t*goto Conscript_8\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 Machine Gunners (15000) (10)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_8\n\t*selectable_if ((Money >=10000) and (Civilian >=10)) #10 Snipers (10000) (10)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +10\n\t\t*set Money -10000\n\t\t*set Civilian -10\n\t\t*goto Conscript_8\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 ATs (15000) (10)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=50000) and (Sniper_Infantry >=10)) and (Marx =true)) #Marxmen (50000) (10 Snipers)\n\t\tYou get a Marxman.\n\t\t*set Marxman +10\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=50000) and (Machine_Gunner >=10)) and (Guard =true)) #Czar Guards (40000) (10 MGs)\n\t\tYou get a Czar Guard.\n\t\t*set Czar_Guard +10\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=100000) and (Anti_Tank >=10)) and (Fire =true)) #Flamers (100000) (10 ATs)\n\t\tYou get a flamer.\n\t\t*set Flamer +10\n\t\t*set Money -100000\n\t\t*set Anti_Tank -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=150000) and (Flamer >=10)) and (Scorch =true)) #Scorchers (150000) (10 Flamers)\n\t\tYou get a scorcher.\n\t\t*set Scorcher +10\n\t\t*set Money -150000\n\t\t*set Flamer -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=50000) and (Artillery >=10)) and (Gasser =true)) #Gas (50000) (10 Artillery)\n\t\tYou get a gas unit.\n\t\t*set Gas +10\n\t\t*set Money -50000\n\t\t*set Artillery -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=300000) and (Gas >=10)) and (Infil =true)) #Infiltrator (300000) (10 Gas)\n\t\tYou get an Infiltrator.\n\t\t*set Infiltrator +10\n\t\t*set Money -300000\n\t\t*set Gas -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=300000) and (Tank >=10)) and (Air =true)) #Airplane (300000) (10 Tanks)\n\t\tYou get a Airplane.\n\t\t*set Airplane +10\n\t\t*set Money -300000\n\t\t*set Tank -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=600000) and (Airplane >=10)) and (Bomb =true)) #Bomber (600000) (10 Planes)\n\t\tYou get a Bomber.\n\t\t*set Bomber +10\n\t\t*set Money -600000\n\t\t*set Airplane -10\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=500000) and (Riflemen >=100)) and (Hev =true)) #Heavy (500000) (100 Riflemen)\n\t\tYou get a heavy unit.\n\t\t*set Heavy +100\n\t\t*set Money -500000\n\t\t*set Riflemen -100\n\t\t*goto Conscript_8\n\t*selectable_if (((Money >=1000000) and (Heavy >=100)) and (Russland =true)) #R.U.S.S.I.A. Troops (1000000) (100 Heavies)\n\t\tYou get a R.U.S.S.I.A troop.\n\t\t*set Russia +2\n\t\t*set Money -1000000\n\t\t*set Heavy -100\n\t\t*goto Conscript_8\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 400000\n\t\t*goto Prep_8\n\n*label Prep_8\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself. You may also pull missions to lower the Enemy Mass.  \n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*disable_reuse *selectable_if ((Industry >=20) and (Welfare >=20)) #Create Great Russian War Palace (Industry and Welfare > or =20)\n\t\tYou make the GRWP and you train some soldiers in there instilling them with love for Russia.\n\t\t*set Russia +50\n\t\t*set Marxman +30\n\t\t*set Czar_Guard +30\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=5000) and (Civilian >=1)) #House (5000) (/30)\n\t\tYou build a free house to increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -5000\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=1)) #Bar (5000) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -5000\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=3000) and (Civilian >=1)) #Pub (3000) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -3000\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=1)) #Sports Stadium (10000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -10000\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Med School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=3)) #Gun Range (10000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -10000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_8\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=3000) and (Machine_Gunner >=10)) #MG Nest (30000) (10)MG Unit(s) -(30000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -30000\n\t\t*set Money -3000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=1000) and (Riflemen >=50)) #Rifle Trench (10000) (50)Rifle Unit(s) -(20000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -1000\n\t\t*set Riflemen -50\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=4000) and (Sniper_Infantry >=30)) #Sniper Hut (40000) (30)Sniper Unit(s) -(60000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -4000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=10000) and (Artillery >=30)) #Artillery Array (100000) (30)Artillery Unit(s) -(200000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200000\n\t\t*set Money -10000\n\t\t*set Artillery -30\n\t\t*goto Prep_8\n\t*selectable_if (Money >=3000) #Barricade (30000) -(20000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -3000\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=3000) and (Infiltrator >=5)) #Infiltrator Squad (30000) (5)Infiltrator(s) -(150000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -150000\n\t\t*set Money -3000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_8\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (20000) (5)Bombers(s) -(600000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -600000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_8\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto Germany_Capture_8\n\n*label Germany_Capture_8\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with them! After this, you will be able to own 50% of Germany's territory. The final march of Germany.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Germany_Capture_8\n\t*selectable_if (Riflemen >=10) #Rifleman \n\t\tYou send a few rifleman to their quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=50)) #Rifle Squad Of 50\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -50\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=50)) #Elite Rifle Squad Of 50\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -50\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=50)) #Very Elite Rifle Squad Of 50\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -50\n\t\t*goto Germany_Capture_8\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=50)) and (Machine_Gunner >=10)) #MG Phalanx\n\t\tLight machine gunners wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -50\n\t\t*set Machine_Gunner -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=10)) #machine gunner\n\t\tThe machine gunners opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=10)) #Sniper\n\t\tThe snipers gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=10) and (Artillery >=10)) #Artillery Strike \n\t\tYou fire some Artillery. They use some of their very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=2000)) #Rifle Rush X2000\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -700000\n\t\t*set Riflemen -2000\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1000)) #Heavy Artillery Strike X1000\n\t\tYou fire 1000 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -1000\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=10)) #Rocket Launcher\n\t\tAn AT squad gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=10) and (Tank >=10)) #Tank!!!\n\t\tYou send out a tank squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Flamer >=10)) #Flamer\n\t\tYou send out a flamer squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=10)) #Scorcher\n\t\tYou send out a scorcher squad to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +50\n\t\t*set Scorcher -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Airplane >=10)) #Airplane\n\t\tYou send out a airplane squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Bomber >=10)) #Bomber\n\t\tYou send out a bomber squad to do its business. It uses its bombs and is available as a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -10\n\t\t*set Airplane +10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Gas >=10)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set Enemy_Mass -15000\n\t\t*set Gas -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Infiltrator >=10)) #Infiltrator\n\t\tYou send out a Infiltrator squad to do its business. They steal enemy war funds.\n\t\t*set Enemy_Mass -25000\n\t\t*set Money +5000\n\t\t*set Infiltrator -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Marxman >=10)) #Marxman\n\t\tYou send out a Marxman squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Marxman -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Czar_Guard >=10)) #Czar Guard\n\t\tYou send out a Czar Guard squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Czar_Guard -10\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Heavy >=50)) #Heavy Squad\n\t\tYou send out a heavy squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Heavy -50\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Russia >=50)) #R.U.S.S.I.A. Squad\n\t\tYou send out a R.U.S.S.I.A. squad to do its business. It experiences minimal casualties.\n\t\t*set Enemy_Mass -100000\n\t\t*set Russia -1\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Experiment >=1)) #Send An Abomination\n\t\tYou unleash the experiment. It kills very many and escapes.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Experiment -1\n\t\t*goto Germany_Capture_8\n\t*selectable_if ((Army_Power >=40) and (Failed_Experiment >=100)) #Release The Failed Experiments (100)\n\t\tYou unleash the experiments. They kill very many and are put out of their misery.\n\t\t*set Enemy_Mass -20000\n\t\t*set Failed_Experiment -100\n\t\t*goto Germany_Capture_8\n\t*disable_reuse *selectable_if (Exper =true) #True Fear\n\t\tYou mail pictures of your experiments to the Germans. The fear the worst and head for safety, leaving their army...\n\t\t*set Enemy_Mass -5000000\n\t\t*goto Germany_Capture_8\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful battle!\n\t\t*set Enemy_Mass 0\n\t\t*set Money +300000\n\t\t*set Civilian +50\n\t\t*goto Hitler\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Hitler\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n*label Hitler\n\nYou walk through your newly conquered territory, waiting for the meeting from your former allies (you despise each other). Then you see a German driving a supply truck. Some unknown force makes you ask his name. He says [b]Hitler[/b]. That unknown force makes you instantly hate him. You have a pistol with you for protection. Shall you pop a bullet into his skull for a feeling in your gut?\n\n*choice\n\n\t#Certainly!\n\t\tYou kill him and nobody bats an eye. You feel you have saved the world and destroyed it at the same time.\n\t\t*set Sniper +5\n\t\t*set Civilian -1\n\t\t*goto Meeting_3\n\t#Nah\n\t\tWhy kill someone just because you want to? Ow, your gut...\n\t\t*goto Meeting_3\n\n*label Meeting_3\n\nYour allies meet in Moscow again to discuss your growth. They are a bit scared of your fast growth in power. With your population and enough guns, you could replace Germany as the world superpower. The US follows Wester Europe's lead and asks for the land you conquered. The peasants oppose this again with all their power and cite that the Germans attacked them, causing lots of damage and death. The Rich with the US, the poor with the impoverished. The field is split, its up to you. The Allies proclaim if you do not drop Germany the will make you. Through war. The people of the world tire of war. Therefore, in order to succeed, you must win fast; in two attacks. Then again, Germany may retain some of its power that you can absorb into Russia... As you leave the new leader of [b]Albania[/b]; [b]Albnoob[/b] tells you, he would help you for your life story. You give it to him and you are disappointed when he says you need all character skills at level 100 or more by the attack against the US. Whatever that means...\n\n*choice\n\n\t#Leave It\n\t\tYou drop Germany. The people rejoice at the end of war!\n\t\t*set Money +100000\n\t\t*goto Decide\n\t#Keep It\n\t\tThe leaders jot out of the Kremlin, hoping not to get shot and you are prepared for World War II.\n\t\t*set Land +10\n\t\t*set Civilian +500\n\t\t*set Industry +10\n\t\t*set Welfare +20\n\t\t*goto Allot\n\n*label Decide\n\nYou have averted crisis. But you think about it. Who are they to make such a demand? You need to show who is boss by obtaining all land ravaged by war and mobilizing while they rejoice. The people were against World War II, but now they indulge in German goods smuggled by the soldiers that marched into Berlin and wish to have the world at their finger tips. [b]War[/b] or [b]Peace[/b]?\n\n*choice\n\n\t#War!\n\t\tYou prepare your army until it is noticed. Then you declare war.\n\t\t*set Riflemen +2000\n\t\t*goto Allot\n\t#Peace\n\t\tYou decide a petty rivalry is nothing compared to death and destruction.\n\t\t*achieve crisis\n\t\t*goto Leader\n\n*label Allot\n\nIf you going to pull out your plan Молниеносный удар, you will need to do it fast. You can use vehicles and trains to conquer Eurasia quickly and your new navy can pull out attacks on islands and other continents at the same time. To pull this off though, you will need some help. You have narrowed down a list of potential leaders that each have something the want to bring.\n\nThere is Maksim Savely, a local business owner who has hired someone to record all of your recent battles and has given his business to the government. He follows your tactics and wishes to expand his business with his new power, providing jobs and industry.\n\nThere is Varlaam Timofei, a 12 year old child prodigy who has become Russia favorite child as a chess champion who led his village to victory after a German attack through the best tactics. He wishes to expand education for the people, increasing welfare.\n\nThere is also Ludmila Ninel, a persevering peasant that managed to feed her entire village in the winter with failing crops. She may not be a great general, but she knows great farming tips and people love her.\n\nAlong with them, there is Jędrzej Aureliusz, an old, hardened general from Poland that cleared his city of corruption through some smart moves. In addition to his political power, he also can lead a small force to destroy a giant force.\n\nLast, but not least is Vladislav Jevrem, a Serbian nationalist that led a small pocket of unconquered territory in a war-torn country. He can fight, lead, build, and many other things, improving much.\n\n*choice\n\n\t#Maksim Savely\n\t\tYou call him into your office. He looks very happy and uses his power to help Russia.\n\t\t*set Industry +20\n\t\t*goto Fix_9\n\t#Varlaam Timofei\n\t\tHe walks to your office and he already knows what you want. He accepts it, improving Russia\n\t\t*set Welfare +20\n\t\t*goto Fix_9\n\t#Ludmila Ninel\n\t\tYou call her into your office. She approches with her family and gives you her farming guide to spread around Russia.\n\t\t*set Agriculture +20\n\t\t*goto Fix_9\n\t#Jędrzej Aureliusz\n\t\tYou call him into your office. He accepts quietly and already finds two moles during his time in the office.\n\t\t*set State +20\n\t\t*goto Fix_9\n\t#Vladislav Jevrem\n\t\tYou call him into your office. He accepts only because you are just like him.\n\t\t*set Industry +5\n\t\t*set State +5\n\t\t*set Welfare +5\n\t\t*set Agriculture + 5\n\t\t*goto Fix_9\n\n*label Fix_9\n\nYou have Russia's military and science much better than before, but you think of your past life. A poor civilian who hated the government for not helping the impoverished. They people thought they would have a better life now that a poor person rose to power. Industry still lags far behind and you allow foreigners to exploit your workforce for a large amount of money. Corruption is still endemic, as shown by Stalin. You need to improve agriculture for higher civilian growth, factories for money, and many more things. It is time for the rebirth of Russia!\n\n*choice\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Factory (150000) (30)\n\t\tYou build a factory and employ workers.\n\t\t*set Industry +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_9\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Farm (150000) (30)\n\t\tYou build a farm and employ workers.\n\t\t*set Agriculture +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_9\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Reform Constitution (150000) (30)\n\t\tYou build an office and employ scribes.\n\t\t*set State +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_9\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Welfare Policies (150000) (30)\n\t\tYou build an unemployment office and employ workers.\n\t\t*set Welfare +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_9\n\n\t#Done\n\t\tYou feel you have improved Russia.\n\t\t*set Land 50\n\t\t*goto Test_9\n\n*label Test_9\n\nThe people protest the war but have no power. You are leading the main drive into Western Europe with your generals leading other drives elsewhere. Your secretary is conquering colonies and establishing them under your control. You will keep as much land as you can and you will keep the west, later turning them into puppet states. You can keep the victory streak going! You will expend 10X the units per attack. You have restarted science so now you can unlock new units. What shall you unlock?\n\nYou have$${Money}\n\n*choice\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Sniper_Infantry >=5)) and (Communist >=70)) #Marxmen (50000) (5 Snipers)\n\t\tYou develop better zoom and stability along with high caliber ammo. You give them Communist symbols.\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -5\n\t\t*set Marx true\n\t\t*set Marxman +5\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Machine_Gunner >=5)) and (Czarist >=70)) #Czar Guards (50000) (5 MGs)\n\t\tYou give them portable machine gun stands, make the guns lighter, and get rags to cool it along with Czarist symbols.\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -5\n\t\t*set Guard true\n\t\t*set Czar_Guard +5\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Riflemen >=50)) #Heavy (500000) (50 Riflemen)\n\t\tYou give heavy, lightweight armor to riflemen and pockets containing supplies.\n\t\t*set Money -500000\n\t\t*set Riflemen -50\n\t\t*set Hev true\n\t\t*set Heavy +50\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=1000000) and (Heavy >=50)) #R.U.S.S.I.A. Troops (1000000) (50 Heavies)\n\t\tYou train 50 veterans for the [b]R[/b]ussian [b]U[/b]nit of [b]S[/b]uper [b]S[/b]oldier [b]I[/b]nfantry in [b]A[/b]rmor. Only one survives...\n\t\t*set Money -1000000\n\t\t*set Heavy -50\n\t\t*set Russland true\n\t\t*set Russia +1\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Artillery >=5)) #Gas (50000) (5 Artillery)\n\t\tYou modify the chemicals in the flare shells and others making a lethal gas.\n\t\t*set Money -50000\n\t\t*set Artillery -5\n\t\t*set Gasser true\n\t\t*set Gas +5\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Gas >=5)) #Infiltrator (200000) (5 Gas)\n\t\tYou give stealth corps in dark, strong armor gas and instruct them to open the gas bombs and hide them.\n\t\t*set Money -200000\n\t\t*set Gas -5\n\t\t*set Infil true\n\t\t*set Infiltrator +5\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Tank >=5)) #Planes (200000) (5 Tank)\n\t\tYou study engines and make one powerful enough to take multiple guns and bullets into the air.\n\t\t*set Money -200000\n\t\t*set Tank -5\n\t\t*set Air true\n\t\t*set Airplane +5\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=400000) and (Airplane >=5)) #Bombers (400000) (5 Airplane)\n\t\tYou equip planes with better engines, bigger wings, and strong bombs, keeping the original guns on board.\n\t\t*set Money -400000\n\t\t*set Airplane -5\n\t\t*set Bomb true\n\t\t*set Bomber +5\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=100000) and (Anti_Tank >=5)) #Flamer (100000) (5 Anti-Tank)\n\t\tYou make rocket propellant give off a slow burn. The result; nightmares only 2nd to weapons of mass destruction.\n\t\t*set Money -100000\n\t\t*set Anti_Tank -5\n\t\t*set Fire true\n\t\t*set Flamer +5\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=300000) and (Flamer >=5)) #Scorcher (300000) (5 Flamer)\n\t\tYou develop full-body fire retardant suits and give heavy flame throwers. Destroys spies.\n\t\t*set Money -300000\n\t\t*set Flamer -5\n\t\t*set Scorch true\n\t\t*set Scorcher +5\n\t\t*goto Test_9\n\n\t*selectable_if ((Money >=30000) and (Civilian >=50)) #Prisoner Experiments (30000) (50 Civilians)\n\t\tYou give death row prisoners to the lab. The 20% that survived are now sick and have experienced mutations.\n\t\t*set Money -30000\n\t\t*set Civilian -50\n\t\t*set Failed_
