Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Skin (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The skin of the successful had grown crystals.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Stone_Skin true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Chemicals (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The brain of the successful had produced growth hormones.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Chem true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Immunity (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The body of the successful had been immune to pathogens.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Immune true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_9\n\n\t*disable_reuse *selectable_if (((Stone_Skin = true) and (Immune = true)) and (Chem = true)) #Abomination\n\t\tWhat have you done!?! You have made an abomination!!!\n\t\t*set Exper true\n\t\t*set Experiment +1\n\t\t*achieve dark\n\t\t*set Moral -30\n\t\t*goto Test_9\n\n\t#Done\n\t\tYou get ready to tax civilians.\n\t\t*goto Tax_9\n\n*label Tax_9\n\n*set Money +(1000 * Industry)\n*set Civilian +(50 * Agriculture)\n*set Riflemen +(30 * State)\n\nPopulation grows from Agriculture, Profits grow from Industry, army grows from State propaganda, and you have developed socialist taxing. You are ready to tax. The researching was very expensive. You have many civilians under your control. The Allies are mobilizing and preparing for more war with you. You need to afford your units and upgraded units. You are controlling all of Russia.\n\nTime to tax. High gives $30 per civilian, medium gives $20, and low give $10. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular.  Get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -50\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_9\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_9\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +50\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_9\n\t*if (Contentment >=50) #Socialist Taxes\n\t\tYou tax the rich more and the poor less. The richer the people, the more money! Many enjoy this as a tax method.\n\t\t*set Civilian +10\n\t\t*set Contentment +5\n\t\t*set Money +(Welfare * Civilian)\n\t\t*goto Conscript_9\n\n*label Conscript_9\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in Russia. This means you can get tanks, Artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 400,000 foes. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=3000) #Book On Leading (3000) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -3000\n\t\t*set Army_Power +10\n\t\t*goto Conscript_9\n\t*selectable_if ((Money >=500) and (Civilian >=10)) #10 Riflemen (5000) (10)\n\t\tYou get general riflemen.\n\t\t*set Riflemen +10\n\t\t*set Money -5000\n\t\t*set Civilian -10\n\t\t*goto Conscript_9\n\t*selectable_if ((Money >=20000) and (Civilian >=50)) #50 Riflemen (20000) (50)\n\t\tYou get 50 general rifleman. Cheaper.\n\t\t*set Riflemen +50\n\t\t*set Money -20000\n\t\t*set Civilian -50\n\t\t*goto Conscript_9\n\t*selectable_if ((Money >=30000) and (Civilian >=30)) #10 Tanks (30000) (30)\n\t\tYou get a TANK.\n\t\t*set Tank +10\n\t\t*set Money -30000\n\t\t*set Civilian -30\n\t\t*goto Conscript_9\n\t*selectable_if ((Money >=15000) and (Civilian >=50)) #10 Artillery (15000) (50)\n\t\tYou get Artillery.\n\t\t*set Artillery +10\n\t\t*set Money -15000\n\t\t*set Civilian -50\n\t\t*goto Conscript_9\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 Machine Gunners (15000) (10)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_9\n\t*selectable_if ((Money >=10000) and (Civilian >=10)) #10 Snipers (10000) (10)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +10\n\t\t*set Money -10000\n\t\t*set Civilian -10\n\t\t*goto Conscript_9\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 ATs (15000) (10)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=50000) and (Sniper_Infantry >=10)) and (Marx =true)) #Marxmen (50000) (10 Snipers)\n\t\tYou get a Marxman.\n\t\t*set Marxman +10\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=50000) and (Machine_Gunner >=10)) and (Guard =true)) #Czar Guards (40000) (10 MGs)\n\t\tYou get a Czar Guard.\n\t\t*set Czar_Guard +10\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=100000) and (Anti_Tank >=10)) and (Fire =true)) #Flamers (100000) (10 ATs)\n\t\tYou get a flamer.\n\t\t*set Flamer +10\n\t\t*set Money -100000\n\t\t*set Anti_Tank -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=150000) and (Flamer >=10)) and (Scorch =true)) #Scorchers (150000) (10 Flamers)\n\t\tYou get a scorcher.\n\t\t*set Scorcher +10\n\t\t*set Money -150000\n\t\t*set Flamer -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=50000) and (Artillery >=10)) and (Gasser =true)) #Gas (50000) (10 Artillery)\n\t\tYou get a gas unit.\n\t\t*set Gas +10\n\t\t*set Money -50000\n\t\t*set Artillery -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=300000) and (Gas >=10)) and (Infil =true)) #Infiltrator (300000) (10 Gas)\n\t\tYou get an Infiltrator.\n\t\t*set Infiltrator +10\n\t\t*set Money -300000\n\t\t*set Gas -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=300000) and (Tank >=10)) and (Air =true)) #Airplane (300000) (10 Tanks)\n\t\tYou get a Airplane.\n\t\t*set Airplane +10\n\t\t*set Money -300000\n\t\t*set Tank -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=600000) and (Airplane >=10)) and (Bomb =true)) #Bomber (600000) (10 Planes)\n\t\tYou get a Bomber.\n\t\t*set Bomber +10\n\t\t*set Money -600000\n\t\t*set Airplane -10\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=500000) and (Riflemen >=100)) and (Hev =true)) #Heavy (500000) (100 Riflemen)\n\t\tYou get a heavy unit.\n\t\t*set Heavy +100\n\t\t*set Money -500000\n\t\t*set Riflemen -100\n\t\t*goto Conscript_9\n\t*selectable_if (((Money >=1000000) and (Heavy >=100)) and (Russland =true)) #R.U.S.S.I.A. Troops (1000000) (100 Heavies)\n\t\tYou get a R.U.S.S.I.A troop.\n\t\t*set Russia +2\n\t\t*set Money -1000000\n\t\t*set Heavy -100\n\t\t*goto Conscript_9\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 400000\n\t\t*goto Prep_9\n\n*label Prep_9\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself. You may also pull missions to lower the Enemy Mass.  \n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*selectable_if ((Money >=5000) and (Civilian >=1)) #House (5000) (/30)\n\t\tYou build a free house to increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -5000\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=1)) #Bar (5000) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -5000\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=3000) and (Civilian >=1)) #Pub (3000) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -3000\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=1)) #Sports Stadium (10000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -10000\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Med School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=3)) #Gun Range (10000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -10000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_9\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_9\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_9\n\t*selectable_if ((Money >=3000) and (Machine_Gunner >=10)) #MG Nest (30000) (10)MG Unit(s) -(30000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -30000\n\t\t*set Money -3000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_9\n\t*selectable_if ((Money >=1000) and (Riflemen >=50)) #Rifle Trench (10000) (50)Rifle Unit(s) -(20000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -1000\n\t\t*set Riflemen -50\n\t\t*goto Prep_9\n\t*selectable_if ((Money >=4000) and (Sniper_Infantry >=30)) #Sniper Hut (40000) (30)Sniper Unit(s) -(60000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -4000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_9\n\t*selectable_if ((Money >=10000) and (Artillery >=30)) #Artillery Array (100000) (30)Artillery Unit(s) -(200000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200000\n\t\t*set Money -10000\n\t\t*set Artillery -30\n\t\t*goto Prep_9\n\t*selectable_if (Money >=3000) #Barricade (30000) -(20000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -3000\n\t\t*goto Prep_9\n\t*selectable_if ((Money >=3000) and (Infiltrator >=5)) #Infiltrator Squad (30000) (5)Infiltrator(s) -(150000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -150000\n\t\t*set Money -3000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_9\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (20000) (5)Bombers(s) -(600000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -600000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_9\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto Capture_9\n\n*label Capture_9\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with them! After this, you will be able to own 50% of the world's territory. The first march of world domination.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Capture_9\n\t*selectable_if (Riflemen >=10) #Rifleman \n\t\tYou send a few rifleman to their quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=50)) #Rifle Squad Of 50\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -50\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=50)) #Elite Rifle Squad Of 50\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -50\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=50)) #Very Elite Rifle Squad Of 50\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -50\n\t\t*goto Capture_9\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=50)) and (Machine_Gunner >=10)) #MG Phalanx\n\t\tLight machine gunners wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -50\n\t\t*set Machine_Gunner -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=10)) #machine gunner\n\t\tThe machine gunners opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=10)) #Sniper\n\t\tThe snipers gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=10) and (Artillery >=10)) #Artillery Strike \n\t\tYou fire some Artillery. They use some of their very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=2000)) #Rifle Rush X2000\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -700000\n\t\t*set Riflemen -2000\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1000)) #Heavy Artillery Strike X1000\n\t\tYou fire 1000 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -1000\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=10)) #Rocket Launcher\n\t\tAn AT squad gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=10) and (Tank >=10)) #Tank!!!\n\t\tYou send out a tank squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=40) and (Flamer >=10)) #Flamer\n\t\tYou send out a flamer squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=10)) #Scorcher\n\t\tYou send out a scorcher squad to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +50\n\t\t*set Scorcher -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=40) and (Airplane >=10)) #Airplane\n\t\tYou send out a airplane squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=40) and (Bomber >=10)) #Bomber\n\t\tYou send out a bomber squad to do its business. It uses its bombs and is available as a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -10\n\t\t*set Airplane +10\n\t\t*goto Capture_9\n\t*selectable_if ((Army_Power >=40) and (Gas >=10)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set ch better than before, but you think of your past life. A poor civilian who hated the government for not helping the impoverished. They people thought they would have a better life now that a poor person rose to power. Industry still lags far behind and you allow foreigners to exploit your workforce for a large amount of money. Corruption is still endemic, as shown by Stalin. You need to improve agriculture for higher civilian growth, factories for money, and many more things. It is time for the rebirth of Russia!\n\n*choice\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Factory (150000) (30)\n\t\tYou build a factory and employ workers.\n\t\t*set Industry +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_0\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Farm (150000) (30)\n\t\tYou build a farm and employ workers.\n\t\t*set Agriculture +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_0\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Reform Constitution (150000) (30)\n\t\tYou build an office and employ scribes.\n\t\t*set State +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_0\n\n\t*selectable_if ((Money >=150000) and (Civilian >=30)) #Welfare Policies (150000) (30)\n\t\tYou build an unemployment office and employ workers.\n\t\t*set Welfare +5\n\t\t*set Money -150000\n\t\t*set Civilian -30\n\t\t*goto Fix_0\n\n\t#Done\n\t\tYou feel you have improved Russia.\n\t\t*set Land 50\n\t\t*goto Test_0\n\n*label Test_0\n\nThe protests have mainly stopped. People enjoy French bread and English tea. As a treat, your remaining soldiers little candies from around the world. Meanwhile, inside the Kremlin, life is not all peachy. The White House is sending orders to prepare an army. You are attacking before they can break you. You will lead the attack against the US, your partner will attack the UK, and others will attack lone islands and the Americas. The use of U-boats will even the battle out. This the population. Doing this though was very unpopular.  Get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -50\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_0\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_0\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +50\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_0\n\t*if (Contentment >=50) #Socialist Taxes\n\t\tYou tax the rich more and the poor less. The richer the people, the more money! Many enjoy this as a tax method.\n\t\t*set Civilian +10\n\t\t*set Contentment +5\n\t\t*set Money +(Welfare * Civilian)\n\t\t*goto Conscript_0\n\n*label Conscript_0\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in Russia. This means you can get tanks, Artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 600,000 foes. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=3000) #Book On Leading (3000) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -3000\n\t\t*set Army_Power +10\n\t\t*goto Conscript_0\n\t*selectable_if ((Money >=500) and (Civilian >=10)) #10 Riflemen (5000) (10)\n\t\tYou get general riflemen.\n\t\t*set Riflemen +10\n\t\t*set Money -5000\n\t\t*set Civilian -10\n\t\t*goto Conscript_0\n\t*selectable_if ((Money >=20000) and (Civilian >=50)) #50 Riflemen (20000) (50)\n\t\tYou get 50 general rifleman. Cheaper.\n\t\t*set Riflemen +50\n\t\t*set Money -20000\n\t\t*set Civilian -50\n\t\t*goto Conscript_0\n\t*selectable_if ((Money >=30000) and (Civilian >=30)) #10 Tanks (30000) (30)\n\t\tYou get a TANK.\n\t\t*set Tank +10\n\t\t*set Money -30000\n\t\t*set Civilian -30\n\t\t*goto Conscript_0\n\t*selectable_if ((Money >=15000) and (Civilian >=50)) #10 Artillery (15000) (50)\n\t\tYou get Artillery.\n\t\t*set Artillery +10\n\t\t*set Money -15000\n\t\t*set Civilian -50\n\t\t*goto Conscript_0\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 Machine Gunners (15000) (10)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_0\n\t*selectable_if ((Money >=10000) and (Civilian >=10)) #10 Snipers (10000) (10)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +10\n\t\t*set Money -10000\n\t\t*set Civilian -10\n\t\t*goto Conscript_0\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 ATs (15000) (10)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_0\n\t*selectable_if (((Money >=50000) and (Sniper_Infantry >=10)) and (Marx =true)) #Marxmen (50000) (10 Snipers)\n\t\tYou get a Marxman.\n\t\t*set Marxman +10\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -10\n\t\t*goto Conscript_0\n\t*selectable_if (((Money >=50000) and (Machine_Gunner >=10)) and (Guard =true)) #Czar Guards (40000) (10 MGs)\n\t\tYou get a Czar Guard.\n\t\t*set Czar_Guard +10\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -10\n\t\t*goto Conscript_0\n\t*selectable_if (((Money >=100000) and (Anti_Tank >=10)) and (Fire =true)) #Flamers (100000) (10 ATs)\n\t\tYou get a flamer.\n\t\t*set Flamer +10\n\t\t*set Money -100000\n\t\t*set Anti_Tank -10\n\t\t*goto Conscript_0\n\t*selectable_if lf. You may also pull missions to lower the Enemy Mass.  \n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*selectable_if ((Money >=5000) and (Civilian >=1)) #House (5000) (/30)\n\t\tYou build a free house to increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -5000\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=1)) #Bar (5000) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -5000\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=3000) and (Civilian >=1)) #Pub (3000) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -3000\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=1)) #Sports Stadium (10000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -10000\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Med School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=3)) #Gun Range (10000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -10000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_0\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_0\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_0\n\t*selectable_if ((Money >=30000) and (Machine_Gunner >=10)) #MG Nest (30000) (10)MG Unit(s) -(30000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -30000\n\t\t*set Money -30000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_0\n\t*selectable_if ((Money >=10000) and (Riflemen >=50)) #Rifle Trench (10000) (50)Rifle Unit(s) -(20000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -10000\n\t\t*set Riflemen -50\n\t\t*goto Prep_0\n\t*selectable_if ((Money >=40000) and (Sniper_Infantry >=30)) #Sniper Hut (40000) (30)Sniper Unit(s) -(60000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -40000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_0\n\t*selectable_if ((Money >=100000) and (Artillery >=30)) #Artillery Array (100000) (30)Artillery Unit(s) -(200000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200000\n\t\t*set Money -100000\n\t\t*set Artillery -30\n\t\t*goto Prep_0\n\t*selectable_if (Money >=30000) #Barricade (30000) -(20000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -30000\n\t\t*goto Prep_0\n\t*selectable_if ((Money >=30000) and (Infiltrator >=5)) #Infiltrator Squad (30000) (5)Infiltrator(s) -(150000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -150000\n\t\t*set Money -30000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_0\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (20000) (5)Bombers(s) -(600000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -600000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_0\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto Capture_0\n\n*label Capture_0\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with them! After this, you will be able to own 90% of the world's territory. The final march of (almost) world domination.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Capture_0\n\t*disable_reuse *selectable_if (Decoy = true) #Bribes\n\t\tYou bribe US radio officials to exaggerate about your army size.\n\t\t*set Enemy_Mass -80000\n\t\t*goto Capture_0\n\t*selectable_if (Riflemen >=10) #Rifleman \n\t\tYou send a few rifleman to their quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=50)) #Rifle Squad Of 50\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -50\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=50)) #Elite Rifle Squad Of 50\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -50\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=50)) #Very Elite Rifle Squad Of 50\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -50\n\t\t*goto Capture_0\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=50)) and (Machine_Gunner >=10)) #MG Phalanx\n\t\tLight machine gunners wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -50\n\t\t*set Machine_Gunner -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=10)) #machine gunner\n\t\tThe machine gunners opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=10)) #Sniper\n\t\tThe snipers gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=10) and (Artillery >=10)) #Artillery Strike \n\t\tYou fire some Artillery. They use some of their very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=2000)) #Rifle Rush X2000\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -700000\n\t\t*set Riflemen -2000\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1000)) #Heavy Artillery Strike X1000\n\t\tYou fire 1000 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -1000\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=10)) #Rocket Launcher\n\t\tAn AT squad gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=10) and (Tank >=10)) #Tank!!!\n\t\tYou send out a tank squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Flamer >=10)) #Flamer\n\t\tYou send out a flamer squad to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=10)) #Scorcher\n\t\tYou send out a scorcher squad to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +50\n\t\t*set Scorcher -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Airplane >=10)) #Airplane\n\t\tYou send out a airplane squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Bomber >=10)) #Bomber\n\t\tYou send out a bomber squad to do its business. It uses its bombs and is available as a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -10\n\t\t*set Airplane +10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Gas >=10)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set Enemy_Mass -15000\n\t\t*set Gas -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Infiltrator >=10)) #Infiltrator\n\t\tYou send out a infiltrator squad to do its business. They steal enemy war funds.\n\t\t*set Enemy_Mass -25000\n\t\t*set Money +5000\n\t\t*set Infiltrator -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Marxman >=10)) #Marxman\n\t\tYou send out a Marxman squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Marxman -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Czar_Guard >=10)) #Czar Guard\n\t\tYou send out a Czar Guard squad to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Czar_Guard -10\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Heavy >=50)) #Heavy Squad\n\t\tYou send out a heavy squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Heavy -50\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Russia >=50)) #R.U.S.S.I.A. Squad\n\t\tYou send out a R.U.S.S.I.A. squad to do its business. It experiences minimal casualties.\n\t\t*set Enemy_Mass -100000\n\t\t*set Russia -1\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Experiment >=1)) #Send An Abomination\n\t\tYou unleash the experiment. It kills very many and escapes.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Experiment -1\n\t\t*goto Capture_0\n\t*selectable_if ((Army_Power >=40) and (Failed_Experiment >=100)) #Release The Failed Experiments (100)\n\t\tYou unleash the experiments. They kill very many and are put out of their misery.\n\t\t*set Enemy_Mass -20000\n\t\t*set Failed_Experiment -100\n\t\t*goto Capture_0\n\t*disable_reuse *selectable_if (Russia >=51) #Russia's Might\n\t\tYou get the most high tech equipment for your RUSSIA units and send them out. Biggest damage on your side was minute.\n\t\t*set Enemy_Mass -10000000\n\t\t*goto Capture_0\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful battle!\n\t\t*set Enemy_Mass 0\n\t\t*set Money +300000\n\t\t*set Civilian +50\n\t\t*set Land +20\n\t\t*goto Captured\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Captured\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n*label Captured\n\n\nYou rush the gates of the White House with your soldiers and you are relaxed when almost the entire world is yours. You go to Mount Rushmore to carve your face in there and as you pose for a photo, it fades to black. You wake up in a marble corridor, scarcely lit. Some American speaks to you with a translator by his side. He says that once you are tried and executed, he will be able to defeat a confused Russia. He takes you off to a cell and you bide your time. Then one day you hear that an attack is coming. You are smart enough to know that it is a drill, but others don't. A guard quickly opens your door to take you to the electric chair. Now is your chance!\n\n*choice\n\n\t*selectable_if (Heavy_Hitter >=100) #Knock Him Out!\n\t\tYou smash his skull with one punch and see you've caught the attention of a machine gunner.\n\t\t*goto Captured_2\n\t#Fail\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Captured_2\n\t\t*else\n\t\t\tYou hit him and he shoots you.\n\t\t\tgoto_scene death\n\n*label Captured_2\n\nA machine gunner sees you and fires like crazy. You can't die now!\n\n*choice\n\n\t*selectable_if (Cloaked >=100) #Dodge The Fire\n\t\tYou dodge the bullets until they run out and he tosses a knife at you.\n\t\t*goto Captured_3\n\t#Fail\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Captured_3\n\t\t*else\n\t\t\tHe shoots you.\n\t\t\t*goto_scene death\n\n*label Captured_3\n\nThe knife gets lunged deep in a vein. You are at death's door.\n\n*choice\n\n\t*selectable_if (Doctor >=100) #Heal Yourself\n\t\tYou pull out the knife and toss it back while treating your wound.\n\t\t*goto Captured_4\n\t#Fail\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Captured_4\n\t\t*else\n\t\t\tYou bleed out.\n\t\t\t*goto_scene death\n\n*label Captured_4\n\nYou make your way outside and see a deserter driving. They slow down a bit and pull a gun on you. Maybe you can talk a bit.\n\n*choice\n\n\t*selectable_if (Speaker >=100) #Talk\n\t\tYou get him on board and you find he is going to be a powerful ally.\n\t\t*goto Captured_5\n\t#Fail\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Captured_5\n\t\t*else\n\t\t\tHe shoots you.\n\t\t\t*goto_scene death\n\n*label Captured_5\n\nThe drill ends and as you drive people start shooting you! Your ally gives you his gun and you have to fire on them.\n\n*choice\n\n\t*selectable_if (Sniper >=100) #Kill Them\n\t\tYou manage to fire on the attackers until a patrol squad helps you.\n\t\t*achieve world\n\t\t*goto Leader\n\t#Fail\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Leader\n\t\t*else\n\t\t\tThey shoot you in the fuel tank.\n\t\t\t*goto_scene death\n\n*label Leader\n\nYou have made it through the Great War! You have conquered all of your foes. The countries of the world (other than [b]Albania[/b]) fear you. Your ideas spread. But the wartime buzz ends as everyone looks to you, -the hero- for whats next. You can lead an army, but a country? The future has many gifts ahead of you and if you can obtain them, you can be the best leader of all time! But can you? What leader will you be?\n\n*choice\n\n\t*selectable_if (Moral \u003c=10) #Evil\n\t\tPeople fear you and you are overthrown quickly as your new empire crumbles.\n\t\t*achieve bad\n\t\t*goto_scene ending\n\n\t*selectable_if (Moral >=90) #Benevolent\n\t\tYou make Russia the strongest country in the planet and the happiest!\n\t\t*achieve good\n\t\t*goto_scene ending\n\n\t#Normal\n\t\tYour people live a pretty normal life after the war.\n\t\t*achieve normal\n\t\t*goto_scene ending\n", "moscow": "*label Moving_1\n\nYou cleared the town of communists! Great job! However this was nothing compared what's happening in Moscow. You are ready, your remaining units standing by, ready to board a ship. The sea air invigorates you, and the speed of the of the ship gives you time to think. Is life better? Sure, your family and friends are gone and you are alone, but now you are successful, and you are rebuilding history. You ponder and when you finally get an answer, then you hear a foghorn, knocking the answer out of your mind. There are two boats, a small $1000 boat to America (The neutral ending) and a free one to Moscow. Where do you go?\n\n*choice\n\n\t#Moscow\n\t\tYou are a Czarist now. You should not waste your money on abandoning your country.\n\t\t*set Moral +10\n\t\t*set Czarist +20\n\t\t*set Civilian +100\n\t\t*goto Tax_1\n\t*selectable_if (Money >=1000) #America\n\t\tYou deserve this, you killed, almost died and worked very, very hard.\n\t\t*set Money -1000\n\t\t*achieve Neutral\n\t\t*goto_scene ending\n\n*label Tax_1\n\nYou arrive after a trip by boat and a long ride in a bus. You had to stop a bit to shoot some Communists, but they were just minor threats. It spreads around the bus that you have reached a rank where a small amount of Moscow will be delegated to you. You talk with some people and they tell you about what you might expect. Unlike the previous combat arrangements, there will be civilians. The civilians can provide taxes, soldiers, defenses, and other things. Depending on how you treat the civilians, they will decrease, increase, or stagnate. You can tax them on different levels. High gives $20 per civilian, medium gives $10, and low give $5. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular. Note: if your civilians don't like you, you can't tax them high. There are 3 main communist groups. One is coming soon, get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -5\n\t\t*set Contentment -20\n\t\t*set Moral -10\n\t\t*goto Conscript_1\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_1\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +5\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_1\n\n*label Conscript_1\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in a bit of Moscow with heavy industry. This means you can get primitive tanks, artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 1000 Communists. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=300) #Book On Leading (300) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -300\n\t\t*set Army_Power +10\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=50) and (Civilian >=1)) #Rifleman (50) (1)\n\t\tYou get a general rifleman.\n\t\t*set Riflemen +1\n\t\t*set Money -50\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=200) and (Civilian >=5)) #5 Rifleman (200) (5)\n\t\tYou get 5 general rifleman. Cheaper.\n\t\t*set Riflemen +5\n\t\t*set Money -200\n\t\t*set Civilian -5\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=300) and (Civilian >=3)) #Tank (300) (3)\n\t\tYou get a TANK.\n\t\t*set Tank +1\n\t\t*set Money -300\n\t\t*set Civilian -3\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=150) and (Civilian >=5)) #Artillery (150) (5)\n\t\tYou get artillery.\n\t\t*set Artillery +1\n\t\t*set Money -150\n\t\t*set Civilian -5\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #Machine Gunner (150) (1)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=100) and (Civilian >=1)) #Sniper (100) (1)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +1\n\t\t*set Money -100\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #AT (150) (1)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 1000\n\t\t*goto Prep_1\n\n*label Prep_1\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*selectable_if ((Money >=500) and (Civilian >=1)) #House (500) (/3)\n\t\tYou build a free house to will increase population.\n\t\t*set Civilian +3\n\t\t*set Moral +10\n\t\t*set Money -500\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=1)) #Bar (500) (/5)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +5\n\t\t*set Money -500\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=300) and (Civilian >=1)) #Pub (300) (/3)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -300\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=1000) and (Civilian >=1)) #Sports Stadium (1000) (/10)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +10\n\t\t*set Money -1000\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Med School (500) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=1000) and (Civilian >=3)) #Gun Range (1000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -1000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Speech Center (500) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Gymnastics (500) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Boxing Ring (500) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=500) and (Civilian >=3)) #School (500) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Mass \u003c0)\n\t*set Enemy_Mass 0\n\nThey are here to destroy you. Remember, you need to diminish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a officer. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=30) #Heavy Fire!\n\t\tYou fire heavy at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -150\n\t\t*goto MoscowD_1\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -150\n\t\t*set Riflemen -5\n\t\t*goto MoscowD_1\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike\n\t\tYou fire some artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto MoscowD_1\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto MoscowD_1\n\t*disable_reuse *selectable_if ((Army_Power >=25) and (Sniper_Infantry >=5)) #Dead-zone\n\t\tYour snipers fire before the commies can see us. No deaths.\n\t\t*set Enemy_Mass -1500\n\t\t*goto MoscowD_1\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful officer battle!\n\t\t*set Army_Power +5\n\t\t*set Money +1500\n\t\t*set Machine_Gunner +3\n\t\t*set Enemy_Mass 0\n\t\t*set Civilian +400\n\t\t*goto Tax_2\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Tax_2\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n\n*label Tax_2\n\n[b]Czar Nicholas II[/b] visits you. He says that you have been very resourceful and that you should take a bigger challenge. He gives you around half of Moscow at your disposal. He hopes that you will be a great leader. In a moment of weakness he breaks his arrogance and reveals that he thinks you will be a better leader than him. He then remarks that he will be second best. You think about that. You, little ${Name} could become the sole leader of Russia. Or would you be sole leader? Will you establish a democracy? You think to Moscow's importance. It was the city that defeated the Mongols and conquered all of Russia, making your home today. You hear gunshots and are reminded of the rest of the communists. \"Good luck officer\" said the [b]Czar[/b] as he left. Here we go again. \n\nTime to tax. High gives $20 per civilian, medium gives $10, and low give $5. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular. There are 3 main communist groups. One is coming soon, get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -5\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_2\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_2\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +5\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_2\n\n*label Conscript_2\n\nMany soldiers have called to serve in defense of Moscow but not in your sector! Many civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in a bit of Moscow with heavy industry. This means you can get primitive tanks, artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 5000 Communists. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=300) #Book On Leading (300) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -300\n\t\t*set Army_Power +10\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=50) and (Civilian >=1)) #Rifleman (50) (1)\n\t\tYou get a general rifleman.\n\t\t*set Riflemen +1\n\t\t*set Money -50\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=200) and (Civilian >=5)) #5 Rifleman (200) (5)\n\t\tYou get 5 general rifleman. Cheaper.\n\t\t*set Riflemen +5\n\t\t*set Money -200\n\t\t*set Civilian -5\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=300) and (Civilian >=3)) #Tank (300) (3)\n\t\tYou get a TANK.\n\t\t*set Tank +1\n\t\t*set Money -300\n\t\t*set Civilian -3\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=150) and (Civilian >=5)) #Artillery (150) (5)\n\t\tYou get artillery.\n\t\t*set Artillery +1\n\t\t*set Money -150\n\t\t*set Civilian -5\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #Machine Gunner (150) (1)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=100) and (Civilian >=1)) #Sniper (100) (1)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +1\n\t\t*set Money -100\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #AT (150) (1)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 5000\n\t\t*goto Prep_2\n\n*label Prep_2\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you w  -300\n\t\t*set Money -300\n\t\t*set Machine_Gunner -1\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=100) and (Riflemen >=5)) #Rifle Trench (100) (5)Rifle Unit(s) -(200) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200\n\t\t*set Money -100\n\t\t*set Riflemen -5\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=400) and (Sniper_Infantry >=3)) #Sniper Hut (400) (3)Sniper Unit(s) -(600) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -600\n\t\t*set Money -400\n\t\t*set Sniper_Infantry -3\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=1000) and (Artillery >=3)) #Artillery Array (1000) (3)Artillery Unit(s) -(2000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -1000\n\t\t*set Artillery -3\n\t\t*goto Prep_2\n\t*selectable_if (Money >=300) #Barricade (300) -(200) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200\n\t\t*set Money -300\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=1500) and (Civilian >=3)) #Nuclear Testing Lab (1500) (3) +!?!\n\t\tYou hire some scientists and buy some uranium in hopes that the center will discover something.\n\t\t*set Money -1500\n\t\t*set Civilian -3\n\t\t*set Nuclear true\n\t\t*goto Prep_2\n\t#Here They Come...\n\t\tYou see red on the horizon. Here they come.\n\t\t*goto MoscowD_2\n\n*label MoscowD_2\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nThey are here to destroy you. Remember, you need to diminish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a officer. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=40) #V. Heavy Fire!\n\t\tYou fire Very heavily at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -250\n\t\t*goto MoscowD_2\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -150\n\t\t*set Riflemen -5\n\t\t*goto MoscowD_2\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike\n\t\tYou fire some artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto MoscowD_2\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto MoscowD_2\n\t*disable_reuse *selectable_if ((Army_Power >=25) and (Tank >=5)) #Operation Colossus\n\t\tYou make a wall of tanks that bring fear upon the foes. No deaths.\n\t\t*set Enemy_Mass -15000\n\t\t*goto MoscowD_2\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful commander battle!\n\t\t*set Army_Power +5\n\t\t*set Money +1500\n\t\t*set Machine_Gunner +3\n\t\t*set Enemy_Mass 0\n\t\t*goto Rest\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Rest\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n*label Rest\n\nYou did it. The communists used the rest of their man power on that attack. You rest and see the soldiers finishing the ammo in a display. The sky glows with bombs and military is all throughout the streets. You have made Russia a power house. A force among the greats. You have industrialized, and exploded the military. Shame you have not fought yourself in a while, but that is better than death. The soldiers return to their families, guns and machines left in the armory. Except for Cetrina, you have forgot about her. You are the real leader of Russia, the [b]Czar[/b] is just a figure head. You are a master leader. Those thoughts fill your head as a painful thought enters your brain. What happened? You used to work long, hard hours so you could hardly feed your family. Now you make trivial choices just so you can build another statue of yourself. You should at least join the festivities. Wow, it is late, 3 AM.\n\n*choice\n\n\t#Practice With My Gun Outside\n\t\tYou do well, and you look at your hand. They have turned into the hands of an aristocrat. Your thoughts are stopped by a sniper. Who plans a revolution at 3 am?\n\t\t*goto_scene death\n\t#Search For Commies\n\t\tYou spy around and you see a following of around 80,000 Bolsheviks revolting at 3 AM! You prepare yourself.\n\t\t*goto Sniper_Shot\n\t#Parade\n\t\tYou get up on your own platform and take the cheers from many Russians. Just then, you are shot for your arrogance.\n\t\t*goto_scene death\n\n*label Sniper_Shot\n\nYou run through the alley ways. You think of the revolution. At the beginning, it was a democratic revolution. What happened? You guess that the Communists had much more firepower. You won because the civilians are on your side! You notice there is a black shadow lurking around before you pull out your rifle- BOOM! You have been shot in the arm. You are bleeding as the shadow takes off his mask. It is -was- your village doctor Dorota. \"You have changed\" he says to you. He begins to walk away.\n\n*choice\n\n\t*selectable_if (Doctor >=50) #Patch Yourself Up\n\t\tHe is not the only doctor around here. When you get up, you make sure to stop him.\n\t\t*set Doctor +10\n\t\t*goto Heavy\n\t*selectable_if (Speaker >=50) #Ask For Help\n\t\tHe still is your friend. You remind him of the promise he made to you on day one, when you were five. \"I will never hurt you\".\n\t\t*set Speaker +10\n\t\t*goto Heavy\n\t#Bleed Out\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Heavy\n\t\t*else\n\t\t\tWell, you made it to this part. You should be proud.\n\t\t\t*goto_scene death\n\n\n*label Heavy\n\nYou are now prepared for the worst. There is still a number of Bolsheviks. Who plans a revolution at 3 AM anyway!?! You just need to get to the Bolshevik Bunker you defeated early on. There are some reserve troops who did not want to go home there and a machine gun on wheels. As you go there, there is a number of Communists that you defeat quickly. You get there fast and see the reserve troops cowering in a dark alleyway. You ask them what they are doing there and you quickly find out that they are targets of a machine gun. You peak past the wall and you spy a Communist manning the machine gun. What do you do?\n\n*choice\n\n\t*selectable_if (Heavy_Hitter >=50) #Hit His Head!\n\t\tYou knock him down and throw him in a blasted-out home till he wakes up.\n\t\t*set Heavy_Hitter +10\n\t\t*goto Horde\n\t*selectable_if (Cloaked >=50) #Disconnect The Ammo\n\t\tYou move away the ammo and when he gets curious, you send in the troops.\n\t\t*set Cloaked +10\n\t\t*goto Horde\n\t#MG's Here\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Horde\n\t\t*else\n\t\t\tYou spend so much time thinking that you are caught and shot.\n\t\t\t*goto_scene death\n\n\n*label Horde\n\n\n*if (choice_randomtest =true)\n\t*goto Battle_Royale\n\nHere comes the horde. You have a machine gun fully loaded and a few units. You need to be prepared to fire as your foes surround you. 80,000 is a sizable number so you have to survive until the support comes. It will then be a battle royal, you will have to fight a mass of 800,000. There is no way to beat them with no deaths if you use the soldiers, but there is always a way to win with no deaths on your side. Will you lead or your units?\n\n*choice\n\n\t*selectable_if (Sniper >=50) #You'll Go\n\t\tYou lead yourself. You manage to secure the area until your help arrives.\n\t\t*set Sniper_Infantry +220\n\t\t*set Tank +20\n\t\t*set Riflemen +2200\n\t\t*set Machine_Gunner +220\n\t\t*set Artillery +200\n\t\t*set Anti_Tank +220\n\t\t*set Sniper +10\n\t\t*set Moral +10\n\t\t*set Enemy_Mass +800000\n\t\t*goto Battle_Royale\n\t*selectable_if (Army_Power >=40) #They'll Go\n\t\tYou lead the units to their death. You manage to secure the area until your help arrives.\n\t\t*set Sniper_Infantry +200\n\t\t*set Tank +20\n\t\t*set Riflemen +2000\n\t\t*set Machine_Gunner +200\n\t\t*set Artillery +200\n\t\t*set Anti_Tank +200\n\t\t*set Army_Power +5\n\t\t*set Moral -10\n\t\t*set Enemy_Mass +800000\n\t\t*goto Battle_Royale\n\t#Too Late\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Battle_Royale\n\t\t*else\n\t\t\tYour idle actions resulted in all of your deaths.\n\t\t\t*goto_scene death\n*label Battle_Royale\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nThey are here to destroy you. Remember, you need to diminish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a officer. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=40) #V. Heavy Fire!\n\t\tYou fire Very heavily at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -250\n\t\t*goto Battle_Royale\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -150\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike\n\t\tYou fire some artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=200)) #Rifle Rush X200\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -50000\n\t\t*set Riflemen -200\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Artillery >=100)) #Heavy Artillery Strike X100\n\t\tYou fire 100 artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -200000\n\t\t*set Artillery -100\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto Battle_Royale\n\t*disable_reuse *selectable_if (Nuclear= true) #Nuke\n\t\tYour nuclear scientists make a bomb and use it on a distant island. The Communists can see the flash and fallout.\n\t\t*set Enemy_Mass -1000000\n\t\t*achieve Nuke\n\t\t*goto Battle_Royale\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful commander battle!\n\t\t*set Army_Power -10\n\t\t*set Money +5000\n\t\t*set Machine_Gunner +30\n\t\t*set Czarist +10\n\t\t*set Enemy_Mass 0\n\t\t*goto Ceremony\t\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Ceremony\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n\n*label Ceremony\n\nThe Bolsheviks are stopped and you have a parade along with a holiday in your honor. You are a master commander and leader. The [b]Czar[/b] is thinking about having you fight in the Great War. You are given medals and the [b]Czar[/b] is hailing you. But there is one thing that is ailing you. The [b]Czar[/b] is hailing you yes, but as his patsy. As his pet. [i]As his tool[/i]. You look out in the crowd and you see a sign. The sign says that you are the real Czar. Another sign says Czar ${Name}. Maybe you should cause your own rebellion and become Czar.\n\n*choice\n\n\t*selectable_if (Czarist >=100) #You Do It\n\t\tYou have become Czar. Czar ${Name} The Great!\n\t\t*achieve lead\n\t\t*achieve czar\n\t\t*goto_scene great\n\t#No\n\t\tYou have made it this far, better a pet than dead.\n\t\t*goto_scene great\n\n", "screenshots": "*comment Comrade or Czar Screenshots\n\nscreenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set Sniper 50\n*set Speaker 60\n*set Doctor 30\n*set Heavy_Hitter 40\n*set Cloaked 20\n*set Civilian 500\n*set Riflemen 50\n\nYou did it. The Czarists lost most of Moscow. You rest and see the soldiers finishing the ammo in a display. The sky glows with bombs and military is all throughout the streets. You have made Russia a power house. A force amoung the greats. You have industrialized, and exploded the military. Shame you have not fought yourself in a while, but that is better than death. The soldiers return to their families, guns and machines left in the armory. Except for Cetrina, you have forgot about her. You are the real leader of Russia, Lenin is just a figure head. You are a master leader. Those thoughts fill your head as a painful thought enters your brain. What happened? You used to work long, hard hours so you could hardly feed your family. Now you make trivial choices just so you can build another statue of yourself. You should at least join the festivities. Wow, it is late, 3 AM. Wait, you are supposed to revolt now right? You need to get the radio center in the Czarist part of Moscow. But you could rest. There are no spys. Right?\n\n*fake_choice\n\n\t#Practice With My Gun Outside\n\t#Prepare The Attack\n\t#Parade\n\n\n\n*script changeBackgroundColor(\"black\")\n\n\n*set Sniper 50\n*set Speaker 60\n*set Doctor 30\n*set Heavy_Hitter 40\n*set Cloaked 20\n*set Civilian 500\n*set Communist 20\n\nYou lay, enjoying your reward and fame. You are also now in the K-6 group, K-7 is along ways away. You see a lady in thick black clothing talking to Trotsky. She has a bit of a British accent. Why would a person from Gre-. She's a spy!!! She wants to assassinate your comrade, you need to kill her or alert the defences to her. You talk to Trotsky and you can tell from the look on his face that he is smitten with her. You need a way to get him to hate her so that she does not kill anyone. You have to make sure she is gone. Forever. As she leaves you see a marking on her expensive handbag Perica.\n\n*fake_choice\n\n\t#Trotsky Believes You Comrade\n\t#Trotsky Listens\n\t#You Kill Her\n\t#You Steal The Mission Objective\n\t#Buy An Assassin\n\n\n\n*script changeBackgroundColor(\"sepia\")\n\n\n*set Sniper 100\n*set Speaker 70\n*set Doctor 60\n*set Heavy_Hitter 70\n*set Cloaked 40\n*set Riflemen 500\n*set Czarist 20\n\nYou see an up and comer rising. His name; Stalin. Most high-ranking officials are impressed with him. Some abide his every whim. You can see what is happening. He is using underground influence to gain power. You need to put an end to this before he replaces you. Afterward you must deal with the Ottomans. They are misplaced here. You have very many things to worry about.\n\n*fake_choice\n\n\t#Conspire Against Him\n\t#Shoot Him\n\t#Poison Him\n\t#Do Nothing\n\n*set Sniper 50\n*set Speaker 60\n*set Doctor 30\n*set Heavy_Hitter 40\n*set Cloaked 20\n*set Civilian 500\n*set Riflemen 50\n\nYou hear the news, she is killed. You feel lighter as you now have the job. You may now raise an army. Generally, the way an army works is there is an enemy mass. The way you win a battle is by dropping the enemy mass to 0. To do that you need to release soldiers in a formation. The formations you can use vary depending on your faction, army power, and units. More complex formations take more units and army power. Time to choose your units for an upcoming skirmish.\n\n*fake_choice\n\t#Tank And AT\n\t#Rifle Squadron\n\t#Explosives Team]\n\t#Rifles and Strategy Guides\n\t*selectable_if (Sniper >14) #Machineguns and Rifles\n\n\n\n*set Sniper 100\n*set Speaker 70\n*set Doctor 60\n*set Heavy_Hitter 70\n*set Cloaked 40\n*set Riflemen 500\n*set Czarist 20\n\n\nYou now have a formidable force. You are also part of the army and you need to train. You only have enough time before the brunt of the Communists come. You need to improve yourself. There is a bunch of equipment in the nearby trunk. There is weights, guns, targets, books, ropes, and other mischellanous items. A bloodied scout rushes to your room he tells you that there is a mass of 500 enemies. Mass is approximate army strength. It is around 30 riflemen or a destroyed tank. You have the bonus because you are defending. How will you prepare?\n\n*fake_choice\n\n\t#Scrounge Up Any Extra recruits\n\t*selectable_if (Doctor >14) #Heal Some Recruits\n\t#General Studies\n\t#Physical Studies\n\t#Mental Studies", "startup": "*title Comrade or Czar\n*author Albnoob\n*scene_list\n\tstartup\n\tfaction\n\tarmy\n\t$ moscow\n\t$ great\n\t$ ending\n\tdeath\n\n*create Name \"\"\n*create Sniper 10\n*create Heavy_Hitter 10\n*create Speaker 10\n*create Doctor 10\n*create Cloaked 10\n*create Money 300\n*create Communist 10\n*create Czarist 10\n*create Moral 50\n*create Riflemen 0\n*create Machine_Gunner 0\n*create Artillery 0\n*create Tank 0\n*create Civilian 0\n*create Sniper_Infantry 0\n*create Anti_Tank 0\n*create Army_Power 0\n*create Enemy_Mass 0\n*create Marxman 0\n*create Czar_Guard 0\n*create Heavy 0\n*create Airplane 0\n*create Flamer 0\n*create Gas 0\n*create RUSSIA 0\n*create Bomber 0\n*create Scorcher 0\n*create Infiltrator 0\n*create Failed_Experiment 0\n*create Experiment 0\n*create State 5\n*create Land 20\n*create Welfare 5\n*create Industry 5\n*create Agriculture 15\n*create Contentment 50\n*create Bomb false\n*create Air false\n*create Gasser false\n*create Hev false\n*create Marx false\n*create Fire false\n*create Scorch false\n*create Russland false\n*create Guard false\n*create Infil false\n*create Nuclear false\n*create Exper false\n*create Stone_Skin false\n*create Chem false\n*create Immune false\n*create Track false\n*create Relief false\n*create Schools false\n*create Electric false\n*create Lab false\n*create Vehicle false\n*create Decoy false\n*create Rocket false\n*create Radio false\n*create Rifle 0\n*achievement good visible 30 Benevolent\n\tBecome a nice and powerful leader\n\tYou have become a force to be reckon with as well as a respected leader\n*achievement bad visible 30 Tyrant\n\tBecome a horrible dictator\n\tYou have become a horrible dictator only to be overthrown\n*achievement normal visible 20 Normal\n\tBecome a normal leader\n\tYou become a normal leader not unlike anything seen before\n*achievement lead visible 20 Leader\n\tBecome leader of Russia\n\tYou have became leader of Russia\n*achievement czar visible 20 Czar\n\tBecome the Czar\n\tYou are the Czar\n*achievement communist visible 20 Communist\n\tBecome the leader of the Communist party\n\tYou are leader of the Bolsheviks\n*achievement dead visible 10 Die\n\tDon't survive\n\tYou have died before\n*achievement pig visible 50 Pig\n\tWhat? Why does this exist?\n\tYou found it. How, I don't know.\n*achievement nuke visible 30 Oppenheimer\n\tMake fallout before the US\n\tYou have become death, destroyer of worlds.\n*achievement orbital visible 50 Death By Orbital Laser\n\tDid these exist in 1917?\n\tYou died by orbital laser, no words.\n*achievement neutral visible 40 The Only Good Ending\n\tGo to capitalist America\n\tYou made it to New York, in the USA\n*achievement dark visible 40 Mad Scientist\n\tRedefine humanity\n\tYou modified the human body!\n*achievement crisis visible 30 Crisis Averted!\n\tSave the world from the biggest war ever.\n\tYou are a true humanitarian.\n*achievement world visible 40 World Conquerer\n\tOwn the Earth!\n\tThe planet is (almost) yours!\n*achievement smart visible 20 Genius\n\tUnderestimate a little strip of land in the Balkans\n\tYou had it coming\n\n\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tAre you prepared to lead the Revolution Of 1917? It's the fall of the Tzars! How will you build The Motherland!?\n\n\t[i]Comrade or Czar[/i] is a 60,000 word interactive novel by Albnoob, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t• Lead armies to conquer the world![n/]\n\t• Build and reform Russia![n/]\n\t• Embrace Communism or stomp it out![n/]\n\t• Lead your side to victory!\n\n\t*if choice_prerelease\n\t\t[i]You can play the first two chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"no
