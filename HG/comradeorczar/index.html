<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comrade or Czar — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "comradeorczar", "title": "Comrade or Czar", "scenes": {"army": "You cleared the town of Czarists! Great job! However this was nothing compared what's happening in Moscow. You are ready, your remaining units standing by, ready to board a ship. The sea air invigorates you, and the speed of the of the ship gives you time to think. Is life better? Sure, your family and friends are gone and you are alone, but now you are successful, and you are rebuilding history. You ponder and when you finally get an answer, you hear a foghorn, hitting the answer out of your mind. It is a long trip. You need something to keep you at bay. Perhaps you can prepare for Moscow.\n\n*choice\n\n\t#Gun Training\n\t\tYou train your rifle on old pieces of metal. Some of the soldiers get the metal for a chance of money.\n\t\t*set Sniper +10\n\t\t*set Civilian +200\n\t\t*goto Moscow\n\t#Melee Training\n\t\tYou cut potatoes in the kitchen in a violent way. You are happy when you are payed for your chopping.\n\t\t*set Heavy_Hitter +10\n\t\t*set Money +200\n\t\t*set Civilian +200\n\t\t*goto Moscow\n\t#Speech Training\n\t\tYou give a speech about the communist ways to your comrades. [i]Trotsky[/i] shakes your hand afterwards.\n\t\t*set Communist +20\n\t\t*set Speaker +10\n\t\t*set Civilian +200\n\t\t*goto Moscow\n\n*label Moscow\n\nYou arrive after a trip by boat and a long ride in a bus. You had to stop a bit to shoot some game, but they were just minor targets. It spreads around the bus that you have reached a rank where a small amount of Moscow will be delegated to you. You talk with some people and they tell you about what you might expect. Unlike the previous combat arrangements, there will be civilians. The civilians can provide taxes, soldiers, defenses, and other things. Depending on how you treat the civilians, they will decrease, increase, or stagnate. You can tax them on different levels. High gives $30 per civilian, medium gives $20, and low give $10. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular. There are 3 main Czarist groups to conquer. One is going to be attacked soon, get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -5\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_1\n\t\t\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_1\n\t\t\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +5\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_1\n\n*label Conscript_1\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in a bit of Moscow with heavy industry. This means you can get primitive tanks, artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 2000 Czarists. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=250) #Book On Leading (250) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -250\n\t\t*set Army_Power +10\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=50) and (Civilian >=1)) #Rifleman (50) (1)\n\t\tYou get a general rifleman.\n\t\t*set Riflemen +1\n\t\t*set Money -50\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=150) and (Civilian >=5)) #5 Rifleman (150) (5)\n\t\tYou get 5 general rifleman. Cheaper.\n\t\t*set Riflemen +5\n\t\t*set Money -150\n\t\t*set Civilian -5\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=300) and (Civilian >=3)) #Tank (300) (3)\n\t\tYou get a TANK.\n\t\t*set Tank +1\n\t\t*set Money -300\n\t\t*set Civilian -3\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=150) and (Civilian >=5)) #Artillery (150) (5)\n\t\tYou get artillery.\n\t\t*set Artillery +1\n\t\t*set Money -150\n\t\t*set Civilian -5\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #Machine Gunner (150) (1)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=100) and (Civilian >=1)) #Sniper (100) (1)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +1\n\t\t*set Money -100\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #AT (150) (1)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_1\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 2000\n\t\t*goto Prep_1\n\n*label Prep_1\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*selectable_if ((Money >=500) and (Civilian >=1)) #House (500) (/3)\n\t\tYou build a free house to will increase population.\n\t\t*set Civilian +3\n\t\t*set Moral +10\n\t\t*set Money -500\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=1)) #Bar (500) (/5)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +5\n\t\t*set Money -500\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=300) and (Civilian >=1)) #Pub (300) (/3)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -300\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=1000) and (Civilian >=1)) #Sports Stadium (1000) (/10)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +10\n\t\t*set Money -1000\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Med School (500) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=1000) and (Civilian >=3)) #Gun Range (1000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -1000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +10\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Speech Center (500) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Gymnastics (500) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=3)) #Boxing Ring (500) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=500) and (Civilian >=3)) #School (500) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -500\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if (Money >=2000) #Monument (2000)\n\t\tYou hire a sculptor and buy some marble in hopes that the structure will increase moral.\n\t\t*set Communist +50\n\t\t*set Money -2000\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if (Money >=500) #Sculpture (500)\n\t\tYou hire a sculptor and buy some marble in hopes that the structure will increase moral.\n\t\t*set Communist +10\n\t\t*set Money -500\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=300) and (Machine_Gunner >=1)) #MG Nest (300) (1)MG Unit(s) -(300) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -300\n\t\t*set Money -300\n\t\t*set Machine_Gunner -1\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=100) and (Riflemen >=5)) #Rifle Trench (100) (5)Rifle Unit(s) -(200) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200\n\t\t*set Money -100\n\t\t*set Riflemen -5\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=300) and (Sniper_Infantry >=3)) #Sniper Hut (400) (3)Sniper Unit(s) -(600) EM\n\t\tYou mark a dead zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -600\n\t\t*set Money -400\n\t\t*set Sniper_Infantry -3\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=2000) and (Artillery >=3)) #Artillery Array (1000) (3)Artillery Unit(s) -(2000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -1000\n\t\t*set Artillery -3\n\t\t*goto Prep_1\n\t*selectable_if (Money >=300) #Barricade (300) -(200) EM\n\t\tYou hire a builder and buy some materials in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200\n\t\t*set Money -300\n\t\t*goto Prep_1\n\t#Here They Come...\n\t\tYou see white on the horizon. Here they come.\n\t\t*goto MoscowA_1\n\n*label MoscowA_1\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nThey are here to destroy you. Remember, you need to diminish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a commander. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=30) #Heavy Fire!\n\t\tYou fire heavily at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -150\n\t\t*goto MoscowA_1\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -150\n\t\t*set Riflemen -5\n\t\t*goto MoscowA_1\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike\n\t\tYou fire some artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto MoscowA_1\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto MoscowA_1\n\t*disable_reuse *selectable_if ((Army_Power >=25) and (Sniper_Infantry >=5)) #Dead-zone\n\t\tYour snipers fire before the foes can see us. No deaths.\n\t\t*set Enemy_Mass -2500\n\t\t*goto MoscowA_1\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful commander battle!\n\t\t*set Army_Power +5\n\t\t*set Money +1500\n\t\t*set Machine_Gunner +3\n\t\t*set Enemy_Mass 0\n\t\t*set Civilian +800\n\t\t*goto Tax_2\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Tax_2\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n*label Tax_2\n\n[b]Lenin[/b] visits you. He says that you have been very resourceful and that you should take a bigger challenge. He gives you around half of Moscow at your disposal. He hopes that you will be a great leader. [b]Lenin[/b] reveals that he thinks you will be what Marx was thinking of when he wrote to Communist Manifesto. You think about that. You, little ${Name} could become the sole leader of Russia. Or would you be sole leader? Will you establish a democracy? You think to Moscow's importance. It was the city that defeated the Mongols and conquered all of Russia, making your home today. You hear gunshots and are reminded of the rest of the Czarists. \"Good luck comrade\" said [b]Lenin[/b] as he left. Here we go again. \n\nTime to tax. High gives $30 per civilian, medium gives $20, and low give $10. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular. There are 3 main communist groups. One is coming soon, get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -5\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_2\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_2\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +5\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_2\n\n*label Conscript_2\n\nMany soldiers have called to serve in the defense of Moscow. Time to destroy them! Many civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in a bit of Moscow with heavy industry. This means you can get primitive tanks, artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 10000 Czarists. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=300) #Book On Leading (300) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -300\n\t\t*set Army_Power +10\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=50) and (Civilian >=1)) #Rifleman (50) (1)\n\t\tYou get a general rifleman.\n\t\t*set Riflemen +1\n\t\t*set Money -50\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=200) and (Civilian >=5)) #5 Rifleman (200) (5)\n\t\tYou get 5 general rifleman. Cheaper.\n\t\t*set Riflemen +5\n\t\t*set Money -200\n\t\t*set Civilian -5\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=300) and (Civilian >=3)) #Tank (300) (3)\n\t\tYou get a TANK.\n\t\t*set Tank +1\n\t\t*set Money -300\n\t\t*set Civilian -3\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=350) and (Civilian >=100)) #5 Artillery (350) (10)\n\t\tYou get artillery.\n\t\t*set Artillery +5\n\t\t*set Money -350\n\t\t*set Civilian -10\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #Machine Gunner (150) (1)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=100) and (Civilian >=1)) #Sniper (100) (1)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +1\n\t\t*set Money -100\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=150) and (Civilian >=1)) #AT (150) (1)\n\t\tYou get an anti-tank unit.\n\t\t*set Anti_Tank +1\n\t\t*set Money -150\n\t\t*set Civilian -1\n\t\t*goto Conscript_2\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 10000\n\t\t*goto Prep_2\n\n*label Prep_2\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself. There are very many places of work open as communist strikes have claimed Moscow. You walk through the streets and you see gypsies singing and dancing while people give them small amounts of food a gypsy tells you to train. You are really helping the country.\n\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*selectable_if ((Money >=500) and (Civilian >=1)) #House (500) (/30)\n\t\tYou build a free house to will increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -500\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=500) and (Civilian >=1)) #Bar (500) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -500\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=300) and (Civilian >=1)) #Pub (300) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +30\n\t\t*set Money -300\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=1000) and (Civilian >=1)) #Sports Stadium (1000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -1000\n\t\t n. Here they come.\n\t\t*goto MoscowA_2\n\n*label MoscowA_2\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nThey are here to destroy you. Remember, you need to diminish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a commander. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=40) #V. Heavy Fire!\n\t\tYou fire very heavily at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -250\n\t\t*goto MoscowA_2\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -200\n\t\t*set Riflemen -5\n\t\t*goto MoscowA_2\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike\n\t\tYou fire some artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto MoscowA_2\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto MoscowA_2\n\t*disable_reuse *selectable_if ((Army_Power >=25) and (Tank >=5)) #Operation Colossus\n\t\tYou make a wall of tanks that bring fear upon the foes. No deaths.\n\t\t*set Enemy_Mass -15000\n\t\t*goto MoscowA_2\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful commander battle!\n\t\t*set Army_Power +5\n\t\t*set Money +1500\n\t\t*set Machine_Gunner +3\n\t\t*set Enemy_Mass 0\n\t\t*goto Rest\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Rest\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n\n*label Rest\n\nYou did it. The Czarists lost most of Moscow. You rest and see the soldiers finishing the ammo in a display. The sky glows with bombs and military is all throughout the streets. You have made Russia a power house. A force among the greats. You have industrialized, and exploded the military. Shame you have not fought yourself in a while, but that is better than death. The soldiers return to their families, guns and machines left in the armory. Except for Cetrina, you have forgot about her. You are the real leader of Russia, [b]Lenin[/b] is just a figure head. You are a master leader. Those thoughts fill your head as a painful thought enters your brain. What happened? You used to work long, hard hours so you could hardly feed your family. Now you make trivial choices just so you can build another statue of yourself. You should at least join the festivities. Wow, it is late, 3 AM. Wait, you are supposed to revolt now right? You need to get the radio center in the Czarist part of Moscow. But you could rest. There are no spies. Right?\n\n*choice\n\n\t#Practice With My Gun Outside\n\t\tYou do well, and you look at your hand. They have turned into the hands of an aristocrat. Your thoughts are stopped by a sniper. Who plans a revolution at 3 am?\n\t\t*goto_scene death\n\t#Prepare The Attack\n\t\tYou spy around and you see a following of around 80,000 Bolsheviks that should revolting at 3 AM! You prepare yourself as there is a large force at the radio center.\n\t\t*goto Sniper_Shot\n\t#Parade\n\t\tYou get up on your own platform and take the cheers from many Russians. Just then, you are shot for your arrogance.\n\t\t*goto_scene death\n\n*label Sniper_Shot\n\nYou run through the alley ways. You think of the revolution. At the beginning, it was a democratic revolution. What happened? You guess that you had much more firepower. Maybe because the civilians are on your side! You notice there is a black shadow lurking around before you pull out your rifle- BOOM! You have been shot in the arm. You are bleeding as the shadow takes off his mask. It is -was- your village doctor -Dorota. \"You have changed\" he says to you. He begins to walk away.\n\n*choice\n\n\t*selectable_if (Doctor >=40) #Patch Yourself Up\n\t\tHe is not the only doctor around here. When you get up, you make sure to stop him.\n\t\t*set Doctor +10\n\t\t*goto Heavy\n\t*selectable_if (Speaker >=40) #Ask For Help\n\t\tHe still is your friend. You remind him of the promise he made to you on day one, when you were five. \"I will never hurt you\".\n\t\t*set Speaker +10\n\t\t*goto Heavy\n\t#Bleed Out\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Heavy\n\t\t*else\n\t\t\tWell, you made it to this part. You should be proud.\n\t\t\t*goto_scene death\n\n\n*label Heavy\n\n\nYou are now prepared for the worst. There is still a number of Bolsheviks. Who plans a revolution at 3 AM anyway!?! You just need to get to the Czarist Port you defeated early on. There are some reserve troops who did not want to go home there and a mortar on wheels. As you go there, there is a number of Czarists that you defeat quickly. You get there fast and see the reserve troops cowering in a dark alleyway. You ask them what they are doing there and you quickly find out that they are targets of a mortar. You peak past the wall and you spy a Czarist manning the mortar. What do you do?\n\n*choice\n\n\t*selectable_if (Heavy_Hitter >=40) #Hit His Head!\n\t\tYou knock him down and throw him in a blasted-out home till he wakes up.\n\t\t*set Heavy_Hitter +10\n\t\t*goto Horde\n\t*selectable_if (Cloaked >=40) #Disconnect The Shells\n\t\tYou move away the shells and when he gets curious, you send in the troops.\n\t\t*set Cloaked +10\n\t\t*goto Horde\n\t#The Bomb's Here\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Horde\n\t\t*else\n\t\t\tYou spend so much time thinking that you are bombed.\n\t\t\t*goto_scene death\n\n*label Horde\n\nYou manage to turn on the radio, just not unnoticed. Here comes the horde. You have a mortar fully loaded and a few units. You need to be prepared to fire as your foes surround you. 80,000 is a sizable number so you have to survive until the support comes. It will then be a battle royal, you will have to fight a mass of 800,000. There is no way to beat them with no deaths if you use the soldiers, but there is always a way to win with no deaths on your side. Will you lead or your units?\n\n*choice\n\n\t*selectable_if (Sniper >=40) #You'll Go\n\t\tYou lead yourself. You manage to secure the area until your help arrives.\n\t\t*set Sniper_Infantry +200\n\t\t*set Tank +20\n\t\t*set Riflemen +2200\n\t\t*set Machine_Gunner +200\n\t\t*set Artillery +200\n\t\t*set Anti_Tank +200\n\t\t*set Sniper +10\n\t\t*set Moral +10\n\t\t*set Enemy_Mass +800000\n\t\t*goto Battle_Royale\n\t*selectable_if (Army_Power >=30) #They'll Go\n\t\tYou send out the units to their death. You manage to secure the area until your help arrives.\n\t\t*set Sniper_Infantry +200\n\t\t*set Tank +20\n\t\t*set Riflemen +2000\n\t\t*set Machine_Gunner +200\n\t\t*set Artillery +200\n\t\t*set Anti_Tank +200\n\t\t*set Army_Power +5\n\t\t*set Moral -10\n\t\t*set Enemy_Mass +800000\n\t\t*goto Battle_Royale\n\t#Too Late\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Battle_Royale\n\t\t*else\n\t\t\tYour idle actions resulted in all of your deaths.\n\t\t\t*goto_scene death\n\n\n*label Battle_Royale\n\nYou have a following of 80,000 Bolsheviks. The Czarists are here to destroy you. Remember, you need to diminish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a commander. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #E. Heavy Fire!\n\t\tYou fire Extremely heavily at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -1000\n\t\t*goto Battle_Royale\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -150\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike\n\t\tYou fire some artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=200)) #Rifle Rush X200\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -70000\n\t\t*set Riflemen -200\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Artillery >=100)) #Heavy Artillery Strike X100\n\t\tYou fire 100 artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -100000\n\t\t*set Artillery -100\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto Battle_Royale\n\t*disable_reuse *selectable_if (Nuclear= true) #Nuke\n\t\tYour nuclear scientists make a bomb and use it on a distant island. The Czarists can see the flash and fallout.\n\t\t*set Enemy_Mass -1000000\n\t\t*achieve Nuke\n\t\t*goto Battle_Royale\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful commander battle!\n\t\t*set Army_Power -10\n\t\t*set Money +5000\n\t\t*set Machine_Gunner +30\n\t\t*set Communist +10\n\t\t*set Enemy_Mass 0\n\t\t*goto Ceremony\t\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Ceremony\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n\n*label Ceremony\n\nThe Bolsheviks are stopped and you have a parade along with a holiday in your honor. You are a master commander and leader. [b]Lenin[/b] calls you a true socialist. You are given medals and [b]Lenin[/b] is hailing you. But there is one thing that is ailing you. [b]Lenin[/b] is hailing you yes, but as his patsy. As his pet. [i]As his tool[/i]. You look out in the crowd and you see a sign. The sign says that you are the real leader. Another sign says Comrade ${Name}. Maybe you should cause your own rebellion and become leader.\n\n*choice\n\n\t*selectable_if (Communist >=100) #You Do It\n\t\t*gosub trial_end\n\t\tYou have become leader. Comrade ${Name} The Great!\n\t\t*achieve communist\n\t\t*achieve lead\n\t\t*goto_scene great\n\t#No\n\t\t*gosub trial_end\n\t\tYou have made it this far, better a pet than dead.\n\t\t*goto_scene great\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2018-02-08 $3.99 $2.99 purchased\n*abort\n\n", "choicescript_description": "Are you prepared to lead the Revolution Of 1917? It's the fall of the Tzars! How will you build The Motherland!?\n\n[i]Comrade or Czar[/i] is a 60,000 word interactive novel by Albnoob, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Lead armies to conquer the world![n/]\n• Build and reform Russia![n/]\n• Embrace Communism or stomp it out![n/]\n• Lead your side to victory!\n", "choicescript_stats": "*label Stat\nStats-\n*if (Money \u003c0)\n\t*set Money 0\n\n*if (Heavy_Hitter \u003c0)\n\t*set Heavy_Hitter 0\n\n\n*if (Cloaked \u003c0)\n\t*set Cloaked 0\n\n\n*if (Doctor \u003c0)\n\t*set Doctor 0\n\n\n*if (Sniper \u003c0)\n\t*set Sniper 0\n\n\n*if (Speaker \u003c0)\n\t*set Speaker 0\n\n\n*if (Heavy_Hitter >100)\n\t*set Heavy_Hitter 100\n\n\n*if (Cloaked >100)\n\t*set Cloaked 100\n\n\n*if (Doctor >100)\n\t*set Doctor 100\n\n\n*if (Sniper >100)\n\t*set Sniper 100\n\n*if (Communist >100)\n\t*set Communist 100\n\n*if (Czarist >100)\n\t*set Czarist 100\n\n*if (Speaker >100)\n\t*set Speaker 100\n\n*if (Army_Power >100)\n\t*set Army_Power 100\n\n*if (Moral \u003c0)\n\t*set Moral 0\n\n*if (Moral >100)\n\t*set Moral 100\n\n*stat_chart\n\tpercent Speaker\n\tpercent Sniper\n\tpercent Heavy_Hitter Heavy Hitter\n\tpercent Doctor\n\tpercent Cloaked\n\topposed_pair Moral\n\t\tEvil\n\tpercent Communist\n\tpercent Czarist\n\ttext Money\n\n*choice\n\n\t#Military\n\t\t*goto Army\n\t#Country\n\t\t*goto Country\n\n*label Army\n\n*if (Army_Power >100)\n\t\t*set Army_Power 100\n*stat_chart\n\ttext Riflemen\n\ttext Machine_Gunner Machine Gunner\n\ttext Sniper_Infantry Sniper Infantry\n\ttext Anti_Tank Anti Tank\n\ttext Artillery\n\ttext Civilian\n\ttext Tank\n\tpercent Army_Power Army Power\n\ttext Name\n\ttext Enemy_Mass Enemy Mass\n\ttext Marxman\n\ttext Czar_Guard Czar Guard\n\ttext Flamer\n\ttext Airplane\n\ttext Heavy\n\ttext Gas\n\ttext RUSSIA\n\ttext Bomber\n\ttext Scorcher\n\ttext Infiltrator\n\ttext Failed_Experiment Failed Experiment\n\ttext Experiment\n\n*choice\n\n\t#Stats\n\t\t*goto Stat\n\t#Country\n\t\t*goto Country\n\t\t\n*label Country\n\n*if (Agriculture >100)\n\t\t*set Agriculture 100\n\t\n*if (Welfare >100)\n\t\t*set Welfare 100\n\t\t\n*if (Industry >100)\n\t\t*set Industry 100\n\t\t\n*if (State >100)\n\t\t*set State 100\n\t\t\n*if (Contentment \u003c0)\n\t\t*set Contentment 0\n\t\t\n*if (Contentment >100)\n\t\t*set Contentment 100\n*stat_chart\n\tpercent State\n\tpercent Industry\n\tpercent Agriculture\n\tpercent Welfare\n\tpercent Land\n\tpercent Contentment\n\n*choice\n\n\t#Stats\n\t\t*goto Stat\n\t#Military\n\t\t*goto Army", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 3 and 4[/b]\n  \n  Unlock chapters 3 and 4, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2018-02-08 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 3 and 4[/b]\n  \n  You've paid to unlock chapters 3 and 4.\n", "death": "*achieve Dead\n\nWe hope you've enjoyed playing [i]Comrade or Czar.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nCommunists take over and you are gone as civilization rebuilds. Your town is razed to the ground and you are -even though dead- the most successful in your family. If only you had the power. If only the universe was yours. If only. If only you could change history at will. If only -wait-\n\nRestart!\n\n*ending\n\n", "ending": "You did it! You survived the revolution unlike 20 million poor souls. Al least it's not 20,000,001.\n\nWe hope you've enjoyed playing [i]Comrade or Czar.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nYou sit back, wondering if it was all worth it. You killed for survival. You may have even augmented history itself. Was it worth it? Your friends, your comrades, your victims are not as lucky as you. The deaths you caused are unfortunate to say the least. Was it worth!?! All the deaths, all the destruction all the power- was it used in vain? You can't bear the the thought of all the death, you need to feel better, maybe a stro- Wait, the restart button.\n\nCOMRADE OR CZAR- -Which did you choose?-\n\n*image Comrade-Czar.jpg\n\n*ending", "faction": "You realize how close that was. You can't survive here alone. You could continue running to a dark alleyway, who will follow you there? There is also the ports. Capitalist soldiers are coming in to help the Czar there. There is also a stronghold where the local communists are. You could go there and become a member of the Red Army.\n\n*choice\n\n\t#Dark Alleyway\n\t\tYou run in between two buildings. Smells horrible, but better that the stench of death.\n\t\t*goto Bronislava\n\t#Port\n\t\tYou run through the chaos to the Czarist port.\n\t\t*goto Port\n\t#Stronghold\n\t\tYou sprint through the machinegun fire to the concrete bunker.\n\t\t*goto Bunker\n\n*label Bronislava\n\nYou can barely see. The dark envelops everything and everyone. But you can hear. You hear some loud feral cats screech at a pitch so loud you are surprised your eardrums did not burst. You scare them away so they will not alert others to your position. Just then you hear \"Помоги мне\" from some trash. Is there someone who needs help? You look in between some rancid garbage bags and see a uniform with a red star. He could kill you or he could help you.\n\n*choice\n\n\t*selectable_if (Sniper >13) #Shoot Him\n\t\tHe probably had it coming. He also had money on him -had-. You find a note on his corpse that tells you he left the communist cause.\n\t\t*set Money +100\n\t\t*set Sniper +5\n\t\t*set Communist +5\n\t\t*goto Choice1\n\t*selectable_if (Speaker >13) #Talk To Him\n\t\tYou find out he is a rouge Communist named Bronislava. He leans on his machinegun and says he will join you if you give him a job.\n\t\t*set Speaker +5\n\t\t*set Machine_Gunner +1\n\t\t*goto Choice1\n\t#Run\n\t\tA Communist! They have killed enough, you are leaving.\n\t\t*goto Choice1\n\t#Ignore Him\n\t\tYou should know better than to do that. Sneaks up on you and ends you with a machinegun.\n\t\t*goto_scene death\n\n*label Choice1\n\nYou know you cannot stay in the alleyway forever. You need to go somewhere else. You need to leave fast. You heard that the Czarists are bombing the region. You need to pick a faction. The Communists or Czarists. The Communists seem to be winning and you hear that the leader of the Red Army, [i]Trotsky[/i] is here to help.\n\n*choice\n\n\t#Communists\n\t\tYou feel the Communists have the best interests at heart.\n\t\t*goto Bunker\n\t#Czarists\n\t\tYou hate the Communists for what they did and they must pay.\n\t\t*goto Port\n\n\n*label Bunker\n\nYou arrive just in time. Bombers clear out the city and remaining civilians. You are greeted by a voice that you can tell belongs to a high ranking official. \"Hello, I am [i]Trotsky[/i] I am the leader of the Red Army. I am [b]Lenin's[/b] second in command. Would you like to enlist to allow the Socialists grow? I promise that afterwards you will be rewarded for your efforts.\" He is serious.\n\n*choice\n\n\t*selectable_if (Communist >20) #Yes Comrade!\n\t\tYou say you are ${name} and you are willing to help the motherland. He gives you training as well.\n\t\t*set Doctor +5\n\t\t*set Cloaked +5\n\t\t*set Heavy_Hitter +5\n\t\t*set Sniper +5\n\t\t*set Speaker +5\n\t\t*set Army_Power +5\n\t\t*set Communist +10\n\t\t*goto Training\n\t#Fine...\n\t\t[i]Trotsky[/i] listens to you and lets you know that you can help when you want to.\n\t\t*goto Training\n\n*label Training\n\nAfter that you had a big feast (beans, bread, and potatos) and slept like a rock. You awaken at 5:26 AM at the sound of a ringing bell. You are told that we are under attack! You quickly grab Cetrina and head to the front lines. There is an commander standing on a brick. he asks you infantry or MG.\n\n*choice\n\n\t#You'll Be Infantry\n\t\tInfantry is a generic job, you are in the front lines with your comrades.\n\t\t*set Sniper +5\n\t\t*set Riflemen +5\n\t\t*goto Trouble\n\t*selectable_if (Sniper >19) #MG's Right For You\n\t\tIt is difficult to hit the Czarists, but your gun skills allow you to. You win with minimal losses on your side. As a reward you are granted a small platoon.\n\t\t*set Sniper +10\n\t\t*set Riflemen +5\n\t\t*goto Promotion1\n\n*label Trouble\n\nYou are doing fine until the trench has been bombed by a mortar you failed to pay attention to. The Czarists broke in but have not noticed you yet. You have a few friends with you. You need to find a way to defeat the Czarists. Unfortunately, the mortar made you lose your rifle in the Czarist part of the trench. The Communist soldiers give you command. You could use their lives to win or you can risk yourself.\n\n*choice\n\n\t#Use A Full-On Charge\n\t\tThey won, at the cost of their lives, was it worth it?\n\t\t*set Riflemen -5\n\t\t*set Moral -10\n\t\t*goto Promotion1\n\t*selectable_if (Army_Power >4) #Do A Simple Flanking Strategy\n\t\tYou hit them from both sides and lost no men.\n\t\t*goto Promotion1\n\t*selectable_if (Cloaked >13) #Sneak Behind Enemy Lines\n\t\tYou steal food and ammo from the Czarist soldiers at night. In the morning they try to shoot you with no bullets.\n\t\t*set Moral +10\n\t\t*set Cloaked +10\n\t\t*goto Promotion1\n\t*selectable_if (Heavy_Hitter >13) #Hit Them, Hard\n\t\tYou run at them and use their shock to bash them with their own guns.\n\t\t*set Heavy_Hitter +10\n\t\t*set Moral +10\n\t\t*goto Promotion1\n\t#Run For The Rifle\n\t\tYou did not notice they had a machinegun. Their Machinegun destroys you and your troop fast.\n\t\t*goto_scene death\n\n*label Promotion1\n\nThe Comrades are pleased at your skill and are thinking about promoting you. Despite all the deaths this was a big success. They may also not promote you. You need to do something special to show off that you are the best candidate for the position of commander. Which of your many skils shall you use? You find out that the Red Army prefers the word commander over the Czarist phrase officer.\n\n*choice\n\n\t*selectable_if (Communist >34) #They Already Love You\n\t\tThey heard about you long ago and were waiting until you joined. When you joined, they were very happy.\n\t\t*set Army_Power +5\n\t\t*goto Training2\n\t*selectable_if (Money >=300) #Everyone Has A Price\n\t\t300$ is more than enough to secure your place as a commander.\n\t\t*set Army_Power +5\n\t\t*set Money -300\n\t\t*goto Training2\n\t*selectable_if (Moral >=60) #You Have Good Karma\n\t\tYou must have pleased someone because your good actions have not gone unnoticed.\n\t\t*set Army_Power +5\n\t\t*goto Training2\n\t*selectable_if (Moral \u003c=40) #They Fear You\n\t\tYou have been so bad you have instilled fear amoung a number of people, they know better than to say no.\n\t\t*set Army_Power +5\n\t\t*goto Training2\n\t#Destroy Your Czarist Ties\n\t\tYou made sure that the Czarists hate you so that your comrades will know where you stand. The Czarists send more soldiers to defeat you.\n\t\t*set Czarist 0\n\t\t*set Enemy_Mass +50\n\t\t*set Army_Power +5\n\t\t*goto Training2\n\n*label Training2\n\nYou are now Commander ${name}. Your soldiers give you more respect due to your new promotion. You are soon going to earn a few more soldiers, but now it is time to defend. The machinegun nests are setting up as you see white on the horizon. You grab Cetrina as you gather the units. Now you need to ralley the units, you have a decent budget to spend on soldiers and equipment. You may also have to fight yourself.\n\n*choice\n\n\t#Tank\n\t\tLet's be honest here TANK.\n\t\t*set Tank +1\n\t\t*goto Perfection1\n\t#Rifle Squadron\n\t\t15 riflemen, good old Russian spam tactics.\n\t\t*set Riflemen +15\n\t\t*goto Perfection1\n\t#Explosives Team\n\t\tAnti-tank and artillary with rifle support, good for hordes.\n\t\t*set Anti_Tank +3\n\t\t*set Artillery +1\n\t\t*set Riflemen +5\n\t\t*goto Perfection1\n\t#Rifles and Strategy Guides\n\t\tYou get some strategies and riflemen.\n\t\t*set Riflemen +10\n\t\t*set Army_Power +5\n\t\t*goto Perfection1\n\t*selectable_if (Sniper >14) #Machineguns and Rifles\n\t\tYou know from shooting machinegunners are big targets, so let's get some more targets.\n\t\t*set Machine_Gunner +3\n\t\t*set Riflemen +10\n\t\t*goto Perfection1\n\n*label Perfection1\n\nYou now have a formidable force. You are also part of the army and you need to train. You only have some time before the brunt of the Czarists come. You need to improve yourself. There is a bunch of equipment in the nearby trunk. There are weights, guns, targets, books, ropes, and other mischellanous items. A bloodied scout rushes to your room he tells you that there is a mass of 300 enemies. Mass is approximate army strength. You have the bonus because you are defending. How will you prepare?\n\n*choice\n\n\t#Scrounge Up Any Extra recruits\n\t\tA few riflemen join you and so does a sniper.\n\t\t*set Riflemen +5\n\t\t*set Sniper_Infantry +1\n\t\t*set Enemy_Mass +300\n\t\t*goto Skirmish1\n\t*selectable_if (Doctor >14) #Heal Some Recruits\n\t\tYou get a number of volunteers and some respect.\n\t\t*set Communist +10\n\t\t*set Riflemen +5\n\t\t*set Machine_Gunner +1\n\t\t*set Sniper_Infantry +2\n\t\t*set Anti_Tank +1\n\t\t*set Doctor +5\n\t\t*set Enemy_Mass +300\n\t\t*goto Skirmish1\n\t#General Studies\n\t\tYou learn a bit of everything.\n\t\t*set Doctor +5\n\t\t*set Speaker +5\n\t\t*set Sniper +5\n\t\t*set Heavy_Hitter +5\n\t\t*set Cloaked +5\n\t\t*set Enemy_Mass +300\n\t\t*goto Skirmish1\n\t#Physical Studies\n\t\tYou exercize, sneak and snipe.\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Cloaked +10\n\t\t*set Enemy_Mass +300\n\t\t*goto Skirmish1\n\t#Mental Studies\n\t\tYou read. Alot.\n\t\t*set Doctor +10\n\t\t*set Speaker +10\n\t\t*set Army_Power +5\n\t\t*set Enemy_Mass +300\n\t\t*goto Skirmish1\n\n\n\n*label Skirmish1\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nThey are here to destroy you. Remember, you need to dimish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a commander. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=20) #Fire!\n\t\tYou fire at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -50\n\t\t*goto Skirmish1\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto Skirmish1\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto Skirmish1\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto Skirmish1\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machinegunner\n\t\tThe machinegunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto Skirmish1\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto Skirmish1\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillary Strike\n\t\tYou fire some artillary. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto Skirmish1\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto Skirmish1\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto Skirmish1\n\t*disable_reuse *selectable_if ((Army_Power >=15) and (Riflemen >=10)) #Cellar Tricks\n\t\tYou hide riflemen in some cellars and when the foes rest, they are attacked. No deaths.\n\t\t*set Enemy_Mass -500\n\t\t*goto Skirmish1\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! Your first successful commander battle!\n\t\t*set Army_Power +5\n\t\t*set Money +500\n\t\t*set Machine_Gunner +1\n\t\t*set Enemy_Mass 0\n\t\t*goto Assassination1\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Assassination1\n\t\t*else\n\t\t\tThe Czarists storm the stronghold and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n*label Assassination1\n\nYou lay, enjoying your reward and fame. You are also now in the K-6 group, K-7 is along ways away. You see a lady in thick black clothing talking to [i]Trotsky[/i]. She has a bit of a British accent. Why would a person from Gre-. She's a spy!!! She wants to assassinate your comrade, you need to kill her or alert the defences to her. You talk to [i]Trotsky[/i] and you can tell from the look on his face that he is smitten with her. You need a way to get him to hate her so that she does not kill anyone. You have to make sure she is gone. Forever. As she leaves you see a marking on her expensive handbag [i]Perica[/i].\n\n*choice\n\n\t*selectable_if (Communist >=30) #Trotsky Believes You Comrade\n\t\t[i]Trotsky[/i] knows you are a great comrade and executes her, finding the mission objective in her bedroom.\n\t\t*set Communist +10\n\t\t*finish\n\t*selectable_if (Speaker >=20) #Trotsky Listens\n\t\t[i]Trotsky[/i] is skeptical at first, but he listens to common sense and tortures her for the truth.\n\t\t*set Speaker +5\n\t\t*finish\n\t*selectable_if (Sniper >=20) #You Kill Her\n\t\tShe was a terrible person, even though she was rich, she wanted the bounty of killing [i]Trotsky[/i].\n\t\t*set Sniper +5\n\t\t*finish\n\t*selectable_if (Cloaked >=20) #You Steal The Mission Objective\n\t\tYou pick the lock to her bedroom and take her mission objective and deliver it to [i]Trotsky[/i].\n\t\t*set Cloaked +5\n\t\t*finish\n\t#Buy An Assassin\n\t\tYou pay a commander to sneak into her room and poison her soup.\n\t\t*set Money -200\n\t\t*finish\n\n*label Port\n\nYou arrive at the port and you are almost go deaf from the roar of bombers flying toward the city. You hear French, English, and Russian slung around the area. Someone with a shotgun and some missing teeth yells at you. He says \"Wadduo wond? Ya ear ta elp or dah?\". Someone else helps translate the English. What do you want? Are you here to help or die? You feel like joking but then again, a shotgun is not really something to laugh at.\n\n*choice\n\n\t*selectable_if (Czarist >=20) #Help\n\t\tYou say you can't wait to kill some commies and the shotgun man bares his 10 teeth. They offer training to you.\n\t\t*set Doctor +5\n\t\t*set Cloaked +5\n\t\t*set Sniper +5\n\t\t*set Heavy_Hitter +5\n\t\t*set Speaker +5\n\t\t*set Army_Power +5\n\t\t*set Czarist +10\n\t\t*goto Training_1\n\t#You'd Rather Die\n\t\tLucky for you, the Shotgun man laughs and hits you so hard you almost fall to the sea.\n\t\t*goto Training_1\n\n*label Training_1\n\nYou eat the first fish you've eaten in a long time and sleep like a log. You wake up 5:10 at the sound of an officer ringing a bell you get up fast because you see he is carrying a bucket of ice-cold water and it is -4 degrees Centigrade outside. You grab Cetrina and head for the front. There is a officer with some armor on. He yells at you. He says \"Mortar or Foot?\". You know it is difficult to aim a mortar so it is recommended to be a footman.\n\n*choice\n\n\t#Footman\n\t\tYou do well until a Maxim MG cuts into your numbers. One of you shoot it down, but there are also a lot of riflemen.\n\t\t*goto Trouble_1\n\t*selectable_if (Sniper >=20) #Mortarman\n\t\tYou blast the trenches to another planet and you destroy the MGs. A sniper joins you due to your skills.\n\t\t*set Sniper +10\n\t\t*set Sniper_Infantry +1\n\t\t*goto Promotion_1\n\n*label Trouble_1\n\nYou are in trouble! The riflemen are firing on your soldiers. Before you shoot, a soldier hits you and your rifle falls deep into the enemy trench. There is some nearby barbed wire you could wrap around a stick and use. You could also sneak to the unused machinegun. You need to think fast! Your soldiers are dieing around you. What do you do.\n\n*choice\n\n\t#Push Through\n\t\tYou tell your units to push through and even though there is a lot of death, you make it.\n\t\t*set Moral -10\n\t\t*goto Promotion_1\n\t#Get Your Rifle Back\n\t\tYou run for it! And get shot in the leg, falling head-first a meter straight down into the hard ground of the trench.\n\t\t*goto_scene death\n\t*selectable_if (Heavy_Hitter >=15) #Melee Madness\n\t\tYou bravely charge the Communists, killing them until the rest of your team comes to help.\n\t\t*set Heavy_Hitter +10\n\t\t*set Moral +10\n\t\t*goto Promotion_1\n\t*selectable_if (Cloaked >=15) #Steal MG\n\t\tYou sneak up to the machinegun during the chaos but you get noticed. By then though, you are at the MG.\n\t\t*set Cloaked +10\n\t\t*goto Promotion_1\n\n*label Promotion_1\n\nThe [b]Czar[/b] comes to the base and is saying something about an evacuation to Moscow, the capital. To do that they need two more things. The eradication of the communists and more officers. You stopped listening there. Perhaps you could help them achieve both. Lucky for you, the promotion is down to you and one more person. Unlucky for you, the other canadate is a seasoned Brittish spy. Her name is \"[i]Perica[/i]\" and she is a personal friend of the Czar. The only way you can beat her is if she is dead. She may be a Communist spy so to get her to die, you need a double-sided coin. If she is Czarist, she will accept the mission and die. If she is Communist, she will refuse the mission and get executed. The mission is the assassinate [i]Trotsky[/i]. Later -if she goes-, you will alert the Communists to the spy.\n\n*choice\n\n\t*selectable_if (Czarist >=35) #The Czar Listens\n\t\tWith a little nudge the [b]Czar[/b] believes that she can succeed.\n\t\t*set Army_Power +5\n\t\t*goto Training_2\n\t*selectable_if (Speaker >=20) #You Convince The Czar\n\t\tAfter a long debate, the [b]Czar[/b] is convinced that she can succeed.\n\t\t*set Speaker +5\n\t\t*set Army_Power +5\n\t\t*goto Training_2\n\t*selectable_if (Sniper >=30) #Kill Her Yourself\n\t\tYou manage to sneak a bullet through a window crack to kill her silently.\n\t\t*set Sniper +5\n\t\t*set Army_Power +5\n\t\t*goto Training_2\n\t#Hire An Assassin\n\t\tYou hire a Communist assassin to kill her in the bathtub for $200\n\t\t*set Money -200\n\t\t*set Army_Power +5\n\t\t*goto Training_2\n\n*label Training_2\n\nYou hear the news, she is killed. You feel lighter as you now have the job. You may now raise an army. Generally, the way an army works is there is an enemy mass. The way you win a battle is by dropping the enemy mass to 0. To do that you need to release soldiers in a formation. The formations you can use vary depending on your faction, army power, and units. More complex formations take more units and army power. Time to choose your units for an upcoming skirmish.\n\n*choice\n\n\t#Tank And AT\n\t\tLet's be honest here TANK.\n\t\t*set Tank +1\n\t\t*set Anti_Tank +3\n\t\t*goto Perfection_1\n\t#Rifle Squadron\n\t\t30 riflemen, good old Russian spam tactics.\n\t\t*set Riflemen +30\n\t\t*goto Perfection_1\n\t#Explosives Team\n\t\tAnti-tank and artillary with rifle support,  good for hordes.\n\t\t*set Anti_Tank +5\n\t\t*set Artillery +3\n\t\t*set Riflemen +5\n\t\t*goto Perfection_1\n\t#Rifles and Strategy Guides\n\t\tYou get some strategies and riflemen.\n\t\t*set Riflemen +15\n\t\t*set Army_Power +5\n\t\t*goto Perfection_1\n\t*selectable_if (Sniper >14) #Machineguns and Rifles\n\t\tYou know from shooting that machinegunners are big targets, so let's get alot more targets.\n\t\t*set Machine_Gunner +5\n\t\t*set Riflemen +15\n\t\t*goto Perfection_1\n\n*label Perfection_1\n\nYou now have a formidable force. You are also part of the army and you need to train. You only have enough time before the brunt of the Communists come. You need to improve yourself. There is a bunch of equipment in the nearby trunk. There is weights, guns, targets, books, ropes, and other mischellanous items. A bloodied scout rushes to your room he tells you that there is a mass of 500 enemies. Mass is approximate army strength. It is around 30 riflemen or a destroyed tank. You have the bonus because you are defending. How will you prepare?\n\n*choice\n\n\t#Scrounge Up Any Extra recruits\n\t\tA few riflemen join you and so does a sniper.\n\t\t*set Riflemen +10\n\t\t*set Sniper_Infantry +1\n\t\t*set Enemy_Mass +500\n\t\t*goto Skirmish_1\n\t*selectable_if (Doctor >14) #Heal Some Recruits\n\t\tYou get a number of volunteers and some respect.\n\t\t*set Czarist +10\n\t\t*set Riflemen +10\n\t\t*set Machine_Gunner +1\n\t\t*set Sniper_Infantry +2\n\t\t*set Anti_Tank +1\n\t\t*set Doctor +5\n\t\t*set Enemy_Mass +500\n\t\t*goto Skirmish_1\n\t#General Studies\n\t\tYou do a bit of everything.\n\t\t*set Doctor +5\n\t\t*set Speaker +5\n\t\t*set Sniper +5\n\t\t*set Heavy_Hitter +5\n\t\t*set Cloaked +5\n\t\t*set Enemy_Mass +500\n\t\t*goto Skirmish_1\n\t#Physical Studies\n\t\tYou exercize, sneak and snipe.\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Cloaked +10\n\t\t*set Enemy_Mass +500\n\t\t*goto Skirmish_1\n\t#Mental Studies\n\t\tYou read. Alot.\n\t\t*set Doctor +10\n\t\t*set Speaker +10\n\t\t*set Army_Power +5\n\t\t*set Enemy_Mass +500\n\t\t*goto Skirmish_1\n\n*label Skirmish_1\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nThey are here to destroy you. Remember, you need to dimish the mass to 0. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a officer. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=20) #Fire!\n\t\tYou fire at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -50\n\t\t*goto Skirmish_1\n\t*selectable_if (Riflemen >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto Skirmish_1\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -5\n\t\t*goto Skirmish_1\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -100\n\t\t*set Riflemen -5\n\t\t*goto Skirmish_1\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machinegunner\n\t\tThe machinegunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -100\n\t\t*set Machine_Gunner -1\n\t\t*goto Skirmish_1\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -150\n\t\t*set Sniper_Infantry -1\n\t\t*goto Skirmish_1\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillary Strike\n\t\tYou fire some artillary. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -200\n\t\t*set Artillery -1\n\t\t*goto Skirmish_1\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -200\n\t\t*set Anti_Tank -1\n\t\t*goto Skirmish_1\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. Is causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -500\n\t\t*set Tank -1\n\t\t*goto Skirmish_1\n\t*disable_reuse *selectable_if ((Army_Power >=15) and (Riflemen >=10)) #Cellar Tricks\n\t\tYou hide riflemen in some cellars and when the foes rest, they are attacked. No deaths on your side.\n\t\t*set Enemy_Mass -500\n\t\t*goto Skirmish_1\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\t*gosub_scene army trial_end\n\t\tYou did it! Your first successful battle!\n\t\t*set Army_Power +5\n\t\t*set Money +500\n\t\t*set Machine_Gunner +1\n\t\t*set Enemy_Mass 0\n\t\t*goto_scene moscow\n\t#Loss\n\t\t*gosub_scene army trial_end\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto_scene moscow\n\t\t*else\n\t\t\tThe Communists beat you, capture you, and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n", "great": "*label Test_1\n\nCongratulations! You cleaned up the vast land of Russia from rebels. The internal problems are mainly dealt with, but you need to deal with the external. The central foes thought Russia was out of the war. They thought that Russia was done. The were happy as the west is all they had to fight. Time to make them suffer for their ignorance. You need to control most of Russia in order to defeat the central. There are some high ranking officials that want to exit the Great War. They matter none. You shall renovate Russia and defeat the foes and, if you are strong enough- the allies. The blasted Great War is the reason of the revolution. But with you reestablishing Russia as a power among the greats and gaining the support of the common person, they are ready once more, but only under you. You have restarted science so now you can unlock new units. What shall you unlock?\n\nYou have$${Money}\n\n*choice\n\n\t*disable_reuse *selectable_if (((Money >=5000) and (Sniper_Infantry >=5)) and (Communist >=70)) #Marxmen (5000) (5 Snipers)\n\t\tYou develop better zoom and stability along with high caliber ammo. You give them communist symbols.\n\t\t*set Money -5000\n\t\t*set Sniper_Infantry -5\n\t\t*set Marx true\n\t\t*set Marxman +5\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if (((Money >=5000) and (Machine_Gunner >=5)) and (Czarist >=70)) #Czar Guards (5000) (5 MGs)\n\t\tYou give them portable machine gun stands, make the guns lighter, and get rags to cool it along with Czarist symbols.\n\t\t*set Money -5000\n\t\t*set Machine_Gunner -5\n\t\t*set Guard true\n\t\t*set Czar_Guard +5\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Riflemen >=50)) #Heavy (50000) (50 Riflemen)\n\t\tYou give heavy, lightweight armor to riflemen and pockets containing supplies.\n\t\t*set Money -50000\n\t\t*set Riflemen -50\n\t\t*set Hev true\n\t\t*set Heavy +50\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=100000) and (Heavy >=50)) #R.U.S.S.I.A. Troops (100000) (50 Heavies)\n\t\tYou train 50 veterans for the [b]R[/b]ussian [b]U[/b]nit of [b]S[/b]uper [b]S[/b]oldier [b]I[/b]nfantry in [b]A[/b]rmor. Only one survives...\n\t\t*set Money -100000\n\t\t*set Heavy -50\n\t\t*set Russland true\n\t\t*set Russia +1\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=5000) and (Artillery >=5)) #Gas (5000) (5 Artillery)\n\t\tYou modify the chemicals in the flare shells and others making a lethal gas.\n\t\t*set Money -5000\n\t\t*set Artillery -5\n\t\t*set Gasser true\n\t\t*set Gas +5\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=20000) and (Gas >=5)) #Infiltrator (20000) (5 Gas)\n\t\tYou give stealth corps in dark, strong armor gas and instruct them to open the gas bombs and hide them.\n\t\t*set Money -20000\n\t\t*set Gas -5\n\t\t*set Infil true\n\t\t*set Infiltrator +5\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=20000) and (Tank >=5)) #Planes (20000) (5 Tank)\n\t\tYou study engines and make one powerful enough to take multiple guns and bullets into the air.\n\t\t*set Money -20000\n\t\t*set Tank -5\n\t\t*set Air true\n\t\t*set Airplane +5\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=40000) and (Airplane >=5)) #Bombers (40000) (5 Airplane)\n\t\tYou equip planes with better engines, bigger wings, and strong bombs, keeping the original guns on board.\n\t\t*set Money -40000\n\t\t*set Airplane -5\n\t\t*set Bomb true\n\t\t*set Bomber +5\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=10000) and (Anti_Tank >=5)) #Flamer (10000) (5 Anti-Tank)\n\t\tYou make rocket propellant give off a slow burn. The result; nightmares only 2nd to weapons of mass destruction.\n\t\t*set Money -10000\n\t\t*set Anti_Tank -5\n\t\t*set Fire true\n\t\t*set Flamer +5\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=30000) and (Flamer >=5)) #Scorcher (30000) (5 Flamer)\n\t\tYou develop full-body fire retardant suits and give heavy flame throwers. Destroys spies.\n\t\t*set Money -30000\n\t\t*set Flamer -5\n\t\t*set Scorch true\n\t\t*set Scorcher
