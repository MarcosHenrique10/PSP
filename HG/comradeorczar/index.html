+5\n\t\t*goto Test_1\n\n\t*selectable_if ((Money >=3000) and (Civilian >=50)) #Prisoner Experiments (3000) (50 Civilians)\n\t\tYou give death row prisoners to the lab. The 20% that survived are now sick and have experienced mutations.\n\t\t*set Money -3000\n\t\t*set Civilian -50\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Civilian >=50)) #Dark Experiments- Skin (50000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The skin of the successful had grown crystals.\n\t\t*set Money -50000\n\t\t*set Civilian -50\n\t\t*set Stone_Skin true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Civilian >=50)) #Dark Experiments- Chemicals (50000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The brain of the successful had produced growth hormones.\n\t\t*set Money -50000\n\t\t*set Civilian -50\n\t\t*set Chem true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Civilian >=50)) #Dark Experiments- Immunity (50000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The body of the successful had been immune to pathogens.\n\t\t*set Money -50000\n\t\t*set Civilian -50\n\t\t*set Immune true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_1\n\n\t*disable_reuse *selectable_if (((Stone_Skin = true) and (Immune = true)) and (Chem = true)) #Abomination\n\t\tWhat have you done!?! You have made an abomination!!!\n\t\t*set Exper true\n\t\t*set Experiment +1\n\t\t*achieve dark\n\t\t*set Moral -30\n\t\t*goto Test_1\n\n\t#Done\n\t\tYou get ready to tax civilians.\n\t\t*set Civilian +1000\n\t\t*goto Tax_1\n\n*label Tax_1\n\nYou are ready to tax. The researching was very expensive. You have many civilians under your control. The Ottomans are mobilizing and preparing for war with you. You need to afford your units and upgraded units. You are controlling South Russia. The Ottomans are at their brink of collapse as Russia once was. Finish them and establish your government there. For the motherland! For Serbia!\n\nTime to tax. High gives $20 per civilian, medium gives $10, and low give $5. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular. Get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -5\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_1\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_1\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +5\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_1\n\t\t\n*label Conscript_1\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in a bit of Russia with heavy industry. This means you can get tanks, artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 100000 Ottomans. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=300) #Book On Leading (3000) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -300\n\t\t*set Army_Power +10\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=500) and (Civilian >=10)) #10 Riflemen (500) (10)\n\t\tYou get general riflemen.\n\t\t*set Riflemen +10\n\t\t*set Money -500\n\t\t*set Civilian -10\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=2000) and (Civilian >=50)) #50 Riflemen (2000) (50)\n\t\tYou get 50 general riflemen. Cheaper.\n\t\t*set Riflemen +50\n\t\t*set Money -2000\n\t\t*set Civilian -50\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=3000) and (Civilian >=30)) #10 Tanks (3000) (30)\n\t\tYou get a TANK.\n\t\t*set Tank +10\n\t\t*set Money -3000\n\t\t*set Civilian -30\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=1500) and (Civilian >=50)) #10 Artillery (1500) (50)\n\t\tYou get artillery.\n\t\t*set Artillery +10\n\t\t*set Money -1500\n\t\t*set Civilian -50\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=1500) and (Civilian >=10)) #10 Machine Gunners (1500) (10)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +10\n\t\t*set Money -1500\n\t\t*set Civilian -10\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=1000) and (Civilian >=10)) #10 Snipers (1000) (100)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +10\n\t\t*set Money -1000\n\t\t*set Civilian -10\n\t\t*goto Conscript_1\n\t*selectable_if ((Money >=1500) and (Civilian >=1)) #10 ATs (1500) (100)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +10\n\t\t*set Money -1500\n\t\t*set Civilian -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=5000) and (Sniper_Infantry >=10)) and (Marx =true)) #Marxmen (5000) (10 Snipers)\n\t\tYou get a Marxman.\n\t\t*set Marxman +10\n\t\t*set Money -5000\n\t\t*set Sniper_Infantry -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=5000) and (Machine_Gunner >=10)) and (Guard =true)) #Czar Guards (4000) (10 MGs)\n\t\tYou get a Czar Guard.\n\t\t*set Czar_Guard +10\n\t\t*set Money -5000\n\t\t*set Machine_Gunner -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=10000) and (Anti_Tank >=10)) and (Fire =true)) #Flamers (10000) (10 ATs)\n\t\tYou get a flamer.\n\t\t*set Flamer +10\n\t\t*set Money -10000\n\t\t*set Anti_Tank -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=15000) and (Flamer >=10)) and (Scorch =true)) #Scorchers (15000) (10 Flamers)\n\t\tYou get a scorcher.\n\t\t*set Scorcher +10\n\t\t*set Money -15000\n\t\t*set Flamer -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=5000) and (Artillery >=10)) and (Gasser =true)) #Gas (5000) (10 Artillery)\n\t\tYou get a gas unit.\n\t\t*set Gas +10\n\t\t*set Money -5000\n\t\t*set Artillery -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=30000) and (Gas >=10)) and (Infil =true)) #Infiltrator (30000) (10 Gas)\n\t\tYou get an Infiltrator.\n\t\t*set Infiltrator +10\n\t\t*set Money -30000\n\t\t*set Gas -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=60000) and (Tank >=10)) and (Air =true)) #Airplane (30000) (10 Tanks)\n\t\tYou get a Airplane.\n\t\t*set Airplane +10\n\t\t*set Money -60000\n\t\t*set Tank -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=30000) and (Airplane >=10)) and (Bomb =true)) #Bomber (60000) (10 Planes)\n\t\tYou get a Bomber.\n\t\t*set Bomber +10\n\t\t*set Money -30000\n\t\t*set Airplane -10\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=50000) and (Riflemen >=100)) and (Hev =true)) #Heavy (50000) (100 Riflemen)\n\t\tYou get a heavy unit.\n\t\t*set Heavy +100\n\t\t*set Money -50000\n\t\t*set Riflemen -100\n\t\t*goto Conscript_1\n\t*selectable_if (((Money >=100000) and (Heavy >=100)) and (Russland =true)) #R.U.S.S.I.A. Troops (100000) (100 Heavies)\n\t\tYou get a R.U.S.S.I.A troop.\n\t\t*set Russia +2\n\t\t*set Money -100000\n\t\t*set Heavy -100\n\t\t*goto Conscript_1\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 100000\n\t\t*goto Prep_1\n*label Prep_1\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself. You may also pull missions to lower the Enemy Mass.  \n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*selectable_if ((Money >=5000) and (Civilian >=1)) #House (5000) (/30)\n\t\tYou build a free house to increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -5000\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=1)) #Bar (5000) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -5000\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=3000) and (Civilian >=1)) #Pub (3000) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +30\n\t\t*set Money -3000\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=1)) #Sports Stadium (10000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -10000\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Med School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=3)) #Gun Range (10000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -10000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=3000) and (Machine_Gunner >=10)) #MG Nest (3000) (10)MG Unit(s) -(3000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -3000\n\t\t*set Money -3000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=1000) and (Riflemen >=50)) #Rifle Trench (1000) (50)Rifle Unit(s) -(2000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -1000\n\t\t*set Riflemen -50\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=4000) and (Sniper_Infantry >=30)) #Sniper Hut (4000) (30)Sniper Unit(s) -(6000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -6000\n\t\t*set Money -4000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=20000) and (Artillery >=30)) #Artillery Array (20000) (30)Artillery Unit(s) -(20000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -20000\n\t\t*set Artillery -30\n\t\t*goto Prep_1\n\t*selectable_if (Money >=3000) #Barricade (3000) -(2000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -200\n\t\t*set Money -3000\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=3000) and (Infiltrator >=5)) #Infiltrator Squad (3000) (5)Infiltrator(s) -(15000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -15000\n\t\t*set Money -3000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_1\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (2000) (5)Bombers(s) -(60000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_1\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto Battle_Royale\n\n*label Battle_Royale\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nThey are here to destroy you. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with the Ottomans!\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Battle_Royale\n\t*selectable_if (Riflemen >=1) #Rifleman \n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -5\n\t\t*set Riflemen -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -5\n\t\t*goto Battle_Royale\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike \n\t\tYou fire some Artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=200)) #Rifle Rush X200\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -500000\n\t\t*set Riflemen -200\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Artillery >=100)) #Heavy Artillery Strike X100\n\t\tYou fire 100 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -100\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Flamer >=1)) #Flamer\n\t\tYou send out a flamer to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=1)) #Scorcher\n\t\tYou send out a scorcher to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +5\n\t\t*set Scorcher -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Airplane >=1)) #Airplane\n\t\tYou send out a airplane to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Bomber >=1)) #Bomber\n\t\tYou send out a bomber to do its business. It uses its bombs and is now a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -1\n\t\t*set Airplane +1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Gas >=1)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set Enemy_Mass -15000\n\t\t*set Gas -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Infiltrator >=1)) #Infiltrator\n\t\tYou send out a Infiltrator to do its business. They steal enemy war funds.\n\t\t*set Enemy_Mass -25000\n\t\t*set Money +500\n\t\t*set Infiltrator -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Marxman >=1)) #Marxman\n\t\tYou send out a marxman to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Marxman -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Czar_Guard >=1)) #Czar Guard\n\t\tYou send out a Czar Guard to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Czar_Guard -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Heavy >=5)) #Heavy Squad\n\t\tYou send out a heavy squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Heavy -5\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Russia >=5)) #R.U.S.S.I.A. Squad\n\t\tYou send out a R.U.S.S.I.A. squad to do its business. It experiences minimal casualties.\n\t\t*set Enemy_Mass -100000\n\t\t*set Russia -1\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Experiment >=1)) #Send An Abomination\n\t\tYou unleash the experiment. It kills very many and escapes.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Experiment -1\n\t\t*goto Battle_Royale\n\t*disable_reuse *selectable_if (Infil= true) #Gas Trap\n\t\tYou fill the air with gas as your units dawn gas masks.\n\t\t*set Enemy_Mass -300000\n\t\t*goto Battle_Royale\n\t*selectable_if ((Army_Power >=40) and (Failed_Experiment >=10)) #Release The Failed Experiments (10)\n\t\tYou unleash the experiments. They kills very many and are put out of their misery.\n\t\t*set Enemy_Mass -20000\n\t\t*set Failed_Experiment -10\n\t\t*goto Battle_Royale\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful battle!\n\t\t*set Enemy_Mass 0\n\t\t*goto Stalin\t\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Stalin\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n\n*label Stalin\n\n*if (choice_randomtest =true)\n\t*goto Ottoman_Prep_1\n\nYou see an up and comer rising. His name; [b]Stalin[/b]. Most high-ranking officials are impressed with him. Some abide his every whim. You can see what is happening. He is using underground influence to gain power. You need to put an end to this before he replaces you. Afterward you must deal with the Ottomans. They are misplaced here. You have very many things to worry about.\n\n*choice\n\n\t*selectable_if (Speaker >=60) #Conspire Against Him\n\t\tYou manage to conspire against him. He is exiled like Lenin was not so long ago. You hope this does not lead to war.\n\t\t*set Speaker +5\n\t\t*goto Ottoman_Prep_1\n\t*selectable_if (Sniper >=60) #Shoot Him\n\t\tAhh, the gun. The age old answer to problems.\n\t\t*set Sniper +5\n\t\t*goto Ottoman_Prep_1\n\t*selectable_if (Doctor >=60) #Poison Him\n\t\tYou give him a large dose of an anti-clotting factor and nick him with a blade.\n\t\t*set Doctor +5\n\t\t*goto Ottoman_Prep_1\n\t#Do Nothing\n\t\tHe eventually disposes of you.\n\t\t*goto_scene death\n\n*label Ottoman_Prep_1\n\nYou are preparing for attack! This is your first attack and it is right after the defense. You do not have time to prepare. The terrible Ottomans are preparing an attack. You must smash it. The rules are much different for an attack. There will be little defenders and they are the Ottomans, the embarrassment of the central powers. But they are entrenched. It may take months for equal sides to win a trench war. Lucky for you, things are not exactly equal. You will conquer about 10% of Ottoman territory. Time to prepare.\n\n*choice\n\n\t*selectable_if (Speaker >=60) #Increase Moral\n\t\tYou rally the troops in one big speech. Others decide to join your cause and they give a contribution.\n\t\t*set Speaker +5\n\t\t*set Money +5000\n\t\t*set Enemy_Mass 200000\n\t\t*goto Ottoman_Capture_1\n\n\t*selectable_if (Cloaked >=60) #Show-Case Sneaking Tactics\n\t\tYou teach soldiers covert sneaking tactics. Some become Infiltrators.\n\t\t*set Cloaked +5\n\t\t*set Infiltrator +10\n\t\t*set Enemy_Mass 200000\n\t\t*goto Ottoman_Capture_1\n\n\t#Look Over The Plans\n\t\tYou wait for time to pass while preparing yourself.\n\t\t*set Enemy_Mass 200000\n\t\t*goto Ottoman_Capture_1\n\n*label Ottoman_Capture_1\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with the Ottomans!\n\nEnemy Mass= ${Enemy_Mass}\n\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if (Riflemen >=1) #Rifleman \n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #Machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike \n\t\tYou fire some Artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=200)) #Rifle Rush X200\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -500000\n\t\t*set Riflemen -200\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=10) and (Artillery >=100)) #Heavy Artillery Strike X100\n\t\tYou fire 100 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -100\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Flamer >=1)) #Flamer\n\t\tYou send out a flamer to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=1)) #Scorcher\n\t\tYou send out a scorcher to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +5\n\t\t*set Scorcher -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Airplane >=1)) #Airplane\n\t\tYou send out a airplane to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Bomber >=1)) #Bomber\n\t\tYou send out a bomber to do its business. It uses its bombs and is available as a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -1\n\t\t*set Airplane +1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Gas >=1)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set Enemy_Mass -15000\n\t\t*set Gas -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Infiltrator >=1)) #Infiltrator\n\t\tYou send out a Infiltrator to do its business. They steal enemy war funds.\n\t\t*set Enemy_Mass -25000\n\t\t*set Money +500\n\t\t*set Infiltrator -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Marxman >=1)) #Marxman\n\t\tYou send out a marxman to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Marxman -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Czar_Guard >=1)) #Czar Guard\n\t\tYou send out a Czar Guard to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Czar_Guard -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Heavy >=5)) #Heavy Squad\n\t\tYou send out a heavy squad to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Heavy -5\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Russia >=5)) #R.U.S.S.I.A. Squad\n\t\tYou send out a R.U.S.S.I.A. squad to do its business. It experiences minimal casualties.\n\t\t*set Enemy_Mass -100000\n\t\t*set Russia -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Experiment >=1)) #Send An Abomination\n\t\tYou unleash the experiment. It kills very many and escapes.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Experiment -1\n\t\t*goto Ottoman_Capture_1\n\t*selectable_if ((Army_Power >=40) and (Failed_Experiment >=10)) #Release The Failed Experiments (10)\n\t\tYou unleash the experiments. They kills very many and are put out of their misery.\n\t\t*set Enemy_Mass -20000\n\t\t*set Failed_Experiment -10\n\t\t*goto Ottoman_Capture_1\n\t*disable_reuse *selectable_if (Airplane >=10) #Destroy The Train Via Plane\n\t\tYou quickly attack the supply lines, delaying supplies and support.\n\t\t*set Enemy_Mass -400000\n\t\t*goto Ottoman_Capture_1\n\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful battle!\n\t\t*set Enemy_Mass 0\n\t\t*goto Test_2\t\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Test_2\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n\n*label Test_2\n\nYou have conquered more land. Now the world is shocked and scared. \"How could the little, backwards Russia rebuild and take over territory?\" your democratic allies whimper. Germany is preparing a small garrison against you. Something the old Russia could have fallen to. Time to show the people of the world Russia is back and powerful. When you build defenses, they will have to be on the battle field. The Ottomans are getting supplies by train, giving you an idea. You have restarted science so now you can unlock new units. What shall you unlock?\n\nYou have$${Money}\n\n*choice\n\n\t*disable_reuse *selectable_if (((Money >=5000) and (Sniper_Infantry >=5)) and (Communist >=70)) #Marxmen (5000) (5 Snipers)\n\t\tYou develop better zoom and stability along with high caliber ammo. You give them Communist symbols.\n\t\t*set Money -5000\n\t\t*set Sniper_Infantry -5\n\t\t*set Marx true\n\t\t*set Marxman +5\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if (((Money >=5000) and (Machine_Gunner >=5)) and (Czarist >=70)) #Czar Guards (5000) (5 MGs)\n\t\tYou give them portable machine gun stands, make the guns lighter, and get rags to cool it along with Czarist symbols.\n\t\t*set Money -5000\n\t\t*set Machine_Gunner -5\n\t\t*set Guard true\n\t\t*set Czar_Guard +5\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Riflemen >=50)) #Heavy (50000) (50 Riflemen)\n\t\tYou give heavy, lightweight armor to riflemen and pockets containing supplies.\n\t\t*set Money -50000\n\t\t*set Riflemen -50\n\t\t*set Hev true\n\t\t*set Heavy +50\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=100000) and (Heavy >=50)) #R.U.S.S.I.A. Troops (100000) (50 Heavies)\n\t\tYou train 50 veterans for the [b]R[/b]ussian [b]U[/b]nit of [b]S[/b]uper [b]S[/b]oldier [b]I[/b]nfantry in [b]A[/b]rmor. Only one survives...\n\t\t*set Money -100000\n\t\t*set Heavy -50\n\t\t*set Russland true\n\t\t*set Russia +1\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=5000) and (Artillery >=5)) #Gas (5000) (5 Artillery)\n\t\tYou modify the chemicals in the flare shells and others making a lethal gas.\n\t\t*set Money -5000\n\t\t*set Artillery -5\n\t\t*set Gasser true\n\t\t*set Gas +5\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=20000) and (Gas >=5)) #Infiltrator (20000) (5 Gas)\n\t\tYou give stealth corps in dark, strong armor gas and instruct them to open the gas bombs and hide them.\n\t\t*set Money -20000\n\t\t*set Gas -5\n\t\t*set Infil true\n\t\t*set Infiltrator +5\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=20000) and (Tank >=5)) #Planes (20000) (5 Tank)\n\t\tYou study engines and make one powerful enough to take multiple guns and bullets into the air.\n\t\t*set Money -20000\n\t\t*set Tank -5\n\t\t*set Air true\n\t\t*set Airplane +5\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=40000) and (Airplane >=5)) #Bombers (40000) (5 Airplane)\n\t\tYou equip planes with better engines, bigger wings, and strong bombs, keeping the original guns on board.\n\t\t*set Money -40000\n\t\t*set Airplane -5\n\t\t*set Bomb true\n\t\t*set Bomber +5\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=10000) and (Anti_Tank >=5)) #Flamer (10000) (5 Anti-Tank)\n\t\tYou make rocket propellant give off a slow burn. The result; nightmares only 2nd to weapons of mass destruction.\n\t\t*set Money -10000\n\t\t*set Anti_Tank -5\n\t\t*set Fire true\n\t\t*set Flamer +5\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=30000) and (Flamer >=5)) #Scorcher (30000) (5 Flamer)\n\t\tYou develop full-body fire retardant suits and give heavy flame throwers. Destroys spies.\n\t\t*set Money -30000\n\t\t*set Flamer -5\n\t\t*set Scorch true\n\t\t*set Scorcher +5\n\t\t*goto Test_2\n\n\t*selectable_if ((Money >=3000) and (Civilian >=50)) #Prisoner Experiments (3000) (50 Civilians)\n\t\tYou give death row prisoners to the lab. The 20% that survived are now sick and have experienced mutations.\n\t\t*set Money -3000\n\t\t*set Civilian -50\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Civilian >=50)) #Dark Experiments- Skin (50000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The skin of the successful had grown crystals.\n\t\t*set Money -50000\n\t\t*set Civilian -50\n\t\t*set Stone_Skin true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Civilian >=50)) #Dark Experiments- Chemicals (50000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The brain of the successful had produced growth hormones.\n\t\t*set Money -50000\n\t\t*set Civilian -50\n\t\t*set Chem true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Civilian >=50)) #Dark Experiments- Immunity (50000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The body of the successful had been immune to pathogens.\n\t\t*set Money -50000\n\t\t*set Civilian -50\n\t\t*set Immune true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_2\n\n\t*disable_reuse *selectable_if (((Stone_Skin = true) and (Immune = true)) and (Chem = true)) #Abomination\n\t\tWhat have you done!?! You have made an abomination!!!\n\t\t*set Exper true\n\t\t*set Experiment +1\n\t\t*achieve dark\n\t\t*set Moral -30\n\t\t*goto Test_2\n\n\t#Done\n\t\tYou get ready to tax civilians.\n\t\t*set Money +10000\n\t\t*set Civilian +1000\n\t\t*goto Tax_2\n\n*label Tax_2\n\nYou find a gift of gold from the Allies, you feel this was a one-time contribution. You are ready to tax. The researching was very expensive. You have many civilians under your control. The Ottomans are mobilizing and preparing for more war with you. You need to afford your units and upgraded units. You are controlling South Russia. The Ottomans are at their brink of collapse as Russia once was. Finish them and establish your government there. For the motherland! For Serbia!\n\nTime to tax. High gives $20 per civilian, medium gives $10, and low give $5. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular.  Get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -5\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_2\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_2\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +5\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_2\n\n*label Conscript_2\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in a bit of Russia with heavy industry. This means you can get tanks, Artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 300000 Ottomans. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=300) #Book On Leading (3000) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -300\n\t\t*set Army_Power +10\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=500) and (Civilian >=10)) #10 Riflemen (500) (10)\n\t\tYou get general riflemen.\n\t\t*set Riflemen +10\n\t\t*set Money -500\n\t\t*set Civilian -10\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=2000) and (Civilian >=50)) #50 Riflemen (2000) (50)\n\t\tYou get 50 general rifleman. Cheaper.\n\t\t*set Riflemen +50\n\t\t*set Money -2000\n\t\t*set Civilian -50\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=3000) and (Civilian >=30)) #10 Tanks (3000) (30)\n\t\tYou get a TANK.\n\t\t*set Tank +10\n\t\t*set Money -3000\n\t\t*set Civilian -30\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=1500) and (Civilian >=50)) #10 Artillery (1500) (50)\n\t\tYou get Artillery.\n\t\t*set Artillery +10\n\t\t*set Money -1500\n\t\t*set Civilian -50\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=1500) and (Civilian >=10)) #10 Machine Gunners (1500) (10)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +10\n\t\t*set Money -1500\n\t\t*set Civilian -10\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=1000) and (Civilian >=10)) #10 Snipers (1000) (100)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +10\n\t\t*set Money -1000\n\t\t*set Civilian -10\n\t\t*goto Conscript_2\n\t*selectable_if ((Money >=1500) and (Civilian >=1)) #10 ATs (1500) (100)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +10\n\t\t*set Money -1500\n\t\t*set Civilian -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=5000) and (Sniper_Infantry >=10)) and (Marx =true)) #Marxmen (5000) (10 Snipers)\n\t\tYou get a Marxman.\n\t\t*set Marxman +10\n\t\t*set Money -5000\n\t\t*set Sniper_Infantry -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=5000) and (Machine_Gunner >=10)) and (Guard =true)) #Czar Guards (4000) (10 MGs)\n\t\tYou get a Czar Guard.\n\t\t*set Czar_Guard +10\n\t\t*set Money -5000\n\t\t*set Machine_Gunner -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=10000) and (Anti_Tank >=10)) and (Fire =true)) #Flamers (10000) (10 ATs)\n\t\tYou get a flamer.\n\t\t*set Flamer +10\n\t\t*set Money -10000\n\t\t*set Anti_Tank -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=15000) and (Flamer >=10)) and (Scorch =true)) #Scorchers (15000) (10 Flamers)\n\t\tYou get a scorcher.\n\t\t*set Scorcher +10\n\t\t*set Money -15000\n\t\t*set Flamer -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=5000) and (Artillery >=10)) and (Gasser =true)) #Gas (5000) (10 Artillery)\n\t\tYou get a gas unit.\n\t\t*set Gas +10\n\t\t*set Money -5000\n\t\t*set Artillery -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=30000) and (Gas >=10)) and (Infil =true)) #Infiltrator (30000) (10 Gas)\n\t\tYou get an Infiltrator.\n\t\t*set Infiltrator +10\n\t\t*set Money -30000\n\t\t*set Gas -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=30000) and (Tank >=10)) and (Air =true)) #Airplane (30000) (10 Tanks)\n\t\tYou get a Airplane.\n\t\t*set Airplane +10\n\t\t*set Money -30000\n\t\t*set Tank -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=60000) and (Airplane >=10)) and (Bomb =true)) #Bomber (60000) (10 Planes)\n\t\tYou get a Bomber.\n\t\t*set Bomber +10\n\t\t*set Money -60000\n\t\t*set Airplane -10\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=50000) and (Riflemen >=100)) and (Hev =true)) #Heavy (50000) (100 Riflemen)\n\t\tYou get a heavy unit.\n\t\t*set Heavy +100\n\t\t*set Money -50000\n\t\t*set Riflemen -100\n\t\t*goto Conscript_2\n\t*selectable_if (((Money >=100000) and (Heavy >=100)) and (Russland =true)) #R.U.S.S.I.A. Troops (100000) (100 Heavies)\n\t\tYou get a R.U.S.S.I.A troop.\n\t\t*set Russia +2\n\t\t*set Money -100000\n\t\t*set Heavy -100\n\t\t*goto Conscript_2\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 300000\n\t\t*goto Buy_1\n\n*label Buy_1\n\nBefore you manage to discuss new buildings, you see a house that is purple, yellow, and red striped. When you enter, there is a number of gypsies that look at you, one is familiar. They have a deal for you. There is a contest for people. The contest was held to help Russia get better. They have ideas that they need to be made. If you can provide them money, those ideas may come into fruition and you can use them to better Russia. \n\nOne idea is a special running track. Every week you will hold a run and the winners get in a special training facility. Once trained, the runners will become highly equipped soldiers. This will give you a constant supply of powerful units. ($15000) (/20)\n\nAnother is a type of relief squad. They will go into war-torn areas and help people rebuild. This may allow you to gain favor and donations from the west. ($12000)\n\nFinally, there is an idea of improving schools. This will allow for the majority of people to become more intelligent and rich. ($5000)\n\nWhich do you want?\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=15000) #Running Track\n\t\tYou decide to fund the running track.\n\t\t*set Track true\n\t\t*set Money -15000\n\t\t*set Civilian +20\n\t\t*goto Buy_1\n\n\t*disable_reuse *selectable_if (Money >=12000) #Relief Squad\n\t\tYou decide to fund the relief squad.\n\t\t*set Relief true\n\t\t*set Money -12000\n\t\t*goto Buy_1\n\n\t*disable_reuse *selectable_if (Money >=5000) #Schools\n\t\tYou decide to fund the public schools.\n\t\t*set Schools true\n\t\t*set Money -5000\n\t\t*set Welfare +10\n\t\t*goto Buy_1\n\n\t*disable_reuse #Talk To The Gypsies\n\t\tYou find a familiar gypsy with a familiar voice. \"Young child\" they whisper. That gypsy has been the first to talk about your age. \"I see a fire\" the gypsy continues. \"Yes, a fire. A fire caused by treason and lies\". \"Germans knocking at the gates of the Kremlin\". \"An army, or a car, or; or; or; no! It cannot be\" They gypsy faints. You realize this was the gypsy from Moscow a while ago.\n\t\t*goto Buy_1\n\n\t#Leave\n\t\tYou exit the house.\n\t\t*goto Prep_2\n\n*label Prep_2\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nYou remember that. Now you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself. You may also pull missions to lower the Enemy Mass.  \n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\n\t*disable_reuse *selectable_if ((Money >=10000) and (Track = true)) #Running Track (10000) (/200)\n\t\tYou get a running track and you get some elites already.\n\t\t*set Civilian +200\n\t\t*set Heavy +50\n\t\t*set Money -10000\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=5000) and (Civilian >=1)) #House (5000) (/30)\n\t\tYou build a free house to increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -5000\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=1)) #Bar (5000) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -5000\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=3000) and (Civilian >=1)) #Pub (3000) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -3000\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=1)) #Sports Stadium (10000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -10000\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Med School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=3)) #Gun Range (10000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -10000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=3000) and (Machine_Gunner >=1)) #MG Nest (3000) (10)MG Unit(s) -(3000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -3000\n\t\t*set Money -3000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=1000) and (Riflemen >=5)) #Rifle Trench (1000) (50)Rifle Unit(s) -(2000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -1000\n\t\t*set Riflemen -50\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=4000) and (Sniper_Infantry >=3)) #Sniper Hut (4000) (30)Sniper Unit(s) -(6000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -6000\n\t\t*set Money -4000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=10000) and (Artillery >=3)) #Artillery Array (10000) (30)Artillery Unit(s) -(20000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -10000\n\t\t*set Artillery -30\n\t\t*goto Prep_2\n\t*selectable_if (Money >=3000) #Barricade (3000) -(2000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -3000\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=3000) and (Infiltrator >=5)) #Infiltrator Squad (3000) (5)Infiltrator(s) -(15000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -15000\n\t\t*set Money -3000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_2\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (2000) (5)Bombers(s) -(60000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_2\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto Ottoman_Capture_2\n\n*label Ottoman_Capture_2\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with the Ottomans! After this, you will be able to own 25% of Ottoman territory.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if (Riflemen >=1) #Rifleman \n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike \n\t\tYou fire some Artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy_Mass -2000\n\t\t*set Artillery -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=200)) #Rifle Rush X200\n\t\tYou send out a number of riflemen who clear out a number of foes.\n\t\t*set Enemy_Mass -500000\n\t\t*set Riflemen -200\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=10) and (Artillery >=100)) #Heavy Artillery Strike X100\n\t\tYou fire 100 Artillery. It uses lots of its very rare ammunition.\n\t\t*set Enemy_Mass -2000000\n\t\t*set Artillery -100\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=5) and (Anti_Tank >=1)) #Rocket Launcher\n\t\tAn AT gets up high and fires a rocket before a sniper does his job.\n\t\t*set Enemy_Mass -2000\n\t\t*set Anti_Tank -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=10) and (Tank >=1)) #Tank!!!\n\t\tYou send out a tank to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -5000\n\t\t*set Tank -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Flamer >=1)) #Flamer\n\t\tYou send out a flamer to do its business. It causes mass mayhem but is put out from overheating.\n\t\t*set Enemy_Mass -20000\n\t\t*set Flamer -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Scorcher >=1)) #Scorcher\n\t\tYou send out a scorcher to do its business. It scare civilians onto your side.\n\t\t*set Enemy_Mass -30000\n\t\t*set Civilian +5\n\t\t*set Scorcher -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Airplane >=1)) #Airplane\n\t\tYou send out a airplane to do its business.\n\t\t*set Enemy_Mass -30000\n\t\t*set Airplane -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Bomber >=1)) #Bomber\n\t\tYou send out a bomber to do its business. It uses its bombs and is available as a fighter plane\n\t\t*set Enemy_Mass -40000\n\t\t*set Bomber -1\n\t\t*set Airplane +1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Gas >=1)) #Gas\n\t\tYou send out a gas unit to do its business.\n\t\t*set Enemy_Mass -15000\n\t\t*set Gas -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Infiltrator >=1)) #Infiltrator\n\t\tYou send out a Infiltrator to do its business. They steal enemy war funds.\n\t\t*set Enemy_Mass -25000\n\t\t*set Money +500\n\t\t*set Infiltrator -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Marxman >=1)) #Marxman\n\t\tYou send out a marxman to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Marxman -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Czar_Guard >=1)) #Czar Guard\n\t\tYou send out a Czar Guard to do its business.\n\t\t*set Enemy_Mass -20000\n\t\t*set Czar_Guard -1\n\t\t*goto Ottoman_Capture_2\n\t*selectable_if ((Army_Power >=40) and (Heavy >=5)) #Heavy Squad\n\t\tYou  You crawl out of the rubble, bleeding. You notice most of the Kremlin is alright, just not where you are. You are scared to ask for help as there may be more moles. What do you do?\n\n*choice\n\n\t#Call Out\n\t\tYou yell out for help and German soldiers finish you off.\n\t\t*goto_scene death\n\t#Look Around\n\t\tYou spy around you, and hear German.\n\t\t*goto Gates_1\n\t#Crawl Out Into A Crevice\n\t\tYou enter a cramped small cave and start healing yourself.\n\t\t*goto Gates_2\n\n*label Gates_2\n\nYou are hidden inside what appears to be a liquor cabinet. You manage to find an unsmashed glass and you fill it up, that gives you the strenght to go on. A German soldier enters the room, and yells something. You bandage yourself with a Russian flag. Shame it came to this. You find a display case with Cetrina in it and grab the rifle. The German has his head turned. You use a piece of wood as a stablizer. Do you fire or do you hold it for fear of being caught?\n\n*choice\n\n\t#Fire!\n\t\tYou shoot him and dart for the Gypsy House.\n\t\t*goto Gates_3\n\t#Hold\n\t\tThe German comes by and you hold your breath. He goes back to his position.\n\t\t*goto Gates_2\n\n*label Gates_3\n\n*set Rifle 30\n\nYou made your way to the Gypsy House and you ask if the Germans searched it yet. They reply yes and the Germans left quickly. They provide refuge and guide you towards one of theirs. That familiar gypsy starts talking. \"Oh, young NicolÆ, your trials are not done. Help is on the way. But first you must stay alive.\" You ask if you make it through the day. The gypsy replies \"That depends on your choices\" as you leave to a bed the have for you, you ask for the gypsy's name. The gypsy smiles and replies \"[i]CRNOBOG[/i]\" giving a sinister smile. You go to bed and you are awakened by a German search squad ransacking the place. What do you do?\n\n*choice\n\n\t#Hide\n\t\tYou jump under the bed and you are found, then shot.\n\t\t*goto_scene death\n\t#Run\n\t\tYou jump out the window, and see a train.\n\t\t*set Enemy_Mass +150000\n\t\t*goto Gates_4\n\n*label Gates_4\n\nYou hide in a trash heap until the train arrives. You manage to reach the train before the Germans and you see some riflemen who came to helpn They want to take it the the Germans. You will lead them!\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nEnemy Mass=${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=20) #Fire!\n\t\tYou fire at the crowd, using your clip and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -50\n\t\t*goto Gates_4\n\t*selectable_if (Rifle >=1) #Rifleman\n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Rifle -1\n\t\t*goto Gates_4\n\t*selectable_if ((Army_Power >=5) and (Rifle >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Rifle -5\n\t\t*goto Gates_4\n\t*selectable_if ((Army_Power >=10) and (Rifle >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Rifle -5\n\t\t*goto Gates_4\n\t*selectable_if ((Army_Power >=20) and (Rifle >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Rifle -5\n\t\t*goto Gates_4\n\t*selectable_if (Track = true) #Track Squad Help \n\t\tThe track squad army provides support.\n\t\t*set Enemy_Mass -150000\n\t\t*goto Gates_4\n\t*selectable_if (Enemy_Mass \u003c=0) #Victory\n\t\tYou did it! A successful battle!\n\t\t*set Enemy_Mass 0\n\t\t*goto Test_3\n\t#Loss\n\t\tThe foes beat you, capture you, and imprison you for your \"crimes\".\n\t\t*goto Gates_5\n\n*label Gates_5\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nYou were lucky to be captured. The reason why you were not executed was because that would spark Russia and make it explode against Germany. You reach out of the prison and pick up a rock. With the rock, you carve out a tunnel so you can escape. However, you must wait until support comes. Once day, you hear bells ringing and you look out the window. In the window, you see the Russian flag flown in the sky. You escape to your army. They welcome you and prepare themselves for the fight ahead.\n\nEnemy Mass=${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Gates_5\n\t*selectable_if (Riflemen >=1) #Rifleman \n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -1\n\t\t*goto Gates_5\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*goto Gates_5\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -5\n\t\t*goto Gates_5\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -5\n\t\t*goto Gates_5\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto Gates_5\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -1\n\t\t*goto Gates_5\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_M ssful battle!\n\t\t*set Enemy_Mass 0\n\t\t*goto Test_3\n\t#Loss\n\t\t*if (choice_randomtest =true)\n\t\t\t*goto Test_3\n\t\t*else\n\t\t\tYour foes defeat you and execute you for your \"crimes\".\n\t\t\t*goto_scene death\n\n\n*label Test_3\n\nIt is time for the march into Konstantinopel, the Ottoman's capital. After this the Ottomans will be defeated. Desertion is a big problem in their army so the [b]Kaiser[/b] is meeting with the leader of the Ottomans to discuss defenses. This will be the biggest Ottoman garrison, so it is time to prepare. You can tell your allies are both proud of you and rather scared that your government will take hold in their cities. Once you get Konstantinopel you will be able to annex the Ottoman territory to Russia! You have restarted science so now you can unlock new units. What shall you unlock?\n\nYou have$${Money}\n\n*choice\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Sniper_Infantry >=5)) and (Communist >=70)) #Marxmen (50000) (5 Snipers)\n\t\tYou develop better zoom and stability along with high caliber ammo. You give them Communist symbols.\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -5\n\t\t*set Marx true\n\t\t*set Marxman +5\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if (((Money >=50000) and (Machine_Gunner >=5)) and (Czarist >=70)) #Czar Guards (50000) (5 MGs)\n\t\tYou give them portable machine gun stands, make the guns lighter, and get rags to cool it along with Czarist symbols.\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -5\n\t\t*set Guard true\n\t\t*set Czar_Guard +5\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Riflemen >=50)) #Heavy (500000) (50 Riflemen)\n\t\tYou give heavy, lightweight armor to riflemen and pockets containing supplies.\n\t\t*set Money -500000\n\t\t*set Riflemen -50\n\t\t*set Hev true\n\t\t*set Heavy +50\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=1000000) and (Heavy >=50)) #R.U.S.S.I.A. Troops (1000000) (50 Heavies)\n\t\tYou train 50 veterans for the [b]R[/b]ussian [b]U[/b]nit of [b]S[/b]uper [b]S[/b]oldier [b]I[/b]nfantry in [b]A[/b]rmor. Only one survives...\n\t\t*set Money -1000000\n\t\t*set Heavy -50\n\t\t*set Russland true\n\t\t*set Russia +1\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=50000) and (Artillery >=5)) #Gas (50000) (5 Artillery)\n\t\tYou modify the chemicals in the flare shells and others making a lethal gas.\n\t\t*set Money -50000\n\t\t*set Artillery -5\n\t\t*set Gasser true\n\t\t*set Gas +5\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Gas >=5)) #Infiltrator (200000) (5 Gas)\n\t\tYou give stealth corps in dark, strong armor gas and instruct them to open the gas bombs and hide them.\n\t\t*set Money -200000\n\t\t*set Gas -5\n\t\t*set Infil true\n\t\t*set Infiltrator +5\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=200000) and (Tank >=5)) #Planes (200000) (5 Tank)\n\t\tYou study engines and make one powerful enough to take multiple guns and bullets into the air.\n\t\t*set Money -200000\n\t\t*set Tank -5\n\t\t*set Air true\n\t\t*set Airplane +5\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=400000) and (Airplane >=5)) #Bombers (400000) (5 Airplane)\n\t\tYou equip planes with better engines, bigger wings, and strong bombs, keeping the original guns on board.\n\t\t*set Money -400000\n\t\t*set Airplane -5\n\t\t*set Bomb true\n\t\t*set Bomber +5\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=100000) and (Anti_Tank >=5)) #Flamer (100000) (5 Anti-Tank)\n\t\tYou make rocket propellant give off a slow burn. The result; nightmares only 2nd to weapons of mass destruction.\n\t\t*set Money -100000\n\t\t*set Anti_Tank -5\n\t\t*set Fire true\n\t\t*set Flamer +5\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=30000) and (Flamer >=5)) #Scorcher (300000) (5 Flamer)\n\t\tYou develop full-body fire retardant suits and give heavy flame throwers. Destroys spies.\n\t\t*set Money -300000\n\t\t*set Flamer -5\n\t\t*set Scorch true\n\t\t*set Scorcher +5\n\t\t*goto Test_3\n\n\t*selectable_if ((Money >=30000) and (Civilian >=50)) #Prisoner Experiments (30000) (50 Civilians)\n\t\tYou give death row prisoners to the lab. The 20% that survived are now sick and have experienced mutations.\n\t\t*set Money -30000\n\t\t*set Civilian -50\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Skin (500000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The skin of the successful had grown crystals.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Stone_Skin true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Chemicals (5000000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The brain of the successful had produced growth hormones.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Chem true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if ((Money >=500000) and (Civilian >=50)) #Dark Experiments- Immunity (5000000) (50 Civilians)\n\t\tYou subject strong and smart humans to intensive therapy. The body of the successful had been immune to pathogens.\n\t\t*set Money -500000\n\t\t*set Civilian -50\n\t\t*set Immune true\n\t\t*set Failed_Experiment +10\n\t\t*set Moral -10\n\t\t*goto Test_3\n\n\t*disable_reuse *selectable_if (((Stone_Skin = true) and (Immune = true)) and (Chem = true)) #Abomination\n\t\tWhat have you done!?! You have made an abomination!!!\n\t\t*set Exper true\n\t\t*set Experiment +1\n\t\t*achieve dark\n\t\t*set Moral -30\n\t\t*goto Test_3\n\n\t#Done\n\t\tYou get ready to tax civilians.\n\t\t*set Civilian +1000\n\t\t*goto Tax_3\n\n*label Tax_3\n\nYou are ready to tax. The researching was very expensive. You have many civilians under your control. The Ottomans are mobilizing and preparing for more war with you. You need to afford your units and upgraded units. You are controlling all of Russia. The Ottomans are at their brink of collapse as Russia once was. Finish them and establish your government there. For the motherland! For Serbia!\n\nTime to tax. High gives $20 per civilian, medium gives $10, and low give $5. You can also conscript civilians to soldiers for money. If you are running low on civilians, you can buy food and help them to grow the population. Doing this though was very unpopular.  Get ready.\n\nYour Current Civilians Are ${Civilian}\n\n*choice\n\n\t*if (Contentment >=70) #High\n\t\tThe civilians are sad but expected this. Some can't afford food.\n\t\t*set Money +(Civilian * 20)\n\t\t*set Civilian -5\n\t\t*set Moral -10\n\t\t*set Contentment -20\n\t\t*goto Conscript_3\n\t*if (Contentment >=50) #Medium\n\t\tYou set taxes as the were before the revolution.\n\t\t*set Money +(Civilian * 10)\n\t\t*set Contentment -10\n\t\t*goto Conscript_3\n\t#Low\n\t\tThe workers are confused. They have never been treated like this before. People can afford to have kids now.\n\t\t*set Money +(Civilian * 5)\n\t\t*set Civilian +5\n\t\t*set Moral +10\n\t\t*set Contentment +30\n\t\t*goto Conscript_3\n\n*label Conscript_3\n\nMany civilians are willing to fight. Unfortunately, weapons are not free. So to get soldiers, you need weapons and civilians. You are lucky to be in Russia. This means you can get tanks, Artillery, and heavy weaponry. Prepare well, you heard a there is a mass of 500000 Ottomans. You need to prepare as much as possible without draining the population. If you are in trouble, you may need to fight yourself. Try to have high Army_Power. Also, things are cheaper in bulk.\n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed\n\n*choice\n\n\t*disable_reuse *selectable_if (Money >=3000) #Book On Leading (3000) (0)\n\t\tYou learn more speaking and leading skills.\n\t\t*set Speaker +10\n\t\t*set Money -3000\n\t\t*set Army_Power +10\n\t\t*goto Conscript_3\n\t*selectable_if ((Money >=500) and (Civilian >=10)) #10 Riflemen (5000) (10)\n\t\tYou get general riflemen.\n\t\t*set Riflemen +10\n\t\t*set Money -5000\n\t\t*set Civilian -10\n\t\t*goto Conscript_3\n\t*selectable_if ((Money >=20000) and (Civilian >=50)) #50 Riflemen (20000) (50)\n\t\tYou get 50 general rifleman. Cheaper.\n\t\t*set Riflemen +50\n\t\t*set Money -20000\n\t\t*set Civilian -50\n\t\t*goto Conscript_3\n\t*selectable_if ((Money >=30000) and (Civilian >=30)) #10 Tanks (30000) (30)\n\t\tYou get a TANK.\n\t\t*set Tank +10\n\t\t*set Money -30000\n\t\t*set Civilian -30\n\t\t*goto Conscript_3\n\t*selectable_if ((Money >=15000) and (Civilian >=50)) #10 Artillery (15000) (50)\n\t\tYou get Artillery.\n\t\t*set Artillery +10\n\t\t*set Money -15000\n\t\t*set Civilian -50\n\t\t*goto Conscript_3\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 Machine Gunners (15000) (10)\n\t\tYou get a general machine gunner.\n\t\t*set Machine_Gunner +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_3\n\t*selectable_if ((Money >=10000) and (Civilian >=10)) #10 Snipers (10000) (10)\n\t\tYou get a marksman.\n\t\t*set Sniper_Infantry +10\n\t\t*set Money -10000\n\t\t*set Civilian -10\n\t\t*goto Conscript_3\n\t*selectable_if ((Money >=15000) and (Civilian >=10)) #10 ATs (15000) (10)\n\t\tYou get an anti-tank.\n\t\t*set Anti_Tank +10\n\t\t*set Money -15000\n\t\t*set Civilian -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=50000) and (Sniper_Infantry >=10)) and (Marx =true)) #Marxmen (50000) (10 Snipers)\n\t\tYou get a Marxman.\n\t\t*set Marxman +10\n\t\t*set Money -50000\n\t\t*set Sniper_Infantry -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=50000) and (Machine_Gunner >=10)) and (Guard =true)) #Czar Guards (40000) (10 MGs)\n\t\tYou get a Czar Guard.\n\t\t*set Czar_Guard +10\n\t\t*set Money -50000\n\t\t*set Machine_Gunner -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=100000) and (Anti_Tank >=10)) and (Fire =true)) #Flamers (100000) (10 ATs)\n\t\tYou get a flamer.\n\t\t*set Flamer +10\n\t\t*set Money -100000\n\t\t*set Anti_Tank -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=150000) and (Flamer >=10)) and (Scorch =true)) #Scorchers (150000) (10 Flamers)\n\t\tYou get a scorcher.\n\t\t*set Scorcher +10\n\t\t*set Money -150000\n\t\t*set Flamer -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=50000) and (Artillery >=10)) and (Gasser =true)) #Gas (50000) (10 Artillery)\n\t\tYou get a gas unit.\n\t\t*set Gas +10\n\t\t*set Money -50000\n\t\t*set Artillery -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=300000) and (Gas >=10)) and (Infil =true)) #Infiltrator (300000) (10 Gas)\n\t\tYou get an Infiltrator.\n\t\t*set Infiltrator +10\n\t\t*set Money -300000\n\t\t*set Gas -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=300000) and (Tank >=10)) and (Air =true)) #Airplane (300000) (10 Tanks)\n\t\tYou get a Airplane.\n\t\t*set Airplane +10\n\t\t*set Money -300000\n\t\t*set Tank -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=600000) and (Airplane >=10)) and (Bomb =true)) #Bomber (600000) (10 Planes)\n\t\tYou get a Bomber.\n\t\t*set Bomber +10\n\t\t*set Money -600000\n\t\t*set Airplane -10\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=500000) and (Riflemen >=100)) and (Hev =true)) #Heavy (500000) (100 Riflemen)\n\t\tYou get a heavy unit.\n\t\t*set Heavy +100\n\t\t*set Money -500000\n\t\t*set Riflemen -100\n\t\t*goto Conscript_3\n\t*selectable_if (((Money >=1000000) and (Heavy >=100)) and (Russland =true)) #R.U.S.S.I.A. Troops (1000000) (100 Heavies)\n\t\tYou get a R.U.S.S.I.A troop.\n\t\t*set Russia +2\n\t\t*set Money -1000000\n\t\t*set Heavy -100\n\t\t*goto Conscript_3\n\t#Done\n\t\tYou prepare the area for war.\n\t\t*set Enemy_Mass 500000\n\t\t*goto Prep_3\n\n*label Prep_3\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\n\nNow you have an army. You need to prepare the area for war. You can build things such as bars, pubs, and sports arenas to increase population. You can build defenses to lower the mass of troops you will actually have to take care of. You can build centers were you could train yourself. You may also pull missions to lower the Enemy Mass.  \n\nYou have ${Civilian} civilians and $${Money}. First number-Price.Second number-Civilians needed.Second +/ is Civilians provided.\n\nThere is an Enemy Mass of ${Enemy_Mass} (EM= Enemy Mass)\n\n*choice\n\n\t*selectable_if ((Money >=5000) and (Civilian >=1)) #House (5000) (/30)\n\t\tYou build a free house to increase population.\n\t\t*set Civilian +30\n\t\t*set Moral +10\n\t\t*set Money -5000\n\t\t*goto Prep_3\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=1)) #Bar (5000) (/50)\n\t\tYou hire a bartender and buy some food in hopes that the center will increase population.\n\t\t*set Civilian +50\n\t\t*set Money -5000\n\t\t*goto Prep_3\n\t*disable_reuse *selectable_if ((Money >=3000) and (Civilian >=1)) #Pub (3000) (/30)\n\t\tYou hire a bartender and buy some drinks in hopes that the center will increase population.\n\t\t*set Civilian +3\n\t\t*set Money -3000\n\t\t*goto Prep_3\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=1)) #Sports Stadium (10000) (/100)\n\t\tYou hire a team and buy some snacks in hopes that the center will increase population.\n\t\t*set Civilian +100\n\t\t*set Money -10000\n\t\t*goto Prep_3\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Med School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase doctors and medical services.\n\t\t*set Doctor +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_3\n\t*disable_reuse *selectable_if ((Money >=10000) and (Civilian >=3)) #Gun Range (10000) (3)\n\t\tYou hire some shooting instructors and buy some ammo in hopes that the center will increase soldiers.\n\t\t*set Sniper +30\n\t\t*set Money -10000\n\t\t*set Civilian -3\n\t\t*set Riflemen +20\n\t\t*set Sniper_Infantry +5\n\t\t*goto Prep_3\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Speech Center (5000) (3)\n\t\tYou hire some teachers and buy some microphones in hopes that the center will increase fluency.\n\t\t*set Speaker +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_2\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Gymnastics (5000) (3)\n\t\tYou hire some instructors and buy some materials in hopes that the center will increase agility.\n\t\t*set Cloaked +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_3\n\t*disable_reuse *selectable_if ((Money >=5000) and (Civilian >=3)) #Boxing Ring (5000) (3)\n\t\tYou hire some instructors and buy some punching bags in hopes that the center will increase strength.\n\t\t*set Heavy_Hitter +30\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_3\n\t*selectable_if ((Money >=5000) and (Civilian >=3)) #School (5000) (3)\n\t\tYou hire some teachers and buy some books in hopes that the center will increase general intelligence.\n\t\t*set Doctor +10\n\t\t*set Cloaked +10\n\t\t*set Heavy_Hitter +10\n\t\t*set Sniper +10\n\t\t*set Army_Power +5\n\t\t*set Speaker +10\n\t\t*set Money -5000\n\t\t*set Civilian -3\n\t\t*goto Prep_3\n\t*selectable_if ((Money >=3000) and (Machine_Gunner >=10)) #MG Nest (3000) (10)MG Unit(s) -(3000) EM\n\t\tYou hire a machine gunner and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -3000\n\t\t*set Money -3000\n\t\t*set Machine_Gunner -10\n\t\t*goto Prep_3\n\t*selectable_if ((Money >=1000) and (Riflemen >=50)) #Rifle Trench (1000) (50)Rifle Unit(s) -(2000) EM\n\t\tYou dig a trench and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -1000\n\t\t*set Riflemen -50\n\t\t*goto Prep_3\n\t*selectable_if ((Money >=4000) and (Sniper_Infantry >=30)) #Sniper Hut (4000) (30)Sniper Unit(s) -(6000) EM\n\t\tYou mark a dead-zone and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -6000\n\t\t*set Money -4000\n\t\t*set Sniper_Infantry -30\n\t\t*goto Prep_3\n\t*selectable_if ((Money >=10000) and (Artillery >=30)) #Artillery Array (10000) (30)Artillery Unit(s) -(20000) EM\n\t\tYou hire a mechanic and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -20000\n\t\t*set Money -10000\n\t\t*set Artillery -30\n\t\t*goto Prep_3\n\t*selectable_if (Money >=3000) #Barricade (3000) -(2000) EM\n\t\tYou hire a builder and buy some ammo in hopes that the structure will decrease foes.\n\t\t*set Enemy_Mass -2000\n\t\t*set Money -3000\n\t\t*goto Prep_3\n\t*selectable_if ((Money >=3000) and (Infiltrator >=5)) #Infiltrator Squad (3000) (5)Infiltrator(s) -(15000) EM\n\t\tYou send a gas squad into a foe's base.\n\t\t*set Enemy_Mass -15000\n\t\t*set Money -3000\n\t\t*set Infiltrator -5\n\t\t*goto Prep_3\n\t*selectable_if ((Money >=2000) and (Bomber >=5)) #Bombing Run (2000) (5)Bombers(s) -(60000) EM\n\t\tYou send a bombing run.\n\t\t*set Enemy_Mass -60000\n\t\t*set Money -2000\n\t\t*set Bomber -5\n\t\t*set Airplane +5\n\t\t*goto Prep_3\n\t#Here They Come...\n\t\tYou see units on the horizon. Here they come.\n\t\t*goto Ottoman_Capture_3\n\n*label Ottoman_Capture_3\n\n*if (Enemy_Mass \u003c0)\n\t*set Enemy_Mass 0\n\nYou are here to destroy them. Remember, you need to diminish the mass to 0 or below. The current enemy army mass is ${Enemy_Mass}. Your army power measures your skill as a leader. In order to pull of a flawless work, you need a higher army power. To say the words \"Go close and shoot them\" you obviously require less army skill. It is always possible to win with no casualties on your side. You need to survive so don't go against 10 tanks with just a pistol yourself. Down with the Ottomans! After this, you will be able to own 100% of Ottoman territory. The final march.\n\nEnemy Mass= ${Enemy_Mass}\n\n*choice\n\n\t*disable_reuse *selectable_if (Sniper >=50) #Rocket Fire!\n\t\tYou fire rockets at the crowd, using your supply and you have no time to reload.\n\t\t*set Sniper +5\n\t\t*set Enemy_Mass -10000\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if (Riflemen >=1) #Rifleman \n\t\tYou send a single rifleman to his quick death. It was not the smartest thing to do.\n\t\t*set Enemy_Mass -50\n\t\t*set Riflemen -1\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if ((Army_Power >=5) and (Riflemen >=5)) #Rifle Squad Of 5\n\t\tThey deal damage but are lost in combat.\n\t\t*set Enemy_Mass -500\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if ((Army_Power >=10) and (Riflemen >=5)) #Elite Rifle Squad Of 5\n\t\tThey employ elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1000\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if ((Army_Power >=20) and (Riflemen >=5)) #Very Elite Rifle Squad Of 5\n\t\tThey employ Very elite tactics but meet their inevitable end.\n\t\t*set Enemy_Mass -1500\n\t\t*set Riflemen -5\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if (((Army_Power >=20) and (Riflemen >=5)) and (Machine_Gunner >=1)) #MG Phalanx\n\t\tA light machine gunner wrapped in a shell of riflemen\n\t\t*set Enemy_Mass -5000\n\t\t*set Riflemen -5\n\t\t*set Machine_Gunner -1\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if ((Army_Power >=5) and (Machine_Gunner >=1)) #machine gunner\n\t\tThe machine gunner opened fire, destroying very many foes yet he dies.\n\t\t*set Enemy_Mass -1000\n\t\t*set Machine_Gunner -1\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if ((Army_Power >=10) and (Sniper_Infantry >=1)) #Sniper\n\t\tThe sniper gets many potshots before he is ended.\n\t\t*set Enemy_Mass -1500\n\t\t*set Sniper_Infantry -1\n\t\t*goto Ottoman_Capture_3\n\t*selectable_if ((Army_Power >=10) and (Artillery >=1)) #Artillery Strike \n\t\tYou fire some Artillery. It uses some of its very rare ammunition.\n\t\t*set Enemy
